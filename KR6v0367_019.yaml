body:
  text: 宗喀巴大師造法尊法師譯明生起次第品第十二之三巳三圓滿之支分分二午一召入智尊印證供讚午二嘗甘露味修念誦法今初若知修習主尊儀軌要義修眷屬法則易了知當俱修三昧耶薩埵此中滅庸凡慢自心現為面臂端嚴之天即三昧耶薩埵教授穗云有亦説種子有唯説種子此述二派有説天身及種子字為三昧耶薩埵有説唯種子為三昧耶薩埵者三昧耶者梵語三梅底為正往彌拉底為攝還如教授穗論云以此體性中具無二智性智慧薩埵能正往還名三昧耶此是三昧耶之訓詁言薩埵者如前論云能饒益有情故是清淨有情名所詮境故名為薩埵云何種子得有薩埵之義即前論云種子如羯羅藍亦名有情此舉雖無頭臂行相亦可名為有情之喻雖曼陀羅諸尊容有多少然最少者亦須加持諸處或身語意等尊堪為定量諸曼陀羅現觀亦皆順所淨事具足能淨諸尊之數故若不修堪為定量之曼陀羅修法則難具足生起次第修上悉地之扼要也召入智慧薩埵如攝真實經説三昧耶尊之眼等與智慧尊之眼等下至極微皆應合雜無異故當堅固勝解平等一味教授穗説如是勝解與如來一切同體者是為信解其平等性有時勝解與一切衆生同體者是為通達自性清淨真如相同故於自心相續出生之智薩埵應信解為一體於他身之智尊應起平等性之信解召智尊後灌頂諸論多説是水灌頂多説從瓶取菩提心自性之水而行灌頂亦有説從顱鉢取水而灌頂者謂以智水洗除一切諸垢習氣故灌頂水集於頂上為印證者是明種性之差別也又海生之修法與羅伊跋現觀之覺窩釋亦説受四灌頂而後印證若知教授穗論所説印證之理則能了解印證總相故當解説恭敬頂戴是為印證為令滿足非令苦惱以部主印證者子隨父行為令了知從彼生故六佛互印證時以不動佛印證毗盧等四佛者是以自性印證有性不動是心為令了知彼四亦是心性色受想行體唯心故無畏論師不許外境受等三法亦許但是心之分位菩提心從空性生故以不動佛印金剛持是為以果印因以金剛持印不動佛則是以因印果説金剛持為五部之冠者是表五智皆彼體攝如癡金剛與地藏等六部以外餘尊是五如來三摩地之一分故以五佛印證若爾地藏等五與色金剛等五佛眼等四皆應以毗盧佛印證彼等皆是色一分故此亦無過雖立五蘊為五如來然於一一蘊皆有五佛故故於色蘊以餘蘊如來為部主亦不相違印證十二處者以毗盧佛印眼處天最清淨故不動印耳與虛空相等故寶生印鼻若中有位或諸餘位於緣香受生歡喜故貪性彌陀印舌緣味之貪最有力故不空印身不空成就體性為風遍全身故不動佛印意根意隨諸根轉故普賢修法説隨諸根印證色等總論更作餘説以毗盧佛印色天色金剛色是癡所依故寶生印聲由稱讚等聲引生慢心故彌陀印香由緣紅花等香生貪著故不空印味滿一切肢遍於諸肢轉故不動印觸遍諸根故於法亦爾於四界中以毗盧佛印地界天由堅硬性為大愚癡之所依故不動印水等同虛空能斷能穿亦彼攝故彌陀印火以有光故不空印風能遍動故癡金剛等印佛眼等彼是癡金剛等之明妃故印諸明王之理從東方起至東北角與上下二明王每二明王如其次第而以毗盧寶生彌陀不空不動印證是於愚癡我慢貪著嫉妬瞋恚五惑受用斷盡為體性故集密曼殊金剛之八明王則以不動印證以是從心出生勝德為體及是忿怒性故然害獄主明王與蓮邊際明王則同前説或有論説攝五部主入菩薩中為顯彼等體無異故餘經代替兩部集密以不動為主之龍猛派與以曼殊金剛為主之智足派之五佛與四佛母者在勝樂法則為主尊與四空行母為五并能隨母等四尊在喜金剛則為主尊與白色母等四尊並補迦茜等四尊在大威德則為害獄主等五尊及茲迦等四佛母代地藏等集密法中諸菩薩者即癡金剛等其印證及清淨如理應知次獻內外供養稱讚應如各法所説而行尤於供讚之境作者供讚應以無性如幻之心而行午二嘗甘露味修念誦法次嘗甘露修天瑜伽至疲倦時當修念誦念珠之料結合經第三十品云泥珠母珍珠及餘白界等於息災羯摩數珠殊勝相金銀與諸銅以及蓮華珠增益法殊勝知者應數用紅花等妙香一切香和丸善為製造已許為愛敬用金剛子槵子如是男子骨用修降伏法白界謂骨等者謂白石及餘白珠等四座經云紅花或餘香各別或一切作丸復染色許為愛敬用金剛空行亦説用珊瑚及紫檀男子者指人通一切法皆吉祥者如前經云息增愛降伏菩提子皆通念珠之數即前經云修咒用五十愛敬彼半數息災用一百增益再加八降伏用六十持配諸羯摩言修咒者謂隨順諸羯摩即修一切業咒念珠之索金剛空行經説用金絲或童女所捻棉線九股為索次自住於金剛持慢觀想右手五指剎那變成五股金剛從痾生日輪以痾字加持又想左手五指剎那變成蓮花葉形從痾生月輪以痾字加持兩手所持珠索中線想為金剛薩埵本性方維八線想為蓮花手彌勒虛空藏普賢金剛手妙吉祥除蓋障及地藏本性珠粒想為毗盧佛等五佛體性想佛頭珠剎那變成力無畏等法蘊之塔次從心間種子放光召金剛薩埵等各入自體誦咒加持阿喀茹迦茹那茹阿莎黑阿門達毗薩茹伽尼阿阿桑枯阿利茹悉伊當達毗薩茹嗡跋得跋得摩訶若那薩嚩補答摩訶跋北吽吽吽賀賀賀阿康娑訶次用瓶水灌頂供養嗡跋得以下出結合第八鬘論教授穗論皆説彼咒即結合經與四座經之善住法若略修善住者如鬘論説修語金剛鈎召智尊合一變彼像成念珠之相散灑瓶水供養誦語金剛心咒一百八遍數珠之法金剛空行經云息災放食指增益置中指愛敬用無名小指作降伏大指作鈎狀想召一切天善住定誦咒定成就無疑結合亦爾又結合云由真實成就不明顯則遠釋論謂若想兩手為金剛蓮花修為空悲不離右手數珠及能了知天身無性真實則能成就餘則不成想大指為鈎狀由彼鈎召諸天降念珠上結合與四座經亦如是説善住定者謂心不亂衆多經論殷重説此故心不亂極為重要念誦快慢等者如祥米金剛云明顯者謂不離韻量不急不緩出息入息聲勿太猛致妨誦咒令咒不顯寂靜論師蓮鎧論師亦説當如是誦量者謂字音韻長短之量出不出聲誦者如歡喜金剛修法斷謬論與鈴論師毳衣大師勝樂修法俱修金剛念誦忿怒念誦寂靜論師蓮鎧論師札拏修法唯修忿怒念誦無意念誦此是大威德之別法二種念誦如祥米金剛引文云金剛語念誦金剛語離聲如集密云忿三昧耶智自金剛壇宣咒字句可聞名金剛念誦明炬論云忿怒謂大威德等咒三昧耶智謂知驅逐等法壇謂自身金剛謂舌由彼所宣意謂自他可聞念誦念誦之所緣者鈴論師與毳衣大師説想所誦之咒從自心間種子分出自金剛端入明妃身由天女口入自口中回轉如前想一切口及一切瑜伽母皆悉念誦海生師説從天女口入自口中如前回轉教授穗説四種念誦安住一切平等性慢先想咒鬘入自口中從金剛出入蓮花中緣中脈向上行從妃口出入自口中回轉修行諸字緩誦鬘咒是為回曲念誦若先自妃口入如前回轉字音粗壯是為忿怒念誦若猛誦心咒等是為明王念誦若誦心咒及心中心想從心間種子出曼陀羅諸尊利益衆生次隨入息與咒同時入心中種子如引珠繩然誦各尊咒收放各尊是三昧耶念誦此説初二是誦鬘咒粗柔二相第三乃是鬘咒心咒心中心咒念誦第四是心咒或心中心咒念誦又第四種普賢修法亦説并説放出諸天遍虛空界燃燈智云放智身念誦誦由命放出咒由力收回謂出息時放出諸天入息時則收回寂靜論師立自宗云隨順咒量誦一或二或復多咒呼出長息為命彼所攝者謂即誦及放出之時如是誦者心不散亂并説每誦一咒即放出時後即收回為他師宗若鈴論師毳衣大師所説想彼諸尊諸口面多者皆在念誦眷屬諸尊亦皆念誦則此念誦成爾許倍斷謬論云當勝解一切口及一切天女口皆悉誦咒此由一切天女誦故本尊念誦便成八倍如是想本尊口與明妃口回轉念誦及觀想從咒鬘放收諸天念誦總有三種觀想又如寂靜論師與三昧耶金剛歡喜金剛修法所説想於心間種子咒鬘繞圍咒向上立光明晃耀猶如燈鬘若心緣彼念誦如意寫字若與一切口及一切天女口念誦前者默誦後者出聲為二念誦共成五種連前三種觀想為五又倫答日跋説前者各圓體念誦後者名三昧耶念誦教授穗論與慧鎧論師等多于此時説緣風修三字金剛念誦恐繁不録如是於正修時離念誦過專心持誦入念誦數中間所誦不入數中然可念誦亦無有失如不動金剛札拏修法云起座以後應緣佛身持誦密咒而不入數咒之色者海生論師説由羯磨色分此謂息災增益愛敬降伏如次色為白黃赤黑或如修承事時諸尊身色不變如是咒色亦隨諸尊為種種色或如藏師所説為於諸尊自在當修紅色如善根金剛云念誦之時方便如旋火輪如擲索槍或如翎束或如結繩或如鈎連隨時應知藏地師謂初是息災次是降伏三是增益後二愛敬彼是咒字咒光之相餘師未見明説從口至口旋如火輪海生説分四羯摩色般若因陀羅茹資於寶熾然論亦作此説次智者誦咒從父母口中旋轉如火輪色由羯摩分如是從入智尊乃至念誦是為所生諸天圓滿之支憶清淨者多如難勝月説至不能入定時憶念清淨故於修天瑜伽疲倦時行此又多如寂靜難勝月種比跋所説於正修時憶念海生與耶茜那説於施食後憶念清淨此則於中間憶念也多依慧鎧師等所釋羅伊跋修法之意趣及海生之修法所説漸次收入光明許為即五次第論所説之隨壞若修此時應憶正見而修微細空點隨各各法所説時修緣彼修習堅固住心滅除沉掉守護正念正知并得奢摩他之量等顯密所共如共道次第中廣説當閲彼論而求定解修天及修空時如來金剛云此中從上午至中夜唯應修天而住次應修空此約別修空性而説辰三結行分二巳一養身修食法巳二修天供食法今初修行疲倦休養身心之法然燈賢以集密所説方便修養如云頂月嗡潤澤降注勝心水滿足身語意當如法降注此法當想頂上一張手處空中有一月輪嗡字莊嚴彼注甘露充滿全身乃至足下一一微塵悉皆潤澤祥米金剛説想由出息入息導引鈎召甘露從頂下注寂靜師云由嗡字光召自十方次以命力令入身內於筋脈轉周遍全身言命力者謂以入息令降身中又説休息之後仍修念誦是故隨疲倦時皆可休息非唯限於座末次下座時普賢修法本釋中説復當供養讚曼陀羅嘗甘露味送曼陀羅此是將曼陀羅諸天攝歸主尊説為送遣非往他處若能於四座後皆施食者即如是行現説經云以此法漸次四座間行施若不能者則當於座末後施食海生師説將曼陀羅攝歸己身而後施食教授穗説先施食已將曼陀羅攝歸己身故於末座或一座後隨宜而行施食儀軌雖有多種然結合經及四座經金剛空行意趣相符茲如教授穗論解釋結合經意而説施食法者經説為息障礙與修悉地初後最要故定應行施食之時結合經第九云下半月十四尤應於八日及上月初十此是特勝之時餘説日日應施施者之天瑜伽如集密不動佛説若俱修現觀或以四支儀軌漸修或剎那頃頓生金剛薩埵隨修一種即可餘準應知施食儀軌有廣中略三法廣者修甘露食之器結合經説蓮花器謂顱器教授穗説盤等亦可紅大威德經説於台或於銅盤鬘論説瓦杯盤亦可行施故可隨宜食物鬘論與教授穗論説用麵豆肉魚粥餅酒水蔥蒜牛乳等若不具者唯麵與水亦可陳設供物法結合經云閼伽等供物魚肉諸食品酒為左所需能醉品亦可右側設水器閼伽器陳前此一切供物以五甘露淨第三句文釋論作酒能令歡喜若有肉與魚肉所作食物分陳左右以五甘露淨者教授穗説或放甘露丸或修為甘露而淨食物修法鬘論所説即結合經意趣教授穗論亦説如鬘論説集密勝樂歡喜金剛三部修法亦同法謂想從漾字出生風輪上有囕字生為火輪從痾字生白色顱器安於三種子字所生三頭之上於中吽等十種子字出生五甘露及五肉以彼種子加持莊嚴種子謂吽嘣鄂什康仲吽尚掌於何方隅而生謂何字在何方生為何物鬘論教授穗論俱未明説結合與四座經亦爾紅大威德經説名為廊姑答哈那之五肉如其次第即毗盧等體性自東方至中央從仲鄂藏康吽五字而生名毗惹虛摩穆之五甘露如其次第即佛眼等性體自火東南隅至中央從朗芒邦當旺五字而生即以彼等莊嚴鬘論教授穗論説五甘露以及五燈雖作如是次第先説甘露後説五肉然教授穗又云勝解如是行相五智體性即五如來謂五燈與五鈎此説五燈五鈎為五如來又云不動毗盧寶生彌陀不空是為五鈎次第又如此説先説中央後説四方故前五種子字生為五肉從中央起右繞乃至四方吽等五字如其次第生大肉等彼字莊嚴從火東南乃至自在東北仲等四字如其次第生大香等彼字莊嚴大肉共通肉與甘露故僅説四種亦有説五甘露為五佛者如大印點經云寶生説為血液為無量光不空為大肉不動即香水毗盧為大香此是五甘露鈴論師之勝樂修法亦如是説如云吽嗡康鄂掌小大香大肉菩提心妙華又朗芒邦當牛犬象馬肉皆有種子嚴毳衣大師亦如是説此説四方左繞四隅右繞種子顏色中央與四方藍白黃赤緑是毳衣大師説又説風上有幡火上有焰莊嚴顱器為整塊者顱有一塊兩塊等別內為紅色此二師説甘露為如來諸肉為佛母由種子即可知梵本之修食法多從五佛佛母種子出生十物扎拏釋寶炬論阿底峽所造羅伊跋釋論并耶茜那説十物各從自名第一字生耶茜那更説從東南隅右繞乃至中央從白藍紅緑黃色從廊姑答哈那五字生為牛犬象馬大肉彼字莊嚴從東方左繞乃至中央從白緑紅黃四色從毗穆摩惹阿五字生大小香大肉血液彼字莊嚴前二論師亦於彼物安立五佛種子從自名第一字出生之規此為最善總之施食器用顱器食物生為十種物品就種子論有從五佛佛母種子字生及從各物自名第一字生兩派約生處辨如扎拏疏寶炬論説唯於中央四方五處安布十物五佛種子莊嚴及於方隅皆安布之兩派後派又有中央四方安布五肉四隅出生甘露及與彼相反之兩派又有肉為佛體甘露為佛母體及與上相反之兩派然彼皆是不動佛居中央之規五甘露者大香小香赤白二界前四相共第五有多異解拏熱跋藥足等説為大肉跋嚩跋札四座經釋説為痰涕律生中説肉中脂肪骨中髓肉頭中腦膜為下中上三品五肉亦名五鈎五燈以能鈎召及光顯悉地故次想食物有訶賀什如其次第淨除尋常之色香力變成勝妙色等教授穗與鬘論於修食法未説生為三佛結合經與四座經説修訶字為彌陀賀為毗盧什為不動四座釋説誦阿訶貨什三遍淨除過失色香味三生為三佛次當觀想風動火燃溶化諸字變成液汁色如日出由彼蒸氣變成吽字生喀敞迦金剛莊嚴由彼溶化三次落顱器中變成甘露其上嗡字變成月輪月上有嗡阿吽三字重豎從彼放光鈎召十方佛菩提心甘露大海等中甘露入三字及月輪三字月輪溶入顱中次誦三字三遍加持清淨成水銀性此是鬘論所説教授穗論説從阿利迦利變成三字毳衣大師與鈴論師所説同前是依律生意也嘗甘露之儀軌毳衣大師與鈴論師亦如是説如是生已想諸天舌根有吽字所生白色金剛量如大麥從彼放光如管吸飲甘露悉皆飽足次以大指與無名指彈灑供養四座經釋謂齊舌端眉尖頂上三處彈灑巳二修天供食法如結合等三經説三角壇外白內紅量廣一肘釋論説以紅花紫檀塗內令紅其外應用白檀等塗或用顏料染作彼色於彼中央彈四線成九格於中格中剎那生曼陀羅諸天鬘論於集密施食法亦説香壇故知集密亦如是修其餘八格教授穗説有護方神女神圍繞此中當説諸護方神東方琮字生帝釋天黃色千目乘護地白色象手執金剛南方岡字出生閻羅黑色伸展右足立水牛上怒髮上豎結恐怖印及執骨杖西方啖字出生水天白色乘七頭龍手執蛇索北方碑字出毗沙門黃色乘人其身肥短手執鼬囊及幢火方囕字出生火天紅色眉鬚髮髻烈焰熾燃忿怒肥壯騎山羊上作歸依印及執念珠水瓶棒杖離實方𠹍字出羅剎黑色裸體乘尸人骨莊嚴開口獠牙手執彎刀顱器風方漾字出生風天緑色跨黃色鹿手執風布自在方阿字出生自在天白色乘牛王上結髮髻著骨飾手執三尖杖及小鼓帝釋右側吽字生遍入天黑色乘鵬手執輪杖法螺及憍都跋毗沙門右側穴字生礙神白色象頭乘鼠執蘿卜杖食團珠鬘上方阿字出生日天紅色乘車威光赫赫莫敢仰視手執蓮花日之左側昂字出生月天白色乘輪執夜開花數珠嗡字出生大梵黃色乘鵝作歸依印執蓮花及珠杖下方啖字出生善織阿修羅黑色乘車手執利劍郎字出生地神黃色坐蓮花上手執蓮花除上已説莊嚴所餘一切皆著寶冠面帶笑容帝釋水天風天礙神及毗沙門藥叉月天大梵地神坐月輪座餘坐日輪大梵天地神是身部毗盧部唯日天是寶部毗沙門自在天水天皆是語部彌陀部風天是不空成就部所餘諸尊皆不動部帝釋天等皆有相等明妃地神具有相等方便各從三昧耶生彼等之外想有諸龍王及一切有情次以各法迎請儀軌請世出世諸天與三昧耶合一獻閼伽與浴足水等為先供養食物後為令曼陀羅諸尊歡喜及除增減等失并成就一切事業故搖鈴誦百字咒次旋繞手印令諸天歡喜收束手印作抱持相次以左手當心作金剛拳伸展右手按九格地作執諸天足想次對樂為成辦所作之智尊及眷屬而誦嗡阿達磨底叉吽娑訶想從格地升起次隨入息入自身中成為一味復當供養次以抱持印三彈指復誦嗡薩嚩都喀札格哈那格哈那伽剎吽泮想諸護方神回自處此是廣施食法若諸格中不修三昧耶尊但請智尊餘事如前供養是為中法若想諸護方神皆為本尊形狀隨宜而住各施所愛食物是為略法爾時不須作三角壇及修三昧耶尊召智尊等此是生起次第施食儀軌圓滿次第不動智慧方便唯略思維即請智慧方便為體性之本尊與帝釋等供獻智慧為體性之食物寂靜論師説於供養或獻食後誦普賢願文等有多論師説於座後誦百字咒當如是行此是初座次第歡喜金剛現説尊長等經合經等論多説日修四座四座修法倫答日跋云言四座加持次第者謂於早晨日中下午夜間藥足亦作是説故當如是而修四座早晨初座應如前修餘座廣略有無別耶毳衣師説初座廣修一切儀軌日中下午座間自化光明變成吽字由此變成能依所依曼陀羅已灌頂以下全修最後一座廣修一切儀軌鈴論師説亦爾珠鬘論説餘座自修無我母已從於心間種子放出十四天女眷屬各安其處清淨加持身語意業灌頂以下圓滿修習黑行論師與三昧耶金剛亦説餘座從自心間種子放出壇輪安立其處召入智尊灌頂以下圓滿修行諸師許先未收宮殿故彼修法與守護輪集資糧等皆可省略憶念第一加行最勝曼陀羅輪唯從心間放出四百五十論釋亦云言座間者謂於日中日邊夜半剎那現起圓滿曼陀羅輪供養稱讚等如前修至睡眠時應當眠臥此説集密亦如是修故與前同穗論第十二云若匆忙者隨餘座儀軌行若有暇者應修一切此説初座暇修一切忙則略修餘座儀軌藥足師説忙者初座俱修餘座於自座上住本尊慢以三字放出曼陀羅諸天灌頂供讚嘗甘露味隨住某一細點而修念誦略法如前此處似須召入智尊如三昧耶金剛所説如是初末兩座廣修中二座略與初座廣餘三座略非關忙間是常修法於事忙時或初座廣餘三座略或第一座因忙暇而廣略餘三座略是教授穗論之修法若有暇者可如毳衣大師等説而修長時修天易於增進淨所淨事生起次第之要亦無所缺卯二中間之瑜伽如是前座已畢後座未修中間亦應作諸善事此即清淨受用瑜伽謂自憶持主尊天慢根緣境時當觀諸境體為諸天由彼供養若依總清淨者當觀一切皆以無二智為體金剛持為相若修各別清淨當觀色為毗盧聲為不動香為寶生味為彌陀觸為不空此是方便清淨若依慧清淨者當觀五境為色金剛等五天女而修供養復以三輪不可得慧任持若能一切時中依止正念即是速能圓滿二種資糧方便如普賢修法云由離邪分別圓滿一切事供養諸佛輪此為最殊勝如是知已隨自受用何境及施他等皆應如是而行清淨業瑜伽者相續依止明想主尊之念行住坐等諸身語業皆成結印誦咒修集資糧如普賢修法云身等彼彼業當知常住定由具彼相心身語意諸業諸佛咸説彼成印咒行相金剛心莊嚴經亦云若住平等性隨身所動作語中所宣説悉皆成咒印此謂先將無記身語化成善性逮後力漸增時雖於餘人為不善者亦能變為增長廣大資糧方便清淨犯三昧耶之瑜伽者如普賢修法云犯三昧耶想心月心咒變成雜金剛三昧金剛瑜伽師想諸衆生本性淨當於雜色蓮葉中由前次第受灌頂祥米金剛釋此義謂想自心間地輪上有雜色蓮華彼上月輪中央由吽字變成羯摩杵上有慷字變成寶劍再變為不空成就佛智慧方便為體次想一切諸法本性清淨智慧薩埵心間種子放光勸請虛空諸佛放光出佛眼等天女手捧寶瓶甘露充滿為自灌頂一切微塵悉皆潤澤此立自宗修天為先依止五甘露等對治毀犯續中所説護密咒行諸三昧耶破他派説溶化自身為不空佛三昧耶形而受灌頂又四百五十論云犯三昧耶還出者微妙不空金剛輪心間想業金剛慷一切皆為自灌頂寂靜論師釋云自修不空成就想曼陀羅主尊心間有羯摩杵上有慷字自受灌頂此二隨修一種能淨輕毀師長等罪最為重要食瑜伽者謂受飲食等時憶自為天加持食物生為甘露作供天想而食浴瑜伽者如前灌頂時行眠瑜伽者如教授穗論説增上勝解空性為俱生喜自性我是光明自性故以智慧方便自性而眠如此説者最多當如是行起瑜伽者想由小鼓聲或天女歌聲勸請而起卯三安立彼瑜伽為廣大之理通達自心真實修習增長若時一切無明都盡內心真實所依色蘊等相悉皆不現變成佛身則知凡身是雜染因所起客法佛身乃是盡虛空際永不離法如口授論釋引集智金剛經云祕密主繩蛇非有然由眩翳如是妄現若諸士夫斷除眩翳則唯見繩不見餘事祕密主如是於常等上誤為色等亦非是有然由貪著色等習氣故現若諸士夫修真實道遣遍計執唯見常等不見餘事常者是毗盧佛異名解脫點經亦云離翳則於繩不得餘少事離戲論於壇全不得生死故由深明壇我常般涅槃是故心性所依尋常諸蘊唯是無明染污之力若一切時心入真實成無二智則尋常身畢竟隱沒非彼所依相好莊嚴之身乃彼所依未為無明染污之法即是毗盧等身故以抉擇一切法空之慧修習娑跋嚩等咒義後時當起毗盧等身如是隨順未染有法與法性理咒師所修天輪即安立為廣大四百五十論云所施等無得仍是凡常性無我不壞凡勝壇無彼事寂靜論師釋云彼所施等雖無所得然布施等仍是尋常體性以時處相所限局故雖證無我不壞有量又云若不限局時處相者是廣大性故名廣大若法體有時處定相即狹小性故名尋常尋常亦即凡常庸常等謂波羅蜜多乘能證無我有甚深義然無違反尋常境相之天輪故仍為狹小咒有彼法故為廣大由於時處有量無量安立名為大小義謂若達諸法實性一味依彼未染有法修天瑜伽則諸如來色身等德不為時處分量所限普緣一切而修故名廣大若無此天瑜伽雖有甚深瑜伽通達一切諸法無異真如然就有法猶未能越限量故為狹小如寂靜論師云由修自體諸法為最清淨地與波羅蜜多自性之力則以一切諸佛波羅蜜等令自所修波羅蜜多等行於心一切剎那皆悉圓滿供養自他亦即供養一切諸佛以微劣物亦成勝妙供養是故易得菩提此即菩提道之自性言是故者顯唯由此法能速證菩提如云唯由此瑜伽速當得佛果此説若如前配能淨所淨及勝解為無邊佛法體性而修則能成熟一切圓滿次第善根故下三部雖亦修空與天然有極大差別此最勝之廣大圓滿次第時之所有波羅蜜多乘中雖修隨順法身之道不修違反尋常境相隨順色身之道故於圓滿色身因之資糧時極久遠密咒乘中俱有彼等故易圓滿資糧若善了知依未染法修習甚深光明無二之理則知説心一一剎那皆能圓滿無量資糧等理餘乘要歷無數劫方具廣大福資糧此以少力便能滿色身衆因善方便生起次第淨所淨云何能於自身起今依淨教及正理全無臆度顯了説
