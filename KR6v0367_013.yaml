body:
  text: 宗喀巴大師著法尊法師譯明瓶灌頂儀軌次第品第九申二入後灌頂分四酉一瓶灌頂酉二密灌頂酉三慧智灌頂酉四第四灌頂初中又二戌一金剛弟子共灌頂戌二金剛阿闍黎不共灌頂初中分二亥一五種灌頂共同建立亥二各別建立今初此中能灌頂人所灌頂業及灌頂之作用方便三種所緣當修何尊瑜伽如答日迦跋云不動三靜慮義謂師長弟子及灌頂物三者皆修為不動佛而行灌頂此是第一水灌頂除名灌頂餘三各修為寶生等三種所緣名灌頂則修為毘盧二種所緣此論師等唯說弟子與灌頂物改易所緣於阿闍黎未明顯說意為可住主尊瑜伽弟子為受灌頂故須請白師長師長則須請白灌頂諸尊以為灌頂是故有二能灌頂者灌頂諸尊又二有彩繪曼陀羅所住諸尊及諸大成就者儀軌所說師長別更新請諸尊安住虛空以彼灌頂前者謂阿闍黎入所修曼陀羅於彼主尊具受灌頂得其聽許以三三昧耶歌稱讚為先為令弟子入內請求悉地請於弟子灌頂作證加持相續彼曼陀羅諸尊乃至弟子灌頂事未圓滿而住非灌頂時入弟子身新請灌頂諸尊則於每一灌頂之後入弟子身此是毳衣大師等說故應攝入於彩繪曼陀羅得瓶灌頂其義極難安立若謂由先入彼曼陀羅者則上三種灌頂亦同又非住彼曼陀羅內作瓶灌頂亦非由彼曼陀羅內諸尊而為灌頂若以彩繪主尊與師無二傳瓶灌頂即立為於彼曼陀羅獲得瓶灌頂者灌頂之時雖多宣說師長主尊無異然有眾多堪據教典亦說師長主尊各異而傳瓶灌頂者又但以彼二者無異亦不能立於彩繪曼陀羅得瓶灌頂若不爾者則彼繼續傳餘三灌頂時理由相同亦應許彼上三灌頂可於彩繪曼陀羅得故所修曼陀羅諸尊雖不如彼所請灌頂諸尊親手執瓶灌頂唱吉祥等然須信解於阿闍黎傳瓶灌頂作意聽許為灌頂事如龍智云知自性行者為弟子灌頂恭敬請諸佛勸其仍降臨此說當修曼陀羅時為傳弟子灌頂請智慧尊傳咒隨許亦須請白彼曼陀羅主尊而傳最後復說師長將諸弟子供献曼陀羅主尊等如是諸瓶灌頂有彩繪曼陀羅諸尊作意聽許故說諸瓶灌頂於彩繪曼陀羅中得無相違過修曼陀羅為令弟子入內阿闍黎耶亦須入受灌頂故不可執修曼陀羅唯為弟子灌頂而作所請灌頂諸尊或如毳衣大師說請勝樂分為五部之曼陀羅餘尊亦可准彼理趣而請或如鬘論所說請通常之如來佛母菩薩及天女等龍智意趣如明顯雙運論說唯水灌頂時修弟子為毘盧名灌頂時修弟子為不動餘者皆同餘曼陀羅儀軌時輪所說與諸餘經諸曼陀羅儀軌極不相同以彼經乃特殊意趣此處是說餘經之規又弟子與灌頂物生為諸尊者毳衣大師說五種勝樂以三段法生或准彼理隨時別配若自教中說有五佛即如是修若無有者則於主尊開為五部雖此僅說生三昧耶鈎入智尊未說餘事然諸師長亦修灌頂以及部主印定金剛幕第四云想弟子馬勝具多羅天女手振金剛鈴金剛主灌頂於鈴灌頂說弟子為不空成就父母此是一例餘時弟子及灌頂物之生起法亦應知五種明灌頂時明灌頂瓶灌頂皆弟子五種灌頂之異名弟子須白師長正灌頂時須誦灌頂大金剛等諸師皆同唯此論師說內灌頂寶鎧與毘布底亦隨此行鬘論除於第一灌頂說內灌頂餘未明說然毘布底則說餘亦同前是鬘論意趣故餘亦准知收攝灌頂諸尊及傳弟子水灌頂後部主印定并供養彼鬘論唯阿闍黎灌頂時說然毳衣大師跋嚩跋陀羅答日迦跋處處皆說收攝灌頂諸尊其收攝法前二論師毳衣跋嚩說入毛孔由何方便攝者毳衣大師說由師長心間種子放光召入莊嚴頂者部主印定毳衣大師說第一想頂上為不動第二右耳上為寶生第三腦後為彌陀佛第四左耳上為不空第五額上為毘盧佛皆由水成若如此說五灌頂後乃有五佛嚴頂冠灌頂時則未有五佛嚴頂也供養弟子如毳衣大師與答日迦跋所說亦供花等又答日迦跋云供養授清淨授清淨者如毳衣大師說五種灌頂以自性淨法性染污末那第六意識前五根識及阿賴耶轉依所成之法界體性智平等性智妙觀察智成所作智大圓鏡智而為自性鬘論亦云由五灌頂而能增長諸智種子故應勝解為彼體性律生經云五灌頂佛體慧鎧亦說五蘊與五煩惱清淨為五灌頂勝賢師於五明灌頂後云若如是灌頂得悉地無疑即當證彼尊能作彼事業當令弟子了知彼義金剛幕第四亦於五灌頂後云彼所現一切及主黑茹迦諸法性清淨應觀為佛智餘曼陀羅儀軌亦多宣說天種慧師釋彼義云從鬘灌頂至名灌頂凡有所現即應觀彼為佛五智與淨法界觀鬘灌頂即為第六為何灌頂曰為法性清淨無垢謂自性清淨諸佛法及大圓鏡智等六法之垢以彼諸灌頂而洗除由與彼等自性無異故應勝解為彼等也曼陀羅主尊是彼一切之自性黑茹迦者唯是一例此即釋觀五灌頂為五智之義其洒水等頭上戴冠鈴杵授手與立名等是五灌頂之因非是自體其自體者如水灌頂所灌頂處生為不動灌頂之物即以不動所化之水灌頂之法由洒於頂上等作用所修曼陀羅內諸尊作意傳水灌頂祈白新請不動為主灌頂諸尊正由師長作灌頂事令於弟子身中熏成能淨治識蘊與瞋恚及能現證法界體性智並由不動門修行念誦於修悉地獲得自在此勝功能即水灌頂餘四以及花鬘灌頂亦准彼理應知故五灌頂中第一水灌頂與他灌頂之後用水灌頂義不相同彼等皆名明灌頂者如鬘論云花鬘與水等六灌頂能令對治無明有大功能故名明灌頂毳衣大師則云由五無明體性轉成明了五智體故一切皆以佛眼等明妃灌頂故此中二釋前者謂修成明了之灌頂後者謂由明所灌頂故非灌頂自體為明毳衣大師總說得此五種修持真言聞說經教皆得自在鬘論破云聞說事行二部經教修彼真言可得自在於聞說瑜伽與瑜伽母教修彼真言猶未自在此如前引意指未能自在聞修圓滿次第及說二教非破彼於聞修生起次第而得自在如是事行部中唯增說法隨許不須別傳阿闍黎灌頂也亥二各別建立分二乾一水灌頂儀軌乾二餘灌頂儀軌初中又二坎一祈請清淨坎二傳水灌頂今初開示曼陀羅後為受水灌頂故隨所有物供養師長雙膝著地合掌請云如菩提金剛大供養佛等今為度我故空金剛授我菩提金剛謂金剛持如彼於不動等傳大灌頂以為供養如是為於生死大海救度我故我今歸依虛空金剛即是等同金剛持之師長唯願傳我灌頂此是明炬論十六品所說毳衣大師等多說爾時應頂禮師長次於根本曼陀羅外之東浴水不致沾及根本曼陀羅處繪方浴壇一墻圍繞其門西向對入壇門內作雜色蓮華若彩土繪或研米汁等繪或作無牌樓之方壇西向對入壇門或造量等內曼陀羅半量之壇四方四門兩重不作牌樓東方等處繪輪寶華釰四隅繪四佛母標幟中繪八葉雜色蓮華前之兩種同是一門初有牌樓後者無之言兩重者謂諸尊處與蓮華處上安繪有八葉蓮華木質之座或繪有月輪之布等獅座勝解安於彼曼陀羅蓮華之上安彼上時勿觸蓮華若無浴壇唯作彼想於木座等上修弟子為金剛持向曼陀羅而住黑行師與薩惹哈說修為主尊鬘論於此灌頂浴壇指如曼陀羅開光時所說如是勝樂灌頂品中亦指如前所說然彼不應道理以彼論前未曾說浴壇故蓋是未能决定了解而錄鬘論故知非是無畏所作是一善巧鬘論者之所造此辨灌頂品非無畏作次誦甘露瓶咒嗡阿毘迦南達枳吽及誦吽字七遍加持芥子兩拳握持左繞二匝口誦嗡薩嚩跋榜答哈那班耶班薩埵茜薩嚩跋榜答哈娑哈投芥子入火中右繞二匝次以兩拳持水亦如是修次以四白瓦碗四連茅草之牛糞團四握食四黃布亦如前修作左右繞然瓦碗等非投火中次應洗淨念誦主尊真言心間塗香頭繫花鬘前供閼伽燈明旋繞熏以誦甘露瓶及七遍吽字之酥合芸香金剛幕經所說驅除真言依文應是淨罪之義毳衣大師說除不淨毘布底說除遣鬼魅坎二傳水灌頂師長次於自心種子放光迎請無邊處所諸佛明妃於前虛空中住奉供養後請為弟子灌頂白云金剛持於佛為救眾生故傳德生灌頂亦如是傳此此義准前請白應知鬘論僅說不動本性菩提心之甘露為體未明顯說灌頂物之生法二隨行者則說水生為不動佛召入智尊寶鎧更說彼化為水故諸瓶水先為洒淨變成吽字次後由彼變成金剛吽字莊嚴再從彼生不動次以自心種子放光召入智慧薩埵奉供養後仍變為水次鬘論說如來溶化為先次將弟子召入口中而為灌頂寶鎧所說次第雖異然於實行為易當如彼說而作先召弟子入自口中從金剛路出住明妃蓮華之中次想弟子剎那空後先生為吽次為金剛吽字莊嚴生為不動尊及明妃由與智薩埵無別故召入智尊次諸如來明妃等至大貪溶化從毘盧門灌入頂中隨金剛路出菩提心而為蓮華之上生為天身弟子灌頂次想面臂圓滿天身由蓮華出安置座上此處幕經所說之義難勝月謂八瓶一切水為明妃士夫善修意金剛金剛持灌頂此說兼水灌頂與內灌頂天種性慧則未說內灌頂水灌頂前觀想次第謂想諸如來佛眼等明妃充滿虛空彼等於弟子上執持傘蓋幢幡衣服歌舞作樂雨眾妙花手略傾斜執持充滿菩提心甘露之白瓶為從佛母蓮華初出弟子灌頂時色金剛母等唱吉祥云諸吉祥住眾生心一切體性勝部主生諸有情大安樂今灌汝頂最吉祥圓滿眾德若金山三世依怙淨三垢佛眼廣長如蓮華汝今寂滅最吉祥彼說妙法不動搖徧揚三世人天供勝法恆令眾生寂汝今寂滅最吉祥多聞正法多吉祥人天修羅供養處僧伽眾尊慚德本汝今寂滅最吉祥金剛藏莊嚴第四云充滿如蔴壳諸佛執持瓶故執瓶者非定由佛眼等明妃作如是勝解後自亦應先唱吉祥讚爾時師長應手舉瓶於弟子讚吉祥明顯雙運論云執瓶應先誦諸吉祥偈頌次水灌頂略有三法謂從尊勝等瓶各取少水注於顱盃或螺盃內作水灌頂或先以尊勝瓶次以四如來瓶次以四天女瓶隨所有曼陀羅諸瓶而為灌頂若唯一灌頂瓶則於尊勝瓶中不動體性之菩提心甘露以右手執杵取瓶上華枝略取瓶水隨金剛端流注灌頂誦云灌頂大金剛三界皆敬禮金剛三密生諸佛前授與嗡啊班鄔答迦阿毘懇吽蘇惹達當阿吭若樂略者如是即可廣則更誦嗡摩訶蘇喀斑薩埵阿毘克格那當阿毘懇彌薩嚩達塔伽達阿底跋底得那枳朵跋嚩龍智及明顯雙運論亦宣說此二咒應釋授與於何人前謂諸佛前授與何事謂與灌頂大謂此之殊勝成三界王故為三界之所敬禮我今將此授汝汝應於此善修此是安慰弟子金剛者謂不可棄捨金剛三密不可分離即金剛持從彼生者即是從此種性所生此明炬論十六品說如是灌頂之時應想出生圓滿安樂曼陀羅儀軌等雖未明說置瓶於頂然諸師長皆如是行歡喜金剛羯摩次第儀軌及瑜伽部說令飲水如第十二穗云灌頂謂以智水洗除一切習氣障垢故以瓶水灌頂能於頂上印定分別種性於現觀中修法也水灌頂時作如是說此中亦同乾二餘灌頂儀軌次明餘四灌頂冠灌頂者祈請師長之後想弟子由盎字及寶什字及蓮康字及劒嗡字及輪依三段法生為寶生乃至毘盧皆如前修灌頂之物亦爾冠灌頂物謂用金及布等所作之五佛冠弟子之部主居中在首中央額兩側頂心腦後如其次第念誦嗡斑達底穴曰阿毘懇吽嗡薩嚩達塔伽達薩埵班即阿毘懇種嗡惹那班即阿毘懇阿嗡達摩班即阿毘懇什嗡迦摩班即阿毘懇掌誦此五真言而戴於頭上龍智與鬘論同并結手印置彼諸處誦諸真言次誦灌頂大金剛等及誦嗡阿班穆姑札阿毘懇吽蘇惹達當阿吭班都喀耶賀令生歡喜龍智亦說於此處修五佛嚴首次誦嗡吽𫫮什阿真言擊飄帶於額上明顯雙運說於頂冠懸掛飄帶而誦班都喀耶賀以平合掌令生歡喜此是龍智意趣次金剛灌頂者先誦灌頂大金剛頌並誦諸佛杵灌頂今為汝灌頂此即一切佛為修取金剛以金剛杵觸弟子心間喉處頭上授右手中幕經於此處云弟子世自在九股大金剛釋論解此頌義謂修為蓮華舞自在杵雖五股以上下八股及中股故說九股後二句文金剛幕作善修諸佛故應受此金剛真實光明論釋此頌義謂一切諸佛今為汝傳金剛灌頂故汝應取受此金剛以菩提心為杵智慧為鈴金剛灌頂即是金剛智灌頂故以此金剛灌頂即與空性不離之菩提心自性故是一切佛之灌頂應受之理謂此金剛是一切佛之體為得彼而修彼故汝應受鈴灌頂者將鈴授弟子左手中令手持鈴杵作抱持印狀先誦灌頂大金剛等次誦幕經第四所說嗡班阿底跋底當阿毘懇彌底义班三昧耶當次令誦云嗡班根枳痾痾世尊攝授我願正親近我此出幕經第十四品誦後真言及二句頌是龍智意趣攝真實經勝吉祥經許以諸佛等頌而作金剛灌頂班阿底跋底等咒作主灌頂然燈賢與難勝月等亦如是說答日迦跋改誦金剛杵頌為鈴授鈴灌頂其咒即主灌頂之堅固法黑行師等文句稍略以咒與頌傳金剛灌頂後另以餘頌傳鈴灌頂彼真言义可通作金剛灌頂與鈴灌頂解是故堪為量者有作金剛灌頂有作鈴灌頂者毳衣大師說以嗡善具鈴金剛極勇士灌頂汝住金剛誓受勝主灌頂傳鈴灌頂其第三句即底義班三昧耶之義主灌頂即阿底跋底阿毘懇之義毳衣大師之意總謂為汝住金剛三昧耶傳金剛主灌頂汝應受取慶喜藏釋此咒與彼不同於此金剛及鈴灌頂諸大論師亦多同時傳金剛三昧耶金剛禁行鈴三昧耶之文跋嚩跋陀羅於鈴灌頂後名灌頂前並傳印三昧耶亦復以彼傳阿闍黎灌頂然毳衣大師與答日迦跋並此論師鈴杵與印三昧耶等要於弟子灌頂以後阿闍黎灌頂時方乃傳授餘師意趣亦以作如是解為善鈴灌頂亦名主灌頂義如下釋名灌頂者手執鈴杵置弟子頂先誦灌頂大金剛等及幕經第四品所說嗡班薩埵當阿毘懇彌班那摩阿毘克迦達次隨投花所中本尊種性之名喚瞋恚金剛或痴金剛等傳毘盧遮那本性之灌頂依於六部立男女名廣如鬘論應知如攝真實經云傑金剛隨是何名即喚為彼傑是呼召其名然燈賢等又說於彼用吉祥名如云吉祥不動金剛此是稱德立名非於名灌頂時問先所得灌頂密名而云傑吉祥也如答日迦跋云具吉祥金剛師長三度呼此說以所立名呼召三遍此論師於餘四灌頂未明顯說傳水灌頂可據之曼陀羅儀軌亦多未說然毳衣大師於餘四灌頂後各傳一水灌頂應如是行此等皆有瓶事隨行而名瓶灌頂故鬘論亦說一切皆有如來與明妃持瓶灌頂故從水至阿闍黎六種同名瓶灌頂故觀想如來父母持瓶灌頂及色金剛母等唱吉祥等餘四灌頂亦須爾故以是彼時召請灌頂諸尊等之觀想應如水灌頂修餘四灌頂未說與妃俱生准前應有灌頂大金剛等通五灌頂毳衣大師亦然餘諸水灌頂時應以阿闍黎灌頂時所說真言而灌如是傳與五灌頂時須為說明各灌頂體令其决定明解彼義而傳灌頂水灌頂嗢柁南曰供養敬祈請安浴台清淨奉請灌頂天並生為天形請白內灌頂讚吉水灌頂入身献供養解釋灌頂義餘灌頂嗢柁南曰白請灌頂天二俱生為天請白灌頂天內外二灌頂水後諸尊入供釋灌頂義戌二金剛阿闍黎不供灌頂分二亥一阿闍黎灌頂建立亥二阿闍黎灌頂者儀軌今初金剛阿闍黎灌頂與不退灌頂正詮第六灌頂假名亦通水灌頂等瓶灌頂名通六灌頂故與前二義有寬狹金剛阿闍黎灌頂之正行如持祥云又不退轉灌頂於金剛與鈴三昧耶增身加持又云由此加持令成欲天體性大印即是印三昧耶謂授印三昧耶時即授阿闍黎灌頂之正行羅睺羅吉祥友常住金剛亦說授印三昧耶作欲天父母抱持狀時為阿闍黎灌頂為証如是印三昧耶故引智慧滿十六等毳衣大師亦云此中自欲天身金剛持性以結合次第加持令作抱持狀即大印三昧耶此說以印三昧耶頌令如是行雖未明了分別何者為阿闍黎灌頂然其意趣同前鬘論意趣亦同明顯雙運及常住金剛說若爾鬘論為証餘經所說三三昧耶是阿闍黎灌頂支分云何亦引智慧滿十六等雖受印三昧耶時即得阿闍黎灌頂然說彼三昧耶是彼灌頂支分亦不相違以修身為欲天父母是阿闍黎灌頂之因支故由證印三昧耶須修欲天父母故引智慧滿十六等意謂應修智印作如斯狀金剛鈴結合者謂持鈴杵修抱持狀寂靜論師亦云金剛鈴結合者謂由雙手為上師灌頂者謂由抱持生妙樂三摩地此中若是父母等至所生樂者則與依止智印傳授第三灌頂全無差別若是唯修與妃抱持所生樂者則於五明灌頂修父母抱持相所生妙樂復有何別初非所許雖是第二亦有差別前者弟子灌頂僅是五佛父母一分種性此中徧五部主第六金剛持與金剛慢母抱持身境差別如是又前者雖修父母抱持相然非專於抱持攝心不生彼樂俱三摩地此中則生故引生之法亦由金剛意三昧耶及鈴語三昧耶身為欲天父母之身印三昧耶由依表示如來身語意業三殊勝三昧耶所生樂俱之三摩地為阿闍黎灌頂日生以授三三昧耶示曼陀羅及天真實並傳阿闍黎事業次第等名為阿闍黎共灌頂智慧滿十六等目為阿闍黎別灌頂唯授三三昧耶瑜伽部中亦有故立前者為共其後灌頂非彼所有故名不共然無上部中授印三昧耶即可有智慧滿十六等義前諸論師意趣在此時輪本釋所許水灌頂等七不名瓶灌頂七種俱有水隨行故名水灌頂隨許灌頂之後大疏時輪大疏中云次將鈴杵授於弟子手中而授某甲金剛之阿闍黎謂於瓶灌頂前由三三昧耶門中傳一阿闍黎灌頂如略續時輪略經云善授隨許攝此言攝者謂即攝入隨許之中非彼七灌頂所不攝之阿闍黎灌頂又瑜伽部以下之阿闍黎灌頂非能說無上續之阿闍黎故於瓶等上四灌頂為聽聞了知無上續道故傳授上四灌頂為能講說無上續故傳上上四灌頂分為二種傳法如大疏云此上灌頂有二一為令有情入壇為了知道及聽聞教得自在故二為授大阿闍黎位及為講說故如是第一瓶灌頂者如略續云初觸祥慧乳即是瓶灌頂歡喜金剛經於智慧滿十六等釋為瓶灌頂及以阿闍黎灌頂是依真實明妃而說第二瓶灌頂者謂由抱持觸九明妃所生妙樂唯多寡異餘與前同隨順餘經諸大論師說圓滿傳授瓶灌頂即成演說無上續之阿闍黎者意指續之一分以未獲得上三灌頂其於聞說圓滿次第未得自在彼諸論師亦共許故圓滿聽聞及講說無上續之阿闍黎須俱得四種灌頂故然於得可圓滿聞教之第四灌頂中餘經與時輪教有所不同為講說故須否更傳第四灌頂亦有異同至後當說傳授水至隨許七灌頂法與餘經不同者謂由此七灌頂成修生起次第法器復以生起次第各尊修治各事在灌頂時亦順彼修義謂由五佛母修治五界故將瓶水與弟子五界生為五佛母傳水灌頂洗諸器垢乃有修五佛母悉地之分由五如來修治五蘊故將冠與弟子五蘊生為五佛傳冠灌頂洗五蘊垢有修五佛悉地之分此上所淨二事皆是身法故隨主尊能淨身面所向即將弟子安置北方生身金剛而為灌頂由十能力母與主尊父母修治十風以及左右二脈由彼二門傳冠帶與鈴杵灌頂此是語法故隨能淨語面所向即將弟子安置南方生語金剛由菩薩菩薩母修治六根六境及明王明王妃修治五業根及作用由此二門傳授禁戒與名灌頂此由二種根轉二境之垢是為心法故隨能淨意面所向即將弟子安置東方生意金剛由金剛薩埵父母修治智蘊與識界故由彼門授隨許轉法輪灌頂由二所淨是為智垢故隨能淨智面所向即將弟子安置西方生智金剛而為灌頂其能灌頂之曼陀羅諸尊亦皆各住所修曼陀羅中故是能淨所淨各細分別灌頂之法隨餘經者所淨之事攝為六聚謂五取蘊若別若總或五蘊與真如以六部佛修治彼等故由彼門傳授灌頂於修六部一切生起次第皆得自在依此密意故於水等灌頂安立不動等名冠帶即是冠灌頂之眷屬隨許即是餘灌頂之後依除所淨事能淨灌頂微有廣略其餘淨除能障修習一切生起次第法器之垢則義無不同也亥二阿闍黎灌頂儀軌分二乾一阿闍黎灌頂正儀軌乾二彼後依儀軌初又分二坎一授三三昧耶坎二受三三昧耶開示真實今初其次弟子供養合掌請白師言我從師長恩何能利自他金剛師灌頂悲藏願授我稱師長曰悲藏我從師長恩由得何種灌頂能利自他即阿闍黎灌頂願授與我答日迦跋說當三請毳衣師說若欲傳阿闍黎灌頂應於預備時受阿闍黎戒或此時受五部律儀意謂欲傳五明灌頂必須先具阿闍黎戒又說若欲唯受五明灌頂不受阿闍黎戒可於五灌頂後傳授隨許禁戒授記安慰四法如是弟子若欲更請阿闍黎灌頂者則可唯於此處受律儀後而為請白如答日迦跋云得弟子灌頂為聞經教授知道若能說作金剛師故以此語請白此是弟子灌頂與阿闍黎灌頂不一時傳之規謂得弟子灌頂若能為他作金剛阿闍黎者乃可請白也次想弟子由吽字與金剛以三段法生為第六金剛薩埵想金剛杵是從吽字所生金剛誦云無始終薩埵金剛心大喜普賢一切性金剛慢主體世尊第一士令以真實性持金剛授金剛三昧耶鬘論雖未說金剛杵生法以說鈴之生法故亦應修毳衣大師與答日迦跋等亦說從吽生為金剛並誦嗡摩訶班吽令其受持所說真實性持勝吉祥經大疏釋云不離空性之菩提心如來心性是為秘密金剛持金剛時即表彼義而持主謂一切眾生之主餘無始終等文如前請白天時所釋由緣法界為生本尊大印之因故立果位金剛持名謂為世尊最勝第一士夫此是慶喜藏師所釋次想鈴從痾字所生誦云說此一切佛鈴隨音而轉佛許勝菩提汝應恒受持令以真實性而受持真實性受持者謂搖鈴時念誦一切虛空相等勝吉祥經大疏謂想鈴聲宣說諸法皆無自性而搖前頌出幕經與勝吉祥經後頌出幕經第四品如諸佛大菩提體性之慧緣於空性任運以種種音為他說法此鈴亦爾表示隨音而行之慧以是諸佛許彼為勝菩提汝亦應常受持此是寂靜論師等釋有譯慧隨音而轉者較妥如勝吉祥經說爾時弟子搖鈴誦云三有自性淨自性違三有自性淨第一薩埵受勝有毳衣與答日迦跋等說教弟子亦誦嗡班根札痾真言論師多說前頌授鈴後頌令搖言三有者生死相續彼自性清淨者即彼自性遍淨增益為我之性即是違害三有無損害中而為損害寂靜無畏俱作違三有解勝吉祥經大疏則作離三有解第一薩埵即是菩薩彼受第一或最勝之三有由何而受謂由自性清淨於彼無實斷盡執著通達無住涅槃自性慶喜藏與寂靜論師所說如是此上是授鈴三昧耶次告彼云意身堅固性名印三昧耶由堅一切身是故名為印又告知云加持智印已受用諸欲塵修一切悉地令以金剛薩埵身與智印結合次第加持作抱持狀此未明說金剛薩埵與彼佛母身色面臂餘曼陀羅儀軌亦未明說若有經中說有金剛薩埵或金剛持父母相者即可如彼而修若未說者可修藍或白色一面二臂執持鈴杵佛母亦爾明顯雙運論說彼佛母是金剛界自在母亦說是金剛慢主體坎二受三三昧耶開示真實次若能辦當如上說造沐浴壇若不能造修如是壇安置弟子修為金剛薩埵之相鬘論說此是受三三昧耶其上是授三三昧耶分別授受三三昧耶為二時者謂前開示受三三昧耶法令弟子生定解此時明想為天父母以真實性持鈴杵手作抱持狀從如是修生三摩地應告知為瓶灌頂故許於受三三昧耶時得阿闍黎灌頂次如水灌頂時所說從自心間種子放光迎請灌頂諸尊乃至以金剛端注水誦灌頂大金剛等頌及誦嗡啊薩嚩達塔迦達阿毘克迦三昧耶室利耶吽娑訶而為灌頂說於彼時傳內灌頂與水灌頂故此論師亦許此處傳內灌頂水灌頂時說持瓶上華枝以杵端注水者謂右手執杵及瓶口莊嚴由華葉端洒水頂上作水灌頂次想水於頂上成不動佛而為印定作成寶冠智體灌頂諸尊入弟子身念誦嗡蘇波羅底叉班則娑訶而為加持供花香等鬘論引第二觀察經智慧滿十六二手正抱持金剛鈴結合許為師灌頂之文證於印三昧耶作天父母狀時得金剛阿闍黎灌頂若未了知如上所引經文即證於印三昧耶時得阿闍黎灌頂則不善知阿闍黎灌頂之正行以隨許說法等僅傳弟子灌頂亦可作後依故又以開示二種真實告知本尊之後亦可傳故次應告云總此宮殿即毘盧自性等此是說曼陀羅真實清淨又云五蘊應略說即五佛體性頌等說天真實清淨亦應示阿闍黎事業次第謂於曼陀羅及眷屬繪修供養以及入內受灌頂等是阿闍黎事業次第又應告云如是了知曼陀羅真實等於修三昧耶及律儀成就功能不可違越之性是三昧耶防止應作不作作不應作故名律儀能依所依清淨瑜伽部於信等功德之法宣說清淨無上部中俱說道清淨與蘊等清淨為遮妄執能依所依如未淨之情器體各異者故說宮殿清淨為遮妄執諸尊體各異故說天清淨如是唯依主尊智慧相分現起種種能依所依曼陀羅相離彼更非有體故彼一切皆以智慧為體廣說清淨如穗論第十八應當了知此不退轉灌頂儀軌又名為阿闍黎灌頂乾二彼後依儀軌傳咒儀軌次誦主尊心咒等一百八遍或誦三遍次云世尊我傳授願近此弟子三遍而授弟子亦誦世尊我今受維願哀近我三遍而受爾時作何觀想此論未明應如毘布底說想從自心出自口中經弟子右耳而入彼心中佛頂等經與鈴論師說此名咒灌頂鈴論師許於五明灌頂後傳授金剛鬘經亦說名咒灌頂如云弟子欲故傳咒法真言灌頂第一智彼四句出蘇悉地經眼藥儀軌次於金銀器中安置酥蜜眼藥想弟子眼上有𦺡字誦云嗡班內達羅阿跋哈惹跋札朗什次以金針塗藥誦云如醫王神鍼除世間障翳諸佛今為子除無明眩翳此文出大日經除者謂修有除去之功能餘師多說針從𦺡字所生加持令成般若波羅蜜羅多自性想眼𦺡字總攝一切無知眩翳用針除去或塗眼藥而得消滅誦咒以後塗眼藥時當念咒為除金剛眼障覆之義什是般若波羅蜜多蓮華部之種子示鏡灌頂儀軌次取明鏡阿字加持示弟子云諸法如影像明淨無濁穢無取亦無說正從因業生金剛心如鏡彼明淨無穢是諸佛體性入於子心中無自性無住知諸法如是無等利有情生為諸佛子除第二頌餘是大日經說第一頌明自性清淨第二頌明離垢清淨彼謂諸法明謂無煩惱障淨謂離所知障無濁穢者謂離彼二習氣入者謂得加持及緣彼為所證並成就彼功能由眼藥針除無明翳慧眼能見諸法猶如影像故於彼後說鏡灌頂如鬘論云示鏡儀軌說二次者是未見龍智曼陀羅儀軌有許為釋灌頂法者示二次之儀軌藏師謂此是破慶喜藏師示鏡二次然後句許有示二次儀軌故非破彼故破二次示鏡唯令了知法相如影像者此唯示一次如龍智所說然龍智曼陀羅儀軌無第二頌慶喜藏與答日迦跋寂靜師等許示二次謂於前示鏡後作鈴以及弓箭儀軌次誦第二頌示第二次鏡頌文非一詮義亦異前者唯令了知諸法猶如影像後者令知入自心中金剛薩埵之體性故答日迦跋亦云金剛薩埵尊自由彼文知非破以此理趣示鏡二次故說許為灌頂法者示鏡二次此師所許將彼頌文雜於前頌之間二事同作然亦不須定爾射箭儀軌次從賀字生弓誦賀字而授與誦云薩嚩達塔伽達那阿奴惹伽耶娑或云願一切如來皆歡喜弟子射時師長亦如是說此論未明顯說箭從賀生然答日迦跋云賀字淨弓箭授弟子手中故知俱從賀字生也弟子應誦薩嚩達塔伽達那阿奴耶彌以射魔碍意樂作射四方四箭上下各一共射六箭之狀此瓶灌頂是於繪畫或於身曼陀羅中得如結合第七云繪畫與身業壇中而得此能於初加行等三三摩地及護摩等支分而得自在即前經云三加行及支正為彼宣說色等諸境界達現有遠離此能清淨先造及防未來身垢即前經云殺生等前後清淨不生罪明顯雙運說修治身金剛結合第七亦云彼之自體性謂身金剛性日生亦如是說日生謂瓶灌頂為化身體安立化身殊勝種子為立彼功能故應勝解為化身瓶灌頂之三昧耶者藏地智者謂護十四根本及八粗罪釋名如結合第七云成器瓶灌頂注洒淨自在此是續次第以教所訓釋此謂成就法器及如灌注洒淨洗淨之狀故名灌頂是於阿毘克迦之聲而加以訓釋也阿闍黎灌頂及彼後依之嗢柁南曰請白生為天授與三昧耶安浴台受誓水灌頂攝入灌頂天供養說真實業次咒眼藥鏡箭釋瓶總清淨六如來性六灌頂善淨弟子心相續以屬六佛生次第修勝化身之所依無垢以瓶灌頂體及彼微細諸支分如諸咒師之所許以易解音無雜顯明上三灌頂後依及結行儀軌品第十之一酉二密灌頂先供物請白者以幔帳等隔成屏處弟子勝解師為金剛薩埵以具足三昧耶之智慧母生處無壞年滿十二等之童女奉獻師長如大印空點第二云賢首纖長目容貌妙莊嚴十二或十六難得可二十廿上為餘印令悉地遠離姊妹或自女或妻奉師長論說彼若無者餘者亦可是說年華容貌等德非說具三昧耶或可例外以說喜依不具足三昧耶明妃犯粗罪故次當合掌請云由師足下恩我得無上事是故密灌頂願依怙攝受修密灌頂物者次由師長具主尊慢將俗女身觀空之後生天女身先應加持金剛蓮華而入等至念誦嗡薩嚩達塔伽達阿奴惹迦那班娑跋嚩阿摩郭吭此出幕經與集密經想以心間種子放光召請毘盧佛與佛眼等入定從毘盧門入自身中大貪溶化經阿嚩都底至金剛摩尼堅固俱生如集密後續云金剛蓮華合集諸有金剛身語意加行彼悉攝心中由金剛路出降於弟子口傳密灌頂法者次從蓮華取其金剛以大指無名指取摩尼寶勝解如來化汁與自菩提心無二恐彼持語金剛彌陀慢之弟子見而不信故遮其面非彼手眼所及誦金剛鬘經所說之過去金剛持為佛子灌頂以妙菩提心今為子灌頂又誦嗡啊班枳吽等主尊咒置彼口中弟子亦應想是毘盧佛等一切如來總集體性念誦阿賀摩訶蘇喀而咽咒義為希有大安樂次明妃從定起不著衣服於蓮華中取甘露滴如是置彼口中彼亦如上而飲言如是者謂非眼手之境亦以大指無名指取如前誦咒及頌言如上者謂以總集一切佛心而飲亦如前誦阿賀摩訶蘇喀月稱論師答日迦跋持祥等說雖一弟子亦須父母俱傳秘密灌頂缺一不成從父邊得密灌頂理如明炬論第八品云師長將菩提心安置螺盃等中和以香水唱吉祥頌為先而為弟子灌頂如世尊於月密點云由出寶然菩提心一切諸佛悉憔悴清淨金剛生智水以無垢寶為灌頂如是五次第論及攝行論亦說將菩提心安置瓶內或螺盃中而為灌頂明顯雙運論說師長以大指無名指授弟子口之後仍將菩提心放螺盃等中和以香水唱吉祥頌為先而為灌頂引月密空點經為證拏熱巴於集密後續釋說前者是第一密灌頂後是略密灌頂難勝月與明顯雙運說修弟子為毘盧而傳密灌頂秘密灌頂之體如大印空點第二云由大無名合受用入內身爾時生正智猶如童女樂謂以師長父母空點安置舌上由嘗彼而生妙樂三摩地答日迦跋師云或是以語業授解脫體性唱阿賀蘇喀妙樂充滿身此說唯以言語灌頂故令觀想明顯於修得三摩地明密灌頂此灌頂於世俗菩提心曼陀羅中得是語金剛自性於修金剛念誦等風瑜伽而得自在結合經第七云增上菩提心曼陀羅中得又云彼之自體性即語金剛性妄語等前後清淨罪不生又云金剛念誦體明如幻三昧眼等諸內法達現有遠離拏熱巴於後續釋中說得密灌頂後開示幻身教授明顯雙運雖說為表自加持故表示慧者謂即智慧灌頂是為第三然五次第說於密灌頂後讚歎幻身教授開示幻身口授智足造亦云由彼淨剎土當通達諸法幻等十二義故若得密灌頂即成幻身法器羅睺羅吉祥友許此灌頂俱淨語意日生說為報身自性義如前說此之三昧耶者結合經說依五甘露不害眾生不捨女寶不毀師長名義是以父母菩提心密物灌頂故名密灌頂秘密灌頂嗢柁南曰供明妃請白生彌陀弟子師長及佛母二密物灌頂授灌頂清淨
