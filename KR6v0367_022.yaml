body:
  text: 宗喀巴大師造法尊法師譯明最初修圓滿次第與諸行及道果之次第品第十四之二辰二火瑜伽結合經於八瓣及中蕊後又云到此中之脈以燈為自性猶如芭蕉花伸展口向下勇識住彼中粗細如芥子不壞吽種子滴注若珂雪有情心歡喜故說此名春以馬火形色無我母名點由業風行動於臍輪熾然由得春知足由安住等至勇祥黑茹迦此名春及點略標廣釋春點二文即是猛利瑜伽根本教典初四句說中脈到心間脈輪蓮華之中者謂住彼中於猛利火燒然之時色如油燭光明為性如芭蕉花微開之狀入脈結中之口向下伸展其次四句說中脈內之字住中脈中能摧逆品分別故名勇識即是吽字量如芥子不壞謂作所樂他不能壞此是依猛利生樂之種子滴甘露光清凉如雪由此能令有情喜樂熾然故名為春與春相似故立彼名其次二句說點譬如馬口海中出火處之名之火能竭一切海水如是臍中火色能盡燒五蘊薪即無我母離一切戲論之空點此由臍下風吹生長廣大臍輪熾然業謂由修猛利所生內心作用即由此力策風釋中解為由業策風所動得春謂滴注菩提心知足謂生歡喜彼二相合名為等至說彼名春亦名為點結合經廣釋春點云臍間阿字形說是最短音心中有吽字長有二摩莫喉間嗡字形三摩莫懸遠額上杭字相聲點不可壞春點論中譯為心中有吽字長及於二量喉間嗡字形量誦三字長摩莫當是量字也短長懸遠即最長三者義謂有一二三短音之量此是內誦時量非語中誦修猛利時無語言故所書四字是入圓滿次第方便生起次第所修圓滿次第時者教授穗說短阿謂塵畫體吽謂心嗡謂語杭是連接杭字形脈之菩提心初後二字表赤白分故是身攝及餘二字即身語意三業此是四字所表之義結合經云甘露形滴注晝夜恆安住以此發聲音火能令歡喜疏解此云杭字明顯及不明顯體性猛利殷重無間修習下品修習流注甘露中品大注上品無間極注由修方便續體性圓滿次第曼陀羅若意堅固猛利决定熾然由此炙迫持兔亦注爾時真實杭字流注那達猛利塵畫增長超勝謂圓滿次第時修道要由猛利火溶化杭字樂為道而修諸說皆同此雖有多不同次第今依結合經疏依於補特伽羅增上分四及二四中初者如前細點時說由心修習堅固之力其俱生慧猛利塵畫本性熾然量同髮端百千之一猶如電光修治諸脈溶菩提心充滿其中結合經云彼慧為俱生是故安住形由業風所動臍輪遍熾然說明無我母亦即名春點髮端百千分等同電光明若不勝解此者當以金剛念誦堅固命風將下遣風提於臍間緣慮大印令風回轉猛利熾然大樂由此亦能顯了此若亦不能者可修息上行時塵畫上炎風入內時想滴注杭字月作空點形流注臍間此亦乃至左右二風內外行時數數修習若又不能如是修風出入則當唯以增上勝解修然滴之觀想增上勝解而修字者有二若樂略者當自臍輪乃至頂輪四輪修習紅昂向上黑吽向下紅嗡向上白杭向下先令昂字體性薄伽梵母猛利熾然由此炙上二字杭字溶化向下流注與中二字等同一味當如上說安住臍中若樂廣者當想臍間向上紅蓮蕊中月上有昂東方等葉右旋依次而有阿迦札達跋耶沙八字有謂安布八字是隨所化而說臍內輪有四字其次有八再次十六再次六十四字心間向下紅蓮蕊中月上有吽東方等葉上有阿伊塢鄂四字自在等四隅有耶惹拉嚩四字喉間向上白蓮蕊中月上有嗡東方等葉阿咿𭋒四字自在等隅有㖿㘃啦嚩四字頂上向下三十二脈雜色蓮華蕊中月上有杭東方等葉各隔一葉如其次第有十六韻想阿迦等諸字皆有半月空點那達猶如降雪令昂字體猛利熾然彼漸上行想一切字悉皆溶化等同一昧向下注時住於正見如前休息生起次第學者亦應緣上所說四相之一修令一切瑜伽母輪自性猛利熾然此熾然火由中脈向上升遍諸毛孔毛端乃至額際炙迫三輪以及諸蘊從右鼻孔眉毫孔出猶如電光遍十方界照解生死有情聲聞獨覺與諸菩薩皆悉成佛想彼等與已成諸佛入左鼻孔照大樂輪彼等一切由大貪愛火光發動從自眉際毫孔入內住大樂輪與菩提心同時溶化等同一味向下流注成為智慧方便一味大樂自性安住臍中由如是修當得諸佛圓滿加持教授穗論以此配於生起次第諸餘論師以配圓滿次第此諸猛利瑜伽未說持結合風而修僅說所緣堅固然火之法餘教授中亦說持瓶相風而修此諸主要猛利瑜伽結合經與金剛空行經等明了宣說唯一二點以餘教授而為補充黑行論師等梵本論亦多顯說故是最可信處如是風與猛利瑜伽獲堪能已猛利燒然溶菩提心繫縛不墮依此引生上降下固四喜證德於此之後當起天身以由空性起天身者總於二種次第別於圓滿次第最切要故師長應為弟子詳說此等卯三依此修空性法如是了知脈風空點生成要義若以專注彼等瑜伽令風點得調柔雖能依界流注回返引生四喜之三摩地復有安樂明了無分別而莊嚴然尤當依彼方便而修决擇無我義之清淨正見若不爾者唯修彼三摩地不能度脫三有如菩提心釋云若不知空性終非解脫依愚夫常流轉六道三有獄以是當入靜室修無我義結合經云次住靜慮處當正隨觀察一切法無我又此經後續云又於此中何為空性謂人及法無自性空此攝所修空性為二無我金剛藏莊嚴續云了知一瑜伽往靜處勤修罪淨今成佛善修法無我能證一切智此說往寂靜處修一瑜伽即能成佛其一瑜伽謂修諸法無我經中如是說者無有邊際身中生起此見之法要依教理以觀察慧觀察乃生如菩提心釋云諸行菩薩密咒行者發生願行菩提心已當由修力發勝意菩提心故當說彼體性後以正理破外道所計之人我與內道兩部所計之法我而决擇無我義由修習力引勝義菩提心先當如是求無我見此由解釋集密六如來各說一菩提心中毗盧所說捨離一切事斷除蘊處界及能取所取法無我平等自心本不生空性自性者之義故名菩提心釋如是龍猛菩薩說以正理破除二我修所决擇無我之見名為修勝義菩提心諸行密咒菩薩亦應修此故亦善破有說修觀察慧觀察之見是顯教規非密宗者金剛莊嚴續亦云心觀六分塵析為十方已此明了法義心淨最無垢過去未來心如是無所得無二無無二虛空亦無住如是觀察已一切衆生空是無垢瑜伽想自心無體此說觀察微塵分析十方為修空性跋嚩跋陀羅於金剛空行釋中如中觀莊嚴論分成十方觀察微塵决擇空性持祥師云一切法無實遠離初中後如是於壇輪斷真實分別蘊界皆無我所修妙樂形此說分初中後三時修所决擇無我寶鬘論云如剎那有邊當觀初中後成三剎那性世非剎那住又初中後三如剎那思惟即初中後性亦非有自性又說此法智足等大師明顯此等義謂智足論師於普賢修法與入修我方便如中觀所說離一異等理咒乘中亦如是决擇下三部續亦須如是於身生起前已說訖故學金剛乘者生無我見當如顯教而修又彼正見雖已了知諸法真實然由無始二種我執熏染之力心境不能如水注水平等一味而轉由二取力各別顯現故以猛利火溶化菩提心任持不令外泄由此力故粗分二取收攝寂滅爾時若能憶持正見住見而修能令彼慧漸近真實心境當能一味而轉又若其心未了無我則都非修無我實義若心已了達者則不出於現不現前二門若謂異生現證無我誠屬荒謬故是不現爾時彼等通達無我但由總相影像通達故若說異生以離分別心修真實義非應正理當知此心是後無分別智等流勝因故非未趣向真實之分別由總相門觀無我義故亦非是都不分別如集密釋掌華論云雖觀真義然非分別非無分別何故名非分別以能隨順引發無分別故何故非無分別以分別真義故非從無分別生無分別智以諸凡夫無彼智故亦非從於自性分別而生以此是彼真對治故然是安住真義觀慧由心隨所修轉故能無功用心安住無戲論之法界即此名無戲論無分別智如無分別陀羅尼云又此正行隨教示轉隨修習轉隨多作轉隨作意轉故無功用任運觸證無分別界决定量論亦云於思性慧若多修習當能現證遠離錯亂無垢無壞真勝義智故世尊說諸欲通達無分別菩提者當修觀察真實是此所宗寂靜論師說若無分別智必須以無分別為因凡夫無彼則應成過並引法稱論師所立由多修習思所成慧而生無分別智教授穗論亦云觀察雖是分別然能隨順無分別智隨順者謂親因第二觀察經云以分別分別以諸有諸有寂靜論師解彼義云即以觀察真義分別發修習力展轉引生無分別智唯以念住等世間道引生菩提分等出世間道故以分別而斷分別及以三有而盡三有教授穗論亦如是說由修分別生無分別迦葉問品佛以兩木相鑽出火還燒彼樹為喻顯說此義又教授穗論云若以慧眼决定觀察發正智光一切諸法都無所見故真實瑜伽師一切威儀安住定者雖見一切諸法都無所見如是方名無見非如睡眠閉目全不作意唯離疑惑名於色等拔除執著非如拔刺此說要以觀慧觀察諸戲論法全無所得乃可安立為無所得非故作意全不分別即修真實除心過失非如拔刺要以能對治品遣除增益與疑惑也此與蓮花戒師修次第論所說無別故密乘所化與顯乘所化繫縛生死之因非有差殊其主要繫縛之我執要以逆品無我乃能遣除正理王云未破除此境非能斷此執隨逐德與失貪瞋等斷者由不見彼境非以諸外相提婆菩薩亦云若見境無我當斷三有種若謂結合經云不應修習空不應修非空行者不離空永不離非空若執空非空當生多分別及菩提心釋云無生與空性所說我皆空下根所修者非能修彼義云何此說全不應執空不空耶答曰前文是破世俗都無之斷空見與勝義不空之常見非說無自性空亦不可取以彼上文法界平等性當取如芭蕉說無堅實或無自性亦可取故其釋亦云如芭蕉者謂由無明增益無勝義自性故通達彼無堅實非世俗無何者以法界與無自性中平等性之色等彼等體性非異事故然亦非一於世俗中各別異故是故不具斷常體性故俱破修空與不空既但破世俗無與勝義有之斷常為所修則修勝義無性之空與名言中有色等之不空俱非所破如教授穗論云既說唯勝義無自性即世俗有色等自性故說斷除空與不空不應道理經說執不空當生多分別者謂執常斷而起之邪分別非說一切分別若不爾者唯依不應修空之文則彼經與餘經所說當修空者極多皆成相違龍猛菩薩等說高深圓滿次第尚須以二靜慮多修分別收放而入光明亦成相違以如汝說則一切分別修皆是現證光明之障礙故其第二文義如出世讚云為除諸分別說甘露空法若復執著空佛說最可呵是說於空無我不可執實非說並無自性而不可執若無自性不可執者則應破除諸法無性若破無性則成有性如回諍云若遣無自性即成有自性總之若謂於勝義中破執無性彼非所許破之何益若謂於名言中心不可執無性無我故不應執彼者則應全無通達真實義者謗解脫及一切種智如是邪執是由未解何為中觀因之所破故說一切分別皆是實執破彼邪宗餘已廣說故具慧者於金剛乘亦當以聞思慧如中觀論求無我見獲得無謬見已當修了解無自性之定智以定解智與增益執是能所治若不執於無我由於無我心未趣入則於我執全無損故不動明王經中依此密意故云菩提心堅固說得咒悉地餘則修咒軌所作皆無果由略想諸法一切皆無性定得菩提心非唯餘能得此如教授穗論所引癸三增進二次第之方便諸行謂由了知欲塵體性善巧方便受用諸欲持咒之初業者雖亦有此然今是說增進二次第之勝行謂有戲論及無戲論最無戲論三行此三種行有於生起次第堅固後而行者如明炬云最勝修行與凡常住修習有戲論等三行之瑜伽師諸先覺說初次第時所修為修諸共悉地若修勝悉地者當於圓滿次第時修此復有三謂有得心遠離後修與得幻身後修及得有學雙運後修也有戲論者謂於勝處與二十明以結手印及歌舞等加行晝夜勤行而得大印攝行論說因陀羅薄底王即依此行而證大印無戲論者謂依五明或依一明以修欲塵為道而得大印悉地最無戲論謂與心間智印等至而能圓滿大印果位此三係由智慧資具年齡而分經六月等常恆無間受用諸行先能成就自在功德次即成就大印悉地攝行論云如是下中上別隨順年齡有三種行學習半月或一月或六月即能出生將得大印悉地之相相謂細色輕觸周遍正得光明堅固自在如意若欲現世修大成就定當修此三行之一令道增長如攝行論應當廣知癸四彼等為三士道之理如是無上瑜伽部一切道若順所化修果次第攝為三類上者現世成佛中者中有成佛下者轉生成佛其先修習共道次受清淨灌頂守護三昧耶戒三根皆同其不同者初是能學二種次第及行於此若得幻身現身决定成佛如五次第論云自加持次第若未獲得者經續及儀軌徒勞空無益若得自加持一切佛本性則能於現生成佛定無疑第二謂已滿足生起次第圓滿次第得心遠離然於現生未修三行之一於臨終時先發是願願能現證死有光明真勝義諦於死有後當起幻身如是死時順死漸次而修入光明之次第即能現起死有光明由此力故於餘凡人成中有時即成幻身攝行論云若修行者雖證聖諦然由宿習串習之力務農營商承事等事種種散亂於三種行俱未修行及餘行者因缺資具不能圓滿經說儀軌故未修行此等於命終時為更受後有耶為即得成金剛持耶答云若已證得圓滿次第一切皆修則於現世而般涅槃無可疑惑若知真實但由資緣不具未能如經所說而修諸行然能離一切見而命終者即勝義諦次受生者即世俗諦謂證真已若入光明棄捨凡蘊當發堅固願心以自加持次第而起若能如是作意而住則餘生中亦定不捨彼作意故能證得一切種智此說若得幻身則於此身定能成佛寶性論云聖者永拔除死老及病苦業煩惱力生此無故彼無此說大乘聖人永斷業力之死菩薩地說入地已後不乏資財故此所說未得幻身而證光明未斷業力之死由資具匱乏故如是行者是未得幻身之異生此於死後得幻身者是最初得若現證此中之光明必須先得幻身故於死時證光明者亦非現證此是死後不起中有而成幻身成就唯從風心所起金剛薩埵行相之身非成凡常中有身已再依彼身而修幻身得幻身已次於彼身修所餘道即於彼身而得成佛口授論說即生成佛道次第云自加持次第是故瑜伽師當於多劫中正勤講說此後云自心入法界明喜如虛空次成有神通五齡童身時樂圓滿無比次往他生時現諸變化身皆悉能善證此與攝行論同說成中有樂圓滿無比者謂成報身此是道位三身以五次第論說幻身為報身故即於初次第時釋論亦說入光明為法身最初依怙為報身故故非究竟之三身也口授論中雖說頗嚩如是成就然說頗嚩能否是成就實有二類能成就者謂五齡童身時是於成中有時能起幻身非是成中有已次修幻身故如攝行論中所說智德須於現身證得成彼身已再修餘道亦如上說若不能得如是三身則說生為持明之主漸修大印悉地口授論云若未成三身則成持明主漸次修大印說以此三相而成彼悉地此說現生中有轉生三種成佛其中有成佛者即如上述由離方便到中有時以有善巧方便教授成就金剛薩埵行相天身即於彼身成佛如是現生成佛以及中有成佛唯由修未修行之力果有遠近其道相同其轉生成佛者有灌頂已唯護三昧耶與戒律未多修道有雖修道唯修生起次第以下或有得心遠離以下圓滿次第以此為例餘部諸道亦應准知頗嚩非是現生成佛之道以口授論說是中有成佛轉生成佛之共道故龍猛智足二派論中說修中有為報身相除前述之道外未說餘道成報身後修行餘道雖未明說意謂於前現生成佛之時已說得幻身後現證光明依彼教授即能了知又為於死有時能知死有光明與彼和合至中有位能自了知中有而修中有教授臨受生時能於男女交會滅除貪瞋生勝妙處故於現在當發决定空見修習道位光明及緣生起次第天身明了堅固修幻教授解脫道者修猛利火貪愛道者依止業印不離樂空之心彌拉師說此是麻跋大師心要教授為欲將來認識死光明故現在修習與死漸次最相隨順睡眠光明是善方便此謂漸收明相至最微細頓入睡眠現起無念重無分別即是近得以此亦應比知明增二相次於已過無念重無分別未起夢境之間現如無雲之虛空時正是睡眠光明攝行論云次經多生展轉修習學無我法了知清淨加行當與本性境相合雜以此漸次緣勝義諦其漸次者謂令蘊等入微細界細界入心心入於思思入無明以是加行而入睡眠心思入無明之剎那即成忘念後無忘念智性即是光明又解脫時得風自性便有餘夢相起乃至識未散動當於爾時觀睡光明此即名為各別自證離身語相真勝義諦內證菩提若未能知睡眠光明界限則或有以無念重無分別為睡光明或以夢位引生無分別定為睡光明此雖是於究竟生起次第三遠離等圓滿次第已有力者修習最無戲論時說然於未到彼位之前亦可與彼隨順而修睡眠光明根本乃至風未動時而有風散動後即入夢相故欲任持彼時先當發願任持不失勿令入夢即於爾時攝持其心此即乃至等義又於爾時當憶正見所抉擇義而修非但修習如無雲之虛空而已次若不能安住彼定須起定時莫令入於凡常夢相應勤現起金剛薩埵之身以生起次第時空後多起天身圓滿次第亦如是故漸收現境如無雲虛空者隨順死有故從彼起定時極似中有若於死有修習法身中有定須修報身故此任持睡眠光明之教授不依餘緣但能持夢即能修習此光明與起夢身法是合修死光明與合修中有之教授心藏故師長應詳為解說辛四現證所修之果修二次第以及諸行之果有三最上成佛中品獲得八大悉地下品成就息災增益愛敬降伏四種事業明炬論云亦當說所為謂息災等法如是八悉地成佛為最上此說生起次第最堅固後修前二悉地者謂能如實成就彼等若非如實則初修業咒師修之亦能成就衆多相似悉地又有觀想念誦藥物護摩多種修法故當順自能力與所為而修也若於一曼陀羅已經專精念誦修習若息病魔若增壽慧若欲攝受不信正法者等若於非極粗猛難降伏者作治罰等但於彼天瑜伽略為變改皆可修作不須別求延壽增慧等諸教授修上成就地建立者金剛藏莊嚴經說十二地謂普光明甘露光明虛空光明金剛光明寶光明持蓮花業光明無譬喻離比喻慧光明一切智各別自證地現說尊長經云極喜等十上無喻與具智金剛地十三說十三地立十三地教授穗有二說於十一地加勝解行地共十二加初修業地共十三或加勝進道性無比喻地及加佛地無間道體具智地共十三後說但於十地中分即十地與勝進道無間道為三解釋現說尊長意趣寂靜論師說於共許十一地上加異生地是歡喜金剛經十二地之義金剛藏莊嚴經所說十二地同釋續金剛鬘經如前所引說十四地亦但共許之極喜等十地與異生地開合不同非說較波羅密多乘所說十一普光明地更有超勝之地經彼諸地成佛之理波羅密多乘有於色界天身成佛欲界人身成佛二說諸聲聞部不許前說於後說中許最後有未成佛時仍是異生如俱舍云父母病法師最後身菩薩設非證聖者施果亦無量大遊戲經苦行品亦云假使大地碎百分寶山須彌成大海日月星辰皆墜地雖是異生我無死大乘經中亦有宣說菩薩最後身時仍是異生與十地菩薩者依此等經故於印度亦有多說然解密意堪為量者多說彼是示現非如實義寶性論云大悲知世間普觀一切世不動於法身以種種化事示現而受生及從覩史沒說生覩史天等亦是已成佛之事業分別熾然論引經云諸佛等正覺於色究竟宮斷障成佛已化現此成佛是故菩薩成佛之身於波羅蜜多乘唯應許色究竟天身如入中論釋云由得第十發心自知能得佛法復於佛地精進修行發勤精進欲得之無上智諸佛世尊唯於色究竟天中得本地分說過淨居天別有大自在天是說超聖聲聞能生之色究竟別有第二色究竟天佛薄伽梵唯一剎那證得一切種智入中論云如器有異空無別諸法雖別性無差是故正知同一味妙智剎那證所知此謂永拔一切二取習氣智與一切法真實性一味無別安住法身永無動轉爾時由住報身而證如入中論釋云諸佛如來安住色身現證法界此身具足百福莊嚴成就種種不思議法彼即菩薩受用法因轉依而成此與分別熾然論說龍猛菩薩意許相同分別熾然論說金剛軍說彼身為異熟身無著說彼為受用身為力等法所依止故亦是法身於瞻部洲示現化身成大菩提論師多說此義無上瑜伽即生成佛之身說是人身如無垢光釋云言於此身給佛果者謂能於此人生而給佛果非於天等五趣之生是為教王金剛藏釋亦云言於此生給佛果者謂由數數生人乃成非是天及阿修羅等建立次第亦說是南瞻部洲之人身然如上說中等補特伽羅成佛之身容有例外以彼先於人身有修道之力故故以咒道即生或於中有成佛要如是身然成咒中所說之佛則非定爾咒中亦說色究竟身成正覺故成佛之理謂修道後身成色身心恆安住法身成就雙運如前廣說不共密教及無垢光亦說我等大師久已成佛今於此間示現成佛餘咒說者亦多故說大師化現成佛非新成者顯密相共因陀羅薄底王雖於此大師教法中得大菩提然無一教法中有二大師之過以彼實際雖已成佛然於有情不共顯示成佛事故猶如此土大師眷屬有彌勒等攝行論云此中行者謂世俗諦行謂勝義所行謂無二智遍知彼因果無二者此即名修一切祕密經云果以因印證因亦由果證餘經俱胝劫終不得悉地此說若無世俗幻身勝義光明無二雙運圓滿次第縱經百俱胝劫亦不能得悉地集密後續如上所引若無六支圓滿次第不得上品成就諸餘無邊經論亦說若無圓滿次第要旨唯以生起次第不得上品悉地故若唯修下三部道不能現身成佛以彼等中不共咒道較之生起次第無過上故若爾彼諸續中云何多說即生成佛彼諸續中雖作是說然彼所說非定具足一生成佛之道若不爾者則諸堪為定量經論凡說依此能成佛者則於彼中當說一切成佛之道如是應知或明一分生起圓滿次第亦說由此現生即能成佛然唯修彼非能一生成佛故若所化不欲久經無數大劫而成佛者當入無上瑜伽之門總之咒中共有三種成就建立說新成佛之身有色界天欲界人身之二及久已成佛今於欲界人身示現成佛之一至成佛時如語自在稱說雖有唯身唯智二俱寂等多種主張然共許為有相好莊嚴之色身復非粗色而是智身與此智身體性無別有如所有盡所有智於彼身智獲得自在即是成佛此為智者略示果位觀察之門可觀察處雖有多種恐煩且止如是先修共道淨相續已承事師長逮知能修清淨甚深灌頂乃受灌頂律儀及三昧耶次於所受三種律儀如法謹護次以四座瑜伽修初次第成熟能生圓滿次第勝智善根殊勝圓滿次第漸次生已再修雙運智身如是了知一切經續要旨皆是一人成佛順緣自能住持能仁圓滿聖教亦能令他增長嗢柁南曰久遠親近善知識少學經教勿自滿精細分別經教義於所聞義勤修習能熟灌頂解脫道於所修果皆不愚以金剛乘道進修善巧彼者名咒師回向頌普顯密義日今出高深廣大觀慧空善說千光照十方開敷無邊聖教蓮善根明慧六足衆喜笑音聲遍十方採取花蜜設歡會學金剛乘獲悉地四部續寶之所成具足灌頂四層級二次威光觀無厭四身果德頂莊嚴含種種界聖教水由慧進風所鼓動於此雪山金剛際凝成佛教海中飾此由多聞破愚暗如理修證調自身增上淨意為聖教衆多正法親友等及大福力生貴族殊勝善行護衆生荷宏法擔無疲厭住持密咒所勸請常時祈禱增上尊隨從恩師善巧言於持明咒聖教海審諦觀察而造此然由慧修念力微我今所有諸過失對佛菩薩至誠悔願罪因果咸清淨勤造大密道次第所集廣大二資糧回向能滿衆生願速得雙運金剛持一切生中悉地本承事大乘善知識如法傳四淨灌頂願成甚深道法器爾時師長勇識衆請為見證而善受應守食依三昧耶所有制限皆不違二次及行續部義願以無盡清淨理盡斷無知邪解疑精勤修行為心要如是學習廣大行願有力者恆相助令諸災難名亦無順緣如意皆圓滿深信唯有佛聖教乃是衆生善樂本縱失身命不棄捨以大志力持正法今此善顯祕密義願於大乘無邊行能助教典成教授令聖教藏常光顯猶如霞雲繞金山上繫帝青為頂髻紫金色身殊妙頂靛青五髻最端嚴妙音於我一切生歡喜攝受施大恩於最難測正法海智慧無礙皆能入此依善間教理隨聞正行荷負聖教戒律精嚴勝依譯師多次勸請又有衆多先求了知金剛乘道修心要者懇請廣造四部密法修道要旨又有迦舉行派帕摩主巴紹尊位者𠻨哦大師後裔咒師福稱於法法師獲不壞信志宏密乘數數勸請廣釋密乘以此今造大金剛持道次第開顯一切密要論釋迦苾芻持金剛者東宗喀人善慧名稱吉祥曾由解行圓融義成寶恩師處於金剛乘最初成熟次依具擇法眼童慧大師等諸知識甘露言教及於密乘無邊教義審諦觀察於雪山聚阿得貢賈山中慈氏洲造雅德福祥賢書以此功德惟願聖教遍宏十方民國二十八年正月二十七日譯在縉雲山編譯處並承印順法師詳為潤色
