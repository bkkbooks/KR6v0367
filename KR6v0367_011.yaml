body:
  text: 宗喀巴大師造法尊法師譯繪修供養曼陀羅儀軌次第品第七之二卯二分彩儀軌分四辰一預備彩色拔所釘橛辰二師資分彩法辰三明曼陀羅分繪彩處辰四於曼陀羅安立標幟送往智色今初鬘論與隨行者皆說此處施食然未明說為何布施難勝月說分彩之前應衣紅衣施食與此義同故是分彩之前行也鬘論與隨行者說於新器放白黃紅綠黑諸色如次想從榜朗讓杭蕚字所生白等顏料論說如次是用月晶黃寶瑪瑙摩羅迦達帝青所作或以真珠純金珊瑚火晶等作或用四寶和雜作之此依富有者說又說或用土作或用米作或用花作如其所應磚末炭末或骨末等亦可善為預備此依赤貧者言律生經與總續意趣如是次鬘論中僅說從繃蕚什吭吽生毘盧等然諸色料應依諸尊次序分安五方別書五字洒淨為先或但從種子或由三段法生為五佛次想虛空五佛心中有繃等字所成智色以如智線時所說之熾然視法鈎召攝入想與智色合成一味以繃字等咒已次誦嗡班即多羅三昧耶吽一百八遍而加持之毳衣大師亦說召入智色次以熾然視法令生威光安立什字說云由何諦實能使有情彩色增多能令諸佛愛樂有情願即由此實語令諸彩色熾然以此諦語加持令色增長修天超勝法中說為熾然謂以熾然視法觀想彩色增多說諦實語令有情彩色增多者毘布底謂令塵增多若修天瑜伽有力者彩土則能增長次以香花等物供養此增長彩色等是隨集密二部曼陀羅儀軌說然彼二中說增長法未能如此明顯次將曼陀羅中為繪圓線所釘之橛以下所說四吽字咒拔出意想攝入自手金剛杵中用五彩土填平橛孔實釘橛者應如是行若未實釘則不須爾填彩土時無定次第辰二師資分彩法鬘論謂於此處應振鈴聲以金剛歌除諸惡相誦云此法界清淨善度有情界當繪佛所喜金剛曼陀羅藏師認為此係答日迦跋慧鎧論師所說五誦此是鏡清淨等以配五智之義乃執振鈴每誦一次於橛穴中注一彩土彼義非正此是為除依於彩色之惡相故拋杵振鈴語誦彼詞意念真實義故金剛幕經第八於散宮殿彩時明了宣說此是分散彩色之三昧耶此法界清淨善度有情界當繪佛所喜金剛曼陀羅答日迦跋亦云應面向東方左拳握彩色說諦實而繪此是鏡清淨能度有情界吉祥大樂王一切如來處嗡班即多羅三昧耶吽應誦持五遍線量十二指直高起平整一麥不和雜遍繪一切處所說諦實即此是等誦彼後所繪者即線量十二指至遍繪一切處說為土填橛穴云何相順彼外牆是白色為繪彼故說鏡清淨每配一智之名同時繪一層下說彩土變現惡相是無真實之意樂加行者有則不爾故彼即是遣除彩色惡相方便阿闍黎耶所繪五牆之量此說為十二指歡喜金剛羯磨次第曼陀羅儀軌中亦說為一張手無上部曼陀羅儀軌多說左手金剛拳繪如金剛空行經說最初以金剛拳持線後可隨宜此亦應爾以金剛拳不能繪最直邊紋故如總續云金剛拳加行或以鈎召印或鉢印加行或明手印繪無上部中唯初一種有謂金剛拳者謂以左手持金剛杵而繪故以經說右手持金剛杵之文破之分繪彩色之次第者由外依次而繪金剛空行經云白黃與紅綠一切內為黑依次分色繪由外漸繪五牆彩色次第雖定然白色等漸次則無定準臨時如應配之大日經云色由內分散不應由外分諸師謂是意說始由繪者住處最為善哉疏中亦如是解分繪之法謂善端直遠離粗細等過金剛空行經云一一彩色寬門量廿分一若色不平整或彎曲低下紋低無成就彎曲生熱惱高量一小指應端直而繪粗則生疾病低下當損財彎曲互相瞋斷者師弟死若非右繞繪彩土被橛罰言橛罰者鬘論謂是悉地之因彩色互雜種姓斷絕藏地咒師有謂雖阿闍黎如經而繪猶應用顱鉢或寶器蓋覆餘方所繪之牆至相連時開器而視若有粗斷過應作對治方便善者應誦吉祥頌等此是迷文執義之談粗細彎曲說是所繪之過此如四百五十論云分粗遭疾病鬘論引為分粗生諸病持祥亦云皆應遠離粗等過失而繪若粗繪者當生疾病若謂初繪無過後時乃成粗等之失諸定量者皆未曾說如說非右繞繪是分彩之過失此亦相同由繪時有如是過失故說勵力善繪若約繪時善繪後開視時生從眾過而作彼說如何應理總續云從東北界起應分諸彩末右繞莫間斷平整無缺失若惡若失壞若不平殘缺當生諸過患智者分彩色故應善殷重答日迦跋黑行論師薩惹哈等亦以繪太粗等生諸過失為因說應勵力善繪具相而繪如線斷等是彈線時之過不關線紋之相分彩亦應如是布嚩具慧與毘布底於勝樂法說不左繞有如上說彩色被橛罰過此等諸過是說繪五牆時於餘彩土金剛空行經與諸曼陀羅儀軌皆未宣說慧祥雖說繪一張手許時應葢以金盤等以花圍繞次若相善應讚希有若相不善應將魔碍入彩土中以橛釘之然諸堪為量者之論皆無此說故難憑信彼曼陀羅儀軌多有不可信者三昧耶金剛說略繪五紋以瓦器等覆之後由弟子隨宜而繪毘耶跋達亦說覆以花器後可隨宜而繪然皆未說觀相善惡如是作者歡喜金剛羯摩次第儀軌說於邊紋散諸散花供諸供養因於彩牆供養散花恐損彩土故說葢覆然大論師皆未說此須否葢覆應更觀察息止惡相之方便者鬘論說佛為息滅諸過失故說分彩諸過失於無空行者若忍真實行誰亦不能障龍智曼陀羅儀軌中亦說墻寬門量廿分之一中有麥許是然燈賢持祥慧鎧布嚩具慧等所共說彼諸論師於此粗事絕無錯誤說是自語相違極不應理當更求其密意密意如鬘論云所修之曼陀羅是五墻由五寶所成有謂中有一麥量許此既說有人許則於所修應亦有許中有一麥量者然諸曼陀羅儀軌是說所繪者如是故於所繪亦須解其無違鬘論唯依根本線長一肘量者之曼陀羅而說線粗一麥又二十分之一為門二十分之一故說一一牆此邊至彼邊中有一麥許者唯是根本線長一肘之墻寬量說有門量二十分之一者是大小一切曼陀羅之墻寬量故當了知二者所明寬量無違諸彩條牆應勝解為白色寶等所成細條體性如是善繪如前所說量許次令弟子或令畫師隨宜而繪如金剛空行云次隨弟子繪鬘論說當出入曼陀羅時恐犯跨越線彩之過應以金剛勢入意謂將智彩墻舉昇虛空而誦嗡班北伽札摩吽毳衣大師亦說舉昇智線彼等義如前說如耶茜那說前所舉者仍應降入辰三明曼陀羅分繪彩處分二巳一曼陀羅外分繪彩處巳二曼陀羅內分繪彩處今初曼陀羅及眷屬定須彩繪其中五墻由外至內為當如次繪何色耶略有二種一若中央及四方為常說五佛猶如集密不動金剛與金剛界曼陀羅者則從東方至中次第右繞五佛身色而繪二若四方及中央安立餘尊者當依能印証五佛身色之次第而繪五墻之色一一皆通四方不與餘處色作東白南黃等同所修五墻次第如何而有有諸論師許為內外五層有餘論師許為一牆重叠五色鬘論敘此二家未明自宗然其所許應同前說以於線時說彼門側外線至彼外線共有十小分故說墻寬量是一分故若如後說則墻厚量僅有一小分中五分之一牆有太薄之失寶磚處為紅色瓔珞半瓔珞處黑色若許墻為重叠則說彼為餘色然非此中所欲欲塵台處或為水晶或金瑪瑙或諸餘寶隨美應作然諸師長皆作瑪瑙之色水簷前垜俱為白色處所當作藍色以是虛空體故是故中層名曰闇層是中空體性故門側上之橫梁用寶隨美而作種種寶雲以為莊嚴在所繪者門前牆處不須繪梁牌樓柱與彎曲內懸寶蓋之下應作如來身色後者是方色莊嚴之虛空馬蹄嚩惹那摩羯陀魚處說隨美觀而作其餘諸層論未明說意謂易知言易知者水簷箭垜白色底為藍色寶層闇層於前已說與彼相同金層依名可知其為黃色四法輪者自宗許為金色他派有用餘寶作者牝牡八鹿是以金為自性餘寶莊嚴宮下羯摩杵臍黑色有論說為主尊身色各方中股為各方如來色若是三股其餘二股如其所應為彼側如來身色例如集密不動東方右股為不空成就色左股為寶生佛色若是五股如其所應為餘方及中央佛色例如前者所繪稍隱之右股作彌陀佛色左股中央佛色顯見之左右股即作左右佛色亦有論說各方一切杵股皆作彼方佛色前說與此隨一皆可論云主尊四面謂各方之面色是他宗義例如勝樂有說東股作青色等此是餘宗牌樓左右諸如意瓶由金所作諸如意樹如餘妙樹羯摩杵下蓮蕊綠色蓮鬚黃色諸葉雜色有葉之處是法生內當作深粉紅色表法生者是蓮鬘與金剛鬘之中線應作白色此邊如前彈線時說共有三派許輪鬘者若是玻瓈者為白色若是金者則為黃色是依金剛杵色而說金剛自性及彼邊界應為黑色有論亦說彼二為白色及黃色隨一即可金剛地基處為雜色於所修中下自風輪上至色究竟天皆有金剛圍故風輪等體是雜色故光鬘之色謂即五如來色向外射放巳二曼陀羅內分繪彩處根本線內曼陀羅之地基由二角線所分四方各為該方之如來色所修曼陀羅頂四方亦爾此未分別頂之內外但總說為彼色壇中諸柱亦作各方之如來色各方如來標幟有輪鬘等莊嚴圓金剛鬘及諸金剛未明說為何色圓鬘在所修中有二所繪圓鬘應是圓梁如諸師說作黑色和藍色金剛如說外金剛有三色隨一即可壇內光鬘如鬘論云諸智者說不繪彩邊故於火燄之端不繪彩邊色與外光鬘同論云主尊居處為主尊色若是通常五尊即隨彼色若非爾者則隨彼彼部主之色曼殊金剛主尊雖是金黃然是藍色四百五十論云中央諸地分帝青光熾然又紅大威德十三尊持祥論師亦說中央地基為藍色故蓮華雜色蕊為綠色葉色如云誑綠自在黑火風界者黃餘方為紅色論云主尊層處有主尊標幟鬘層者謂九格宮殿中主尊處周圍之方層此於地上之所繪者雖未明說何色當為中央地色圓線之外梵線兩側離四分處共有八瓶量高四方甘露充滿有許為黃金者復有許為寶體隨各方如來身色者諸餘邊線色與粗細隨美應作辰四於曼陀羅安立標幟送往智色如是諸尊乃至座具圓滿安立能依曼陀羅有三法謂安立各尊種子字標幟鑄塑等像隨力而作如龍智云隨力於壇場安立諸種子或相或形像鑄成或製造曼陀羅儀軌則譯為塑造或鑄成此中若有無善根者非密法大器則繪標幟或印若無彼者應繪形像謂應安置繪像鑄像彫刻泥塑等像繪手印者現說尊長中云無能則安放所繪印或相又云或彩色或筆繪彼等莊嚴印謂手印相謂標幟如現說第三云字壇為第一第二相壇場手印是第三設像為第四布花是第五第六為壇輪穗論第十二云形像或繪畫或彫刻或鑄造或由鍛師製造所成故第四種俱說是彩土上所置之鑄像等與布繪曼陀羅其餘二種未見解說然第五種易知其第六種如攝行論等說男女諸瑜伽師作諸天相如其所應住於曼陀羅處傳謂勇金剛師所造論中說設香點總續說三法謂設天像及諸標幟坐具若圓滿繪諸尊支分費時太長支分若缺不得加持是故特贊繪畫標幟曼陀羅儀軌亦多繪此者如是繪已應善觀察為善未善有未善者應更改繪如總續云圓滿繪壇已應令心等住其後多觀察若有未善處彼應再改繪繪壇以後不可無一得灌頂者空置而去如總續云作沐浴等時安餘見壇者繪曼陀羅時終不應空棄若審知所繪曼陀羅一切明顯應以吽字及誦甘露瓶之五種甘露香水徧塗曼陀羅外并以彼水洒淨壇輪次誦嗡啊吽班穆送去智色盤內餘色安置屏處此雖未說供養彩色然應如前智線所說如勝賢云散失諸色宜用布等拭淨此於香水塗曼陀羅以前作之卯三繪壇辟魔繪曼陀羅等時若地出水或風雲等由天所作或人所作障碍相起爾時若能別修除害方便即如彼修若不能者應剎那頃堅固勝解有金剛幕箭網寶蓋中間空處依諸輻端有最可畏十大明王由此加持十輻黃輪向右旋轉輪轂中有曼陀羅室相如宮殿復修金剛體性之地基等遮禦一切魔障於護餘事亦可用此但須略改念誦而已寅二安諸瓶飾壇場分二卯一安布諸瓶卯二嚴飾壇場今初將前所備諸瓶於曼陀羅右繞安布歡喜金剛羯摩次第儀軌中說爾時以香前導奏諸伎樂繞曼陀羅三匝而後安布慧鎧論師亦云諸瓶以供物傘蓋及幢樂鈸歌而前引安布於壇場二說相同所安之處鬘論與毘布底說於火燄之外寶鎧師說若有屍林安屍林外答日迦跋則云金剛鬘外能生障碍不應陳設與前不同安布之規鬘論但說曼殊金剛不動金剛安布瓶規餘尊安布瓶規準彼可知且如曼殊金剛於東門外略向右側安主尊瓶東門之左如次右繞安布毘盧佛眼業瓶言左右者望內而說主尊瓶右安布色金剛母法界金剛母害獄主諸瓶南門左側安布寶生及摩摩格右側安布聲金剛母慧邊際瓶西門左側安布無量光白衣母右側安布香金剛母蓮邊際瓶北門左側安布不空成就度母右側安布味金剛母觸金剛母碍邊際瓶若是不動金剛則於前說四佛母無間與右側第一唯除主尊每方各安二瓶四角安四隅明王瓶東西二明王瓶無間安布上下二明王瓶準此安立餘曼陀羅瓶之理如寶鎧勝樂十三尊所說謂東門右側先安主尊瓶次安烏面母瓶左側安空行母與一切業二瓶北面南門左側安布那摩等三右側安梟面母等三四隅安布獄主堅母等瓶四角諸瓶誦嗡班葯叉吽咒安鷲翎等四箭是鬘論與律生釋論中說答日迦跋攝為十瓶將主尊與業瓶安於東門右左所餘八瓶安於四門四隅準此道理餘多易知卯二嚴飾壇場次於曼陀羅外四方誦般若等正法謂於東方誦般若經餘南西北三方毘布底說誦入楞伽三摩地王及華嚴經金剛生師說誦華嚴不可思議秘密經金光明經安放龍腦及阿迦茹都茹迦等八隻香鑪如總續云預備十香鑪用瓦等燒作安布諸方隅及後并於前若香爐不敷可供泥鉢中若此亦非有則門各安一又供千百種種妙衣或每尊供一衣或隨力供安於篩等器中如總續云富者一切天各供養二衣餘者三部主各奉獻二衣或由知法者將一雙小布安篩置壇中普供養一切更可供養傘蓋幢幡牌坊妙布有鈴白拂裝滿諸瓶貝葉芭蕉等物隨宜安放於彼諸物誦吽字及主尊真言及誦嗡班娑帕惹那康以為供養慧護論師說於曼陀羅室之外東方等處如次樹立白及淡黃黑灰紅雜深黃綠色八幡供献諸尊有謂毘盧寶生彌陀不空及彼四部諸幡依次立於從火乃至自在四隅主尊之幡竪於東方彼部之幡各竪自方前說符順總續唯除續說東南紫色又續說為八幢故知幢幡皆可為令護方神生歡喜故安立十五幡帝釋者黃徧入者黑月天者白日天者紅梵王者黃立於東方火天者紅獄主者黑離實者灰各立自方西方水天者白地神者黃毘摩質多者黑風處風神者綠北方毘沙門者黃色毘那夜迦者白自在者白立自在方若不敷者隨力奉献總續中說若幢不足可供一白色幢用孔雀翎莊嚴幢頂若有多者竪於東方莎惹哈云次以香花等隨天數供養謂於一一尊處皆應圓滿供養一分寅三修行供養灌頂分二卯一修行供養卯二灌頂儀軌初中又二辰一修曼陀羅辰二供曼陀羅初中又二巳一修彩土曼陀羅法巳二修其餘曼陀羅法今初次應沐浴塗上妙香身著上衣頂髻莊嚴以誦甘露瓶水洒曼陀羅次誦三字及甘露瓶以守護曼陀羅執持鈴杵近東門處西向而坐安住主尊瑜伽修曼陀羅如此論師所說寶鎧與毘布底亦爾莎惹哈與答日迦跋說於圓滿修法之後修曼陀羅修曼陀羅時生三昧耶曼陀羅與入智壇之規如鬘論云所繪之曼陀羅剎那空後觀成所修之曼陀羅俱守護輪釘魔碍等眷屬儀軌如云明妃顏殊妙年可十五六香花善莊嚴欲樂於壇中德帶摩摩格慧者加持彼放寂靜莊嚴佛住虛空界謂與外印入等至定若無外印應與智印入定以正行歡喜聲召請智輪供養浴足閼伽為先入自身內欲火溶化由金剛路至蓮華中放出智輪入於三昧耶輪隨行二師未引彼頌餘說亦爾洒壇輪已剎那想為空性以為淨治次觀成所修曼陀羅自性謂修能依所依皆為智慧所現曼陀羅之自性若唯修能依所依曼陀羅猶未具更當先修護論以及釘魔碍等儀軌眷屬四大重叠乃至座位以及諸尊一切修法皆如各各修法儀軌中說次入智尊引證集密第四品頌以真實或所修明妃入等至聲召請智尊由自口門入自身中溶化以後從蓮華出放諸尊輪入三昧耶曼陀羅中寂靜者謂諸佛佛住之虛空界謂彼宮殿放入彼中是莊嚴義為證須從明妃等至界處放於宮殿故引彼文非引彼證三昧耶尊是證智尊彼文見於集密續中彩繪曼陀羅後供養曼陀羅時所說其義謂修自部母邑同摩摩格而於曼陀羅中修內供養此是顯炬論說所繪曼陀羅中不能如是實行修義應爾如是應修自身不異彩繪曼陀羅中主尊而修供養龍智於修曼陀羅時引述彼文由與明妃等至從菩提心所生三十二尊作放出等各往自土次仍召請來曼陀羅入彩繪曼陀羅諸尊此說欲樂於壇中之義須如前修與明妃等至後放出諸尊之時須修自與彩繪曼陀羅之主尊不異所放諸尊是智慧尊非是三昧耶尊如引集密證智尊入三昧耶尊自與明妃等至之時須自與前不異如是修三昧耶尊時亦由自與前尊不異而修似為應理又放佛寂靜處莊嚴虛空界者此與鬘論所引文同唯藏人譯句稍異耳龍智意如前說持祥論師於札拏曼陀羅儀軌亦以自前不異而修謂住曼陀羅中自與明妃等至由菩提心所化諸天放滿虛空次各安住自處召請智尊入彼此則許前者是三昧耶尊毳衣大師意趣亦為自前不異而修恐繁不錄答日迦跋與莎惹哈則說自與前異修曼陀羅故不應執唯一然此二派皆說生為三昧耶尊次入智尊黎拉班則說繪曼陀羅以後不更新生三昧耶尊即降預備諸尊安住其處再從胎中放出諸尊入彼等中次復召入智尊日生則說由入三三摩地瑜伽及與明妃等至之聲召請諸佛入自心中從蓮放出作利他事次復回至曼陀羅角上虛空中於諸相鈎入縛自在此未說及新生召入智尊彼二皆是自前相異之家若是自前相異而修則於修成曼陀羅前先應如法修天瑜伽若不異者則不別修天瑜伽也曼陀羅中所安諸相應修為諸尊否曼陀羅儀軌中二說俱有如造標幟之相若未淨空即修為天不應道理由先修空後生為天名相生為天故此於所繪之曼陀羅亦同入智尊者如答日迦跋云洒淨想為天降虛空諸尊請智曼陀羅六合為一體此說召請舉昇虛空諸尊及餘智尊六者預備天中有三昧尊與智尊之二修地軌時舉昇虛空之曼陀羅亦二彼四與所請之智尊并彩繪之三昧耶尊為六薩惹哈云前說預備尊由心變化已加持曼陀羅或由心種子鈎召諸智尊加持壇諸尊預備天有二尊故成四合鬘論於此雖未明說入預備天然前舉昇虛空未送往者亦應攝入預備天僅入地軌時舉昇虛空諸尊未攝入餘智尊故是五合毳衣大師持祥論師但說二合日生則全無合黎拉班說有三合故從一至六合皆有說者次於加持眼等無間由自心間種子放光鈎召諸佛及諸天女而為灌頂如應印定其不知部別者可以金剛薩埵或不動佛而為印定巳二修其餘曼陀羅法若修布繪曼陀羅時亦先洒淨如各現觀而修與彩繪同如鬘論云次應現起彩繪曼陀羅或布繪曼陀羅或意曼陀羅於彼以供養等為先如修弟子善住修佛像等善住此於修壇輪後作如是說意謂修曼陀羅法相同故前說依畫像之三曼陀羅儀軌未說修曼陀羅僅說供養等後而灌頂者意謂易解當知修法亦同現說曼陀羅第四亦說布繪曼陀羅故依布繪左證甚多此中有說先將畫像諸尊分出待生起後再令攝入極不應理此與開光安住成相違故不出諸尊即生諸天無少過故若不爾者過失極多彩色生為天已後繪宮殿及生天時亦應先出加持彩色諸尊而生開光佛像及已生為不動佛之弟子水灌頂後欲作冠灌頂時亦應分出不動佛別修寶生等依此道理餘亦應知修靜慮曼陀羅如現觀修習即可修身曼陀羅者義隱難知故於彼法有作是念何為所修之身所修之曼陀羅復何所似彼所依身於此曼陀羅之修法又復如何茲當宣說灌頂之前三曼陀羅中之身曼陀羅鈴論師云諸眾生本性所成壇無二此說所修之身即曼陀羅譬如彩繪與布繪曼陀羅即是彼時修曼陀羅所依事故彼三雖未修習成曼陀羅然亦可得曼陀羅名身曼陀羅名為自性成就餘二名假造曼陀羅不依由儀軌修成得名以依此義三者皆是意所造故亦非依於本性有無智慧所現能所依曼陀羅而言以約彼義三種有無無差別故若謂眾生本有勝樂諸尊則不應云不知彼自性許為彼法器以若不知勝樂身曼陀羅成相違故有以有情身之真實與曼陀羅諸尊真實全無差別說為本性成就則應彩土及畫像之真實亦與諸尊真實相同不應安立彼二為假造者故鈴論師之意是以生起智慧所現能所依曼陀羅所依之事須吾從新勵力修造而分以生餘二所依諸事須用彩等從新造作身曼陀羅生為諸尊之脈界等不須新造而本有故無二義謂即依彼事而生諸尊故修此曼陀羅之所依事定須本性成就之身彼但云諸眾生其為弟子灌頂之曼陀羅為阿闍黎之身為弟子身抑是餘者之身或不分別彼等修一總身而為曼陀羅耶此中修習身曼陀羅即修身曼陀羅現觀非有餘事如修身曼陀羅現觀即將自身修為諸尊此中亦由修曼陀羅之阿闍黎修自身為能依所依之曼陀羅而行灌頂彼中無用餘身此如鈴論師云先暫想三輪即金剛上師次弟子如自後遍修一切此說阿闍黎於灌頂之前先應自修為三輪曼陀羅次乃灌頂此是修曼陀羅瑜伽與現觀同為一事故今藏地諸師現有二說有謂先應如修外曼陀羅現觀於前生起宮殿等已次於主尊及與師長無異之身圓修身曼陀羅而後灌頂有謂先如身曼陀羅而修自起從彼出第二黑茹迦入自身曼陀羅後說為善前說未將本性成就因位之身先修為曼陀羅故入彼中而受灌頂不成身曼陀羅之灌頂故自入何曼陀羅取受灌頂亦令弟子入彼而為灌頂是謂灌頂總相建立若入彼說則應弟子亦非入阿闍黎身曼陀羅受灌頂故自從主尊分出而入壇者即彼自前不異之二外曼陀羅亦有灌頂之境謂主尊與師長不異總之修曼陀羅即是修曼陀羅現觀豈是修一曼陀羅已另於他曼陀羅自入及灌頂耶今當宣說所修之曼陀羅如何修所依曼陀羅論說身一弓四方即宮殿四方有謂彼身本為宮殿想令明顯有謂勝解代替四方宮殿異說雖多然不應理若許自身本有四方宮殿之性自不了知今令了知如前已破若僅勝解為代替者則諸脈界亦應不須修為諸尊唯以勝解代替諸尊即可故三種曼陀羅僅是修為能所依曼陀羅之事有異其所修成之曼陀羅則無不同如修能依曼陀羅時須修六十二尊之身面臂等相修所依曼陀羅須修四方門等相二者理相同故金剛鬘經亦云身成微妙宮一切佛所依此是略標總攝廣說身中何分修為宮殿何分之義則云修彼成宮殿謂由修身轉變為宮殿龍智亦云從梵線發起分成四方形顯現為宮殿是行者身壇於修身曼陀羅所依曼陀羅時說修自身成四方等之宮殿故若修身為所依曼陀羅時須修為宮殿者不於宮殿方隅安立諸尊而於自身安立諸尊不應道理此無過失例如集密不動金剛修法中說於宮殿中修金剛持次於彼身修身曼陀羅安立三十二尊時不安立於宮殿方隅以修宮殿與於身中安立諸尊無相違故修能依曼陀羅謂修脈界成勇識勇識母之相此無不同修彼所依成曼陀羅之理如外曼陀羅從映囕等字生為四大及須彌盧此中從二足開展之弓形與三聚處三角形等生為地等如外曼陀羅於所繪墻等生為宮殿此中於身五色風等諸分生為宮殿如云身成微妙宮即由彼彼身分轉成曼陀羅之彼彼支分如是諸脈脈中諸界亦轉變成諸尊然此不須如餘二曼陀羅空後乃生即由此等轉變生為二種曼陀羅能依所依也脈及諸界例如外曼陀羅所有標幟若爾鈴論師云二假造體性隨所化增上彼非智者修見真解脫故彼說身曼陀羅勝餘二曼陀羅應乖正理以就所修曼陀羅體假非假造二相等故無彼過失此中所修之曼陀羅即諸佛身莊嚴現為能依所依是瑜伽師正所得果此所修事即是能得彼果方便如是依何道智而證彼果即加持此自身諸脈與脈內諸界風為勇識勇識母由此堪能而生彼果故此即是主要方便外曼陀羅雖亦加持字以及音韻等字然非如內能生諸道故由彼二所修之曼陀羅勝劣應理二假造體性隨所化增上義說依彼二種假造方便修曼陀羅入壇灌頂為彼非假造曼陀羅引導所化方便而非不假造曼陀羅之要方便故說上根所化不須二種假造曼陀羅灌頂者全非此義以密咒所化上中下三根最初成法器時皆須先入假造之曼陀羅灌頂是諸經論所共說故彼非智者修者意謂智者不執前二方便為修曼陀羅之主要方便所以然者如實知見身曼陀羅宗要真義由專修彼宗要義故能得解脫若專修餘外壇日月標幟等事則不能解脫故如金剛空行云為知真行故應作假修習及勤假念誦此說於非假造曼陀羅灌頂時須先於假造曼陀羅灌頂故當了知彼為因果此中雖有多義應說恐煩不述辰二供曼陀羅分二巳一正作供養巳二息增減過旋繞開門初又分二午一內供諸尊午二外施諸食初又分二未一總說供養次第未二別釋供閼伽法今初此處雖未明說然須洒淨供物各依自法生起而後供養次放出諸天女以意為體性之供品而行供養又供雙衣寶蓋三字加持之嚼噉䑛喝等飲食以及金女象馬牛等外由十六或八或四瑜伽母作色金剛母等體以各供品而修供養振鈴念誦不動金剛等讚而取自與明妃二界置顱器中修成甘露而為供養勝解諸尊由飽嘗甘露故皆成大樂自性此依實印而說若是智印則須如是勝解而行供養修法為先亦可供酒次誦曼陀羅主尊咒一百八遍眷屬真言二十一遍及百字明如現說第三云百字於一切修令咒堅固具足自己名雜一而念誦毳衣大師說一切諸尊皆誦百八遍誦後復獻供養稱讚薩惹哈及慧鎧師等多說此處亦獻會供黑行論師等多說內護摩未二別釋供閼伽法閼伽器者論云金銀銅石木珠母及瓦螺葉鉢為浴足洒漱閼伽器或於餘器中正說九種餘者亦可總續雖說此等為閼伽器然實亦是餘水之器此如難勝月云此皆閼伽支故說閼伽名內物及真言者若息災者則用大麥牛乳白花茅草胡蔴炒米及和以甘露之白色香水此等稱為閼伽七物誦嗡啊吽部主真言甘露瓶咒七遍或百八遍而為加持若作增益用者則以胡蔴酥酪黃花茅草及和甘露之黃香水如總續云次注妙香水智者以手洒用燒香善熏心意善持誦而作持誦陳設之法謂自左起安置閼伽浴足洒淨漱口之器於彼等前安三盛器難勝月云香花及燈明熏香等置右左安閼伽器前復置盛器其諸盛器置於三足架上供養印及真言謂以右拳大指與食指作鉗狀取浴足器中之水花於諸指上旋繞食指漸開口誦嗡阿什扎嚩惹茜迦讓跋當扎底剎吽娑訶供盛器中次右手持茅草用茅端取第二器中之水於跋當處改誦為卓伽曩於第二盛器中三返洒淨用業瓶水洒淨亦爾次以右手大食二指取第二器中之花水拳口向下小指漸開誦加阿摩曩之咒供第二盛器中次用掌擎第三閼伽之器及水誦加阿崗之咒開金剛掌供第三盛器中一一各供三遍如是四水共為三器以洒淨與漱口同一器故供養次第多說如上供四水之次第然亦有餘論說別次序者洒淨隨宜皆可有說先供閼伽有說唯供閼伽無餘三水各隨時宜所供獻處以浴足水沐浴足故想供於足如是洒淨水想供於全身漱口水供於手或口閼伽供於面前或頭花供頭上香及燈明供於面前食供面前或手或口塗香供心一切儀軌中皆應如是知午二外施諸食鬘論次說令修行伴守曼陀羅自出室外以施食法向東方等供施自所依信諸天及帝釋等此宗宣說世出世天俱在室外施食彩繪曼陀羅與供食之曼陀羅諸尊各異想帝釋等在諸天曼陀羅之諸方隅而施其食是此論師所許薩惹哈與然燈賢等唯說護剎及護方神在外施食未說在外供出世食毘布底說自供食後令他在外施方神食藏地諸師先在室內俱供曼陀羅諸天與自所依信之護法神等食後往外施世間神食施世間食之境如勝賢云次出東門外帝釋等方主先以言奉請當作如是說有與佛俱來安住於此處皆憶念我故受我今所有香花等食物慈念諸有情弟子無魔碍此說施於請智尊時同來之護方神然此論師無畏則說供曼陀羅諸尊同時請帝釋等變成出世間天而行供食供食以後曼陀羅諸尊入自身十大明王諸護方神置曼陀羅室外十方乃至曼陀羅事未竟而住又於曼陀羅室之外各方陳設十大明王土堆於前施食外作十五土堆或在諸小壇上於八方施十五護方神食再於彼外作八土台或以牛糞塗壇瓦器盛牛乳等布施諸龍其外右旋散諸食物以及酥油蜂蜜淨水牛乳酒等五物送彩繪曼陀羅以後供施食等次攝十大明王入於自身送護方神日日供彼等食如前釘橛時說若於餘事亦如是行遮止災難尤為殊勝食品等之生法如下當說藏地諸師供施食訖作樂前導送食驅魔護送食等三處阿闍黎耶壓後次回至室內誦根本咒等施食訖應洗淨洗淨法謂蹲坐禁語手置膝內右手上仰中指及無名指略屈持水向口以少許水漱口多返觸兩耳孔二目鼻口雙手臍頭二或三次此是曼殊室利根本經說以手持水而洗妙臂問經亦云水洗手足已將兩膝向外手在內蹲坐無聲無沫洗飲淨水三口淨拭唇二次此說先洗手足次於左手注清淨水以手指沾水如前洗後飲水三口拭唇兩次有說此除與鬼交談之穢然鬘論說非爾以諸方神生為出世間天而施食故又於四處施食皆合供護方神與曼陀羅諸尊然於餘處未作洗淨故洗淨者為總除不淨耳巳二息增減過旋繞開門若能辦者為息增減過故當燒息災護摩為曼陀羅得滿足故應作增益護摩次具前說之吽迦羅瑜伽口誦四吽真言手持花鬘如前所說舉曼陀羅觀想由下躐入及誦真言以金剛勢入曼陀羅拋杵振鈴作如前說金剛步法共彼守門四阿闍黎旋繞三匝觀曼陀羅次將花鬘供奉主尊東門等阿闍黎如次念誦嗡吽泮嗡吽阿泮嗡吽阿阿阿泮嗡吽哈那摩惹耶都扎那伽達耶伽達耶阿阿吽吽而入曼陀羅中以金剛步如前旋繞勝吉祥經說繞三匝振金剛鈴即能滿足增減不圓滿過次每旋繞一匝開啟一門先到西方口誦嗡班佐答伽札三昧耶波羅北夏耶吽而開東門如是至北方開南門東開西門南開北門龍智說爾時結吽迦羅印左伸而住解印開門有說隨續別作於母續中當右伸而開門然鬘論於地儀軌時說吽迦羅瑜伽彼說右伸故是二續所共不須作彼分別自西開東門者是依身在門內而開餘亦准此應知次誦嗡三昧耶波羅北夏耶彌供獻花鬘又作舞而取鬘繫自頭上禮曼陀羅而請白言願於一切有情施予一切成就之恩次修念誦頌曰賢者入內灌頂處諸佛身土曼陀羅如理修行令歡喜儀軌次第依論釋
