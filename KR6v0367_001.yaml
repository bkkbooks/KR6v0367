body:
  text: 宗喀巴大師造法尊法師譯總明入聖教次第不同諸門品第一之一一切生中以大恭敬稽首歸依諸善尊長及至尊妙音足蓮恭敬頂戴師足蓮哀愍正授無垢道著有滯滅衰能斷誠禮諸善知識足如淨空中現彩霞滅諸戲論而不動現諸天衆無央身願壇輪主恆攝持盡佛所説諸密處無餘結集持明主我今敬禮威力尊諸魔眷屬應斂攝聞説佛父妙音尊欣然舉目微顧視皆能授與最勝慧通達甚深佛密意久遠恆依為本尊終不棄捨更依餘惟願慈悲妙智藏令我妙果得成就有欲如續義所釋依之如理修行者譯師智達無盡教亦曾為此久勸請福賢威嚴衆生欽荷負吉祥金剛乘意欲咸令遍十方衆亦數數而勸請得少便足迷經意不以淨理觀教義或有多聞不勤行彼等不能令佛喜諸如正理善學教先覺妙行感我意我今為明先覺規故於此事而策勵剎生俱生及咒生空行視我如母子哀愍恩施諸成就消滅一切諸障礙若有殊勝大乘種性為善知識之所攝受於諸共道已善修習由大悲心最極發動急欲救度漂流生死諸有恩者則當趣入甚深捷徑金剛大乘速疾施與一切有情唯一依處佛世尊果故此當説大金剛持道之次第此中分二甲一明唯佛教是求解脫之道甲二明入佛教次第不同諸門今初若已觀察自他廣大利益則知非可僅為一生求樂遮苦而依世間耆老所啓法則為求後世所有勝道非諸有情所能隨喜是由違諸世間言説所依愛他勝自大菩提心要當起修菩薩大行依行證得希有勝果下至一呼一吸亦成利生廣大方便是能資育一切衆生根本妙名普聞三地謂佛世尊所説聖教如雜讚云安住無邊際生死大海中貪等極暴惡大鯨噬其身今當皈依誰若誰畢竟無一切諸過失若是一切種諸功德依處則諸含識者應即皈依此讚此恭敬此住其聖教中理雖如是然毗劫囉等自實不知真解脫道妄以為知由彼我慢毒水所醉妄稱大師離諸善逝善説法外別説諸法真實造諸異論立相似道教誨諸欲求解脫者故當了知唯正等覺及彼聖教并於聖教如理行衆是諸樂解脫者大師正道趣解脫伴離此法外諸餘大師教法學衆則非如是於皈依處得決定解不被引轉是則能知唯佛聖教是諸樂解脫者所行道階又此定解慧力強者當求正量所引堅固定解慧力劣者唯是分別覺意仰信而已如超勝天讚云我非朋佛説非瞋數論等若所説如理奉彼為大師謂於自他大師教法應離朋黨及捨瞋恚觀察彼二誰為善説誰為惡説誰於成辦所化二利方便有真能立即是應取爾時二宗教典是否實義屬所觀察非所諍事即為能立是故唯以正理而分是否真實觀察之理若依補特伽羅生起次第則於現時先得增上生已後乃能得決定勝果然若觀察某經所説成辦有情二種義利是否欺誑則應先以正理成立決定勝果主要義利是不誑已次乃比知庸常所得現事無欺此是智者之所共許釋量論云正義無欺故亦比知所餘四百論中亦云若於佛所説不現事生疑當依於空性令彼唯信此由我執故結生相續生死苦蘊由達無我證解脫果能趣解脫諸次第等須以正理而善成立正理論中以理成立有説彼等是諸異生極不現事故能立者唯依教量此説不啻自出皈依之過我捨餘大師皈依佛世尊此唯隨自欲樂而説全無真能立故以於爾時教非能立自許無有能立理故若唯依教自他大師所説有無前世後世蘊常無常有無我等教義不同何者應理何者非理自宗論師若與他宗論議則亦不能成立自教清淨諸説極不現事之教非有事力正量之所能成彼義須以三種無倒觀察清淨正因而善成立立彼相時須以理成不得自許教為能立今唯略示門徑廣説如餘他宗教典開示有情真義利者前後相違如説自性大自在等體是常住作生死者復許求解脫者修道之後解脫生死若因是常則應終不可滅若未能滅生死正因決定不能滅生死故如是若破無我正見而説斷生死縛得於解脫亦成相違如前所説若未了解自宗大師等三是樂解脫真皈依處與此相違餘大師等非真皈依則於自皈依處不生堅固專一覺慧生此覺慧要以正理觀見二宗諸德失故至於有無外道非關緊要諸廣慧者欲生殊勝皈依覺慧當如前學以是應知七部論等諸正理論是於自宗大師佛陀及佛教證二種正法并於如理修正法者引發真誠廣大恭敬最勝方便甲二明入佛教次第不同諸門分二乙一總分諸乘乙二別辨大乘初又分四丙一如何分別丙二依何分別丙三乘體不同丙四顯示一切皆是成佛支分今初攝行炬論依於所化三種勝解攝為三行而分三乘於勝解下劣者説離欲行於勝解廣大者説地及波羅蜜多行於諸增上勝解甚深法者説具貪行迦日毗達迦摩拉師攝為四諦瑜伽行等三行如彼三理炬論亦作是説所説諦性義波羅蜜多義廣大密咒義今總攝而説智稱論師略釋一切經品亦如是説莊嚴經論云諸藏三或二謂大小乘所有二藏彼等俱可引為經典差別及乘差別丙二依何分別論分二門今釋其義有所為下劣唯為自故及所得下劣唯欲解脫生死衆苦求寂滅果故有所為殊勝普為一切諸有情故及所得殊勝欲求佛果故如斯勝劣二所化機彼由何乘各趣自果即説彼二乘名小乘大乘依彼二增上所説二種法即名大小乘藏於小乘中復有聲聞獨覺二種能導彼等各趣自果之道即分聲聞獨覺二乘共為三乘丙三乘體不同分二丁一小乘建立丁二大乘建立今初本地分説聲聞獨覺根果雖有勝劣其道建立大致相同詳明差別誠恐文繁今當略説彼二粗分總共建立此二種性於利他事厭背荷負唯為自利解脫修行能證解脫正因是證無我義慧良以繫縛生死正因即我執故以是彼等為達是義而求彼慧以戒定等餘道為伴而正修習故能盡斷一切煩惱經部師婆沙師唯識師及一分中觀師説彼非達補特伽羅自性本空然如幻有乃達無諸外道所計實我是為通達補特伽羅無我之義月稱論師意謂是則於補特伽羅不能少遣實執如是亦無通達補特伽羅無我之義若於補特伽羅有實執時亦不能遣補特伽羅我執如達蘊等諸法皆無自性立為通達法無我義是則通達補特伽羅無自性者亦須立為通達補特伽羅無我義故以是乃至於蘊執實則於補特伽羅亦起實執乃至於彼實執起時則亦不能盡滅煩惱若爾則應聲聞獨覺任何精勤終於不能解脫生死然此非理入中論云汝見無我瑜伽師不能通達色等性以未達彼自性故緣色轉故生貪等入中論疏亦云由緣色等自性起顛倒故亦不能達補特伽羅無我以彼尚緣假安立我所依蘊故此即龍猛菩薩之義如寶鬘論云乃至有蘊執爾時有我執有我執造業由業復受生中論亦云業惑盡解脫業惑從分別分別依戲論戲論以空滅此説於蘊執實繫縛生死解脫生死必須遮遣生死根本實執戲論此由通達自性空義而遣除故無分別讚亦云諸佛及獨覺諸聲聞所依唯一解脫道除汝更無餘此説通達法無自性唯一無分別母乃是三乘真解脫道般若經云欲學聲聞地者當學般若波羅蜜多於獨覺及佛地亦如是説又攝頌云欲成聲聞衆獨覺及法王若不依此忍莫能得成就前讚即攝此義聲聞藏中亦云色蘊同聚沫受蘊猶水泡想蘊如陽焰諸行似芭蕉識蘊如幻化日親所宣説中論亦説彼義云佛知性無性故於善教授迦旃延那中俱遮於有無故知小乘藏中亦非不説法無我義然彼多説由無常等十六行見乃至趣證阿羅漢果於大乘中亦有二説謂能通達法無自性及以無常等道趣證此如大乘經中雖説以唯識見及中觀見二種趣證一切種智之理然宣説中觀理諸經不可引作餘釋龍猛提婆以正理聚成立決定故顯示唯識理諸經如其所説須向餘引當許此中理亦如是諸續部中亦多有説聲聞獨覺不達諸法真實復有説若不達諸法真實即不能出生死及由於法執實分別繫縛生死故當了知會釋不違之理若依無常等道不能解脫生死然則為何而宣説耶此如六十正理論云生起及滅道為需要而説知生故知滅知滅故無常由知無常性亦能達正法諸了知緣起遠離於生滅彼成就正見能越三有海當知耽著諸有為者不起出離生死之欲為對治彼宣説無常苦道由此便欲出離三有若由生滅為因能達緣起正法全無自性生滅則當解脫生死真解脫道即是通達人法無性無常等道惟是生彼方便調治相續之道諸餘論師雖許空無我道是能解脫修無常等餘相之道是為趣證無我淨治相續然於十六行相中之空及無我亦唯定解無諸外道所執之我非是俱生補特伽羅有自相執真能對治故應了知無常苦等十六行相一切皆非真解脫道同是為淨相續之道由是小乘人中有是淨治相續道器而非解脫道器及是器者即鈍根與利根小乘法藏正為後機宣説前者唯是兼收之機小乘人中雖亦通達法無自性然大小乘非無差別以大乘教非唯光顯法無我性彼亦宣説諸地波羅蜜多大悲願等及説回向二種資糧無餘垢淨不思議法性故寶鬘論云諸聲聞乘中未説菩提願大行及回向何能成菩薩彼經未曾説安住菩薩行大乘中宣説故智者受持故聖父子許大小乘不以見分而以善巧方便行判猶如母是諸子共因父是彼等族姓別因如是佛母般若波羅蜜多即是四子共因判別彼等為大小乘之因是發心等諸方便故丁二大乘建立為求利益一切有情希欲證得無上菩提由此而修六度行者是為大乘總義蜜咒乘人亦以彼道而行諸續部中數宣説故然於彼上多有異義此諸補特伽羅之道即是趣向一切種智之大乘也波羅蜜多大乘其道總體唯有爾許此就見解分別有二謂中觀師及唯識師然彼二師非可説其乘有不同故乘唯一由於實義有盡未盡故知前是利根後是鈍根此般若波羅蜜多乘正為中觀師宣説其唯識師為彼所兼攝庸常之機耳波羅蜜多乘中若就遲速而分入定不定印經説有五種謂如牛車象車行走之二如日月行之一及如二乘與佛神通飛行之二彼等進行遲速雖如上諸喻有大差別然乘無差別故唯由根利鈍行程大小不能分判乘有別也若所趣果乘有勝與劣最大差別或彼能趣因乘有餘不同之道乃能安立為各別乘若道體上無大差別唯於道中略有不同及由修彼道之機略有勝劣不能安立乘有次第丙四顯示一切皆是成佛支分諸小乘人雖非為得成佛而趣自道然彼諸道亦是導彼補特伽羅進趣佛地之方便故不應執諸小乘道一向唯是成佛障礙正法白蓮經云令解佛智故佛設此方便終不於彼等説汝能成佛又云令解佛智故一佛出世間一乘無二乘佛不用小乘自覺所住道謂佛力禪定解脫及自在於彼立有情證淨菩提已若我於小乘安立一衆生則慳過非善實唯有一乘無二亦無三除佛於世間方便説多乘此義謂佛出現世間為令有情證得自所得智故佛所説諸道唯是引導成佛方便非以不能引導成佛之小乘法而導有情故亦安立有情於自所住十力等位得菩提已若將隨一有情安立不能趣入佛地之小乘法便是於法有慳吝過以於究竟唯是一乘小乘種姓亦可引之入佛地故雖復知彼方便然於彼等隱而不説即是引入佛地之法諦者品亦顯了説云曼殊室利如來若為一類有情宣説大乘為他一類説獨覺乘為餘一類説聲聞乘是則如來心非清淨心非平等心有耽著法大悲偏黨異想過失我亦於法而成慳吝曼殊室利我為有情宣説彼彼諸法如是一切皆為令得一切種智趣向菩提臨入大乘成辦一切種智至於一極故我非有異乘安立別説諸乘義如上釋若爾莊嚴經論所説云何可通彼云具慧墮於捺那迦非畢竟障淨菩提分別餘乘清淨利雖安樂住亦成障此説發小乘心與生捺洛迦中二於成佛如前者障後者非爾彼義是説菩薩發小乘心成佛久遠菩薩墮捺洛迦則不如是故無過失以小乘法於大乘人是成佛障於小乘種性是成佛方便全無違故又彼頌前亦明彼義為菩薩説故無可諍論處聖研經云若於佛語分別善惡應不應理是為聲聞是為獨覺菩薩而説皆是謗法義即執著一類佛語可是成佛方便一類則是成佛障礙彼經又説若由惡友增上隨彼所説犯謗法過於七年中日悔三次罪可清淨然得忍位至速亦須十劫是故以彼邪見而趣命終當受最大非義利果若能略得正解便能不起如彼過失如諦者品云譬如大海由諸異門衆水流注如是三乘一切法水亦皆流注如來大海故當了知佛所説法一切皆是正對時機引入佛地所有方便然因所化勝劣增上方便亦有圓不圓滿道遲速等差別應理是故引入佛地支分之道與大乘道二者不同由見此義故真實名經云三乘起出離安住一乘果乙二別辨大乘分二丙一總分二種大乘丙二別説入金剛乘差別初中分三丁一分數類丁二釋名義丁三明所以今初入無上瑜伽教義云菩薩乘中亦有二種謂地及波羅蜜多乘密咒果金剛乘依霞達迦惹嚩摩説密咒乘果乘金剛乘皆是咒乘異名或亦名方便乘因果乘者即二大乘異名如智吉祥論師除二邊論所引聖密授記經云修因説因法善轉法輪已有果乘近道又金剛乘亦稱持明藏及續部丁二釋名義以隱密修而得成就非非器境不為彼説故名曰密咒於梵音為末那達惹耶末那是意達惹耶是救義此如集密後續釋咒字云依彼彼根境為緣所生意是意名末那達惹能救義解脫世間行謂三昧耶律金剛遍防護名之為咒行應知復有異門如前末那及達惹耶釋為了知真實及將護衆生之悲心乘者運載義運至此處即是果乘以此運載即是因乘果謂處所內身受用事業四種遍淨即佛宮殿佛身佛財佛事若順彼相現前修習宮殿天輪供養資具淨情器等所有事業即是果乘修順果相而運行故如入無上續義論云此由內身受用處所作事淨相而入故名為果金剛者無垢光論云言金剛者最不可壞及不可斷此即大乘名金剛乘咒與波羅蜜多果性因性融合為一此謂咒理之果與波羅蜜多理之因二不分離是為金剛乘之名義彼因果者如灌頂略標云因持空性色果持悲不變空悲無分別説名菩提心謂具一切種最勝空性與最勝不變之樂於彼二不分離以由此運往及運往於彼便有因果二乘然此金剛乘義在無上部下續部中便無彼義以不變樂要得三摩地支方可安立須用隨念以下諸支修成諸下部中不具彼諸因支故故此所明金剛乘義範圍狹小彼理所立因果乘義亦不能遍總建立義當依掌華論説如云金剛乘者謂無餘挕一切大乘為六波羅蜜多總挕彼等謂慧方便彼復挕成一味謂菩提心亦是金剛薩埵三摩地故即是金剛彼是金剛亦即乘故名金剛乘是為咒乘之義方便智慧和合無別金剛薩埵瑜伽即金剛乘此有道果二位善巧方便大於波羅蜜多乘故名方便乘除二邊論亦云由無分別即果為道廣大方便最祕密故名金剛乘果乘方便乘祕密乘持明藏者如妙臂經釋説開示諸持明咒者所有學處及所宗故入無上續義論説持明藏有説非三藏挕為第四藏及許是三藏兩派然妙臂問經云説密咒經當諦聽又多續中亦説為經及經部者故當如寂靜論師説由彼總顯甚深義故許為經部最為善哉若就內容分別則亦顯餘二藏之義以故無畏論師許為通三藏挕亦應正理續者謂相續義集密後續説有三種謂修道作用所依止之根本續能淨彼之道續及淨果之果續斯皆所詮義續即以能詮彼義聖言説為能詮教續部者謂彼續之聚或種類波羅蜜多乘者謂若由行所依大菩提心及六度行而正運往除此更無二次第等所餘勝道而可安立若但就有發心及六度行而安立者則金剛乘應成彼乘言因乘者謂不修習如前所説隨順四種果相之道唯修彼因而安立之丁三明所以分二戊一敘他疑竇戊二答釋彼疑今初若於大乘分為二乘此由何門而分且非由於發心之門以諸菩薩由咒及波羅蜜多門而修行者俱為一切有情義利求得正覺修行等故以是所求菩提亦無勝劣由彼分二不應道理亦復非由有無通達諸法真實正見之門以般若波羅蜜多等了義經意除聖龍猛中觀論中所抉擇者更無過上之正見故縱或有之彼亦不能安立乘別例如波羅蜜多大乘雖有中觀唯識二宗然彼二者非有別乘行六度行彼亦俱有故修二身法身色身道要方便智慧不見有別波羅密乘所無之道雖有少許然非主要差別唯此不能安立乘為各別唯由補特伽羅根有利鈍行道遲速亦不能立例如波羅蜜多乘中雖有彼等衆多差別然無別乘若不爾者即咒乘中亦應安立衆多乘也戊二答釋彼疑分二己一破他計執己二安立善説今初有説咒為調伏有貪所化波羅蜜多為調離貪所化而説故於欲塵有不斷貪與斷貪欲而修道者即是分為二乘之理此應分別若謂由彼所化有於欲塵不斷貪欲而修與修斷貪之道而分二者然彼二乘俱有二分故彼差別不能分辨乘有差別修波羅蜜多乘道者多有未斷非梵行之在家菩薩如於善巧方便星宿婆羅門子見有廣大饒益他時開非梵行此等非一咒乘所化亦有衆多於諸欲塵斷貪愛故若不爾者則至成佛應終不能解脫欲貪或成佛後亦不能斷便成過失設謂非就二機總説是依自乘不共之機初行者説此復非説不斷欲塵貪即可修習彼乘之道是説能否即用彼貪為道助伴而作解脫之因然如下説笑視及握手等於諸欲塵依四類貪所生歡喜為道助緣雖許有此四續之機就此根機但可用為最初入彼二乘補特伽羅差別非能分於乘別如是説道有無安樂莊嚴及以注擊身心要隘為差別者亦不能分二乘之別若以由修彼道身生勝樂心發妙喜即以彼力心於所緣堅穩而住為安樂莊嚴者瑜伽論説一切初得奢摩他者皆先發生身息堪能由彼引生身輕安時其身便起廣大安樂次由彼力心發妙喜由依此故心於所緣寂靜而住此於內外奢摩他上皆所共有豈能據彼判別密咒與波羅蜜多道此於共道次第已廣宣説故不贅述若謂安樂莊嚴之義是依修習收放赤白二菩提心勝要教授藉溶化樂通達真實義者以是安立總金剛乘與波羅密多乘差別則不應理以彼唯是無上密咒特殊法故準此當知注擊身心要隘以判二乘不同差別亦不應理己二安立善説分二庚一正明分別二乘之理庚二明道有別果無勝劣初中分三辛一明正義辛二出教證辛三斷諍論今初約運載至此之果乘咒與波羅密多全無勝劣之別二道所得同是盡一切過失圓一切功德之佛果故故是由此運載因乘之別其中智德正見發心意樂學六度行亦無差別故由彼等亦難分別若爾由何分耶二種大乘所求要義是為利他非自證之菩提以見佛果是利他之方便而欲求為利他支故現觀莊嚴論云發心為利他欲正等菩提發心同故正於所化示現利他之佛非是法身而是二種色身要由通達甚深空慧成辦法身廣大方便成辦色身但離方便之慧及離慧之方便皆悉不能成辦二身是故方便智慧不得分離乃大乘之總宗若未通達實義則不能盡一切煩惱出生死海故達甚深空慧亦是下乘二聖所共故大乘道主要差別謂於具足善根之機現示色身乃至生死未空作諸有情依怙之勝方便波羅密多乘人所修諸法真實離諸戲論即修隨順法身行相之道然無修習隨順色身相好莊嚴行相之道咒則有之由是成辦利他色身方便道體上有最大不同故分二乘總大小乘非空慧分用方便分分二大乘非就通達甚深空慧須以方便分別方便之主是就成辦色身而言成辦色身方便即修隨順色身行相天瑜伽法此即勝出餘乘之方便故辛二出教證分二壬一無上瑜伽教中所説壬二以下續部教中所説初又分二癸一續中所説癸二釋論所説今初金剛幕續初品明顯説云若空即方便則不能成佛離因無餘果故方便非空諸見起顛倒及追求我見為遮我執故諸佛宣説空故曼陀羅輪方便安樂律由佛慢瑜伽成佛非遙遠佛具卅二相八十隨好故以彼方便修方便謂佛形此破唯修空性便謂方便及明宣説空性所為并諸不共廣大方便須彼方便成辦之理如彼四頌次第應知其初句義是承幕續上文自分別垢染污內心應遍勵力淨治其心而來他作是念淨治諸垢應唯空性以達真實之慧正與我執行相相違不違餘道是故成佛方便唯應修空何用所餘諸戲論為答爾時於彼方便任何勵力終不成佛以除修空性外無餘感果之方便故離方便支因不具故是故唯修空性非圓滿方便也此理非唯密咒亦是波羅密多乘之軌則此是天種慧師所説極為善哉若爾何為宣説空性謂有於法無我起不正見追求我見著我執者為欲遣彼二我執故宣説無我空性此亦顯示欲淨二我妄分別垢定應尋求通達無我正見而修此亦共波羅蜜多乘釋諸見起顛倒等句是依幕續釋中意也若唯修空性方便非圓滿何者是為勝方便耶勝方便謂是曼陀羅輪幕續釋中作方便謂樂律此譯妥善此中顯示方便勝波羅密多乘由説唯修空性非能圓滿方便及説於修空上所增方便謂天瑜伽故知修習曼陀羅輪即是色身主要之因此方便中具二差別一者安樂謂不待諸苦行二者律儀歡喜金剛雖説多種然今意説行相現為天輪之方便與達空性之智慧互不分離由修如是毗盧遮那佛等慢念方便智慧瑜伽故證佛果非如波羅密多乘之久遠即明此道之殊勝也此説修天瑜伽為速疾道即破執天瑜伽於修大成就全無義利之邪分別修佛色身須持曼陀羅輪行相佛慢瑜伽理由安在説佛具等二句意謂所成色身相好莊嚴為因故須以佛果行相為方便而修幕續餘二釋中未明了説以除他疑天種慧釋於初二句破許唯修空性即方便時説若唯修離方便空當生空無邊等無暇難處此非應理次破他許空性修道位為方便於成熟位為果釋云因道熟果二位空性無差別故如許空性是果則非方便因謂戲論有所緣性果則反彼成立因果有異故説方便非唯空性説空性之所為同前次説波羅蜜多乘中以餘五度方便挕持慧度經三無數大劫而修正行即證菩提修曼陀羅輪等方便復何為耶為除彼疑説故曼等四句安樂如前律儀謂受二根和合之樂佛慢者謂離庸常慢非遙遠者謂即此生可得次説若修佛身當修法身相耶為除彼疑説佛具等四句方便謂修三身行相之三種三摩地西藏諸師多唯將此所説曼陀羅輪諸天瑜伽配初次第是未能分諸天瑜伽與生起次第廣狹之過當知俱通二種次第修大成就棄捨天瑜伽之根本邪執即在妄執唯修空性便能成辦二身明斷彼疑説色身因決定須修天瑜伽者幕續此説最為明顯故今引之以彼為例亦當了知餘續所説今恐文繁不復多録癸二釋論所説分二子一智足論中所説子二餘師論中所説今初如前續中所説智足大阿闍黎於修我方便論中顯了成立先説波羅密多乘法如云若修無我捨離方便彼必不能盡離諸分別垢發生饒益無餘有情一切種智故於方便應極勵力能遍饒益諸衆生者謂佛一切種智利益亦從究竟廣大出生其因亦唯修諸方便以修無我唯斷分別為果性故此如論云深故廣大故無分別成熟此明彼二故是無上方便以是當知善修無倒施等是為方便將彼回向一切種智即成正等菩提之因如契經云施戒安忍及精進定慧回向大菩提對初發業應告誡勿著菩提起見取此謂若離廣大方便唯修無我決不能成饒益一切衆生之佛故於方便必須勵力能饒益一切有情之佛果唯在修習廣大方便以修無我之果唯是盡垢之斷德故此非是説捨離廣大方便修習空性雖能盡斷一切垢染而不能利一切有情亦非是説捨修空性唯修廣大方便雖能獲得利益一切有情之色身而不能證盡斷一切垢染之法身以法身與色身隨得其一必證餘一以彼二身依一聚因決定係屬終不離故此如由菩提心所引通達空性之慧能淨一切我執垢故雖是具二清淨法身之不共因然亦是色身之助緣如是廣大方便雖是色身之不共因然亦是法身之助緣若不勤修廣大方便任何修習諸法真實唯能超越生死終不能得盡一切垢佛法身故若不勤修通達空性之慧唯修廣大方便亦必不能得佛色身事雖如是然須了知佛位盡斷一切垢者是修空性之迹能饒益一切衆生者乃是廣大方便之迹如緣青色眼識生時須具三緣是三緣果然唯緣色不於聲等餘境轉者是根之迹生為領納性者是等無間緣之迹生為青行相者是所緣緣之迹莊嚴經論深故等文是證要具方便智慧二品乃是感果之無上方便般若挕頌施等之教是證施等必須回向菩提及為無所得慧之所攝持方是成佛之方便次説咒乘不共方便非唯如是以除修習不相似因無餘隨順現證大菩提之修故此中義説前説施等非即無過上之方便以無修習行相隨順現證佛身之道而唯修習行相與果不相似之道故若無修習隨順行相色身之道成立非是成佛無上方便即前論云由自自性所成甚深廣大體性之果從自自體而修此謂所證之果總有甚深法身體性及以廣大相好莊嚴體性心與諸法真實平等一味終不起動即於爾時相好熾然莊嚴其身終不變改二性無別即是由自自性之義如是修彼方便智慧亦須與彼隨順如修佛心法身諸瑜伽師須從現在便住自心法真實義修習行相隨順佛心之道如是修色身時亦須自身現為相好行相修習隨順色身之道以此二身修則俱修置則俱置理相等故依此密意修我論云以是當知如修無我廣大自性亦須無異而修此中廣大即天瑜伽廣大之理下當廣説依此道理而修即論所説從自自體而修之義如果位中相好莊嚴之所依身與依彼之無所得心二性無別同時而住如是於道位中諸瑜伽師亦須現見自身為如來身相之方便即於爾時與緣自心法真實義無自性慧同一識體俱時和合智慧方便不可分離由修此二同時和合之瑜伽故最後乃能成辦由無二智於諸所化現起色身之佛果也如是現為天身之勝方便若離無倒通達自心體性之慧由缺支故不能成佛故須二因和合修我論云此謂能仁具足無量光明為自他無邊圓滿之所依以最勝正方便為相若離智慧由無慧故雖復現前修習然終不得無餘圓滿故於自性應起無顛倒心通達所取現為天相無性之慧與廣大天瑜伽之心雖是一體然可安立智慧方便為異觀待所遣異故由異名言增上而立謂於真實遣心倒執之分安立為慧以知所知究竟勝義即勝知故勝知即慧就於自果遣無成佛功能之分立為方便以成佛方便即是成佛功能故此如修我論云此與無倒廣大之心雖是一相然由異名當知為異謂於真實遣心顛倒為性當知名慧及於自果由遣無能説名方便此中安立方便智慧之理雖如通常所説然安立為方便智慧之事則是咒中之勝方便智慧如是由所取分現為天輪而修色身由通達自性空而修法身方便智慧無二和合當知即是咒中所説方便智慧與諸瑜伽主要之義
