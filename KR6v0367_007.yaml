body:
  text: 宗喀巴大師造法尊法師譯了知道要承事為先修地法品第五之二壬四承事已灌頂之次第分二癸一明作法之時癸二作法之次第今初總續云以正寂靜心於寂靜時日而行咒迎請如意得成就又云凶日與非時非處無軌則智不應繪壇繪者決定死又云一切續儀軌須臾而吉祥常於吉祥日主吉而繪壇不吉時作事全無成就者此說善惡時日於作壇法有大利害故應觀察應於何月中修如總續云自仲秋十五至季春月圓智者於此時如法繪壇場為除礙治病及自修諸壇夏季亦可繪智者不須觀此說七個月中可作灌頂壇場餘壇夏季亦可作之七月上下弦何時作及上弦何時作前經云智者於所說諸月上弦中十五或十三初八或十四初十與十一或於初一日初五及初七初三亦可作於此十日中善繪曼陀羅下弦吉期中繪壇亦無妨善住經云若與宿曜合黑月亦可行何曜可用耶前經云木曜與月曜金曜日曜吉作諸猛利事餘曜日亦可宿可用者即前經云鬼柳與氐星軫角及婁尾於此諸日中繪壇最吉祥彼等主寂靜是諸吉祥宿智者應繪壇凶日作猛事諸凶結合二十七結合中有八主凶與凶作用十一中有一凶亦應回避餘殊勝時如總續云日蝕與月蝕及有奇相時並於神通月精勤繪壇場又說用具完備信心深厚精勤事業無諸損害花果繁盛以及弟子承事師長歡喜之時亦可作也蘇悉地說師長歡喜時所授諸咒易於成就鬘論說於如是吉日上午作繪壇事癸二作法之次第分二子一正作灌頂儀軌次第子二灌頂支分儀軌次第今初幻網經云先攝受地基次日行預備三晚正入壇故此分三丑一地儀軌丑二預備儀軌丑三正行儀軌初又分六寅一觀地寅二乞地寅三淨地寅四攝地寅五守護加持寅六餘處餘壇須否地軌今初此中欲釋諸曼陀羅共同儀軌以鬘論為本因彼論依父續母續等曼陀羅共同儀軌及明儀軌最詳故總續中說非處繪壇者死故當觀察處所可否作壇鬘論中說東方繪壇國王死傷國多災患南方所為者死西方阿闍黎死北方入壇者死火方東南降雨羅剎西南饑饉風方西北風雨近塔則死近有龍處則發洪水樹陰死亡幼童知彼衆過避前一切當於城邑村園寺廟居家自在東北方作或於悅意東方偏北而作勝吉祥經釋下說若於火方作天旱無雨起諸火災於風方作當降大雨與前不同又說於樹下作者死於龍處作死及病水除增說於南方空房餘六處同上說並說彼等是大師說總續中說在塔前作故遮與塔太近金剛空行經四十六品云村尸林集場園寺與城郭東與北方吉南西則非爾又云或隨意所喜於彼處繪壇此說可隨意作若言七方不可用者與此隨意所喜相違又說東與北方可用亦相違反然此無過東與北者意取東北遮其餘七方者謂若不在聚落寺廟等內而於彼外鄰近繪壇造曼陀羅殿者雖地悅意亦不可用若非在彼等處則可隨意所喜而作又總續云一切皆圓滿緣具最難得總於平整地光潤向東傾其處多甘泉具好樹莊嚴令心目歡喜無害無毒箭作壇最吉祥得一切悉地毒箭者謂荊棘瓦礫懸險骨鎖株杌孔穴蟻窩灰炭鹹鹵砂石塵髮蟲蟻等處皆當避離彼經亦說須稍北傾鬘論又說地如龜背為死亡與失財之因故當遠離金剛空行經四十六品云寺院與園囿山巔及盤石宮殿等頂上尸林及天祠凡此諸地址經中咸讚許謂在寺院等內作法不須觀方用土觀者如鬘論說掘穴一張手量速以原土填滿有餘者善總續則說掘沒膝量仍填原土若有餘土即有成就反爾不應作法作則招苦不獲善果又金剛手灌頂經云智者掘肘許咒師以所掘原土而填滿有餘為最上平滿為中等不滿則應捨不應於彼修用水觀者鬘論中說即於前穴再掘一手滿注淨水他去百步返回觀察水滿則善水減應捨若有聲響表有龍難金剛空行經說東行百步轉回觀察水滿者善涸者應捨釋論則說涸至半量以下者凶餘者良善又說水若右旋者上不旋者中左旋者捨若有魔礙以甘露軍茶利辟魔釘金剛橛三昧耶金剛論師說掘孔注水時誦甘露軍茶利咒向東行時誦三字咒嗡阿吽已由方相觀知可用復以此二觀察者總續說是觀知善者能得悉地觀察於彼作法能否成辦所求義利鬘論中說即於寺院塔下宮殿蘭若作法亦作彼二觀察爾時是由彼事觀察吉不吉也用色觀者如金剛手灌頂經云白色修息災許紅為自在當知黃增益黑修猛利行寅二乞地總續中云得地主聽許軌範繪壇場此說須得地主聽許是故觀知可用之地若屬王等當從現主乞請聽許次於上午先行施食於所觀地用妙香等作曼陀羅善修曼陀羅輪而為供養舉升虛空次於彼處地祇神等奉施供食如是三請住此諸天龍藥叉羅剎等我今乞此地建壇汝應施次誦嗡姆集利娑訶嗡摩哈尼娑訶嗡當底利娑訶口咒左手二十一遍供養世間自在為先頭南面東著新淨衣臥潔淨處若夢凶惡可誦甘露軍茶利咒勝解一切諸法勝義無性或再觀夢若彼施與或未遮難可用其地遮則莫用次日上午白前舉升虛空諸尊請其聽許午時修守護輪釘諸魔礙或燒猛利護摩驅逐魔礙若如後作則為守護弟子午後當在火界東南方灶中舉行息災護摩用一切業咒加持之芥子水灰於彼灑淨次結金剛跏趺修如下所說之地神先獻浴足漱口閼伽供品誦嗡請來及救護等三返祈請想彼答云可如是作舉升虛空鬘論此處未明說向地神乞地然說先請給地故是請給繪壇之地四百五十論等亦說施食當如是作此與前二是從不現之地主而乞也寅三淨地分三卯一由掘淨地卯二由物咒定三法淨地卯三由無上清淨淨地初又分二辰一為淨地箭而掘辰二為觀蟒神而掘今初次總續云用鋤掘其地次出地毒箭須出地箭之理以及如何取出如前續云有箭地基上作業無成就箭過謂枯骨瓦礫及灰燼朽木并荊棘勵力盡揀出此又名為擇土掘至幾許量者金剛空行經四十六品云下等悉地別掘至膝陰臍揀去腐草石瓦礫灰炭箭并諸荊刺等此說若修上品悉地掘至臍處修中下品掘齊陰處膝處出諸地箭地箭愈淨悉地愈易成就未揀石等之過如鬘論云有石起大風雜骨生痛苦瓦柴感喑啞草炭致災疫有髮木根等能生微細苦了知此過當善揀擇勝祥大疏於須揀除彼等繪壇之理亦說此諸過失故是未善揀除繪壇之過非說掘地發現彼等便有此失於作台處隨台作壇之台量度而出地箭若掘餘處而出地箭則無所益若諸地箭不能盡除當如何作如總續云若不能盡除一切地箭過則當用密咒善修治彼處鬘論與答日迦跋說用手觸地誦咒然未明言何咒賢攝論與日生師說是嗡哈那哈那卓答吽泮不能揀除地箭之量日生說是掘至膝許若不能淨掘至腰許若仍不淨當用咒淨慧鎧師說為除地箭所掘坑穴當用土水觀察三昧耶金剛師亦說初二相同擇盡地箭所餘淨土和以香水仍填彼坑若不滿者可用餘土填滿次以吽字與一切事業咒加持香水遍灑捶築量高半肘中心略高東北微低如是作之勝利與不如是作之過患如金剛空行云於前說地相中高而繪壇東北微低下咒師得成就中高得王位及諸持明處北高者死亡或損失財寶或害諸疾病若東方高起種族速滅盡地本體中窪行者受衰損鬘論於作壇處高低亦如是說故於處所壇台俱當了知總續中說於台中心掘一小穴安置穀寶誦咒加持難勝月及答日迦跋鬘論毗布底等亦說中安藥及五寶此如不空足說安置五寶五穀之瓶用土填滿故安地庫最為善哉辰二為觀蟒神而掘分三巳一觀蟒神行住之理巳二知已應如何掘法巳三掘地好惡之德失今初金剛空行經說觀察蟒神難勝月及無畏慧鎧寶鎧日生如來金剛等曼陀羅儀軌亦說觀察作何等事須觀蟒神如金剛空行云佛寺及宮殿塔壇與築城房屋花園等當掘蟒神腹鬘論說造阿蘭若時亦應觀察毗布底曼陀羅儀軌亦云造廟塔宮閣開光建壇等此當觀地蟒故有多事須此觀察若造曼陀羅室及前所說掘地修治建造曼陀羅台定須觀察在掘地前如前所說辟除彼處魔礙奉施食品次當觀察地主蟒神鬘論但概略云以金剛拳執持彈線與修行伴向右施繞阿闍黎住火方風方而彈東西北南四線將建寺等地基作成方形秋三月等三月如其次第當觀頭向東南西北面朝南等而臥從日出後於龍腋下離一肘處向右旋繞掘為墻基毗布底師則詳言之謂將處所彈成方形於彼四方各隨三月所有日數分九十格蟒神於彼住行之理謂於孟秋初一頭在東北隅格尾在西南隅格面向南住每過一日頭往南移一格右旋而轉三月之中遊行一方之九十格故經一年繞盡四方四九十格此左脅臥從頭至尾有十張手每一張手按壓十格故隨安住何方隅時皆按壓九十格其身橫量覆地九格故隨住於何方隅時其陰密處皆在中心毗布底曼陀羅儀軌中云地基作方形隨三月日數每方如是分自在東北至火界東南東面分九十從火至離實西南離實到風界西北風至自在隅如是各九十秋月孟仲季頭住自在等尾在離實等陰處居地中臍下為蟒身人頂有蛇頭面南枕左手右持寶在腰臥遍九格地龍身十張手住東西邊際如所量地格初一起遊行每日行一分東方如是行南西北亦爾冬月孟仲季白月等面西勝支頭向火隅尾在風界等春月孟仲季面視藥叉方北頭住離實界尾在自在等夏月孟仲季面目望東方頭在風界等尾居火等處經歷一歲中繞遍一切地又說八大龍王住於彼尾端等八處即前論云龍王行差別隨月別應知無邊龍名身白妙想尾等次第其身八龍王供乳等五供尾端種性龍名藍陰處力因龍名緑臍螺護龍名藕色臂大蓮龍名如金增財龍名緑於心安立龍名紅在喉耳中蓮龍名白光無邊龍名藍住頂蟒神亦是無邊龍王白色殊妙云何隨地大小彼皆如是遍臥藏師有謂如彼月影隨器大小皆現水中故不相違然不應理若一蟒神如是遍一切處則成相違體若是一隨地大小影各別現亦無說故故是為知所欲掘處是否地神所不宜處隨地大小作是觀察非謂所觀一切處所皆須如是安住巳二知已應如何掘法若爾何為初應掘處即前論云東棄草七格北置十三半竪東西九橫南北四半為初掘腋前此依頭向東說謂從頭所按格西經三九二十七格是處不可挖掘再從彼界西過九格從身背所壓地前過十三格半不可挖掘再從彼界向南過四格半乃是最初掘處許彼處為腋前即掘腋前九格之軌鬘論說有兩派謂掘腋前一肘處之自派與掘面前之他派也律生釋論中云頭部捨二十格或草一格腹部捨二三格次當定其背尾掘其腹部當觀此與全身首尾共按九十格說有無相違如彼又云蛇頭一面量面部有九格如是項及心臍間亦彼量陰處量亦爾餘為蟒形狀此說身量大小決定與說陰處在地中間亦覺相違想如是蟒神已供乳等供想掘者為礙邊際尊鋤有金剛莊嚴右手持上左手持下面向東北掘四鋤土以寂靜心置施食內或置火界東南等外第五鋤土散彼地中餘諸方隅諸作事人皆可挖掘毗布底云人修礙邊相鋤有金剛飾左手執下部怖逐諸魔衆面向東北方先掘四鋤土靜心置食內或拋火界外其第五鋤土善布彼地中第五散方隅一切人可掘巳三掘地好惡之德失若如上說而掘一切法財意願皆能成就增長若掘餘處生多過失如前論云此增法財願若掘蟒神王所壓九分土喪父母子女妻妾自親屬掘背後自死或離家失財掘尾死象馬牛羊及力衰五鋤有木髮蟻爪灰招損有石招風災穀壳杭染疫有骨感痛苦所言五鋤土中有木柴等招過患者是未揀之過非謂有即生過鬘論如前說者是說觀察蟒神所掘之地毗布底云次除石等以原土填若彼不足亦用餘土灑以香水填所掘坑此說揀除地箭而作未說改移餘處及遮彼惡相之方便日生亦云若不除彼箭當生諸過失又云由善除地箭煩惱即盡除於觀蟒神所掘之地作是說故慧鎧論師別說為觀成就掘地與觀蟒神掘地鬘論及寶鎧論師說彼二作一事者意在建壇之時若為餘事觀察地神掘地之時不須觀察三品成就而掘地故卯二由物咒定三法淨地次以一切業咒所加持之芥子水灰散灑彼地再以前咒加持牛生五物東起漸塗復灑香水誦嗡布康想為虛空如勝樂灌頂品所說修為空性誦吽琅吽想地成為金剛自性金剛空行經謂嗡阿琅吽次誦嗡梅底尼班集拔嚩班奔答吽嗡哈那哈那班卓答吽泮嗡阿吽穴答耶穴答耶惹卡惹卡吽吽泮以手觸地加持想地成為金剛體性繫縛堅牢次以忿怒金剛摧諸魔礙由三金剛淨諸罪惡而為守護金剛空行與幕經中三咒中之第一與此不同四座經說於誦第二咒時修右手為金剛伸手拍地而為修治次降前舉升虛空之地神奉施供食融入地中手挽花輪印誦三字與百字咒而以地神加持其地卯三由無上清淨淨地勝解一切法與空性一味次勝解真如性最極清淨大日經云咒師住分別而修治地法由捨菩提心密主彼不淨故應離分別而淨一切地龍智亦如是說故於淨地此最切要鬘論中說如彈線時所說方隅決定於彼地上須能容造所想壇房四方四門具四牌樓網輪圍繞中繪壇場金剛空行亦云於如是淨地當造繪壇房謂壇與隨順寶等四倍量此說壇房大於壇台四倍故上所說地軌多依別造壇房而說寅四攝地分三卯一修天瑜伽啓白舉壇卯二起持天慢誡敕魔礙卯三作天步法及例外事今初次於曼陀羅處遍布妙花自坐其中如法執持鈴杵圓滿修習當繪之曼陀羅瑜伽及守護輪遣除魔礙舌由吽字成金剛杵右手執香爐誦云遍住十方界諸佛憶念我我某甲金剛於此繪壇場今請諸佛等降臨賜成就以此金剛頂文請白供養諸佛菩薩金剛生論譯作我名曰某甲繪金剛持壇次若有四弟子可令各持鈴杵住於東等四方如其次第而修毗盧寶生彌陀不空瑜伽若無四者令一弟子想阿闍黎與本壇之正尊無異如其次第往彼各方持彼彼如來慢與住虛空毗盧佛等同聲請云諸如來寂靜一切如來依法無我第一請說妙壇場圓滿一切相離一切非相普賢最勝身請說妙壇場妙寂靜法生淨治彼智行普賢最勝語請說妙壇場諸有情大心自性淨無垢普賢意調御請說妙壇場集密第四品謂諸如來請金剛持說灌頂曼陀羅者是為教示未來所化故當作如是請梵本曼陀羅儀軌中多用此文自與毗盧等佛同請者是從難勝月說如云師等金剛心持鈴杵弟子與常等諸佛由外同勸請阿闍黎亦應自想為正尊由四如來勸請若無弟子鬘論說可自以定力當如是行是為教授諸如來者謂具五部能生毗盧佛等大寂靜三摩地故云寂靜是一切如來所依處故云一切如來依是念住等諸法無自性故云法無我第一請說妙壇場者能取空悲無別大樂心藏是名為曼陀羅以彩土曼陀羅表顯之亦得曼陀羅名今請為說明也圓滿一切相者謂具四方等一切相離一切非相者離彩土粗細等過失也由此中有身金剛自性之最勝身故云普賢最勝身明顯出生白法性故云妙寂靜法生淨治為得彼智之諸行故云淨治彼智行能顯彼者即語金剛性故云普賢最勝語開遍一切法自性故云諸有情大心由勝義中遠離一切遍計所執即是意金剛自性故云自性淨無垢由調所應調故云普賢意調御請說妙壇場等如前此是鬘論所說持四如來慢者毗布底及持祥論師說勝樂壇則為四瑜伽母紅大威德壇則為癡威德等四慢而勸請準此道理餘亦應知毗布底說先獻曼陀羅供而請次將所修之曼陀羅舉升虛空咒曰嗡班塢只墀義謂金剛善住印者二金剛拳伸二食指指端相觸向下安住頂上有謂二小指相連者誤也結印誦咒舉升虛空卯二起持天慢誡敕魔礙次解跏趺起向東方並足而立合掌於頂誦嗡跋羅拏摩彌薩嚩達他伽達禮諸如來次觀諸有情類無明所覆隨魔而轉為除魔故自剎那起如下所說吽迦羅尊右眼由摩字成日左眼由札字成月從睛吽字放如劫火以此金剛視法遍觀十方衆生如是觀時身作金剛步舞二目各別作用如勝賢論師云右由摩成日放金剛光明睛吽出劫火勤拋金剛杵行走光明聚金剛視觀察諸毒悉逃逸左成無垢月從暗字放光具足甘露聚飲諸自眷屬飽滿而供養結合經第七觀察中第四品說吽迦羅尊三面六臂遣除魔礙隨順彼經故此論師於舉壇輪升虛空後說從本尊之慢轉起吽迦羅尊答日迦跋亦說起為勝三界尊日生師與歡喜金剛羯摩次第儀軌中說歡喜金剛即修歡喜金剛持祥論師說紅黑大威德即修彼尊若如彼說則彼諸尊不須改易主尊之慢龍智論師說修瞋恚金剛遣魔此亦不須改本尊慢然作金剛步舞須於地上畫成金剛故當修為立相四百五十頌說曼殊金剛應成忿怒故諸主尊非忿怒者須改其慢住忿怒慢而遣魔礙次如金剛頂經所說住慢如云我即金剛持我金剛薩埵我即佛大王我大力金剛我瑜伽自在堅固金剛手我大金剛主終不捨加持瑜伽諸師說彼頌義是持四部轉輪王慢此作持六部慢如理應知此即當於賢攝所說持五部等諸佛之慢最後句義謂由一切部主教敕終不棄捨加持言教次於兩足心修熾然金剛加持雙足其種子者鬘論與結合經皆說從吽字生答日迦跋寂靜論師說從阿字生羯摩杵次現威嚴拋杵搖鈴金剛步舞往自在方東北方次自彼方共諸弟子金剛步舞右繞曼陀羅地後遣魔礙幻網經及持祥日生師等亦如是說毳衣大師答日迦跋黑行毗布底諸論師則說先作誡敕次繞曼陀羅地然說先繞一匝次誡敕後復以金剛步繞故與鬘論意趣全不相違當旋繞時說須結合故於四門各與左側弟子彼鈴內置自杵彼杵置自鈴內次前右後亦如是行每方各四毗布底說咒為嗡喀班只班吽迦羅吽泮此於繞後而作亦不相違答日迦跋說次於自在方誡敕故住彼處若作長誡敕者則誦若諸天衆阿修羅衆藥叉羅剎餓鬼糞掃忘念部多空行與空行母射影老男老女役從眷屬迦樓羅緊那羅成就明咒者汝等應速他去我某甲金剛阿闍黎為令一切有情得無上智為某甲弟子圓滿大菩提故今於此處當繪某名大曼陀羅是故聞此大金剛持敕令速當遠去若不去者我以吽迦羅尊金剛熾然光明最極光明大金剛杵擊彼頭顱碎為百分此是結合經第七觀察中第四品與幻網第二所說當誦三遍想放無量明王遣諸魔礙若作短誡敕者則誦安住身語意魔礙咸諦聽我勝金剛持轉敕語輪者金剛熾然色三身所成語若有違我者於此壞非餘此是集密經十三品所說當誦三遍觀想如前三身亦有說為佛三身者明炬論說此是三身合一之義故是能教者之差別非是所教之境曼陀羅地至金剛際加持彼成吽字所成金剛體性已說當說一切位中隨於何時觀想所緣乃至未顯當不散亂徐徐而修最為切要有以禮拜境與發心之境有情各別持慢境與誡敕之境亦異故各仿彼形態作種種舞謂是鬘論之軌然鬘論與教授穗論并餘二種結合經釋二種幻網釋等堪依教典都未曾說故惟藏地樂戲論者依尼帕爾一類不善巧之咒師隨自臆度而安立耳有說略修作四誡敕是由四門四阿闍黎各別作者亦不應理幻網經云由阿闍黎自作天狀右手勤拋金剛左手搖鈴以金剛步具足威嚴遍繞曼陀羅地此於東門阿闍黎所作誡敕說是阿闍黎自作故誡敕語中亦云某甲金剛阿闍黎故燃燈賢師毳衣大師及答日迦跋等諸堪依者亦皆說是前所勸請之阿闍黎作彼事故餘三方之誡敕非許初誡敕之所不攝故長短二誡敕說隨取一故以是遣魔誡敕定是金剛阿闍黎所作之事也卯三作天步法及例外事毳衣大師與黑行論師說加持雙足想旋繞時足下出光猶如劫火燒魔令散未說以足畫地作金剛紋寂靜論師說繪金剛鬘論亦如是云此四因以金剛莊嚴畫諸金剛故名為金剛步各向右旋展右足等各行一次金剛步形有四獨股金剛三股金剛五股金剛及雜金剛步形生此諸金剛之處謂足心種子謂吽足心向地畫諸金剛舞蹈旋繞然鬘論說向後退繞印留足跡當作金剛步時鬘論中說二金剛眼作二種視謂向前直視及向後回顧是故四種步法各須二視此等步法如鬘論云二目二手腰足側向右旋作響而分散向左亦如是次作跑步舞次搖動而舞速作響如是舞蹈善轉輪榜譯師云舞蹈轉如輪賢攝中云應如輪旋轉此譯為善此等次第謂先如前加持雙足拋杵振鈴口誦吽字足於地上畫成獨股金剛等相二手叉腰右轉如輪次疾跑舞如其所應舉步速疾如前作已左轉如輪前三步法獨股三股五股金剛步形右足先畫後前二紋次以左足亦如是畫間雜而行第四步法雜金剛形以右足畫前右二金剛以左足畫後左二金剛一一金剛步法皆應旋繞鬘論僅於誦時說誦吽字為先未說餘咒金剛空行結合幻網多數曼陀羅儀軌於金剛步旋繞時亦唯說誦吽字藏地諸師於此等時作諸餘法然鬘論意唯有爾許鬘論說有先行一返金剛舞而展右足者或行三返或不定等三派隨欲應作言展右者謂屈左腨距五搩手右足威嚴直伸若展左者與前相違毗舍佉者謂二足中間隔二十六指足指側向雙膝直伸周圓者謂兩足中隔二肘如鵝翅形平立者謂雙足諸指互連兩足大指及跟相觸此諸行相是結合經幻網經釋及慶喜藏論師所說此五是於東等四方及於中央次第而作龍智與無畏論師等許驅魔時所持天慢即可作彼形相五種步法故應住吽迦羅等慢口誦吽字藏中諸師說彼諸法先定基址謂足次第按前按側按後第四立成步法結合經中亦說先定基址阿闍黎耶向內弟子向外東方阿闍黎作右展弟子左展南方相反於餘二方所作步法亦同次若了知而樂為者可作餘八步法及諸形狀坐位等事若不了知或知而不樂故不作者亦說無過如鬘論云若不遍知或以不能或樂略或不樂而不作一切金剛步法等或有少分未作皆不失壞正軌以遣魔者由旋繞等亦能辦故此是明教授者所說若不於地作畫金剛等舞而僅加持足成金剛繞曼陀羅地基不可立為金剛步法黑行論師所說彼時所緣最須明了次於彼地塗諸妙香供花香等并於四角四門提香爐等及歌舞等供養次誦曼陀羅主真言百零八遍及百字咒七遍以手觸地放收天輪當臥其處寂靜論師等說在地中央修現觀已而正啓白為攝持地結合經及幻網經說遣魔已以金剛步法旋繞為攝持地鬘論亦爾此為攝地之理謂由弟子持四部慢請於彼地畫曼陀羅阿闍黎耶默然允許於彼畫曼陀羅故是攝彼地為曼陀羅基此須遣離住彼魔礙故誡敕與步法等亦屬攝地法寅五守護加持分二卯一先起為天鈎召魔礙卯二以金剛橛釘所召魔今初寂靜論師說遣魔第二日釘金剛橛此論亦說故若當日無暇可如是行當日能者則隨廣略作步法後即可行之若第二日作者晨起即發心云為安立衆生於金剛持位故應遣魔剎那想成空性次由纜字想成日輪上有吽字成雜金剛臍有吽字莊嚴光明放出熾然金剛各方無少間隙成金剛牆上有帳幕幕下牆上有金剛蓋外有箭網其下地基亦成雜金剛體熾然難忍於彼中間剎那自成金剛薩埵為體之勝三世明王又名吽迦羅尊三面本面藍色右黃左緑張口獠牙卷舌每面皆現豎眉忿怒三目圓赤具足輪等六印額上戴五枯顱項懸頭鬘鮮血淋漓人頭相連以為腰帶繫虎皮裙以黑無邊龍束赤黃髮向上熾然並安立等八大龍王而為莊嚴於六臂中初二手持鈴杵結金剛拳兩背相著二小指相鈎結二食指直伸為勝三世印與自光般若母等住右下二手持鈎與索左下二手持顱蓋喀敞迦杖之一種雙足右展左屈於雜金剛及日輪上踏作怖天及時相母光聚熾然如猛劫火食盡衆生一切魔礙猛喝吽聲顧視十方從自心間吽字放諸光明鈎召十方魔礙付與吽字所出十大明王言十方魔礙者謂帝釋等有形魔礙及其眷屬鬘論與律生釋於說金剛牆等之後釘金剛橛然燈賢答日迦跋黑行大師等說釘橛以後修金剛牆等毳衣大師則說二時俱作前遣魔者是誡魔礙驅往他方此鈎魔者毳衣大師說是鈎召逃逸魔礙是遣不受誡勑背逃他處仍欲為障礙者鈎來釘制乃至曼陀羅事未圓滿時釘制不放此由拔橛可知此中起為吽迦羅尊誡勑魔礙及召不受誡勑等者如攝真實第二品說往昔大自在等一切暴惡有情為吽迦羅之所調伏故教後學亦持彼慢調伏諸惡有情最為殊勝是此論師之意趣也卯二以金剛橛釘所召魔分二辰一橛及生起儀軌辰二釘橛法及其他今初橛料用擔木與骨鐵三中隨一而作長量十八指十二指八指三等隨一粗量隨自長量分三之一作何形者此論與龍智及持祥論師唯說修成上作明王下為橛形餘未明說灌頂品云十橛上作自像下為橛形拉利班論師亦云橛上為明王下獨股金剛寂靜論師亦說橛臍以上如所修明王像橛臍以下為獨股金剛形應如是造橛上次第纏五色線塗以芥子及紫檀末繫紅花鬘置新器中如答日迦跋云檐等塗紫香繫紅綾花鬘龍智亦說纏五色線橛之數量此論說十橛與四橛兩派後者亦是勝賢所許然燈賢說一橛拉利班則說五橛橛之修法有別修諸尊與不別修之兩派此論與律生疏宣說別修諸橛為十明王毳衣大師慧鎧論師亦說修諸橛為門隅八尊亦是別修龍智與答日迦跋說修諸橛為礙邊際尊持祥師說修為劍害獄主此是不別修者然燈賢說一橛亦修成礙邊際隨依何派皆先遣魔清淨次修上半為明王像下半為獨股金剛相劫火熾然若略修者即此便足若樂廣者可入智尊灌頂印證供養稱讚難勝月云橛頂上置椎由餘手握持誦前咒而打此說右手執椎擊左手中橛頂故須鐵椎此亦先遣清淨隨修何尊釘魔即由彼尊右手標幟而變為椎辰二釘橛法及其他次從長聲吽字所成十井裝諸魔礙先誦嗡班格利格拉耶薩嚩毗迦那吽或誦集密經說嗡伽伽等真言橛插其頭次誦嗡班拇伽羅阿廓札耶吽想用椎釘從自在方起於光鬘八方先由阿闍黎釘次若不能疲勞等可由諸門阿闍黎釘上方橛釘在東方橛之東下方橛釘在西方橛之西此中事相雖是阿闍黎或弟子左手執橛右手椎釘然所修義為唯自持天慢而釘為別有所修耶鬘論中云彼諸明王乃至左以金剛拳握右手執正標幟所成鐵椎繫紅花鬘謂前自作誡敕將諸魔礙付與十大明王各釘自橛是此論及寶鎧論師之意若集密龍猛派則說自作誡敕鈎召與釘皆由害妙明王作之曼殊金剛歡喜金剛紅大威德法中皆說前誡敕時持何尊慢即由彼釘毳衣大師慧鎧論師說由門隅八尊而釘許四橛者有釘四方及釘四隅兩派後說是勝賢所許如曼殊金剛曼陀羅儀軌本釋說用一橛釘於中央此是十護方神及諸眷屬唯用一橛普釘一切魔礙日生說想一切魔礙攝為一體觀想釘於中央實有橛者想釘於曼陀羅中央實橛則釘於自在方最為善哉論云雖說釘於壇外光鬘現今諸師則說釘橛於曼陀羅室外其上造十土堆每一座中皆供花等以及傘食令彼諸橛明王歡喜亦不相違以如是行亦能成辦所求之悉地故此說隨釘內外何處然為斷除妨礙橛故當釘入土堆內每座供養橛者日日應行若無所說橛者唯修而釘如上釘已說誦嗡班阿吽仰掌反轉擊地作如是勝解者是依難勝月論師意勝賢亦云又若智能者釘三摩地橛釘橛擊椎應想一切魔礙皆成一味大樂真如諸餘魔礙亦皆遠逃論說堅固勝解上下諸方廣大周圍一切衆生永離魔礙故釘橛時一一觀想皆須明了堅固寅六餘處餘壇須否地軌若在舊有曼陀羅室與宮殿等餘處立彩土曼陀羅及於布繪曼陀羅身曼陀羅等中灌頂等是否須此地軌如總續云仙處與牛圈岩窟及山頂或地基堅硬屋上并盤石塔前與洲渚及諸湖沼畔淨地與觀地皆不須勤行亦不須捶堅高下等衆過於彼勿憂疑說彼諸處不須觀地前說地須東北低下縱彼反高亦無庸疑故觀地法與高下等差別皆不勞觀察也言不須淨地者不須掘淨非是全不須淨即前續云於本有地基先當善灑掃手打誦密咒即是彼淨法金剛空行亦同彼說律生經第十八品云昔作事業地不須再掘等手觸誦吽字地以真言淨如彼釋論說以物咒定三一切淨地鬘論亦說故當作彼等及無上淨於不現主乞地法類及攝地法類等若於彼處作彩土曼陀羅亦須全作依布繪壇當如何行布繪灌頂曼陀羅儀軌中羅睺羅友語自在稱常住金剛所造皆未宣說就義觀察實亦無用故彼不須觀地乞地及淨地等攝地時儀軌者鬘論於意曼陀羅灌頂時說云以曼陀羅主形攝持地等為佛像等開光為弟子衆灌頂送聖究竟乃至寂靜護摩一切皆以意作故修本尊瑜伽誡敕魔礙釘金剛橛牆等守護皆應修習身曼陀羅灌頂須否地軌天竺教典未見明說諸先師長皆謂不須諸地儀軌或准意曼陀羅所說道理現見亦可頌曰吉祥究竟金剛乘無上瑜伽教海義無餘盡攝道總聚及道次第決定理由先承事淨相續隨於何地繪壇場能令清淨諸儀軌如智者論顯了說
