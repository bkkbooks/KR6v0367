body:
  text: 密宗道次第廣論科目卷頁甲一明唯佛教是求解脫之道一二二明入佛教次第不同諸門分二一五乙一總分諸乘分四一五丙一如何分別一五二依何分別一六三乘體不同分二一六丁一小乘建立一六二大乘建立一一四顯示一切皆是成佛支分一一一乙二別釋大乘分二一一三丙一總分二種大乘分三一一三丁一分數類一一三二釋名義一一三三明所以分二一一六戊一敘他疑竇一一六二答釋彼疑分二一一六己一破他計執一一六二安立善說分二一一八庚一正明分別二乘之理分三一一八辛一明正義一一八二出教證分二一一九壬一無上瑜伽教中所說分二一一九癸一續中所說一一九二釋論所說分二一二二子一智足論中所說一二二二餘師論中所說二一二下三續部教中所說二三三斷諍論二五庚二明道有別果無勝劣分二二七辛一解釋正義二七二釋道差別分二二九壬一自宗所說之差別二九二餘師所說之差別分二二九癸一律生釋中所說二九二三理炬中所說二一丙二別說入金剛乘差別分三二一四丁一明入密咒之異門二一四二明立異門之差別分二二一四戊一問二一四二答分二二一五己一明餘倒說二一五二出自正答二一七三明具差別之諸道分二二二二戊一二種大乘共道次第二二二戊二金剛乘不共道次第分三三一己一事行部道次第分二三一庚一觀察二部有無自起及入智尊分二三一辛一標列諸師所說三一二釋其應理之宗三四二別釋事行部道次第分二三八辛一解釋攝道總頌三八二正釋道之次第分二三一壬一事部道次第分四三一癸一為成修道之器而行灌頂三一二成器已淨律儀及三昧耶三一三住三昧耶先應如何承事分二三一三子一須承事之理三一三二承事之次第分二三一四丑一有念誦靜慮分三三一四寅一四支念誦靜慮之前行分四三一五卯一先於房中所修三一五二出外沐浴入佛堂法三一六三著衣入座加持供物三一九四守護自身及其處所三二一二四支念誦靜慮之正修分二三二三卯一四支念誦靜慮分二三二三辰一自起為天三二四二前請智尊修供養等分六四一巳一起所依處四一二請能依天四二三示印四四四供讚分二四四午一供養四四二稱讚四六五行懺悔等四七六修四無量四八卯二依彼如何念誦分三四九辰一預備數珠數念之法四九二緣何所緣念誦之法分二四一巳一緣字形念誦分二四一午一緣前尊心間字形四一二緣自心間字形四一一二緣字聲念誦四一二三遇障重修念誦之法四一四寅三四支念誦靜慮之後行四一五丑二不待念誦靜慮分二四一七寅一釋住火及聲靜慮四一七二釋聲後靜慮分二四一九卯一放捨住聲次第四一九二正釋聲後靜慮四二三癸四得堪能已如何修習成就四二五壬二行部道次第分四五一癸一為成修道之器而行灌頂五一二成道器已淨三昧耶及律儀五一三住三昧耶先應如何承事分二五二子一分別瑜伽五二二別釋其義分二五三丑一釋有相瑜伽分二五三寅一外四支念誦五三二內四支念誦五六二釋無相瑜伽五六四善承事已應如何修成就五九己二瑜伽部道次第分二五一庚一經中所說五一庚二修彼次第分四五一四辛一為成修道之器而行灌頂五一四二成器已淨三昧耶及律儀五一四三住三昧耶應先如何承事分二五一五壬一有相瑜伽分二五一五癸一緣粗天身四座瑜伽分二五一五子一四座修法分二五一五丑一唯得弟子灌頂之四座瑜伽五一六二得阿闍黎灌頂之四座瑜伽五一八子二不能時如何修五二癸二緣細標幟四座瑜伽分三五二一子一修習細相之所為事五二一二由緣細相令心堅固五二一三得堅固已修收放等五二三壬二無相瑜伽分三五二四癸一攝真實所說五二四二釋續中所說分四五二五子一佛部修法五二六二金剛部修法五二六三寶部修法五二七四蓮華部修法五二七三略說修法五二八辛四善承事已應如何修悉地分三六一壬一由靜慮修悉地法六一二由念誦修悉地法六四三由護摩修悉地法六六己三無上瑜伽部道次第分三六七庚一攝道之總聚六七二釋道之次第六一三釋次第之道分四六一二辛一成就修道法器分四六一二壬一聞修咒道定須灌頂六一二二灌頂師資須互相察分二六一六癸一不觀察之過失六一六二善觀察之方便六一七三觀知其可勸請承事分三六二癸一弟子勸請六二二師長守護六二三先修承事六二三四承事已灌頂之次第分二七一癸一明作法之時七一二作法之次第分二七二子一正作灌頂儀軌次第分三七二丑一地儀軌分六七三寅一觀地七三二乞地七五三淨地分三七六卯一由掘淨地分二七六辰一為淨地刺而掘七六二為觀蟒神而掘分三七八巳一觀蟒神行住之理七八二知己應如何掘法七一三掘地好惡之德失七一一二由物咒定三法淨地七一二三由無上清淨淨地七一四寅四攝地分三七一五卯一修天瑜伽啟白舉壇七一五二起持天慢誡刺魔碍七一六三作天步法及例外事七一九寅五守護加持分二七二二卯一先起為天鈎召魔碍七二二二以金剛橛釘所召魔分二七二三辰一橛及生起儀軌七二三二釘橛法及其他七二五寅六餘處餘壇須否儀軌七二六丑二預備儀軌分三八一寅一預備總建立八一寅二各別預備儀軌分五八三卯一地神預備八三二諸尊預備分二八五辰一為定天處故彈線分四八六巳一彈線曼陀羅之量八六二彈線次第與時間八六三彈羯摩線之次第分二八一一午一預備繩線八一一二彈線之法分二八一二未一彈曼陀羅外線法分二八一二申一彈二派共同線法八一二二彈二派各別線法八一八未二彈曼陀羅內線法八二四巳四釋所彈諸線之義分二九一午一釋曼陀羅外線義分二九一未一釋圓線及牌樓線義分二九一申一釋圓線及杵股線義九一二釋牌樓線義九五未二釋垛線至墻線義分二九九申一釋墻線義九九二釋磚線至垛線義九一三午二釋曼陀羅內線義九一六辰二應如何修天預備九一九卯三瓶預備分四九二一辰一明瓶之因量數九二一二瓶物及畫相法九二二三如何陳設諸瓶九二六四修瓶法及支分九二七卯四啟白諸尊一一五弟子預備分四一二辰一四門阿闍黎與業金剛預備一二二弟子預備數及次第一三三正弟子預備儀軌分五一四巳一教正法起傳內灌頂一四二請白令持一六三受戒加持一八四令投齒木及三水等一一四五慰勵守護觀察夢相一一七辰四舉昇曼陀羅夢相吉凶應如何行一一八寅三餘曼陀羅預備一一九丑三正行儀軌分三一二寅一彈智線分彩法分三一二卯一彈智線分二一二辰一預備智線一二二正彈次第及送往法一二二卯二分彩儀軌分四一一一辰一預備彩色拔所釘橛一一一二師資分彩法一一二三明曼陀羅分繪彩處分二一一七巳一曼陀羅外分繪彩處一一七二曼陀羅內分繪彩處一一九四於曼陀羅安立標幟送往智色一一一卯三繪壇辟魔一一一二寅二安諸瓶飾壇場分二一一一二卯一安布諸瓶一一一二二嚴飾壇場一一一三寅三修行供養灌頂分二一一一五卯一修行供養分二一一一五辰一修曼陀羅分二一一一五巳一修彩土曼陀羅法一一一五二修其餘曼陀羅法一一一九辰二供曼陀羅分二一一二四巳一正作供養分二一一二四午一內供養諸尊分二一一二四未一總供養次第一一二四二別釋供閼伽法一一二五二外施諸食一一二七巳二息增滅過旋繞開門一一二九卯二灌頂儀軌分二一二一辰一自入壇請悉地諦語加持分二一二一巳一入壇灌頂請其聽許一二一二請求悉地諦語加持一二四二為他灌頂儀軌分二一二七巳一為弟子灌頂成法器儀軌分三一二七午一灌頂儀軌分二一二七未一依彩繪曼陀羅灌頂儀軌分五一二七申一入曼陀羅分二一二七酉一遮面入壇分二一二八戌一入幔帳外一二八二入幔帳內分三一二一二亥一入壇繞禮一二一二二立三昧耶一二一六三降智諦語一二一九酉二見壇而入一二二三申二入後灌頂分四一三一酉一瓶灌頂分二一三一戌一金剛弟子共灌頂分二一三一亥一五種灌頂共同建立一三一二各別建立分二一三六乾一水灌頂儀軌分二一三六坎一祈請清淨一三六二傳水灌頂一三八二餘灌頂儀軌一三一一戌二金剛阿闍黎不共灌頂分二一三一五亥一阿闍黎灌頂建立一三一五二阿闍黎灌頂儀軌分二一三一乾一阿闍黎灌頂正儀軌分二一三一九坎一授三三昧耶一三一九二受三昧耶開示真實一三二二二彼後依儀軌一三二四酉二密灌頂一三二八三慧智灌頂分二一四一戌一明慧智灌頂一四一二明第三灌頂之智分二一四三亥一正義一四三二斷諍一四九酉四第四灌頂分二一四一一戌一餘經規分二一四一一亥一明第四灌頂一四一一二第四灌頂之語六何表示一四一四戌二時論規一四一九申三灌頂後法分二一四二三酉一禁行授記一四二三二隨喜慶慰一四二七申四釋灌頂義分二一五一酉一解釋灌頂及後依義分二一五一戌一釋初瓶灌頂及後依義一五一二釋上三灌頂及後依義一五四二以灌頂義配道次一五八申五釋後法理灌頂開合一五一二未二依止餘曼陀羅灌頂斷疑一五一五午二犯三昧耶還淨法一五一七午三曼陀羅後法一五二巳二為天灌頂善住儀軌一五二四子二灌頂支分儀軌次第一五二四辛二淨三昧耶律儀一五二五辛三住彼如何修道分二一五二七壬一聞思了知其道一五二七壬二修習所知之義分四一六一癸一破離二次第之妄說分二一六一子一破離圓滿次第唯說生起次第成佛分二一六一丑一述宗一六一二破執一六二子二破離生起次第說唯圓滿次第成佛分二一六四丑一述宗一六四二破執分二一六五寅一正破一六五二斷諍一六一癸二不離二次第之修法分四一六一六子一二次第之名義一六一六子二次第之數量一六二子三二次第之次第一六二一子四二次第之修學分二一七一丑一學生起次第分二一七一寅一總立生起次第分三一七一卯一生起次第之對治分二一七一辰一明所斷事顯破彼理一七一一明修顯事及安住規分三一七三巳一修幾現觀一七三二修顯了法一七八三修安住法分二一七一一午一於初二位修微細點一七一一二於第三位修微細點一七一六卯二生起次第之差別分二一七一八辰一明四支與四種瑜伽之總頌一七一八二明三支與三三摩地之總頌一七二二卯三爾時云何修空性一八一寅二別釋現觀次第分三一八五卯一修時之瑜伽分三一八五辰一瑜伽加行分二一八五巳一成順緣集積資糧一八五巳二除違緣修守護輪一八一一辰二瑜伽正行及其支分分三一八一三巳一生所依宮殿一八一三二生能依諸尊分三一八一六午一正生天法分三一八一六未一依止五相生起法一八一六二化後歌勸生起法一八一九二以所淨事配能淨道一八一九三攝諸要義一八二五三圓滿之支分分二一九一午一召入智尊證供讚一九一二賞甘露味修念誦法一九五辰三結行分二一九一巳一養身修食法一九一二修天供養法一九一五卯二中間之瑜伽一九一九三安立彼瑜伽為廣大之理一九二一丑二學圓滿次第分二二一寅一圓滿次第總相建立分二二一卯一父續圓滿次第之建立分二二一辰一龍猛派圓滿次第之建立分三二一巳一明二諦別之圓滿次第二一二明三遠離之圓滿次第二六辰二智足派圓滿次第之建立二九卯二母續圓滿次第之建立二一三辰一時輪派之圓滿次第分三二一三巳一明所得之樂空無別二一三二决定修彼道之數量次第二一八三別釋不變之樂分二二二一午一明由不變妙樂證無我理二二一二破以全無思取為時輪軌二二三辰二諸餘派之圓滿次第分二二一一巳一勝樂金剛之圓滿次第二一一巳二歡喜金剛之圓滿次第二一九寅二圓滿次第最初所修分三二一一二卯一明修行所依之脈風分二二一一二辰一釋脈二一一二二釋風二一一九二如何專住分二二一二四辰一風瑜伽二一二四辰二火瑜伽二二一卯三依此修空性法二二五癸三增進二次第之方便二二一二四彼第為三士道之理二二一三辛四現證所修之果二二一七
