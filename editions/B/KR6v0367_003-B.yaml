body:
  text: 宗喀巴大師造法尊法師譯事部道次第品第二之一戊二金剛乘不共道次第分三己一事行部道次第己二瑜伽部道次第己三無上瑜伽部道次第初又分二庚一觀察二部有無自起及入智尊庚二別釋事行部道次第初又分二辛一標列諸師所許辛二釋其應理之宗今初西藏諸師多作是說事部僅有於前修天而無自起行部唯有自起三昧耶尊於前生起智尊而無智尊入我集智金剛續云緣諸恐怖行最潔淨無智薩埵殊勝妙樂自無天慢非希有境唯以過患分別善修行者安住事部此說事部無自起及入智尊故大日經及金剛手灌頂續雖說自起為天未說入智尊故札孥續釋俱生光明論云事行部中所修能修方便非能長時隨轉彼唯假想之所出生謂由布繪等諸天之力圓滿悉地故瑜伽部中有別自以天瑜伽復緣布繪等諸天而修隨順悉地勝授論師集密釋中亦如是說傳謂因陀羅溥帝所造勝樂釋亦云安住密金剛乘事行部者唯依明咒隨許法觀察自與天異周徧計度緣慮有相而修成就此許事行兩部俱無自起後靜慮經中云言密咒靜慮最秘密而說釋云言秘密者謂未開顯此文意謂密咒靜慮雖是一切成就支中所有心藏然諸別續皆未明了分別說者是為不能深修收攝命力等靜慮支眾生令趣入故一切經中亦多不顯了說後當解釋佛密論師謂此所說密咒靜慮即是後文所說天瑜伽等雖是修諸成就支分之要而餘事續多未顯了說者是為不能以下所說內持息等方便專修天瑜伽者引令入續教故前釋又云此是於密咒有念誦靜慮時修如攝一切事部儀軌總續蘇悉地經妙臂問經攝觀察經等及諸別續毘盧遮那現證菩提神變加持經金剛手灌頂經菩薩藏經持名藏等皆共宣說有隱密說者有顯了說者如蘇悉地經云由誦故大誦捨置明咒天愛護最勝修持念不更想毘盧遮那現證菩提經中修念誦時說由四支念誦加行明了宣說密咒加行金剛手灌頂經亦云曼殊室利若咒任運成就天慢爾時一切密咒現前安住持明藏亦云於畫像等修天靜慮想此釧環動鼬囊亦漸動如是動念時漸觀足部等攝觀察經亦說修法無我及天瑜伽多經已說此不繁述故今當說彼等經中所有天色及密咒聲靜慮念誦此說修天色身及緣咒修靜慮并修自真實等諸續部中有顯不顯及具不具如應而說又說後靜慮經及大日經顯了宣說四支念誦故此論師意許四支念誦天瑜伽等事行兩部相同即大日經因所化增上亦說為事續是故事行兩部唯就所化增上而判非就經續自體而分蘇悉地現觀中亦云莫作是念謂事續中未說修天次第雖薄伽梵多未宣說然於金剛手灌頂經及十種真實等專重而說又諸成就皆仗咒天及修真實此若失壞則消災等皆不得成故以師教及觀經義便能了知此說事部有起天法引金剛手灌頂為據顯然是許事行部中之天瑜伽與前說同由欲成辦消災等法無量事業須仗修天及空瑜伽故說事部亦須修天理由極善辛二釋其應理之宗如彼諸異宗當何所取耶且計行部無自起天不應道理若不以大日經金剛手灌頂經為行部則行部不可得若為行部彼中顯了說自起故攝行論第三品亦云毘盧遮那現證菩提行續中云此說為行部故若許緣想天子天女互相愛著修以為道是和合續及第二觀察續之意則定應許事續亦有自起天法然此自起天法為以餘部補充為是事部自有有云如說事部無自起法及入智尊事實應爾然佛密勝菩提二師說事部有自起而未說有入智尊法龍猛菩薩於千手陀羅尼修法說有自起入智尊及灌頂蓮花論師所著大悲修法吉祥苾芻尼所著十一面修法傳謂月居士所著之大白傘蓋修法寂靜勝怨所著五分修法孔雀明王及大隨求等阿底峽所著無垢頂修法及修法海百五十法百修法等依事部者亦說自起及入智尊佛密等許大日經等亦為事部是否意在事行和合尚須觀察餘師所許如攝真實會云心印咒諸明如所欲道理依此處所說通一切修法意謂事部儀軌亦可配用瑜伽部理或如事部所說大隨求法光明天女山林葉衣諸天及咒三補扎等無上瑜伽中亦如是說故是摘用無上瑜伽部之意趣或可事部意趣亦得容有自起應更觀察此中佛密論師非於事部未得明顯說自起者而借大日經及金剛手灌頂等為據以許為事部之金剛髻中明說四支念誦故釋後靜慮住聲心及事云以是當知聲心事等諸念誦支之相凡文中未宣說者意謂此經已說聲心等故聲等之相聲謂咒字心謂咒之所依月輪行相事謂如來身性第二事者謂自天色又諸命根力用收攝等相金剛髻經前已宣說與彼係屬名後靜慮故於此品不復宣說聲等之相此說自天色等於此金剛髻經前已宣說故於此經後分後靜慮中不復說故又許此經所說四支同大日經即彼釋云毘盧遮那現證菩提經云字謂菩提心第二名為聲事謂住自天是自身所作所言第二事正覺兩足尊說命即是風力用謂憶念如是此中事等體相如前已說故住聲心及事之言若謂非是自起為天之事則大日經事謂等文亦應不許說自起天無差別故光明天女修法明顯說有自起并立生起次第圓滿次第之名若謂此是事部則非清淨若謂無上瑜伽所攝則不可作事部有自起天之據由此當知說事部自身有自起者後靜慮經及釋最為明顯佛密論師於摧壞釋中引摧壞廣續所說修六天等亦可了知又攝真實經上釋云凡諸樂著事部行部二俱部儀軌者亦當以彼儀軌修行此說大印等法為釋此義故云真言心印及諸明隨樂修習諸理趣心印咒明如其次第即是四章所說大曼陀羅陀羅尼曼陀羅法曼陀羅業曼陀羅此說瑜伽部及事行兩部儀軌皆可修習故由彼門可修自起及入智尊最為明顯又事部與無上部中所說光明天等像咒皆同依此密意故修法海等中亦多以彼為例將事行部所說諸尊生起法等亦仿無上部而修也若爾如何會通集智金剛教義如佛密說彼是別說事部有一類機怖畏專修本尊瑜伽非是希有違越世間以貪等行修道之器而以實執生老死過患分別之行而修道者則無自起及入智尊非說事部之機一切皆爾如金剛髻經以事行部多屬彼機故諸續中亦未顯說諸尊瑜伽縱說亦略然彼正所化機則非不能或不樂由防護命力等門而專修天瑜伽又如勝菩提論師說修事行部咒之異生亦能成就寶劍丸藥等諸悉地及息災等無邊事業成就彼者金剛手灌頂經顯了宣說須修本尊及空瑜伽如云若時行菩薩行行密咒門自成天身意無疑惑而修天慢若行若住若坐一切時中常不搖動寂靜慧爾時乃是行菩薩行行密咒門具足大菩薩戒又說隨順諸天所作事業勤修瑜伽謂住禁戒於禁戒中修行念誦護摩等業謂行妙行勤修不異諸天瑜伽受諸學處行大乘行謂於密咒獲得悉地無間又云諸菩薩摩訶薩行菩薩行行密咒門常應安住無相後又顯了說云於正覺所制禁行及尸羅諸行并學處若時能安住咒師能成就正智離分別是昔佛所證於無分別中能成諸密咒其果能證得清淨性光明若住於分別則無彼成就故當斷分別思惟諸咒色斷分別者謂以無我慧破我執分別非謂盡滅所有分別思惟諸咒色者謂修天身若行乃至不動意明修天瑜伽堅固之量謂於住不住定一切威儀獲得堪能除天身外持心不散而能除遣庸常慢執佛密論師及勝菩提雖未宣說智尊入我然印度諸智者多數宣說故亦可修若不可者其理應謂由執自與智尊各異不能信解合一之理然彼非理一切皆說由於信解自身語意與本尊身語意不可分離之力凡身轉動皆成手印凡發語言皆成密咒如金剛手灌頂經云若善男子若善女人見曼陀羅發菩提心具足悲愍善權方便善巧密咒諸字義理當作是念離語無意離意無語離意無身意即是語語即是意天身亦即是意語亦即是天身若能如是信解無異咒師便得清淨之意成就如是清淨時便能於一切時見自身與天身自語與天語自意與天意相等爾時即是安住正定若於一切時咒師常住定爾時能趣入身等平等性住平等性者盡所動支節盡所說語言皆是密咒印由此當知觀身為天語言為咒意入真實非是無上部之別法下續部中亦定須爾庚二別釋事行部道次第分二辛一解釋攝道總頌辛二正釋道之次第今初後靜慮云勤修密咒者於微細梵淨三時常了知十支儀軌業此說勤修密咒故於三時中了知現證天瑜伽相明咒禁行由是靜慮所了知故名為微細此將引發悉地諸支總攝為十所言十者釋中說為修行之處咒真實我真實念誦真實住火靜慮住聲靜慮聲後解脫靜慮修咒儀軌護摩儀軌灌頂儀軌共為十事咒等三是念誦四支靜慮其次三種是下說之三種真實靜慮此二為道主體再次一種是修彼二靜慮之時先行及結行儀軌灌頂是為成熟修彼諸道之器護摩是修成就及修事業等時所作由此等門獲得堪能則能成辦無邊事業速疾圓滿大菩提行此是總攝事行兩部之義為彼二機成佛之因事部有四總續妙臂問經於佛蓮花金剛三部天神財神世間六道種姓密咒事業差別承事之方便等餘經廣說難攝集者此總攝集餘略說者此廣顯說餘未說者此中宣說彼於四支靜慮三種真實靜慮多未顯說而於其餘修咒儀軌修諸事業儀軌等則顯了廣說秘密總續則說三部佛蓮金剛三千五百大曼陀羅繪畫灌頂等事通軌故多顯示成熟法器之類蘇悉地經未明顯說六種靜慮而顯了說三部共同修咒儀軌事業儀軌修護摩法及所護之三昧耶等後靜慮經總明六種靜慮別明護持命力等靜慮支及後三種靜慮此亦皆是三部所共若能了知此等建立則亦善知事部諸別續及行部諸義如何攝集此可攝為四類一成熟修道法器灌頂類二成熟所依護三昧耶律儀類三為生起堪能故修承事類四得堪能已為利自他修習成就類依事行部雖有多種修法然如兩部所說而釋要以佛密與勝菩提二師之論為善今如彼釋辛二正釋道之次第分二壬一事部道次第壬二行部道次第初又分四癸一為成修道之器而行灌頂癸二成器已清淨律儀及三昧耶癸三住三昧耶先應如何承事癸四得堪能已如何修習成就今初曼陀羅及灌頂儀軌恐繁不錄此二部中若但入壇及入壇已灌幾種頂根本罪釋已說癸二成器已清淨律儀及三昧耶於灌頂時受何律儀及彼根本罪等根本罪釋已廣宣說今當說餘諸三昧耶此如蘇悉地經咒毘奈耶品轉真言法品云復次誦咒師由住何律儀速得諸成就說彼咒調伏有智修行者於諸咒諸天及大持誦者悉皆不應瞋智者勿臆造咒軌及密咒於諸惡性人亦不應毀訾開示密壇師行為雖暴惡然不應以語或以意毀謗智者雖盛怒於他諸明咒不壓縛損害及治罰降伏若無師隨許不應持密咒於未承事者知咒亦不與智者知經咒曉印及儀軌釋經并壇場不傳未入壇一切標幟形及如有情形并一切諸印不食不跨越具慧修行者不輕毀諸藥不觸諸垢穢亦不以足踐與諸大乘人智者不應諍聞菩薩神力不應為破壞與諸持咒者終不相比鬦於犯小過者不怒行殺害誦者住軌則不歌舞調戲不應為嚴身持鬘塗妙色不越不跳擲不奔不急走諸粗惡身業皆應善遣除安住實法者不忿然作色不粗語離間不說無益語不共外道住亦不與彼諍持咒不應與屠者賤種言智者念誦時除一護咒人餘皆非所須全不應共語不用油塗身不食諸胡麻蘿蔔及蒜鹽異類諸嚼食米粉及豆餅油麻餅團食如是諸豆類成就者盡斷毘奈耶迦食及所施殘食祇薩惹乳粥持咒者皆忌不乘諸車馬不踐蓮花等亦復不應踐所棄諸餘食一切戲笑事著鞋及擎傘并諸修飾事誦咒者當捨不以足揩足不用手揉手糞尿不棄水不棄近水處不手承飲食不鍮器中食不於葉背食智者不貪食具慧修行者不共他不淨大小床上臥不應仰或覆不應數數食不太少太多亦不應絕食不食可疑食不樂諸奇事不觀諸調戲不觸婦女境不應起貪心安住咒法者身語意三業於飲食威儀皆應善防護在家持咒者不著染色衣陳舊及垢穢亦不著一衣不應自菲薄不應不自愛亦不應厭患不可任痛害除得本尊許不應捨密咒莫愚毀明咒精勤莫放逸意勿向餘散莫起諸雜念無貪不淨心行者誦密咒莫修驅逐法護他及遮法不以自他咒持誦禁惡毒除為修成就咒不作餘用亦不用自咒較量及考驗智者三時誦應三時沐浴又云行者於初八或十四十五及神變月半尤應修供養持誦護摩供如是受律儀尤於諸福業當殷重勤修又云如明咒律說應作不應作及學處律儀行者常應思貪著自安樂晝夜應盡除以後當作此繫念不應散若日間放逸夜分當悔除夜作次早悔善作當慶喜誦燒皆當淨勝咒及律儀諸明咒調伏行者善安住祇薩惹者謂黑芝麻豆米合煑之粥未入曼陀羅不應傳咒者如總續云若未善見壇設傳授諸咒彼不得成就死後墮惡趣若為彼宣說咒印及儀軌自犯三昧耶墮號呌地獄若未於四部隨一曼陀羅而受灌頂不可唯依隨許法而修諸尊及授諸咒設作是已淨除彼罪之法如前續云如說三昧耶設若誤毀犯彼當善持誦心咒十萬遍或誦一千遍無痴心總持或息災護摩或更入壇場札拏經釋寶矩論中先說彼等三昧耶已次云諸三昧耶我從事部中集大瑜伽部諸瑜伽師由處時增上及意樂增上亦應如理護持又自謂是大瑜伽部諸瑜伽師若即不樂潔淨不善防護不應道理以意樂增上雖事部中亦有開許如云隨淨或不淨用食未用食任沐浴與否念本尊即成是故大瑜伽部諸瑜伽師亦不應違上說三昧耶也此謂非但受事行部灌頂者應當守護即受無上瑜伽部者亦須守護故應善知彼三昧耶及根本罪慎防莫放諸根本罪設犯餘罪亦莫捨置如云晝犯夜悔夜犯晝悔如是悔除令淨癸三住三昧耶先應如何承事分二子一須承事之理子二承事之次第今初後靜慮云說密咒靜慮為最勝秘密諸苦行大仙離彼亦無成此說若無下說二種靜慮雖持禁戒具足難行修密諸仙亦無成就大日經成就品亦云欲得廣大慧或欲得五通及持明成就或長壽儒童乃至未承事彼即不能得事行兩部皆同此理蘇悉地經咒相品云應觀部目性勢力及事業當精勤承事順自意密咒謂於三部曼陀羅中善得灌頂具足菩薩律儀咒三昧耶善巧修行次第如蘇悉地經及妙臂問經所說處所及具德相助伴等皆悉具足應先修習二種靜慮及諸支分而為承事所得灌頂如總續云於佛部壇中若善得灌頂此即成三部壇等阿闍黎此說若得佛部灌頂即成三部得蓮花部灌頂即成二部得金剛乘灌頂唯成一部阿闍黎耶然隨所修何咒須得彼咒念誦傳承子二承事之次第分二丑一有念誦靜慮丑二不待念誦靜慮初又分三寅一四支念誦靜慮之前行寅二四支念誦靜慮之正修寅三四支念誦靜慮之後行初又分四卯一先於房中所修卯二出外沐浴入佛堂法卯三著衣入座加持供物卯四守護自身及其處所今初每日初座早起床時及餘座首於三部中隨修何部即結彼部三昧耶印誦持密咒謂平仰兩手略屈二食指置於頭上誦云嗡達塔迦達鄔跋瓦耶娑訶又合掌如蓮花開敷之狀置於心間誦云嗡碑瑪鄔跋瓦耶娑訶又二手背相著二大指二小指相鈎置於臍間誦云嗡斑鄔跋瓦耶娑訶如其次第尊勝等為佛部觀自在等為蓮花部金剛摧壞等為金剛部咒印次緣十方一切諸佛誦云嗡薩瓦達塔迦達迦雅瓦迦即達斑般拏梅那薩瓦達塔迦達斑跋答奔答南迦熱彌以此咒禮諸佛次供自身誦云十方一切諸佛菩薩我今乃至未證菩提一切時中畢竟供養維願諸佛諸大菩薩哀愍納受賜我無上悉地次當歸依發菩提心誦云乃至證菩提歸依佛法僧為辦自他利我發菩提心謹請住十方諸佛菩薩聽我為大菩提今發菩提心次用忿怒無障明王咒印守護印者兩手諸指互握成拳二手小指并豎二食指端相著二大指按其側咒云嗡斑卓答摩訶跋羅訶那答訶跋毘朵那薩鄔促沙摩卓答吽泮於受飲食大小便時亦可以此守護次於心間月上觀想毘盧遮那自性摩字頭上想不動佛自性訶字二字皆有燄鬘圍繞誦云嗡娑跋瓦虛答薩瓦答摩娑跋瓦虛朵吭應當信解自性清淨次出房外嚼齒木等掃拭佛堂卯二出外沐浴入佛堂法次為沐浴往無多人及無怖畏河中兩手手指向外交叉鈎合二手食指并豎二大指置食指之前以此印觸淨土誦云嗡尼喀那瓦蘇得娑訶取土分為三分安置淨處此亦結前所說三種三昧耶印隨其所應之一而後取土次以大指壓小指餘指作金剛杵相兩手相交互按其臂上齒壓下唇作忿怒瞻視誦云那末惹那札雅雅那摩軍札斑巴拏耶摩訶藥叉茜那巴達耶那末斑卓答雅得雅他嗡胡魯胡魯底叉底叉奔答奔答訶那訶那阿彌得吽泮以是甘露明王自護次誦嗡訶那訶那阿彌得吽泮兩手內握食指伸豎從頭至足周徧打觸以除身中魔碍次誦嗡班阿格尼般底巴達耶娑訶平仰兩手小指相鈎二無名指按其中二中指並豎食指屈著彼第三節大指并合於中結此印而披金剛甲又即前印二食指分離如金剛杵形是為金剛甲印誦那末惹那札雅雅嗡喀格黎吽泮即以印觸頭肩心喉等處而為披甲次誦那末班雅吽訶那都那摩他毘底薩雅鄔薩惹雅泮左手大指按中二指食指小指相鈎如環觸中二指中節右手中三指如金剛杵形按於腰部為除碍印經說當以此印觸土或水而除魔碍故應先觸土水次誦那末惹那札雅雅那摩軍札班巴拏耶嗡訶那訶那班拏訶以此咒水誦嗡格黎格拉班吽泮左手大指按小指甲餘指結作金剛杵形為格黎格拉印以印觸水即以此水撒地次誦嗡班訶惹吽七遍咒土取土一分身入水中至沒臍處用巾洗浴次以第二分土洗手誦嗡虛底密底答日尼吽訶右手平仰食指置大指前以大指按食指中節為妙音印即以此印洒淨妙臂問經說於此時洒淨勝菩提師似許以此咒印而為洒淨次誦嗡蘇悉底迦日娑訶結髻守護次取第三分土誦嗡布惹拉吽泮加持右繞向日而自塗身次誦那末惹那札雅雅那摩軍札班巴拏耶摩訶藥叉茜那巴達耶那末班卓答雅當卓達迦札碑惹瓦雅得雅他嗡阿彌達軍札黎喀喀喀黑喀黑底叉底叉奔答奔答訶那訶那迦迦毘婆札雅毘婆札雅薩瓦毘迦毘那雅迦那摩訶迦拏巴底即毘達阿那達迦惹雅娑訶右手平仰屈中指無名指以大指端按之食指小指稍鈎作擾水印擾水再誦嗡惹得惹得補答雅娑訶撒三掬水供養三寶次誦嗡阿彌得吽泮於自頂上注三掬水次洗手已仍以前咒注三掬水自灌其頂運意奉請本尊住蓮花上誦嗡薩瓦達他迦達阿彌達娑訶而為沐浴次往佛堂念誦先於水中誦咒二十一遍蘇悉地經念誦品云未防護不淨隨所誦真言彼所持誦數智者不應數此說未善清淨正沐浴等所有念誦不能滿足持誦之數故當安住清淨如或不能廣作沐浴得用土水善洗諸垢如妙臂問經云五土洗後三洗前三洗左手雙手七或是任用多土水乃至垢淨而善洗至佛堂前淨洗足已向東或北而作洗淨次入佛堂現前緣想敬禮諸尊應持誦入三昧耶咒嗡毘惹毘惹摩訶班茲薩達薩達薩惹達薩惹達達惹伊達惹伊毘達摩尼桑巴那尼達惹摩底悉地阿止當娑訶卯三著衣入座加持供物次以香水注於掌中隨其所應誦三部心加持洒自頂上除諸污穢以甘露瓶真言加持洒於茅草等座於彼座上結吉祥坐或蓮花坐或金剛坐次於右腕繫珠索右無名指繫淨罪茅草環及以綢綾如上所說作頂髻狀此中珠索謂以童女所捻之線和合單數為繩結單數結中繫自部念珠一粒持誦自部真言如誦嗡如如蘇普如佐拉底叉悉地羅內薩瓦阿惹他薩答尼娑訶或誦敬禮三寶敬禮觀自在菩薩摩訶薩若有見聞者及觸并憶念我願治一切有情諸疾病得雅他迦制毘迦制岡迦制迦制毘迦制岡迦制薄伽嚩帝毘耶娑訶或誦嗡姑倫答日奔答奔答吽泮如其次第即是佛部蓮花部金剛部珠索明咒亦即彼部佛母此中勝利如蘇悉地經明咒毘奈耶品云由此則不為碍神所障蔽誦此能清淨速得諸悉地繫茅草者如前經云由別誦三部三字心真言茅草能淨罪繫於無名指唧那唧阿熱利班職供養及持誦護摩恆當持行者恆持此能令手清淨又於珠索塗之以香誦咒百遍用綢綾或紅布所作之頂髻咒以下說咒衣之咒衣服亦以彼咒咒而披著次以雷擊木或苦楝木尸林株杌或用栴檀或用餘木刻三股杵善為洗濯塗紅栴檀生為忿怒蘇悉地尊迎請相同智尊修供養等次誦嗡都那班哈初安住時千遍餘時七遍禱云維願世尊哀愍我故住此辦我一切事業於修供養等時左手持此羯摩金剛每日供養誦咒七遍蘇悉地經說由持此杵故一切魔碍毘奈耶迦恐怖逃散次先修歸依發心次體三部一切業咒或誦前說那末惹那札雅雅等甘露瓶咒加持香水以洒水具遣除花等之魔次誦部主密咒或誦部心唧那唧等隨其所應以左手中香水洒淨次以上說除碍印右手三指如金剛形握左中指為增威光印置香花等上誦增威光真言想諸供物皆成殊妙天物嗡得得薩尼悉底悉達雅吽泮又嗡底北底北底跋雅河北夏摩訶夏惹雅耶娑訶又嗡左拉左拉雅奔達日吽泮如其次第即三部咒次誦上甘露瓶真言加持及隨其所應誦部心真言卯四守護自身及其處所次以上說除魔碍之咒印或隨所知而護自身再誦三部一切業咒或誦甘露真言從那末惹那札雅雅至阿彌得吽泮加持香水徧洒自身除諸魔碍若誦嗡掌奔答娑訶或嗡那末摩訶希雅耶娑梅悉底悉底薩答雅希毘希毘迦日阿巴哈薩瓦阿塔薩答尼娑訶或嗡阿格利格拉班吽泮如其次第即如來等三部一切業咒次為護處所故應修護輪誦嗡格利格拉班唧班唧布惹奔答奔答吽泮加持香水七遍洒一切處兩手中指與無名指互結如環指端相觸小指食指並竪大指作橛狀觸地形是為橛印誦前說咒想於諸魔釘忿怒金剛橛令無轉動誦嗡蘇悉地迦惹左利達阿難達母達伊左拉左拉奔答奔答哈那哈那吽泮加持燒香而熏想縛上空諸天此是三部總咒如來部說嗡左拉吽蓮花部說嗡北彌尼巴迦瓦帝摩哈雅摩哈雅伽答摩哈尼娑訶經及儀軌皆未別說金剛部咒次隨所應以彼部心加持香水遍散周圍誦嗡阿彌柁巴瓦鄔巴瓦吽泮那末惹那札雅雅那摩珍札班巴那耶摩訶藥叉茜那巴達耶嗡松巴尼松巴吽格哈那格哈那吽格哈那巴雅格哈那巴雅吽阿那雅賀巴迦毘雅惹吽泮娑訶想以此咒繫縛十方一切魔碍此是三部明王密咒次將橛印二大指向上立是為牆印誦那末惹那札雅雅那摩珍札班巴那耶摩訶藥叉茜那巴達耶得耶他嗡薩惹薩惹班札迦惹吽泮想金剛牆圍繞無少空隙次將牆印向下而繞誦那末惹那札雅雅那摩珍札班巴那耶摩訶藥叉茜那巴達耶嗡毘樸惹叉班巴尼吽泮想金剛牆上有金剛網帳次誦甘露瓶咒及格利格拉咒結印加持彼等蘇悉地經說於房屋周圍恆以彼二明王加持金剛牆網橛次結為拳大指壓諸指甲食指外伸從中旋繞誦那摩薩捫達班尼嗡達惹達惹都如都如摩札摩札奔達奔達薩瓦札阿札底哈得薩西梅薩摩奔答姑如姑如達惹達惹薩捫達班則姑如阿摩類姑如那摩耶都達耶都達耶巴惹巴惹迦惹迦惹蘇彌摩薩捫達毘朵那薩耶左拉雅娑訶想牆各方火燄熾然周遍而為結界寅二四支念誦靜慮之正修分二卯一四支念誦靜慮卯二依彼如何念誦今初後靜慮云於彼天身處最初供養已智者瑜伽處於前想善逝此說先供諸尊次自修為本尊釋論中說供養為例亦應潔淨守護自身處所請本尊等以若不修彼等更無供養時故潔淨等事於一切法皆當了知佛密論師許是次第蘇悉地儀軌說先自修為天身次迎本尊修供養等若就修行次第前說似稍便利然此多依勝菩提說且如後釋此中分二辰一自起為天辰二前請智尊修供養等今初端身正坐從勝妙境內護諸根項如孔雀令出入息徐徐遊行兩眼微開下視鼻端齒相密合舌抵上顎遍緣無餘諸有情聚欲於苦中救護彼等荷負重擔發大悲心為利彼故願得無上菩提當發大菩提心集修福德資糧以住此心所修眾善皆能引發一切種智由此加持諸善即在生死亦能引發無邊安樂次當修勝義菩提心如後靜慮經云後解脫諸支無二種分別細不動明顯慧觀現在前謂彼外道徧計之我雖於名言亦定非有故唯於五蘊假名為我如是即是我之真實時者謂於迎請本尊修供養等之後如何修者謂依勝義觀慧正觀察時非是他身眼等諸識所能分別我亦不能分別他境於勝義中頭等諸支亦皆解脫不成實故此破真實能取所取顯示二空即是明我真實然如夢心由內錯亂增上現顯為境誰能破除若執二空識為實有此亦無少自性最極微細故名曰細此顯我之勝義真實離於一切戲論之相修彼之法由不動等顯示至下當釋勝菩提論師與佛密論師所說義同如我真實於勝義中永離一切戲論天之真實當知亦爾此二如水乳合不可分離於此無分別光明門中修我與本尊合一之慢於無所顯自心明了決定而修靜慮即勝義天如是修習人法我空之空性者與餘續部在修天前先誦娑跋瓦等真言而修空義同一關要從彼定起緣爾時本尊之真言音相是為聲天蘇悉地儀軌中未說此法於此中間說修彼心如月輪相此義二師相同次想爾時咒字之相於空中現猶如寫成如淨水銀吸諸金沙想於我及本尊真實無分別行相心所變月輪之上次第安布是為字天蘇悉地儀軌中說為所誦之咒二大論師皆未明說何咒若是佛部修尊勝咒嗡娑訶若光明天謂嗡瑪日則芒娑訶等短咒亦可如是蓮華部修觀自在等金剛部修金剛摧懷咒等亦當了知佛密論師但說次從月輪放光此當如勝菩提論師所說從月及咒放種種光光芒皆有所修天像遍虛空界化為大供養雲供養一切諸佛又從所化大雲降甘露雨息滅地獄火燄令彼安樂天像光明次皆收回入於自心月輪修成爾時本尊而起與自不異之慢是為色天滅地獄苦是例亦可息滅餘有情苦次修印天如後靜慮釋云從彼起已以白毫頂髻等印印諸支分此如諸續說結頂髻白毫眼目等印誦彼真言即以諸印觸著彼處加持三部諸天之頂髻等此即替代餘部加持眼等若未能作如是修者勝菩提論師云次結本尊三昧耶印加持心額項肩即以前說三部之三昧耶印咒加持例如尊勝楞嚴文殊當以佛部咒印加持一一應知第六天者如後靜慮釋云有世俗三摩地相又說名有分別天餘處說名相天即是修已生起之本尊也如是修六天者後靜慮云我性如是已由真言識修釋此義云真言識謂六種密咒即是六天由彼熏修內心相續即名修彼金剛摧壞經廣本中明顯宣說佛密論師金剛摧壞釋引文云瑜伽師先洗安處金剛座供白修六天空性字聲色印相是為六又云諸佛菩薩由空性等六種菩提成金剛手此代餘部以五菩提而生本尊後靜慮釋釋此理云此且總說真言識修次第若有餘處說餘相者亦應作如是修此說事部中起天瑜伽法與此同或不同皆應依之修習修六天有二種一於六天依次思惟及於天身色三昧耶形等依次思惟於多所緣多行相轉是為靜慮修法二於靜慮所思天身不思多相專一而住是為三摩地修三摩地者即是心專一趣義故此如後靜慮云由真言識修護住三摩地命力善防護初句與住三摩地者顯示二種修法餘文明於三摩地修時防護命力修此次第謂如前說身善安住不散分別乃至色天如次修習先取自為本尊之慢次當知從眼耳鼻口臍男女根不淨孔髮毛孔出入之風是名為命力謂憶餘所緣向彼流散之念防護彼二謂止出入息如龜藏六似舌飲水如是由上行風身內一切遊息及於諸根聚落任運散動非等引意向內收攝如屋內人向外觀望眼稍合閉面略上舉緣自為本尊身專一等住命力義如是者以前引大日經即可成立又命如上釋力謂止出入息斷其散動隨自堪能如是攝持至不能時徐徐放息觀自為本尊次仍如前修修習疲勞休息之法至下當說此中須於明顯天身生三摩地心久安住良以風是心馬能攝持風則於一境心易攝持依此密意故後靜慮釋中說攝持風如云心如國王為念定作意等眷屬圍繞乘於命馬若能捉其命馬則亦擒獲心王及其眷屬餘處亦說應滅其命由滅命故能攝自心及念慧等修習靜慮雖須防護然彼多所緣轉非如修三摩地趣一所緣而善防護故但云護住三摩地未說靜慮此修幾久如金剛手灌頂經說乃至獲得一切威儀能以明顯天身及天慢心遮庸俗慢是故唯於天身明顯持心猶非具足須天慢堅固於彼心此等當於無上部生起次第時廣說無上部中於天瑜伽堅穩之後方說持風之風瑜伽此中則說與於天身持心同時而修勝菩提論師雖未說此然佛密論師顯釋續義極為重要若於六天同時修風瑜伽及於天身持心則以先請智尊修供讚等極為便利後請智尊等次第不便若是初修次第當如佛密而修若已承事次作灌頂依瓶沐浴並修自他悉地等時兩種漸次隨修皆可若後修自起者爾時亦修供讚可如餘師所造諸事行部儀軌而修若先修者以前曾未別修故可同時修供養等修自起時諸餘論師說圓滿修各各諸尊此二論師則說先承事時修自起者但修各部正尊即可若已承事於後修自他悉地時則自起中所說諸尊俱修為善鈎入智尊灌頂及印證等可依餘師所說修習以二論師未說不修故不相違
