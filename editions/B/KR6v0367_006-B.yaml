body:
  text: 宗喀巴大師造法尊法師譯瑜伽部道次第品第四之二辛四善承事已應如何修悉地分三壬一由靜慮修悉地法壬二由念誦修悉地法壬三由護摩修悉地法今初若如上說總承事已別於細金剛三摩地獲得自在則當修習靜慮所成世出世間諸妙悉地此復有二一由入壇時降入智尊者於寶藏等世間悉地略修即成二諸餘悉地則須修至獲得所說相狀乃能成就此中佛密論師唯於修四印時說智薩埵降入自身而修修餘一切世出世間悉地唯說自住三昧耶薩埵慢智慧薩埵不入自身安住前面由供養等而修對餘論師所說先自修三昧耶薩埵召入智慧薩埵次修悉地之宗加以破斥然修一切悉地皆須先修本尊瑜伽則是諸師所共許若為如法利益除遣自他貧乏等故修取寶藏悉地者如初品云藏中金剛形當於自心修修已即能見地中諸寶藏謂於自心想寶藏瓶中有月輪月上有五股杵念誦班尼底乃至見相而修相者謂可見觸之相得相狀已修念誦一通夜次往想有寶藏之處供養本尊等及施鬼神食以金剛鎖咒印縛護寶藏及其處所次修念誦便能見其寶藏掘地而取如是或於虛空修金剛杵自修羯摩金剛修念誦後隨二金剛所墜處即知其有寶藏又於舌上修金剛杵而修念誦自即能說諦語謂某處有若欲修不沉沒悉地可於泉水等旁或於隨所樂處以大瓦器滿注淨水安可見處意誦班羅若諸水塵變金剛相更互相著結成一金剛形四座修習乃至獲得見觸等相次至堪受手足等觸堅如金剛於彼隨繪何部曼陀羅輪修前行儀軌已經一通夜安住三摩地次若欲於水上行時但當現起此三摩地安住其中即能於水上行住等若緣虛空諸塵修成羯摩金剛變成一金剛梯乃至堪受手足觸著如前而修則能上昇須彌頂等若修持明悉地當廣修供養等儀軌修微細金剛後誦班答㘃等四種心咒隨一隨順各品部別觀想持明圓滿形體住月輪上乃至得觸見相而修次供本尊經一通夜住於三摩地中智慧本尊降臨授與所修持明悉地如是等眾多共悉地皆可修行若欲修得最勝悉地自修五如來身隨一形念誦班答都想有微細佛身遍虛空界於出息時觀想一切明顯至入息時想如酥入砂中皆入自心而攝持之如是不作餘業專精修習調伏三業所有粗重乃至見相而修獲得相已如前說繪壇等而修則成就持佛形之持明菩薩又於如來部中若住金剛薩埵等本尊與自身無別之慢每日遠離三業障碍而修至出息時想本尊形遍虛空界尤於諸根及所念境想彼一切皆為本尊形像思惟彼時當如是念此等一切皆從分別而生如所分別若以教理觀察皆於勝義非有次收息及意時當緣本尊如是修習若得前說相狀則當繪壇供養通夜住定勤修念誦本尊降臨授與本尊大印身形悉地修此二時說止命力而修若於彼二由修力弱未得所說之悉地者然如神通壽力身色殊妙等諸悉地不待勤勞亦可成就如是所修悉地是瑜伽部上根所化初修行之最妙悉地然在事行部中若成就前說之持明悉地即是最大身悉地也壬二由念誦修悉地法由念誦門修悉地者先自修為本尊於四月中每日四座持誦如來或其部心一百八遍圓滿承事次若欲修大悉地者先於本尊像前修習本尊瑜伽亦經四月每日四座如前念誦最後通夜持誦至天明時即得本尊身之悉地若欲得三昧耶印悉地者先當如前承事次於本尊像前四座皆結佛部之金剛母三昧耶印不解彼印當善持誦總誦真言滿十萬遍後仍結印誦一通夜爾時若感疲勞可暫解印略息結印重誦如是專注一意若於頂上結印見其熾然爾時結印即當跳動若跳動已結印略舉便能無碍騰空而去若於眉間結印念誦見其搖動爾時略結彼印隨自所欲即能現身若於心間結彼印而念誦見其跳動爾時略結彼印即得隱身悉地若彼印發聲者則結佛部諸尊一切三昧耶印或隨一印念彼心咒便能作彼經所說諸業又四月中先善承事次於本尊像前經一月中日修四座後持誦一通夜則於甲鎧棍杖線繩芥灰芥子金剛橛杵弓箭寶劍糞等隨一物品或以各各真言或以本尊真言加持或繫於身或持於手凡諸男女兒童被魔所魅或恐人及非人魔類損惱及已損惱皆能防護解脫損惱及諸怖畏又諸村邑國土恐有怨敵水火災病發生如前守護即能脫離彼諸怖畏又欲了知善不善等求降智尊隨以紫白栴檀調水為泥誦咒一遍而觸或結金剛與鈎等印或鑄像等觸著而降降已如實宣說能息魔等或用銅瓦等瓶如前加持亦能降臨若求失物何在或誰所竊皆能顯示又如前說三種次第最後於孔雀毛束中安一木杵繫於頂上以金剛母三昧耶印按壓乃至入一切印中而持誦現相以後旋搖彼毛自即能現一切形色顯示世間一事業顯示十方諸佛及諸眷屬自亦能現佛身又先承事四月次於本尊像前結前三昧耶印於四月中每日四次持誦一百八遍次繪壇場結三昧耶印持誦一通夜若見印熾然後隨心欲於某一有情想入其心愛樂誦持即得自在此是守護延請自在事業阿嚩達惹又說由念誦修慈等三摩地法此等坐相念誦聲音意中觀想及顧視法又各各三昧耶積集資糧念珠捻珠法等如阿嚩達惹論本釋總集諸經圓滿儀軌中說壬三由摩護修悉地法先於息滅眾惡增益種性等灶修各尊瑜伽日日護摩乃至獲得自他滅罪等相而修各各事業如是先當清淨三昧耶及律儀為諸成就之本次當勤修有相無相四座瑜伽獲堪能已進修共與不共悉地而趣諸道下三部密經中當知此理不許風息念誦真空天瑜伽等總合一處而趣諸道此等不具生起次第關要及無圓滿次第諸宗要故須得殊勝悉地而趣諸道為令了知彼宗要故於阿嚩達惹論及善根金剛論師釋論依止初品善集經中散說修習悉地之理略說少分瑜伽續中最勝教攝真實經香乳海三師妙論為擾杖搖出第一甘露味得淨灌頂住律儀由修四座念誦法善令本尊身語意與自三業合為一由三瑜伽修治心入修悉地三種門本尊授與上成就此是殊妙易行道是故略知結印法及誦儀軌諸次第縱云已知瑜伽義然須更求諸道要了知道要承事為先修地法品第五之一己三無上瑜伽部道次第分三庚一攝道之總聚庚二釋道之次第庚三釋次第之道今初無上瑜伽之道次第當攝為幾聚耶若知於此義中智者所說多種總攝道次第之不同則能增長觀者妙慧故當說彼諸門善根金剛論師道次第中說波羅密多乘道次第已次說咒乘道次第時攝為五種儀軌謂熟未熟灌頂儀軌熟已不壞護三昧耶儀軌從師聽聞經續了知法相儀軌修行菩提淨心儀軌究竟方便淨行儀軌如彼道次第云具善數取趣於最勝師所發心受灌頂護律善知相修心清淨行是五儀軌相解七莊嚴論云諸瑜伽續中皆現為三續智說為因續方便續果續又云持上瑜伽續果必依於因五入如種子應知取捨別次漸受灌頂應行方便續先由聽聞慧於文續多聞次以思惟慧俱學其文義後以修習力先學生次第後圓滿次第離覆穿毒過善相續安住定生果無疑如水糞生穀因續如明炬論說謂五種補特伽羅得受灌頂方便續謂依聞思慧了解續義漸學二種次第如是學者能證果續此依集密後續所說攝為三續乃是霞答迦惹嚩摩論師所許黑閻曼德迦經初品釋寶炬論依於最勝補特伽羅攝為六聚謂一切遍行之三昧耶依三昧耶而後灌頂得灌頂後承事承事而後修行修行所成之果果後利他事業依於下劣補特伽羅攝為四聚謂三昧耶灌頂承事事業集智金剛續說有貪乘人成佛之理攝為四聚謂續因緣訓釋近因此義如明炬論云以貪法理趣證義故宣說能生五部佛說名為相續後合為一部說名為因緣執持金剛等是說名訓釋喜等諸正行當知說為因明炬論以離欲乘人欲界成佛四相為喻而說有貪乘人一生成佛四相亦同前者第一相謂須生人中如是此中亦須捨離庸常身慢轉入五部或其部屬本尊之慢如受生然故名為續此是第一次第前者第二相謂未出家時有種種相出家以後唯一出家相為因緣如是此中種種本尊化相最後入一大密金剛持種生死涅槃種種諸法於真實光明中等同一味唯一種性是即圓滿次第此是本尊壇等多法根本故名因緣前者第三相謂定須安住毘奈耶行如是此中決定須受金剛三昧耶等五部三昧耶及灌頂此是必須依止之處故名訓釋訓釋梵云跋達義亦通於依止處故前者第四相謂欲求證果必須法行近因如是此中亦須三行隨一行之近因此等即是灌頂受三昧耶二種次第增長諸行果位法色二身聖派諸師許攝入圓滿次第光明與雙蓮如是則可攝為五聚謂成熟修道法器之灌頂清淨爾時所得三昧耶與律儀依彼如何修道增長道之諸行證果之理明炬論說彼次第云諸於大金剛持所化曼陀羅具聽聞善根者當授明灌頂顯示了不了義觀察次第圓滿次第修法造道之總聚者謂諸續中所說一切續義依於所化需要增上前後錯綜令知是一補特伽羅成佛順緣將諸清淨續論現為最勝教授故依何義組纖成道次第即於彼義了知能攝一切續義最為切要如黑閻曼德迦經釋寶炬論云又此教王極相錯綜是故當以尊長教授於彼一一承事等中如應歸屬謂諸宣說三昧耶者先總合為一聚次說灌頂事者次說承事與修行者次諸說果事者次說無邊業者說黑閻曼德迦經如是者僅是一例實一切續皆應如是攝集如是攝道次第諸異說中隨一皆可然今當依集智金剛續意而說庚二釋道之次第無上瑜伽正所化機謂如前說已修共道淨治相續大乘種性是大乘中具足最勝種性大堪能者由大悲心發動意故成就猛利欲樂急願成佛欲入無上瑜伽法門速疾成佛必須無倒了知續義善學二種次第及諸密行為知續義故須聽聞為求聽聞知已修行則須先受清淨灌頂如法護持三昧耶及律儀以灌頂與三昧耶等是金剛乘之道基故如是欲求灌頂須先入曼陀羅此復先應修習所入之曼陀羅如鈴論師灌頂儀軌云金剛持宣說灌頂壇為先曼陀羅亦如彼論云今當說何為曼陀羅體性繪畫諸事業線分彩次第諸眾生本性所成壇無二此說繪像彩土身曼陀羅三種又依有情差別說靜慮曼陀羅故入曼陀羅時之壇總有四種又依菩提心說於勝義世俗二種菩提心曼陀羅及薄伽曼陀羅灌頂然此三者係上三灌頂時事非是水灌頂等以前所入之曼陀羅又先未曾受灌頂者不可即於身曼陀羅灌頂於靜慮曼陀羅灌頂亦須師資俱具勝相故彼二者非總灌頂至下當說雖亦可依繪像然說阿闍黎德相時多說善巧畫壇事業續及解釋諸大智者多說最初灌頂依彩土曼陀羅是故總說弟子所入之曼陀羅是指彩土之所繪者如理修成如來依止供養自入後令弟子入也此在彩土之時為明諸尊居處作香壇等是天預備為知分散彩土處故彈線分別故須先彈業線分別與加持所彈業線之智線又彈線所分處及作天預備處若作地神預備則於彼處作壇應先求得地神聽許除乞土時若不別作地神預備唯作地軌次第即可弟子預備是於灌頂之前為令相續成受灌頂之器瓶預備又分二業瓶預備為除弟子及供物等不淨障碍餘瓶預備為灌頂時須用眾多水故求地神開許作儀軌之地須善作地軌故地軌為先雖久住地不須圓滿地軌然須知圓滿地軌之儀式此若不知設遇前軌所不能辦之地則將不知所作故當說廣儀軌此復先觀彼地可否作曼陀羅故須觀地知其可者須從主乞得其聽許故當乞地乞得聽許須淨彼地故須淨地既淨治已則須攝持作壇處所故當攝地所攝持地復須加持守護是故共有五種地軌修此之阿闍黎須先承事故修彼等先當承事總修承事雖不定須弟子勸請然為弟子灌頂等故而修承事則必須待弟子勸請故更須作弟子請師長法師長守護弟子法等此等是為弟子灌頂次第若修壇輪供養為天灌頂即是開光故以灌頂為主要義於灌頂儀軌支分中護摩與資糧輪儀軌及修彼時所需咒師之相鈴杵大小油杓骷髏杖等應如何製製後如何持用等皆應了知如是由灌頂力成為法器善護諸三昧耶聞思教義決擇修習上者現法即能成佛中者於餘有情起中有位而得成佛下者轉生乃能成佛若能知此諸道次第則善分別上中下三補特伽羅一切道要自修習時何道為宜引導餘人用何次第皆能善知庚三釋次第之道分四辛一成就修道法器辛二淨三昧耶律儀辛三住彼如何修道辛四現證所修之果初又分四壬一聞修咒道定須灌頂壬二灌頂師資須互觀察壬三觀知其可勸請承事壬四承事已灌頂之次第今初欲成聞修大密之器要得清淨灌頂是故灌頂即是成就根本若無灌頂縱能無倒了達教義精進修習終不能得殊勝悉地非但有不得大悉地之失縱得諸小悉地師資亦俱墮那洛迦如大印空點第二云若時諸師資先灌一次頂爾時即成為宣說大密器無灌頂不成如壓沙無油若無灌頂者慢心說密教師弟縱成就死亦墮地獄故應勤精進從師請灌頂金剛鬘經第二亦云灌頂為主要諸悉地常住我說如寔義故先應正聽若具慧弟子先正受灌頂於滿次瑜伽爾時成法器若無正灌頂雖了達教義行者師弟子俱墮大苦獄又云如咒能摧毒咒取淨精華弟子受灌頂未淨能令淨佛頂經第三云譬如家無子死後便空虛如是無灌頂諸智皆空無猶如琵琶身無弦不可彈如是無灌頂咒定不能成實無有灌頂愚妄說云有乃至佛在世師弟墮地獄無畏經釋中云决定當受一切灌頂是說須受一切灌頂之義釋難具智論中說初二頌配秘密灌頂智慧灌頂則第三頌當配第四灌頂佛頂曼陀羅中亦說如次配三灌頂乃至佛在世者具智論說乃至佛法住世而墮地獄自無第四灌頂妄云有灌頂故經釋則謂乃至地獄未空而住地獄自未能得灌頂妄傳他灌頂故以是未得諸上灌頂僅受瓶灌頂者對於聞修俱生自性圓滿次第法門猶非自在曼陀羅儀軌之金剛鬘論亦顯然云瑜伽以及瑜伽母續亦爾此謂妄作阿闍黎耶全無教證於無俱生灌頂及律儀者而妄說彼自性全非佛說亦非正理此破僅得明灌頂者便謂俱可聞說修習二續之執灌頂次第若未入壇令見本尊不得直傳灌頂便令修行如平等加行經第七品云若未入壇場捨諸三昧耶不知密真實雖修無成就又金剛幕經第八云行者未入壇未正受灌頂若未見善住或未燒護摩現世及後世皆無大成就以是未入壇者縱善修行亦無成就又於彼人開示道者如下所說犯三昧耶則前入自心之金剛薩埵不住而去如攝真實經云我今授汝此智汝入一切如來種性尚能成就一切如來況餘悉地當生如是妙智汝不應告彼未見大曼陀羅者犯三昧耶龍智及毳衣大師等所造堪為依據之曼陀羅儀軌亦如是說言見曼陀羅者釋迦親說是依儀軌入壇開示本尊謂於水灌頂等以前所入之曼陀羅非是泛說餘曼陀羅雙運明顯論云此諸灌頂入曼陀羅方可授與彼於解釋花鬘灌頂至第四灌頂後而作彼說故於入壇示本尊者乃可灌頂未入壇者定不應行又灌頂者未灌下頂決定不可授上灌頂是故於全未受無上部灌頂之初發業者若捨諸下灌頂及三昧耶與律儀等唯傳諸後灌頂而說諸道俱害自他凡諸閑教義者咸應棄捨若非爾者則應未成生起次第之器亦堪修習第二次第未得諸前灌頂亦應可傳第四灌頂以未得成修初次第器之灌頂即可傳授圓滿次第之灌頂故若弟子灌頂與諸上灌頂無定次第餘諸灌頂理應等故經說由秘密灌頂等成為堪修圓滿次第之道器者意謂已由前諸灌頂令諸有情成為修習生起次第之器若謂唯彼諸上灌頂即能成者則五次第等說後三灌頂於圓滿次第各別自在水灌頂等於修各部悉地各得自在亦應許彼無諸前者可灌後者又如福頂大師云雖行灌頂而難憑信如誑愚夫無所知識又以微小加持而代灌頂宣說深法應當棄此金剛乘之似法此說極是若以續部所說曼陀羅輪具足德相次第無亂圓滿儀軌而受灌頂乃生功德堪為真淨教授之法器等由餘儀軌不能安立四身果報殊勝種子亦不能淨障碍悉地三業諸垢亦不能成聽聞最勝教授甚深經論之器故於建樹金剛乘之基礎應多勵力壬二灌頂師資須互觀察分二癸一不觀察之過失癸二善觀察之方便今初師長若不觀察弟子法器隨人而灌頂者非法器者不能守護三昧耶故現後俱損故為非器宣說生多過失犯三昧耶遠離成就招諸魔害弟子若不觀察師相隨從何人即受灌頂為彼邪師所欺不能守護經說上師諸三昧耶斷壞成就招諸魔害生多過患故應互善觀察師長五十頌云師長及弟子俱犯三昧耶勇士先觀察師長與弟子金剛鬘經第二品云如摩瑩觀寶煉冶而觀金如是十二年應善觀弟子故應一切時如是互觀察不爾生魔碍招苦壞成就又五十四品云猶如獅子乳不應注瓦器如是大瑜伽非器不應與弟子剎那歿現後俱受損非器施教授師長壞成就大印空點第二品云如煆鍊觀金如智者觀寶如觀安樂女如是觀弟子故應俱策勵師資互觀察不爾便成過終不得悉地十二年者意謂不能速知由經爾久可得了知非定須爾久也癸二善觀察之方便所觀之阿闍黎有二一住咒生起次第之阿闍黎二住定圓滿次第之阿闍黎如龍智云佛說金剛乘有二阿闍黎一謂重持咒二謂住靜慮二師之相如云住咒瑜伽師樂緣天像修由此得行相當繪彩土壇行者住密咒具無二智行以如幻之身繪如幻壇場重持咒者非謂不樂修習以說樂修本尊瑜伽獲得心淨相故重咒重定二者非趣別道以修四座瑜伽堅固生起次第乃趣圓滿次第次第決定是聖父子所許要義生起次第之灌頂阿闍黎注重修習四座本尊瑜伽復須誦咒故說重咒圓滿次第阿闍黎傳授灌頂與前不同由住無二智雙運及幻身靜慮即可灌頂故說住定非是隨住何定皆可若是圓滿次第阿闍黎傳灌頂必具生起次第阿闍黎之一切德相並有增上功德此極希少若無彼師生起次第之阿闍黎亦具灌頂阿闍黎之德相故此當說觀察彼之方便此德相如金剛鬘經第六十四品云善息災等業知咒瑜伽軌此師可稱讚行施住淨戒具最勝忍進晝夜勤修行有慧善工巧具師長德聚說名阿闍黎內愛樂集密外作聲聞行以如是教授轉教諸弟子當知為大師此說戒清淨等具足六度且以集密為例內修無上乘道外順別解脫行如是引導弟子又說了知十真實等眾多功德若不能得圓滿德相如經說者當捨德失相等及多過失而依德增上者勝義承事論云濁世師長德失雜難得全無過失者善觀何師德增上弟子即應親近彼必不容少之相藏地諸賢謂得圓滿灌頂安住三昧耶與律儀親見師長傳承軌則了知十種真實善巧灌頂儀軌先修承事獲得本尊聽許或未遮止定須具此三法實應如是言住咒律儀者須未犯根本罪此最重要金剛鬘經第八品云善摧根本罪由經咒加行賜予世間樂如是為師長此說阿闍黎相須離根本罪故律生論第十八品云永斷根本罪亦離諸粗罪說此為傳弟子之三昧耶其傳授者尤應具足所觀弟子之德相者如攝真實會初品云入大曼陀羅者不須觀察是器非器此說入壇灌頂二者之中若但入壇則不須觀弟子之相如金剛生論云若不受律儀者不應教汝今等不應作阿闍黎隨許以及灌頂但令入壇此說若俱不能受持二種律儀菩薩律儀與密咒律儀唯令入壇投花示以本尊捨置安立三昧耶等佛密論師亦如是解大日經意扎拏經釋寶炬論中引真實光明論為據說斷殺者可如是行說灌頂者若但守護菩薩共律不能守護密咒律儀但傳弟子灌頂若俱守護二種律儀則可傳阿闍黎灌頂故觀能否護戒而為灌頂最為重要鬘論亦云若善觀察知彼無有憍慢等過住近事等律儀及淨修多聞等可受金剛薩埵律儀則雖族非高貴容顏醜惡亦應增上安住預備為弟子若彼希求金剛薩埵律儀信樂金剛乘不求餘大師此說上品希求律儀及深信金剛乘二法為可圓滿灌頂弟子之所必具金剛鬘經六十四品說具淨信恭敬師長常修善行無諸諂誑多聞聖教成就樂度諸有情心等功德相然若能守二種律儀皆可具足秘密總續說具貴族少壯多聞經論等德相已又別說云弟子成勝德支體無殘失無病族高貴信戒者希少若有信三寶愛樂大乘法好修福有情此等可攝受弟子若勤求修善逝密咒雖醜陋無德智者令入壇總續又云曼陀羅儀軌四眾樂大乘勤護所受戒說為共軌則此說若苾蒭等四眾各各勤行別解脫戒於金剛乘尤深愛樂則可作曼陀羅儀軌是故金剛空行母說不對苾蒭說真實者是指不信解大乘之苾蒭寂靜與無畏論師說第二句文是遮相違顯此大乘意業為主謂顯咒行與修別解脫戒二不相違壬三觀知其可勸請承事分三癸一弟子勸請癸二師長守護癸三先修承事今初如是觀察若知其可應請師長灌頂金剛空行四十六云為求繪壇故弟子應殷勤數數請師長謂應供壇頂禮長跪合掌如智凱論師云一切智大師普度三世尊生死泥淖中救我無依者請為金剛師如是三請五十頌云調伏於師前如法善披衣長跪而合掌三請欲聞等若知確是法器雖未勸請亦可教誡而傳灌頂大日經云又自觀有情知堪為法器無過具勝解淨信好利他知此弟子已彼雖未請白師長為饒益召彼如是告癸二師長守護金剛空行四十六云請已師問云資具皆備否若云有少許餘有未具足爾時阿闍黎應觀彼心意堅者知堅固動者知動搖雜者知為雜次於弟子足想弓形風輪臍間然智火光燄上心間熾然徧一切字變惡形罪性從鼻出次修忿怒像噉食彼罪業嗡班扎格尼喀喀喀黑喀黑薩嚩跋邦答哈答哈跋彌孤茹吽吽泮所修成天形安布諸守護此說攝受弟子金剛空行釋解彼次第云弟子作請白者謂阿闍黎願將一切有情立於無上菩提故問一切曼陀羅之用具汝皆備否若云有未備者爾時應於足掌想有弓形風輪於臍間想火輪其上想有日輪吽字由風吹動吽字燄鬘熾然心間字所生罪障自性狀如羅剎青色忿怒陰相長懸由心中起從鼻孔出吽字上至心間變成金剛藥叉藍色大腹獠牙前展右足左手持牙當心作恐怖印右手擎牙上舉從鼻追出念誦嗡班扎格尼等咒意想食彼罪障寂靜論師謂以左手作恐怖印豎立如牙跋嚩跋陀羅論師說次想弟子由桑字變成普賢為守護彼心故從普賢心出烏面母等橛上半為忿怒像橛下半為獨股杵形釘自心所出障礙主橛燄焚燒魔碍餘眾次想弟子心中吽字成金剛杵頂上阿字成月輪上有十字金剛杵杭字莊嚴烏面母等僅是一例變成金剛橛之本尊隨時所宜普賢者或如普賢修法二釋所說白藍紅三面其上二臂作抱持印右下二臂執杵及劍左下二臂執珍寶與蓮花天衣眾寶而為莊嚴或依餘教所說普賢而修堅固等三跋嚩跋跎羅說是觀察善不善等相鬘論亦云弟子臍間日上吽字光明照逼心間字所生罪惡黑如羅剎形極忿暴陰相下垂毛髮上竪從鼻孔出吽字上至心間變成下文所說吽迦惹像亦從彼出誦嗡松跋尼松跋吽吽泮泮嗡格哈那格哈那吽吽泮泮嗡格哈那巴耶格哈那巴耶吽吽泮泮嗡阿那耶賀跋伽聞毘黎耶惹某甲薩嚩巴𠳐那霞耶吽吽泮娑訶以所執熾然金剛杵摧滅所出罪業若先從二字變成吽迦惹與罪障次由吽迦惹光明追逐罪障從鼻孔出以金剛杵摧滅令盡意趣無違便於修習次想吽迦惹誦嗡班格利格拉耶阿薩耶薩嚩毘伽那奔答奔答吽泮而發教勅自亦如是念誦用上為甘露軍茶利像下為橛形之橛釘治弟子心中魔碍由橛猛利光燄焚燒諸餘魔碍次想弟子由桑字成普賢為守護故心間阿字生起月輪有阿字所變羯魔杵莊嚴頂上月輪有吽字所生五股金剛杵豎立杵臍有摩摩格三昧耶尊此尊心中有智尊摩摩格智尊心中月輪有金剛杵杵臍中有下說咒鬘從咒放出微細黃色金剛杵光徧滿全身而披甲鎧誦嗡阿香迦日馨底迦日姑札札姑札札姑札只尼伽達耶伽達耶姑札只尼某甲惹叉惹叉娑訶而作守護若更傳授軍荼利咒令其持誦則魔不能為害用具易得集密第十四品說此咒是摩摩格咒摩摩格者總軌中說藍色有黑白紅三面右三手持金剛杵輪及紅莖青蓮花左手持鈴寶劍此攝受弟子法是淨罪障魔不能害之大方便即於餘時若自若他亦可修作金剛鬘論於承事後乃說此法請已承事之阿闍黎即於請時可作若在未承事前請者亦可即於爾時作法是故次第不定癸三先修承事總言承事即二次第如集密後續云由共勝差別承事有二種共由四金剛勝由六支分故得灌頂住三昧耶律儀漸次學習二次第之承事即修自道豈可灌頂開光等事乃須承事非自修耶是故然燈賢等眾多智者於承事時圓滿宣說本尊瑜伽其後乃說曼陀羅儀軌意謂為他灌不灌頂及修共勝悉地隨一皆須修習四座瑜伽若未承事即傳灌頂是為自害集心論云勝曼陀羅師應先勤承事次於曼陀羅善觀察調伏若未事本尊徒為自損害黑行論師亦云若未承事本尊則自損害鬘論亦云知一切智道應先修承事集福破魔軍離承事無成了二次真實安住遠離處應修本尊輪勞時誦密咒誦壇主一億或本尊十萬眷屬各一萬此名先承事此說為集資糧及破魔故先修本尊與誦咒等承事賢攝受經有彼頌文故先承事最為切要為傳灌頂與開光等承事本尊之量鬘論中云若由如是廣修承事能剎那頃圓滿收放曼陀羅中一切諸尊瑜伽若住壇輪諸尊未遮或由積集資糧而得開許可行入壇開光及攝受徒眾等此說勤行四座瑜伽修本尊慢與明顯相為主要之承事此如何修生起次第時當廣說如鬘論說持誦之量四百五十頌中亦云誦壇主咒億或本尊十萬餘尊各萬遍或壇主開許此謂若得正尊開許雖未滿數亦可壇繪寶金剛師與隨鬘論行之補底論師亦說隨誦壇主本尊滿一億數二觀察經中初觀察第十品云壇主誦十萬壇眾誦萬徧毳衣論師持祥論師亦作此論故現說經四十九品說壇主與本尊誦十萬者意謂隨一又鬘論頌是引賢攝受經故彼經於壇主本尊俱說誦十萬者理當譯同鬘論日生月足慧鎧所造之曼陀羅儀軌雖亦俱說壇主本尊各為十萬然當依止然燈大師而為定量勝樂法中黑行論師與答日迦跋說正尊父母各誦三萬三輪四十八尊各誦二萬大樂輪與三昧耶輪十二尊各誦五千五百遍答日迦跋又云住中或略法壇主誦一億空行誦十千令諸尊歡喜上智誦一萬護摩善供養藏地智者解釋此義謂十三尊或五尊者壇主十萬眷屬各為一萬通一切尊共誦降智真言一萬以彼持誦十分之一而燒護摩然除時輪法類說以降智念誦十分之一而燒護摩及律生等說修息災增益等成就時須以念誦十分之一作護摩外堪為定量之曼陀羅儀軌皆未說曼陀羅儀軌前之念誦須以什一而作護摩故不須也以是答日迦跋所說是為懺除儀軌增減念誦增減過故修念誦後所作護摩非什一之護摩如金剛藏莊嚴第七品云密咒有增減皆以護摩滿隨順佛頂骨經之曼陀羅儀軌有云如經所說軌住生起位師持誦壇主數隨福上中下兆億萬能成眷屬是主分不須別持誦若見開許相誦未滿亦成跋嚩跋陀羅師亦云次誦自明一萬或誦十萬或百萬遍說眷屬是壇主支分故不須別誦者勿即以為事實如是彼意或約究竟至於空性於無二智現為能依所依之理獲得堅穩定解者說應更詳察所誦真言如黑行論師云勇識心真言應誦三萬遍此說心咒四百五十頌云出雜三真實此說班枳等出生咒中雜以三字嗡阿吽為承事時所誦真言不空足論師說持誦恐怖十字心咒十萬故行灌頂等法鬘咒等諸長咒非所定須律生十二品云善時所誦一具三誦二倍具二誦三倍惡時誦四倍有謂經說正尊誦十萬及眷屬一萬者當增四倍然非經義律生十一品說正尊父母與空行母等四眷屬修此六尊於取寶藏取精華時心咒誦一億遍心中心咒誦三億等所誦什一而作護摩釋論謂此依於圓滿世說所引經之釋論亦說言持誦一億二億等者是依圓滿世說故當誦二倍等此說顯是修悉地時作曼陀羅儀軌前之念誦曾未作彼說故其餘堪為依據之曼陀羅儀軌亦未說如是建立故有云灌頂即為弟子消滅罪障增益功德治魔碍等故是修息災增益等悉地之時此不應理若如是者初承事時一切誦修皆有彼義彼等應亦是修悉地之時眾多經教皆說先作承事次修悉地分為二時應俱違一切也修承事之差別勇識金剛說有三種一見相承事謂由修習四座瑜伽見煙等相二時期承事謂修一年或半年或四月三數量承事謂誦正尊十萬眷屬一萬隨修一種即可毳衣論師則謂如云壇主誦十萬壇眾誦萬遍由持誦故或得相狀或得自心清淨穩固是先承事此說由數量念誦與修天瑜伽須得本尊開許之相或得心清淨天瑜伽堅固二者隨一持祥論師亦如是說故若未得本尊開許誦數未滿說經年等三種時量隨一修習即可作法不應正理見相承事有二若未獲得本尊開許之相獲得自心清淨相者亦應誦滿念誦之數又龍智云愛樂修習得相可繪亦說安住念誦四百五十誦云住輪如理誦得相後正繪此俱說二事故正念誦者謂各座瑜伽時意不散亂遠離雜言如諸念誦修法所說而誦餘時隨便念誦不足為數下當宣說念誦儀式慧祥論師謂於作壇之處繪曼陀羅塗香聚花於彼修本尊而念誦恐怖天謂若無自在可略修念誦想本尊聽許其天亦可單修一尊然彼全無可信證據故不應如是行藏師有云或修為瓶或修前起而修念誦然燈賢等諸可依者多說如現觀時所說而修念誦未說餘法是故總修本尊四座念誦與為灌頂所修四座念誦全無差別又有藏師說雖一曼陀羅每次灌頂皆須圓滿念誦一次實如上說念誦一次即彼便足然說先修念誦承事至灌頂時亦應觀夢須得開許或未遮止應如是行若於別尊異曼陀羅則須別修念誦惟除恐怖金剛許可但修一尊念誦餘尊主伴俱須圓滿誦也
