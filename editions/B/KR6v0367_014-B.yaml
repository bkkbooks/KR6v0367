body:
  text: 宗喀巴大師造法尊法師譯明上三灌頂後依及結行儀軌品第十之二酉三慧智灌頂分二戌一明慧智灌頂戌二明第三灌頂之智今初秘密灌頂之後弟子先以菩提金剛等文請白師長師長次以前所供養具三昧耶與律儀之明妃或其餘有妙色像者告云此悅意色像佛觀汝應依輪次第結合當受勝妙樂由金剛跏趺心入摩尼中令其了知而與弟子前所供養雖是師長明妃然可還與如集密後續云淨信慧廣大色妙恆樂修一加行修習具三昧耶者弟子將供事供養於師長師長加持彼應授與行者毳衣持祥日生等說明妃須住三昧耶及律儀善巧四種瑜伽三三摩地故若不具律儀即不堪為明妃輪謂毘盧等與明妃之輪次第結合謂鈎召攝入及從金剛路出等此六句義出口授論由金剛等二句顯示由受安樂而明第三灌頂明妃以紅花等妙香塗飾裸體水生示弟子曰希有妙蓮花具一切安樂若如法依止我常住彼前親近諸佛等如作蓮華事自在大樂王恆於此中住奔木义賀此頌及咒出口授論彼中問答此處未用儀軌中謂自與明妃生為本尊加持金剛及蓮花等毳衣師云承事佛等事謂在蓮華行文顯易解木义義謂解脫即離一切戲論本尊色身鬘論言由師長說者謂彼明妃所說諸義師長為之解說或由師長說此咒語奔謂應依止即應依止解脫次修弟子生為天身慧母生為天女鬘論未明生為何尊父母難勝月說生為彌陀意為是貪金剛明顯雙運說為寶生意為集密中說由寶生門持隨貪慢寶鎧師說生為勝樂父母若如此者則可隨時生為該尊父母除密灌頂此及以下鬘論與隨行者皆未說須繫縛遮面次修吽字所生金剛嗡字所生摩尼金剛口邊有黃泮字啊字所生蓮華蓮華鬚有啊字莊嚴釋云應正策發策發何事謂於左之左脈左謂此中明妃彼身左分之脈名金剛界自在母脈如大印空點第二云蓮華藏中央金界自在母乃至未獲此餘事無菩提彼性歡喜色細中細最勝口授論云當求三那利金界自在脈離取婆伽中由師教授力須以指了知尋求之法謂食指端及於舌端想有紅色什字先誦希達而正策發至有所說相時念誦嗡希希希哈哈哈娑訶及嗡薩嚩達塔伽達阿奴惹伽拏班娑跋嚩阿摩郭吭真言由師長教授力了知四喜差別由自心間種子光明請如來等加持自身入於身中師長亦令毘盧及佛眼等無量諸尊入內等同一味發起歡喜戌二明第三灌頂之智分二亥一正義亥二斷諍今初若謂此處須以師長教授了知四喜差別四喜云何如穗論第五云此從波拉根本從密蓮華金剛摩尼生前歡喜等三於摩尼中生俱生喜此是一種建立又引時輪宗云液始從髻處至毫蓮為喜勝喜與妙喜從喉心處生臍處起離喜乃至密蓮華至密金剛寶俱生喜不出前者從金剛根本起未至摩尼中央隨處所別生三種喜由斷上上品及上品中品三粗分別安立歡喜勝喜妙喜雖有微細下品由無粗者立俱生喜分五品分別教誨了達諸教授者亦是前論所說四歡喜中安立何者為第三灌頂耶如鬘論云由慧合吉祥正表示真實從金剛跏趺心入摩尼中又云真實謂一切法不可思議順彼影像俱生歡喜自性慧智說為真實謂四喜中立俱生智為此慧智生起之時謂菩提心至金剛摩尼未出之際有許俱生喜為第三妙喜為第四者此為教授穗論所破此所破是寂靜論師所許毘布底師亦說菩提心至金剛根本為喜至中央為勝喜入摩尼時發俱生喜於離喜前及勝喜後中間而生金剛跏趺謂住摩尼二鼻孔內停息之時毳衣大師說生時與體性同前四歡喜中說於勝喜離喜中間而生薩惹哈師亦說俱生智為第三灌頂若傳女子灌頂於金剛處當知為蓮此如妙吉祥口授論第三灌頂時云由虛空界金剛荅具正眼者生大樂若於正喜離欲喜見二中間遠離堅蓮空金剛摩尼寶蓮藏二合金剛趺若時見心入摩尼知彼安樂即為智此是圓滿次第道最勝師長共宣說貪離貪中皆無得剎那妙智於彼顯八時一日或一月年刼千刼受此智正灌頂時受須臾頃正修習時長時領受經八時等第三灌頂之俱生智若安立為証真實者則與第四灌頂樂空無別之俱生智全無差別若未証者則與多論所說為於弟子欲以殊勝方便表示真實義故傳此灌頂及說由修第三灌頂所表詮義能証真實皆成相違茲當解釋例如二次第道隨彼補特伽羅根性次第說有勝劣多種如是灌頂詳細分別隨根性門亦有多種得法然總經論要旨第三灌頂之俱生智要能通達真實如口授論開示從色乃至一切種智法性真實法雖本來如是然為有情障過之所覆蔽流轉生死故須通達真實通達彼之方便以多道理說是明妃於傳密灌頂後次云次為知自覺喜法身徧空名曰增上天故授彼童女以此等傳第三灌頂其次乃說生俱生智如前所引故為表詮真實義故傳授第三灌頂最為明顯此非但由菩提心至摩尼以泮字等阻令不出住須臾頃息滅眾生粗動分別發生安樂無分別心以唯彼心雖無通達實性見者亦可生起以彼未達真實義故口授論云法身喜徧空死悶絕睡眠呵欠及噴嚏剎那能覺知此說死等五位亦能覺受法身此於息滅粗動分別假名通達真實不則應諸有情不待功用得解脫故故俱生智是於通達真實得正見之弟子先由師長曉示第三灌頂之智於何時生次於傳灌頂時由依明妃於摩尼中持菩提心息滅粗動二取分別憶其正見說此念住正見之智名曰俱生非唯身心略起樂受亦非唯由彼力令心無分別住然於未善了解真實見者則須於生樂無分別而明第三灌頂以是住正見上第三灌頂之俱生智是否現證真實是最大妄分別生處以想爾時通達真實須無分別離分別智何故不能現證自境由此故起邪執若無正見則於無我心未趣向故計彼智即為現見無我義智其執反少如穗論第五云彼是見道耶曰非爾此破印度有諸智者串習密咒許以第三灌頂之俱生為見道故此應知表示實義之智與彼現證無我與總相通達之差別現證真實之時是無作之俱生未現證時但以勝解作意悟入真實是有作之俱生後即第三灌頂所說如穗論第五云暫受樂時未見真實但由增上勝解修習一切勝事相應不離大悲之空體性証真實時是出世間無諸功用由無造作故名俱生未證真實所領受者有漏非堅未能增廣不徧諸支猶如電閃剎那即滅是世俗性有諸功用雖是造作亦名俱生第三灌頂之智內有二分謂證空分與安樂分前者又名為金剛持安慰後者又名不動安慰即前論云真實安慰說有二種以大樂智與真空體互相印持是不動性與金剛持性故決定出生如來與金剛持由得彼道故能出生如來安慰與金剛持安慰如云方便彼生別第四義二種一如來悉地餘為金剛持第四謂第四俱生喜總謂自與師長所授具德相之明妃生為本尊父母預備金剛蓮花為先了知發生慧智之界及明爾時安住正見有樂之智即為第三灌頂若唯依智印灌頂者亦須明了觀想自與明妃成為欲天父母持天慢等勝解父母等至生菩提心至摩尼中從此生樂次應令憶正見安住其上曉示灌頂由修如是灌頂時所曉示之俱生智能生果位俱生故灌頂時必須悟入真實義之俱生如穗論第五云此俱生所起真實菩提心空性大悲無別離於慧智為別有餘法耶答曰非餘即唯除彼慧智所有逆品說如是相此是自性最極明顯此明顯說唯由修習第三灌頂身中所生俱生之力令離垢障即是果位俱生自性珍珠鬘論亦云然諸如來所有自證法身俱生量等虛空此之等流報身俱生第一殊勝最極清淨堅固樂相彼俱生喜是此中所修者彼非餘事即於世間俱生歡喜如其教授勝解修習修習圓滿即得現証唯自能知而非先有又云由彼了知俱生歡喜更是餘者以是果性之俱生故由彼行相隨順菩提性轉故說生為果性此等於依明妃生四歡喜時說由此中曉示弟子與業印明了觀為本尊父母入於等至生起俱生喜時安住正見則亦當了知行者與業印或行者與智印或行者與空色明妃明了想為本尊父母入等至中起俱生智以彼同於明想本尊父母入等至時所生空樂獲定解故如於白牛决定牛相則於彼類一切皆斷疑故如是依止明妃發俱生者是由依於和合作用上下弓形業風吹燃臍部猛利之力溶化頂上之菩提心由風下吹安住摩尼而生口授論於第三灌頂時云精律動弓形三义智火熾界化十六分猶如拘摩陀由風加行催自性善寂靜唯法身寂滅樂住摩尼中剎那無念動即是大修行故說以脈息空點等無量瑜伽令風吹入中脈由彼作用猛利熾然溶化頂上之菩提心引生三摩地門然彼皆由曉示灌頂宗要於俱生現起時憶念通達真實義之正見將護修習不應妄執唯滅粗分二取分別所生之三摩地即為俱生之義亥二斷諍第二觀察經說是大種安樂故非真實樂由俱生所生說彼為俱生名自性俱生此說依止大種之樂非是真實俱生又智成就亦云二根所生樂惡說為真實勝佛未曾說彼是大安樂凡因緣所生皆不名真實若第三灌頂之俱生通達真實義者寧不與此相違答云無過彼諸經文是破道時之俱生智為自性或自體之俱生智非說第三灌頂等之俱生不達真實或說彼中無俱生智此如智成就經後云以彼樂一切皆非自性有諸善逝正智是了知自性一切樂中尊故名為大樂大樂非無常大樂恆常住破彼非真實樂真實樂是佛地之所有故故若引彼經文以破通達真實之樂則應許一切有學道皆無彼樂故真實樂及名自體俱生或名自性俱生義謂不待功用因緣盡未來際任運相續珍珠鬘論解釋名自性俱生云俱生自性謂此自體生起不待餘緣依止前因一剎那心生起諸餘剎那有如是自性者是名俱生與心剎那展轉增上乃至虛空未盡而生又云俱生有二謂暫時與常住其常住者最為第一以是最勝真實無盡及無壞故此於相續不斷及無窮盡說名為常若謂即初剎那於二剎那安住名常是為外道惡見種者是出生義由是因緣和合所造故是無常大是極義總謂極力所修之無常樂上是珍珠鬘論所釋教授穗論解大種樂非實之義亦謂非一切時恆起俱生若謂第三灌頂是樂空無別之俱生則與第四灌頂無差別者是未了解第四灌頂之談至下當釋時輪本釋說於出家唯以語表傳授第三灌頂故可智印以傳灌頂鬘論說若勝出家身無餘遮緣可實灌頂若有遮緣及非勝出家身應以智印而傳灌頂准此道理以出家身作密灌頂之阿闍黎亦當了知如是第三灌頂之時隨力所能持菩提心不能持時徐徐放捨從水生中持味取起由真實見飲三昧耶自性大菩提心於何曼陀羅中得此灌頂七加行云於清淨婆伽曼陀羅得此謂於婆伽曼陀羅得自性如前經云彼之自性者意金剛自性日生說為法身自性意為已得証彼之勝功能所淨亦如七加行云貪心等前後清淨不生罪三昧耶亦如前經云遮繪壇塲等授最勝律儀答日迦跋說見女人左繞三匝作請白等為三昧耶於修何道得自在者如前經云方便殊勝故正住如金剛修勝悉地故漸依禁儀軌達諸法遠離能取所取體謂於二取空之光明又名金剛喻三摩地集密後後續釋中云弟子依於內外現証菩提次第以貪離貪及中庸貪漸次現証光明智慧修成大印故應先得慧智灌頂說此灌頂表示第四光明修習大印慧智灌頂嗢柁南曰供請授明妃生天加持密等至發俱生飲心釋灌頂酉四第四灌頂分二戌一餘經規戌二時輪規初又分二亥一明第四灌頂亥二第四灌頂之語云何表示今初鬘論未說請白當如答日迦跋所說三返白云由師足蓮恩得主三灌頂今日第四寶願垂恩救護結合經云若信解深廣語授寶灌頂謂觀弟子於深廣法有無信解若信解者可以語言傳授第四灌頂毳衣大師引經文云由烟知有火依水鳥知水菩薩具慧種由諸相了知面淨若蓮華歡喜諸毛豎智者見彼相攝為勝弟子以此方便觀察即能了知弟子意樂次釋應可授與第四灌頂以何授與唯以語言此中遮詞意謂非如第三灌頂可領其義以語傳授之規如云即彼慧智菩提心芽由善修習令彼增長成就無障真實一切諸法不思議性具足七支大印大金剛持自性說為第四灌頂義謂第三灌頂所說之俱生智猶如勝義菩提心之苗芽由修習彼展轉增長成就一切障盡不思議之真實自性總謂由依明妃得表實義俱生之智相續修習乃至障盡法界明了無別之智現起具足七支大印天身即是第四灌頂此中所明第四灌頂寶鎧與毘布底亦說亦是毳衣大師所許如彼曼陀羅儀軌引教云第四灌頂由師口授知者如說即彼圓滿諸義由離分別垢濁不異無上正知諸能仁眾無量光明曼陀羅體如如意珠以自性語而為授與言即彼者即鬘論說即彼慧智之義離分別垢濁不異無上正知者謂不異離垢真實之如所有智諸能仁眾無量光明曼陀羅者即是色身持祥於紅黑大威德曼陀羅儀軌亦如是說七支如語自在稱云滿報結合樂無性悲滿不斷及無滅我許所修七支義遍修正量智者讚圓滿報者謂是相好莊嚴之身亦攝法身及化身以三身無異體故結合者謂與同等明妃而入等至若唯報身波羅密多中亦宣說以此結合即勝彼義何為須爾唯以徧一切身歡喜自性即能成辦一切有情利故佛為攝受欲界增上貪行有情故現等至幻師所化男女稠密不生大樂從此則起故云大樂領受身樂為樂領受心樂為喜大謂最廣無漏殊妙盡未來際為顯彼佛是無自性非執實有故云無性般若經云佛亦如幻如夢設更有法勝涅槃者我亦說彼如夢如幻七加行云行者於諸法善遮顛倒故當說四加行又云一切諸法中說無性為主以諸法王子由修此成辦一切佛圓滿其無自性是具一切種最勝之空性空華兔角之空是無所有不可現証寶頂經說不離布施乃至佛法之空是具一切種殊勝之空性故報身等與布施等諸相是為最勝以彼等相勝出瓶等諸餘相故具足彼諸相者是具一切種之空性如無身相則不能饒益有情如是若無大悲亦不能利一切有情故云悲滿無緣大悲如如意珠無分別中利益有情言不斷者謂受用身具足如上所說功德恆相續轉由是不住寂滅與三有之大涅槃故常恆無斷非有時轉有時不轉間斷之法言無滅者謂彼報身非暫時住即便斷絕盡未來際隨大悲轉及諸有情無間斷故具上七支語自在稱許為咒道所修之果非但如是亦是遍修正量正慧清淨智者之所稱讚若約非是轉止有間釋不間斷則與無滅之非暫住即壞全無差別應成六支然不間斷亦通化身無滅則謂盡未來際不入涅槃故有差別七加行說無比安樂圓滿報身大樂法身及大悲體性之三身相續為前不斷之義又云無比樂報身遮止捨離故宣說七加行於後者說盡未來際而恆安住義理全同教授穗論破他謂前五支不共波羅密多自許初三不共後四支共亥二第四灌頂之語云何表示七支為無上道所修雖實是汝所許亦他智者所讚然立彼為第四灌頂以何証知如七支論中云具如是言故具亦言義故作爾言義故我許四如是此義謂諸經云如是四亦爾謂於第四灌頂之時以彼慧智為喻表顯第四灌頂解釋彼文如是爾亦三義成立第四灌頂即為七支是故我許第四灌頂如前所說餘人所許缺二支等故不應理言如是者顯示第三第四相同此如七加行云大金剛持身觀視無厭足現三面六臂具勝抱明妃如慧智灌頂安住如是相謂如第三灌頂之時自為本尊父母住等至相第四灌頂亦如是住此明第四灌頂具足報身結合二支七支論釋解如是言雖說是由金剛蓮華觸所生樂然葯足師所許應是如前所說父母等至之相以此二師於此等義意趣同故亦者顯示非唯第三有樂第四亦有復勝前者是為大樂故說第四具大樂支勝者謂有廣大無漏微妙無斷盡未來等殊勝此非第三灌頂所有以彼是由業印所生唯剎那頃是有漏法以有業印猛利抱持等苦故非微妙唯住摩尼不遍諸支故非廣大唯住短時故非無斷羯摩印行是無常故亦非盡未來際要由修行現證之時方能成無漏等七加行於說是否大樂後又云然於慧智中住大樂相似又云雖不住無欺故亦名大樂說住第三灌頂能示大樂體相雖不久住然由具足彼支修習於得大樂果無欺誑故亦立大樂名大樂支者諸支中主餘是彼分是故七加行云應知餘加行皆此加行分爾者謂如第三灌頂從善巧三三摩地之業印與方便等和合而生如是第四亦與彼同從於方便智慧和合而生非餘能生語自在稱未明顯說第四灌頂具足餘支之理意謂已說第四灌頂具足報身結合盡未來際大樂三支具餘支分亦易了知七加行中於後三支配於第四第三灌頂惟未配第四支亦多有作第四彼亦爾者亦應善知彼等第三第四灌頂法喻配合具足七支第三灌頂之時自身現報身相此後不離佛母現為父母互抱持相於彼定中心住了達諸法真實之俱生智取彼二者為喻決定第四灌頂之理謂由修方便支最後自身成就相好莊嚴報身及以結合二支體性非唯勝解修為佛之色身此心亦非暫住真實謂是盡未來際所有大樂與無自性二支體性明此雙運即是第四灌頂以是修成圓滿次第法器須由三種灌頂之理亦可了知以圓滿次第之宗要定須自身加持世俗如幻四空次第勝義光明以及外身如幻金剛薩埵之世俗身內心達真實之勝義光明二無分別和合雙運三種圓滿次第自現本尊父母於除庸常慢念之中由內阿吭等至引生歡喜及勝喜等修俱生智第三灌頂已盡决擇第四若無異前决擇之法則仍不免相符極成若爾不許道位有第四灌頂耶不爾謂傳第四灌頂之時如前曉示唯以語言令生了解即為弟子傳彼灌頂弟子亦唯由於語言立為得彼灌頂是為成法器之第四灌頂如是第四灌頂須為曉示第四灌頂之要故如上引多是曉示果德然非道位全無如集密中有學雙運及時輪中三摩地支准彼道理餘亦應知第四灌頂順分生起次第亦有以咒所修七支而為第四灌頂生起次第道中亦須修彼七種支故云何名有順分此如七加行云無比樂智身吽等生天相四成住二身亦無二加行加持天女身明儀軌清淨是大樂體性大悲增長體餘軌中顯示所說勝空性是無性加行於最勝業時不住上四故是無斷無滅如是集密中分別瑜伽師依生起次第受行第四義言四成者謂以四支修行所成儀軌清淨謂隨貪行餘執謂最勝曼陀羅言集密者唯是一例於餘修法亦當了知若具七支雖是第四以彼灌頂云何應理譬如水灌頂等由能淨垢立為灌頂如是所修七支能令畢竟無垢故為灌頂如集密後續云灌頂分三種瓶灌頂第一密灌頂第二慧智為第三如是四亦爾此續中善說彼豈非說三種灌頂云何引為第四灌頂之據豈謂聞說如是四亦爾耶雖聞是說慧智灌頂亦名第四豈世尊語而有欺誑如何即以第三說為第四語雖無欺以諸憍慢自謂智者欲離師教解金剛句為令愚蒙故於第三說第四名佛豈不具大悲愚蒙有情自作師慳云何應理總諸續中隱語雖多是為令依師教非令有情心生愚蒙故破應理若謂由修慧智現証之時立為第四是則證與未證二事各異非即第三立為第四若謂佛意四異三者云分三種與義未合以灌頂有二時未現證時有三証時有一故無過失然成就法器之第四雖非現證而是以語傳授第四非實第四故無過失有謂語自在稱論師許以住金剛端俱生喜為第四灌頂此是未解彼論師教而作是說七支論自釋云彼離七支我不說為第四謂作如是說者不解我意由諸續說第四灌頂猶如第三唯說與彼相同未明顯說相同之理故在印度凡十七家有說第三住摩尼樂從彼出菩提心即為第四有說第三灌頂無間舌嘗菩提心為第四有說第三無間用餘明妃為第四等觀察彼等分別臆計故說我不許為第四以彼離七支故其中有說慧智無間通達一切諸法虛妄之見為第四者及許專修空性大印為第四灌頂者以說慧智無間故於樂上有空印證意為即是樂空無別如斯等類現見實多或以樂空無別或以二諦無別或以方便智慧雙運目為第四灌頂彼於無別雙運之理未能決斷妄於量所不成增益許為經義破彼執已無倒顯示第四灌頂之義造七支論本釋真實寶光明論本釋以及七加行等明了决擇毳衣持祥無畏師弟皆如上說决擇第四灌頂此理與時輪合下當解釋戌二時輪規時輪本釋如前所說瓶等四種灌頂有二傳法二瓶灌頂前已說訖為聞經等所傳前密灌頂除說由覩業印婆伽獲得歡喜餘皆同前為講經等所傳後密灌頂謂由師長與自十二至二十歲九明等至俱種金剛注弟子口依彼灌頂如是第三灌頂前者與一明合受妙歡喜後者隨與九明等至即由彼彼所生妙喜第四灌頂前者由菩提心住摩尼中不外漏注俱生歡喜是謂世俗第四灌頂此於其他咒曼陀羅儀軌說是第三灌頂若但得彼未得後者第四灌頂聞說一切經等猶未自在由時輪中得此灌頂雖可聞一切經然以未得上上第四灌頂仍不能講一切經故能俱講說一切經者須得第二瓶灌頂密灌頂慧智灌頂第四灌頂前三餘經儀軌未曾宣說須得後者第四灌頂則與一切經同餘者易知勝義第四灌頂或名出世難了解故今當解說如大疏云笑視執手交會四種灌頂非真實義此中真實義者無互抱持觀從業印之所生者非無二智所說真實義或勝義第四灌頂為無二智所無之二多次說為樂空經云從彼無轉涅槃樂俱生不變為第四此說不變之樂名為第四故非任何安樂皆可要是三摩地支以上安樂與彼安樂無別之空亦非任何空色即可要三摩地以上空色第四灌頂之樂總有勝劣二種勝者如大疏云大印般若波羅密多不變大樂最後剎那現証大菩提相無有間斷此是世尊菩提樹下所證即得第一灌頂此說果位第四為第四灌頂之主要最勝如是果位樂空無二第四灌頂無二之理又復云何經云身淨無諸塵等空相圓滿種種徧三世離障如夢見語無斷非一餘語他心轉心樂滿無動諸時俱生持此明果位身語意時說身空色離微塵聚清淨無礙等同虛空相好莊嚴心為不變大樂身空色自性之智身與通達諸法真實之樂心自性無別雙運俱轉成為無二以是道位烟等空色上上轉依成一切種相好莊嚴之身經云地入水中水入火火入風中風入空空成十相相轉成一切無盡勝安樂不可摧壞智慧身由智成就妙悉地士夫能於此生得此宗樂空之空多說空色故多說彼名有所緣以現顯色形色相故不變樂者謂達真實義慧故多說彼名無所緣故不應執於安樂上有見印持便為樂空無別此與餘經所說空樂略有不同如大疏云雖有行相而無相世尊慧母所抱持具離生滅不變樂笑等安樂永遠離能生諸佛具三身正等覺了三世法遍智最勝第一佛無二世尊我敬禮此說空色明妃抱持行相固具結合大樂無性等支不論報身有無其名其義已具是故果位第四灌頂具足七支與餘家同劣者道位第四灌頂從隨念時輪中位次專名後現無分別空色欲天父母之相故於三摩地時輪中位次專名位亦有說自彼等位後由空色大印成辦不變樂者非謂任何空色皆可要是現為空色雜母明妃爾時雖非真實成為空色天身然於不待觀察心中即如是現故於如斯空色不變大樂同一智體二無分別名為第四灌頂是故不應偏執安樂或空印證等為第四灌頂以大疏解俱生不變即第四云離羯摩印與智印因空一切種最明顯相多次宣說空色合故其身能不分別現為空色之天與心生為不變樂體從得三摩地支乃有依此安立道位第四灌頂之理如是應知由善分別曉示彼諸關要乃得第四灌頂其於唯不變樂或空印持曉示為第四灌頂者是未能知經釋關要如是勝義第四灌頂不論取否第三為喻總須身心雙運則為此宗餘經所同然時輪於第四灌頂多諸特說如是師長若於弟子善能如前所說曉示由能略獲彼解即從語門獲得第四灌頂此於勝義菩提心曼陀羅中得能淨三業微細障垢堪能修成三種金剛無分別身於修雙運圓滿次第而得自在諸灌頂中須說清淨乃是答日迦跋所說此灌頂之三昧耶者如答日迦跋云汝可殺有情受用他人女不與汝可取一切說妄語嗢柁南曰於請白弟子以慧智為喻七支果灌頂定解授清淨申三灌頂後法分二酉一禁行授記酉二隨許慶慰今初此中授三禁行授明妃禁行者謂第四灌頂後將明妃手置弟子手以自左手執彼二手以右手持金剛置弟子頂教云諸佛為此證我將伊授汝謂以諸佛作證非他法成佛此能淨三趣是故汝與伊終不應捨離此是一切佛無上明禁行若愚者違越不得上悉地授與明妃禁行除三趣句集密後續亦說唯文稍異如集密後續於第三灌頂授弟子明妃時說此諸梵論中亦多如是唯此論師別造傳授明妃禁行儀軌捨去具相明妃以他方便不能速疾成佛答日迦跋說能清淨三趣義謂三趣由此清淨故汝不應離此明妃由具相明妃修行大樂三摩地是一切佛無上明妃禁行若有愚人違越如是欲塵修道彼於現法無上悉地以彼是近因是集密中位次專名故授金剛禁行者次生弟子為金剛薩埵身令持金剛告云此彼一切佛在金剛心手金剛手禁行堅固汝應持弟子應誦嗡薩嚩達塔伽達悉地班三昧耶底义伊喀當答惹耶彌班薩埵黑黑黑黑黑吽接而執持此頌及咒出攝真實經第一品及幕經第四品此者謂在自手彼者即指金剛如云彼菩提心即金剛故彼為何事謂彼金剛是五佛之自性以此一切佛自性金剛在金剛薩埵手中為證彼故汝亦恆應守持是佛禁行是金剛手禁行非他能壞故名堅固禁行之義謂為得一切如來悉地故決定應作如真實光明云不棄捨金剛金剛灌頂是以生為彌陀所出金剛交與生為彌陀弟子之手安立妙觀察智與彌陀之功能金剛三昧耶者是令憶念金剛真實將從吽字所生金剛令生為金剛薩埵之弟子執持金剛禁行是於生為金剛薩埵弟子為令了解證得金剛薩埵方便持不離五智之金剛彼三差別如是應知弟子持時所誦咒義謂此一切如來所成之金剛三昧耶入於我中金剛薩埵應當受持天種慧師說五黑字表鏡智等五智吽字表示清淨法界行禁行者以佛頂或勝樂或歡喜金剛等隨一心咒加持喀敞迦絳得鄔蓮華器等三遍告云金剛薩埵印外內皆正住故授杖鼓器勇士應受持令其受持器謂顱骨如是授與是鈴論師灌頂儀軌中說此金剛薩埵印顱器等有內外二印為憶念彼故應守持除彼三物餘經說有餘行支者亦以爾時主尊心咒加持三遍如前令持此如集密十六品云色持頂髻冠廣大同白色如法作一切咒律遍防護諸莖根果實受一切嚼噉此說由受明禁行而作行禁行於彼第四第五句間說身語意金剛行者各與自部明妃同行意即在此隨是男女凡請行禁行者女應生為金剛亥母或無我母或投花部之天女身男可生為勝樂歡喜等身從自心間種子放光召入智尊如第二觀察云輪色為不動耳璫體彌陀項鬘寶自在手釧念毘盧腰縧住不空頂輪耳璫項飾釧鐲寶縧如其次第剎那想成不動彌陀寶生毘盧不空佛身於彼召入智慧薩埵由不動等轉成輪等諸印信解為不動等體性三誦嗡答惹答惹答惹耶答惹耶摩惹答摩惹答班枳泮娑訶真言加持寶輪誦金剛薩埵頌置彼頂上三誦嗡班達摩三昧耶當呼嚕呼嚕阿熱利泮娑訶加持耳璫安雙耳上三誦嗡班蘇耶達末毘答摩那三昧耶當阿杭惹那枳泮娑訶加持項飾帶於項上三誦嗡夏穴達跋惹摩夏穴達厄訶耶黑唧那唧吽泮娑訶加持雙釧帶二手上三誦嗡樸樸黑黑黑般若枳泮娑訶加持寶縧繫於腰間授女眾時頌中勇士改為天女正住句後如其次第改為輪為不動色雙璫語金剛項鬘即寶生手釧常住體腰縧不空成誦金剛薩埵頌而授五真言出金剛幕經第九品即餘經所說行支亦令受持之義次說男女修得顧視等力為利他故授受勇士行禁行時勝樂法門可授顱鬘虎皮等勝禁行彼是勝樂特法於總軌中且置不論言授記者次阿闍黎作如來相左拳平心握袈裟角右手結為施無畏印誦頌咒云出三有惡趣為滅三有故金剛薩埵佛我為汝授記𠹳某甲金剛達塔伽達悉地三昧耶當布惹布嚩娑此師與毳衣大師說為修投花所中如來相之弟子授記故於此時應生弟子為投花本尊相答日迦跋說無畏印或勝施印薩惹哈云爾時黑茹迦空行母及師想同聲授記謂二俱修勝吉祥經疏說應信授記是此印咒功力此頌與咒出金剛幕勝吉祥經其明妃金剛行禁行與授記等有經與曼陀羅儀軌亦名灌頂酉二隨許慶慰於此處作隨許是依結合經意彼其第四亦爾後云菩提心灌頂於離罪弟子次授與隨許此復有二總隨許者字所生法輪授於弟子前或座上而誦嗡班黑都芒班黑都是金剛因瑜伽部說由此令轉法輪以痾字所生螺念誦嗡班跋喀讓授於右手咒義謂金剛語依瑜伽部說由此能說法第一母韻所生經函最後母韻所生鈴誦彼二字交與左手令彼振鈴誦云一切虛空相虛空亦無相等虛空和合一切勝等顯從此略發心法螺最無上遍滿一切處善轉正法輪猶如虛空唯遮一切障碍所顯無實自性如是一切諸法皆無自性於勝義中本無生故等虛空者謂即真如彼和合者謂瑜伽師心及心所等同真如一味故由瑜伽師智一切最勝平等真如普遍顯現此是勝吉祥經大疏所說鬘論則謂一切法之最勝由離垢故悉無自性顯謂由修現證汝亦應如是行鈴表由彼信解應轉法輪彼鈴聲音表說法蘊授經函者出幻網經大日經於示鏡後云次於二足下安放正法輪次於右手中授給妙法螺法螺最無上吹徹一切處今後於世界轉諸佛法輪汝以無疑心不應懷猶豫行密咒最勝善為此世說由如是善作方名報佛恩一切持金剛悉皆守護汝次授諸部別隨許者弟子修為毘盧等相誦云為利諸有情遍一切世界如種種調伏當轉正法輪慧方便自性高如如意珠無厭離疑惑如是利有情於正法處改誦金剛珍寶蓮華事業以此五頌傳授繪說五部曼陀羅之隨許此五頌出攝真實經其第三句毳衣曼陀羅儀軌作如種種所化所譯為善次弟子應頂禮白云如主尊所勅我當如是行慶慰儀軌次云頂上掌傘蓋令弟子旋繞向壇門合掌降傘作是言奉獻此弟子當受持諸續啟白曼陀羅主尊後傘放餘處當說弟子心所樂語汝今成壇師受持諸咒續諸佛及菩薩諸天悉證知悲愍諸有情汝應如壇軌精勤善繪建令行者學續由進入及見勝密曼陀羅解脫一切罪汝今安樂住依此大樂乘後死汝永無汝出三有苦到三有邊際諸佛執金剛今傳壽灌頂三界法王位汝定為其主如離貪欲罪三界更無餘如是離貪欲汝終不應為汝受用欲事但行無所畏食五肉五露亦護諸餘誓不應害眾生不應棄女寶不應捨師長三昧耶難違由慧方便心無少不應作汝無罪莫畏如如來所說心意淨信金剛性自誓依止無盡樂少樂諸趣汝當到金剛薩埵常住性又諸如法得灌頂者一切諸佛菩薩令增善故以清淨心恆常憶念猶如愛子法爾如是頂上掌傘蓋等六句及汝今成壇師至令行者學續出總續中彼前所作如總續云如是灌頂已令披新淨衣供養花香等供索及釧鐲此義如毳衣師說誦一切諸尊心咒咒弟子心於右手上繫守護釧其掌傘者毳衣師說業金剛於頂上持傘總續則云其次由師長於頂上執傘令其善合掌旋繞曼陀羅此說師長擎傘二說隨一皆可答日迦跋師說次於東門全身著地頂禮俯首不起以身供養師長勝密曼陀羅者入何曼陀羅中灌頂隨時應加其名於彼曼陀羅投花後為見以前為入由入彼中即離一切殺生等罪故從今後乃至未證菩提於人天中得歡喜住如鬘論云由定不造罪業脫惡趣故說決定受善趣安樂由入彼而見故汝等以後定無有死以汝已入此大解脫自性大樂金剛乘故此處勝吉祥經說云不入及不沒全無畏受用希求餘乘意樂不能侵據名為不入由此不墮餘乘而不退沒受用謂當修得金剛薩埵悉地於三有苦悉無畏故理謂由見壇及入壇欲色有等無邊眾苦汝悉斷故如鬘論云出三有苦謂得法身到三有邊謂無邊有即受用身恆相續故榜師譯為為修三有際則是為彼灌頂之意三昧耶者勝吉祥經說眾多三昧耶曼陀羅儀軌亦多有說者根本罪釋已廣解說由一切佛今為汝灌頂故已得欲等三界法王之位故名為主即是自在欲界之主定者由生不退種子現成佛故如勝吉祥經云今已勝諸魔入最勝城邑汝等於今者成佛定無疑於此所欲名欲即金剛薩埵位貪謂希求彼欲如離貪欲罪三界更無餘謂捨菩提心也是故教云汝終不應於所欲境金剛薩埵捨離貪欲是攝真實經說此處餘曼陀羅儀軌中說摩訶三昧耶等義謂大誓即是菩提心相貪欲金剛薩埵訶那者謂摧壞以彼三昧耶摧小乘菩提意樂泮謂破裂汝受用欲事者慶喜藏說受用所欲金剛薩埵餘師說是善巧方便受諸欲塵不應害眾生乃至三昧耶難違出結合經彼說依五甘露是密灌頂之三昧耶此師說彼及食五肉則是共三昧耶於成就殊勝智慧方便之瑜伽師有眾多開許故說由慧等兩句此餘前後諸文並出勝吉祥經意淨信者謂對師長諸佛心善淨信金剛謂不可壞自誓謂自諸尊依止能授無盡安樂諸尊謂當修習汝雖生於少樂多苦趣中亦能常得無罪安樂此是鬘論所說此上所釋多依勝吉祥經大疏而說慶喜藏說由何能令所化發生歡喜即名慶慰毳衣大師說名讚慰如是弟子已得灌頂慶慰歡喜應當依教奉行次如結合誦云我今生有果我生具果利今日生佛家我今成佛子若馬若寶及可愛妻子等隨力所能供養師長亦可施食護摩及歡會等
