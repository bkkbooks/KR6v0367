body:
  text: 宗喀巴大師造法尊法師譯明上三灌頂後依及結行儀軌品第十之三申四釋灌頂分二酉一解釋灌頂及後依義酉二以灌頂義配道次第初又分二戌一釋初瓶灌頂及後依義戌二釋上三灌頂及後依義今初瓶灌頂中由彼投花所中如來自性顯現決定弟子性淨種性師取花鬘繫弟子首弟子與彼本尊相見本尊即當攝受弟子故傳花鬘灌頂由能淨除弟子無明垢故名水灌頂為以如來部主印定及為引生頂髻故於頭上傳冠灌頂為除煩惱等怨敵故繫勇士飄帶是冠灌頂之眷屬有經說此離冠灌頂別作灌頂復有未說繫飄帶者意謂由冠灌頂彼事亦成令生不異真寔故傳金剛灌頂主灌頂者如鬘論說空悲無別之無上智名為法生表示此者謂鈴及聲灌頂為彼主所灌頂故得主灌頂名此謂能生八萬四千法蘊故名法生出生無上智慧之主即名法主體即出生一切諸尊之金剛持表彼宣說諸法蘊故以鈴及聲而為灌頂為得彼主而灌頂故名主灌頂即鈴灌頂之異名由種未來能得佛名之種子故為名灌頂由此六種灌頂能令弟子成何勝緣第一令彼所化是此如來種姓第二令順彼佛種姓名此如來安立堪成彼佛名之功能第三令知彼佛部主安立能成彼佛相之功能第四安立成彼佛心無二智之功能第五安立成彼佛語說八萬四千法蘊之功能第六安立能除障碍成彼如來種姓無明之勝功能鬘論此說最為善哉阿闍黎灌頂中為令弟子從今時始決定了知為證清淨雙運菩提應精進故授金剛三昧耶三昧耶者是金剛持決定應行執持金剛不可違越為令證悟真如定能宣說八萬四千法蘊故授鈴聲三昧耶為令成辦最極堅固方便智慧大樂體性正等覺性故授印三昧耶印謂天身大印即是金剛薩埵父母三昧耶者謂自身為彼尊不可違越印三昧耶能令佛身堅固故幕經中唯以印三昧耶說為正覺灌頂以餘二三昧耶為其眷屬如彼經第十五品說初名水灌頂至第五名名灌頂第六名為正覺灌頂第四品中名灌頂後唯說鈴杵二三昧耶未說印三昧耶故知正覺灌頂即是印三昧耶不說餘二三昧耶為灌頂故知經意謂是彼眷屬攝餘諸經中總說三三昧耶為阿闍黎灌頂眷屬如前所引智慧滿十六等然此非謂印三昧耶幕經中說是阿闍黎灌頂餘經說為彼之眷屬此幕經說阿闍黎灌頂時曾說瓶灌頂第七故故此是說幕經於彼印三昧耶說為正覺灌頂餘經說為阿闍黎灌頂之眷屬未說灌頂之名由洗垢義立為灌頂印三昧耶不妨立為正覺灌頂與三昧耶為阿闍黎灌頂眷屬不立灌頂之名二俱無違說此灌頂名阿闍黎灌頂與不退灌頂者譬如十地不退菩薩十方諸佛為授灌頂如是此及三三昧耶亦是諸佛與自師長為令與諸有情說無量法成就阿闍黎故於三界法王位而授灌頂故名為阿闍黎灌頂如彼不退菩薩灌頂故名不退灌頂非但就此同義亦以能生殊勝不退種故名為不退灌頂故是得不退之灌頂及具足不退之灌頂依上所說故或有云金剛密智三此名阿闍黎許金剛阿闍黎秘密慧智三灌頂為阿闍黎灌頂者唯是劣慧惡見之宗誦真言者為令無障碍故為令熏成息災增益愛敬降伏悉地種故為令清淨勝義真言無二妙智悉地器故傳眼藥者為除無明眼翳生天眼故鏡者除無明後為令觀察通達此種種法如影像故定解諸法皆無自性如影現者先須破除法執無明開發慧眼故此二種能於相續立中觀見殊勝種子即生通達如幻妙慧須先破除實執通達無明所執治品授射箭者為勝四魔穿徹法界最細鵠的眼葯與鏡灌頂雖能熏成殊勝堪能以聞思慧通達空性但由總相通達真寔非善透徹為令究竟達其底裏以箭灌頂復令熏成殊勝種子戌二釋上三灌頂及後依義祕密灌頂為令成為信慧之田守護三昧耶及清淨語成信田者謂於密咒密行不生邪疑信心堅固令成發生彼信法器之理謂將明妃奉献師長及嘗師長明妃等至二界由師長與本尊力故生殊勝樂遣除不信如鈴師云住蓮花正行希有大安樂啟白於大師弟子滅分別成慧田者口授論云由彼清淨田通達一切法幻等十二義謂由密物著口入心蓮內成為通達幻等諸喻所顯幻身義之法器或成為慧智灌頂之法器守護三昧耶者如鈴師云集一切勇識會一切天女世俗菩提心祕密物灌頂彼勇識天女大妙三昧耶具五界妙味當嘗彼安樂謂集一切勇識勇識母體脈中精髓由食二種世俗菩提心故當依五甘露等食三昧耶於前所說守護之三昧耶而得自在五界如金剛鬘經云五界生精華謂身中地界等所生精華或如集密後續所說住空界中央具香水及髓拏熱跋說髓為種子配餘甘露故是五種甘露空界拏熱跋謂師長父母金剛蓮華交合空界此中實具二界以及香水餘者集其淨分精華清淨語者謂不異主尊父母之師長父母等至所生俱生喜之密物與請十方一切諸佛菩薩所化體性無可分別具大力故嘗彼能生大印點中所說如童女樂如是彼樂下至舌喉等處能淨彼彼諸處脈風故能淨語由舌嘗受菩提心味能淨語者是密灌頂之力由身領觸二界觸塵能淨意者是第三灌頂力如是由彼勝物因緣加持脈風及菩提心故成修脈風猛利等瑜伽之器由修彼等成自加持幻三摩地之器故於修習彼道獲得自在第三灌頂慧謂勝智於此有故是為外印智謂從彼所生離分別心清淨俱生歡喜廣如前說由修第三灌頂所示之俱生智最後離一切障周徧清淨即第四灌頂此等由大樂味洗淨意故亦名灌頂可知除彼安立功能以及自在彼道立為灌頂尚有其他安立之理為令了知般若明妃是圓滿最勝無漏樂之正方便故初發業者及彼等字所攝智增進位皆不應捨故授明妃禁行如金剛空行經云若時無分別方便行諸業修無分別故諸禁行中勝已具最勝禁行何用餘禁行為為令專修五智自性菩提心行故授金剛禁行終不應離若離諸行亦不能證彼菩提心為令學故授行禁行此有三種第一行者謂於內三印中愛樂修習如遍行云顱杖為天身觀小皷即慧咒謂飲器顱天身謂身阿那哈達或那達者謂不可壞自性猛利之聲領受無二大樂所依謂世俗菩提心為表此三明自身為天身及猛利火安樂所依拘陀是為內印餘二易知其表樂者謂別釋迦跋羅其崗字與跋羅可作護樂解釋第一明父第二明慧第三所誦真言是為外印第二行者受持五種莊嚴謂由與瑜伽母具足禁行引發淨法界等五智第三行者若得四種視法神通等力為欲饒益諸有情故離世間行諸瑜伽師或瑜伽母由修一切內莊嚴力出生悲空無別大菩提心授記謂授記稱讚云汝能通達三界無分別之法性此是授記時之咒義故應釋彼咒義補謂具足風輪等眷屬之地下補嚩即是地上世間娑謂天趣乃至有頂彼三皆是汝所通達故云當三地自性之真寔三昧耶謂極喜等漸次能證此即三昧耶當補補嚩娑之義金剛幕第四云嗡我今授汝記脫三有惡趣金剛心如來善成諸有故從今以往汝於地下地上超地成為某甲金剛如來最後句即達塔伽達悉地之義釋論釋第四句謂得無住涅槃故第三句謂所記之可事隨許謂如儀軌修成就已當說法等利益有情慶慰謂汝受用欲塵亦能成佛由入壇灌頂等增長堪成佛之功能慶慰弟子令知彼義酉二以灌頂義配道次等若善了知四灌頂體及傳授彼於修何道能得自在并成彼果之理則於經中廣讚灌頂能獲信解即以灌頂而為最勝教授若具此解即奠咒道之基成就之本開啟甚深二次第門能於灌頂珍重授受皆極清淨傳第四灌頂者師告弟子作如是言汝今此身修為報身父母結合等至行相於真寔義引發等至俱生妙智然僅勝解身為天身非實成佛汝心安住諸法真寔亦僅須臾勝解作意由總相門而為通達非於真寔如水注水心無分別及能常住然如是修是等流因若具方便支分修習究竟非但勝解其身寔成佛之色身心與真寔亦無分別常時安住此即名為咒所成果七支具足亦名第四灌頂是為曉示雙運已廣說訖此中所明果位雙運是無上部不共所成即是道位修自身為欲天父母行相由收放二種菩提心修俱生樂為道之力此果親因須離身為天身心與勝義不能合為一味及心能時身不能住天身之失而能二者同時俱轉此即安樂為道勝方便之有學雙運爾時自身雖未寔成佛身然異初次第及幻身以下須別修一殊勝天身集密經中詳說恐繁不錄有學位中二諦雙運須先別生世俗幻身與勝義光明三摩地以無單者則無雙故此二漸次世俗於前光明於後現證心與光明一味三摩地後次即能發雙運故修習此道須傳第三灌頂以彼表詮光明第三灌頂雖依二印隨一而生然依二印引生四喜不必先得第三灌頂唯得瓶灌頂者堅固修習生起次第亦得生故初次第時說與智印等至引生四喜有多種故龍智菩薩於生起次第初加行時俱說真寔修成二明妃故明炬論中亦說生起次第有三行故若修生起次第得堅固者依止智印不能引生四喜則彼無間傳受四種灌頂補特伽羅先未曾修諸天瑜伽依止智印而傳第三灌頂應有不能生四喜失許依智印而得第三灌頂則成矛盾如是修習祕密灌頂道時亦依明妃生四安樂以密灌頂成為幻身教授之器如前已成幻身之前須生起心遠離三空之智彼等諸智亦說依止明妃乃得生故如五次第論云一切幻事中女幻最殊勝三智之差別此中明表示若謂既云三智故是不發俱生喜者如前所說全未修習生起圓滿道者傳第三灌頂時尚生四喜而說生起次第已達究竟由語遠離於風得自在者依止明妃不生四喜寔為可笑以是此中觀察四喜生或不生係指如彼第三灌頂時所生者是菩提心至摩尼中未外出時俱生歡喜豈有如此俱生心遠離時而反不生彼論說三智者意謂即彼三智究竟清淨滅盡微細二取智與真寔同成一味之勝義智是為俱生爾時無彼智生故未宣說一切空光明智故於初灌頂時四喜瓶灌頂道生起次第時之四喜密灌頂道風及猛利等時所生四喜第三灌頂道光明時所生四喜第四灌頂道有學雙運時所生四喜或名四空應善分別如是唯修由風瑜伽以及猛利然注之力溶化諸界令菩提心住摩尼中不出外時生俱生喜不須定傳第三灌頂如修瓶灌頂道第一次第及於密灌頂道修脈息等瑜伽不安立為瓶密灌頂如是修習如彼第三灌頂所生俱生亦不立為第三灌頂所說得此灌頂能於此道得自在者意謂得彼灌頂無間於彼諸道聞思而得自在非說得彼灌頂無間即可修彼諸道如得時輪灌頂無間不能即修三摩地支具得集密灌頂無間未能即修雙運轉道然至能修彼時而修亦無修彼不得自在之過如是發起勝義光明圓滿次第須先發起如幻之世俗幻身三摩地此復由修風猛利等瑜伽令風與菩提心堪能調柔引發四喜智德故須先修秘密灌頂諸道所言幻身非謂由達一切諸法皆無自性後見所現皆如幻化是由現證三空智力行者自身轉成幻身此如集密應知一切脈息及菩提心上行下注等諸瑜伽非謂皆是密灌頂道以修光明以上亦須多修彼等故是最初調柔彼等之諸瑜伽發起如是圓滿次第殊勝智德先須以瓶灌頂第一次第成熟相續故由瓶灌頂道成為生起次第法器說瓶灌頂成就化身秘密灌頂成就報身慧智灌頂成就法身此中所說報身雖可作幻身解然依密乘通義多指佛語如是化身謂佛色身其等流因謂由修習生起次第及彼所表圓滿次第天瑜伽等所成法身謂常住真寔之佛意其等流因謂由修真寔義俱生智之所成如來語報身者謂由修習密灌頂道於彼語根本風獲得自在所成故說彼三灌頂能成就身語意三種金剛如是身語意三不可分離即是第四灌頂此復由前二道成道位之第四灌頂由修有學雙運成就無學身語意三不可分離是故四灌頂中能攝一切二次第道入曼陀羅預備等時亦說歸依發心受二大乘共不共戒及諸學處故若善能觀擇灌頂諸法即了一切咒道宗要若善了知二種次第漸次以及雙須二者之義能滅眾多妄計受持瑜伽自在毘囀跋教授之藏地智者說一切咒道宗要皆在灌頂中求誠為善說申五釋後法理灌頂開合金剛禁行乃至慶慰五法有謂若唯受明灌頂便滿足者或唯受阿闍黎灌頂以下而滿足者即於彼後傳授毳衣大師唯除行儀禁行亦說餘四可如是傳若未傳阿闍黎灌頂而教說法利生隨許云何應理無失大日經中唯傳水灌頂後亦說有說法隨許故雖不可說無上部經事行部經已可說故故若作彼兩部阿闍黎者可於傳受五明灌頂之後而作隨許不須更得阿闍黎灌頂也咒灌頂至射箭等四明灌頂後亦可傳授眼藥與鏡大日經於水灌頂後說故其咒灌頂鈴論師等多於五明灌頂之後說故弓箭亦可如是行故明灌頂之後依如寂靜論師云傳明灌頂决定得共菩提非得正等菩提為令久後定得正等菩提故於明灌頂後可傳少許禁行不傳授記慶慰以此二屬不退地故此說彼後不作授記慶慰唯傳金剛禁行之理然於少數殊勝所化亦說可傳如云有時傳受明灌頂後觀器殊勝亦可授與禁行授記及以慶慰意謂令彼憶念我得授記及以慶慰由此增上勝解力故久後決定得大菩提義與授禁行同又有經說第三灌頂亦傳明妃禁行有經未說咒等四事及行禁行諸總隨許三三昧耶具善根等意謂如彼諸義隨應攝入餘灌頂中具善根者謂慶慰或授記云何攝者觀察即知有經論說隨許慶慰不退灌頂中攝鬘論說彼一切皆異幕經第十五云初謂水灌頂第二冠灌頂杵灌頂第三第四謂自主第五名灌頂六謂正等覺瓶灌頂第七第八密灌頂第九謂慧智以金剛加行授金剛禁行佛為自授記是灌頂次第此中未說花鬘灌頂以是水灌頂等之因傳授咒等如其所應有時說為阿闍黎灌頂之眷屬有時說是第四灌頂眷屬有時說是餘灌頂之眷屬如餘經說應當了知天種慧論師說第六灌頂為鬘灌頂以花鬘及咒灌頂等於四灌頂隨一所攝集密後續故作此說三灌頂各異此經所觀察瓶灌頂第一第二密灌頂第三慧智定其第四亦爾結合經云灌頂有四種初謂瓶灌頂密灌頂第二第三謂智慧第四亦如是二觀察中說四灌頂以阿闍黎灌頂而為第一於中分水冠杵主名及阿闍黎之六一切皆名瓶灌頂者以諸如來及佛眼等明妃執瓶而灌頂故若彼皆是瓶灌頂者云何又說瓶灌頂為第七為欲顯阿闍黎灌頂較諸水灌頂等最為超勝故說瓶灌頂為第七非說水灌頂等非瓶灌頂以金剛加行釋中未解察其含義雖可釋為第四灌頂然有具聲即三囀聲應連下文蓋即金剛禁行別名四灌頂中若以阿闍黎灌頂為第一則攝水灌頂等入於阿闍黎灌頂中意謂彼是阿闍黎灌頂之因故故或攝為瓶灌頂等四種灌頂或離瓶灌頂與阿闍黎灌頂而別說水灌頂等皆不相違又說十四灌頂各配一地是於瓶灌頂中開為十一亦無四灌頂中不攝之過大印空點經云四灌頂次第由果說三種初謂師灌頂第二密灌頂三慧智灌頂第四亦如是師灌頂十一密灌頂十二慧智為十三如是為十四每灌頂一地是諸地自在此經說瓶灌頂分為十一每一灌頂別配一地金剛鬘經亦同此說復云三為因灌頂第四果應知十一種者鈴論師云由師業差別說四種灌頂水灌頂等別四開為十四此中最初說水灌頂故知不數花鬘從水灌頂開為十一彼師明說五明灌頂與咒灌頂不退灌頂正行等七餘四當是授記慶慰二合為一金剛禁行行儀禁行及隨許法別說為三莫如律生別說禁行授記慶慰隨許等四為瓶灌頂若如彼者唯說五明灌頂與說彼四以及不退灌頂為瓶灌頂無咒灌頂僅有十故若不爾者則鈴論師灌頂儀軌應未別說十一種瓶灌頂彼離授記未說餘慶慰故故是略攝慶慰略不礙廣廣開亦可未二依止餘曼陀羅灌頂斷疑於彩繪曼陀羅灌頂如是若於餘曼陀羅灌頂為同彼不語自在稱無畏論師羅睺羅吉祥友及常住金剛等合說布繪彩繪曼陀羅灌頂法故依布繪灌頂當如前說所繪之曼陀羅亦由意修曼陀羅法成可灌頂之曼陀羅故唯意修最為第一以是灌頂開光及護摩等此論師許皆可意修如鬘論云此繪儀軌亦由意修儀軌方能有果故唯意曼陀羅儀軌最為第一是故以曼陀羅主身攝受地等像等開光弟子灌頂送諸聖眾以至息災護摩皆應意作何時方可依靜慮曼陀羅傳灌頂等即彼論云若時無有資財不能俱辦此等一切或非道理或無可得爾時應修雖有外物亦唯靜慮為主不能成辦繪曼陀羅等資財者時輪經於徧捨弟子作如是說非道理者意謂縱有資具然於是處繪曼陀羅有大遮難無可得者意謂非但現無資財後時求亦不得或是離此資財無可得處餘處莫能獲得灌頂若可依於意曼陀羅何用更繪曼陀羅為若有資財可繪壇者必須繪壇以於此事供捨資財增長無邊諸資粮故即前論云然世間見信樂施等為增福故許外儀軌榜師譯為世間見及信施等又可依靜慮曼陀羅更有餘證即前論云諸先師說若無資財可依唯修成辦一切儀軌是故初發業者由心堅固可於意變曼陀羅中如前開光弟子灌頂又如佛頂經云慧蓮華中壇億踰繕那量於三層壇中傳弟子灌頂又云唯由意於彼佛許為壇場引此文證謂若非由靜慮不能成立十萬踰繕那等初發業者由心堅固謂須殊勝本尊瑜伽龍智亦說弟子灌頂共有八曼陀羅第八即是意曼陀羅前七是就彩繪曼陀羅之質料而分身曼陀羅灌頂鈴師論中除注誓水及降智尊開示壇場三法未說餘入曼陀羅法然亦應作以鈴論師灌頂儀軌多依釋續金剛鬘故此經通說身曼陀羅及彩繪曼陀羅灌頂於入壇時亦唯說彼三法以是身曼陀羅若許棄捨餘入曼陀羅法彩繪應同彼既不爾此云何然彼經於行禁行後云次將經螺等弓箭與劒輪如前咒清淨漸授弟子手故亦可傳此等授記慶慰彼亦合說總之鈴師身曼陀羅灌頂顯依釋續金剛鬘經故應順彼經義而釋午二犯三昧耶還淨法如是獲得一度清淨灌頂及三昧耶律儀然由無知煩惱熾盛放逸不敬犯戒四緣而有毀犯除根本罪餘罪可往有咒戒者之前以出罪法而出其罪犯根本罪壞三昧耶須以灌頂還淨應從師長重受灌頂若無可重受處則可如阿闍黎入壇儀軌自入曼陀羅受諸灌頂及三昧耶律儀而為還淨如鬘論云若自犯三昧耶此諸灌頂如阿闍黎入壇受法應如是受然是師長在極遠處或道難行有諸危害不可往處非在餘處如憍薩羅莊嚴論云弟子入時師長應先自作入壇儀軌何者有由忘念越三昧耶故阿闍黎應先自入此說為他灌頂亦須先自入壇淨三昧耶是故若無殊勝阿闍黎處可受若自己善承事了知清淨儀軌可修自入壇法除正行時所有受戒清淨儀軌及餘唯預備時有者阿闍黎於自入壇時須善修行並於爾時傳授弟子如前已說律儀還淨灌頂之前應如何行如鬘論云若犯毀訾師長等罪隨力所能先設歡會而行供養次於師前先正懺悔如前受戒謂應先於師長三昧耶友作大施會多修懺悔次乃受戒黑三昧耶金剛札拏經釋亦云於師長及金剛兄弟轉資粮輪說犯某罪而行懺悔根本罪大疏等說唯除第一根本罪出諸餘罪方便不待灌頂不可憑信以時輪經寂靜論師札拏經釋律生疏鬘論等多說隨犯何根本罪皆須重受灌頂而淨治故札拏經第十七亦云若由放逸故違師三昧耶彼當繪壇場對佛而悔罪繪曼陀羅正為灌頂黑行論師別分師長與三昧耶三昧耶者謂佛語等說違彼等為罪如是灌頂還淨務須至心悔前防後若無彼心以為先犯後受無過失者決定不可如時輪大疏云言犯根本罪為還淨故仍入此曼陀羅者謂若爾時住七灌頂或瓶灌頂或密灌頂犯根本罪爾時為淨罪故繪此曼陀羅已為不更犯故當重入言次得隨許仍在眾會者謂住於種性中言前名為長今成幼小者謂令謹防不復犯故言如來決定者謂諸弟子決定應如是行此於防後不復造心殷重教悔犯戒後還淨者較前學位須降下座答日迦跋時輪灌頂品釋有云此說誓不復犯非無防後心者如人中毒醫為除故令服藥已仍服其毒此等廣如根本戒釋中說恆修自入壇法如鬘論云常修行者可以智慧方便一味本尊加行修靜慮曼陀羅從曼陀羅自在受水灌頂乃入秘密慧智第四究竟慶慰究竟此謂不能常依彩繪及畫像者可於靜慮曼陀羅中受諸灌頂午三曼陀羅後法次為息滅增減儀軌過故應作息災護摩為滿足諸天故應作增益護摩此如不能寔作亦可意修如前已說光穗論云或彼一切護摩皆以意修先自供曼陀羅次教弟子隨力所能供如來等而行供養諸入壇者亦以嚼噉飲食等物供曼陀羅令皆飽滿通夜不臥與弟子眾作歌舞等及菩提心正供養已告云汝等入壇者不應為他說次如論云應受弟子供彼皆當敬献珍寶可愛妻自身及田地總以如是事令師長歡喜師喜得悉地佛說非從餘由供金剛心作者無上師何福不能辦何難行未成此中令師歡喜是最勝因諸梵論中多有宣說所施福田亦最無上集心論云佛等諸福田行施有差別二千首陀種同一婆羅門二千婆羅門等同一苾芻二千諸苾芻同一離塵垢二千離塵垢同一具智者二千具智者等一阿闍黎如是供養田智者恆供養瑜伽根本法如種植良田毳衣大師黑行論師亦如是說次安置諸弟子自往室外施諸護方神食及供養等回入室內禮曼陀羅供主尊閼伽等回向善根其次繞曼陀羅三匝坐壇東門面向本尊為息增減之過誦百字三遍次手握花合掌當心為息不全等過請容恕云由我心愚蒙所作多過罪為救眾生故依怙皆忍恕由未得無知或由無能力此中所犯罪主尊皆容恕所求之事由請白得成就次復誦云嗡尊利益眾生隨順賜悉地今往佛境已仍請時降臨又誦嗡啊吽班穆奉送智曼陀羅攝智所現三昧耶曼陀羅入自身中言佛境者慶喜藏說義通利益有情及以法界次誦嗡阿迦熱穆康薩嚩達摩南阿得奴奔那朵答嗡啊吽泮娑訶嗡啊吽穆勝解一切法皆無生左手振鈴右手持杵從東門起順梵線路拂拭至主尊處略取少土置自頂上次拂拭蓮花等次以杵端毀拭諸門諸角諸師長先收諸尊相次乃用杵毀拭一切次誦四吽真言嗡班格羅鄔答格羅耶薩嚩格羅那班答惹阿若跋耶吽吽吽吽泮訶拔出諸橛此處不同他經以松跋尼為四吽咒次誦嗡茹茹薩樸茹左拉底叉悉達羅內薩嚩阿塔薩答尼娑訶加持牛乳一百八遍洗滌諸橛誦彼真言而洗滌者集密說由彼咒死者能活義謂悉令諸碍復活奉送橛上諸尊若橛釘地應填孔穴若有為治疾病等故而乞彩土可給少許諸餘彩土置尊勝瓶或餘新瓶用衣莊嚴安置象上或車轝上又用施主衣莊嚴瑜伽母以手扶持若阿闍黎或令弟子乘車振鈴唱吉祥歌奏諸妙樂具足傘蓋幢幡諸供養具持至河岸或大海岸或深水邊於彼牛糞塗地白香作曼陀羅蓮華中央修金剛薩埵或本尊於諸葉上四方從東方起四隅從自在起右旋依次想由自心種子放光鈎召無邊蓮花安立財盛大蓮螺護迦廓札種性等諸龍安立彼處次誦嗡啊阿難陀雅吽娑訶嗡啊北摩雅吽娑訶嗡啊達卡迦雅吽娑訶嗡啊跋蘇格耶吽娑訶嗡啊摩訶北摩耶吽娑訶嗡啊香喀跋羅耶吽娑訶嗡啊迦廓札耶吽娑訶嗡啊姑利耶吽娑訶以此諸咒而供白花次以左手作蛇頭狀伸展右手念誦嗡阿難陀跋蘇格達卡迦迦廓札迦北摩摩訶北摩香喀跋拉姑利迦跋拉得嚩底摩訶得嚩底娑摩希克摩訶娑摩希克敦札答惹摩訶敦札答惹阿跋羅羅吽盧札難陀鄔波難陀薩迦惹摩訶薩迦惹禱達摩訶禱達希根底摩訶根底惹那根底蘇茹跋摩訶蘇茹跋跋札希迦摩賀答惹希利摩訶希利嗡跋卡跋卡阿伽剎阿伽剎摩訶那伽阿底跋底薩嚩布希嚩明明娑訶以此真言施食供養次將加持彩土付授諸龍注入水中想彼諸龍以大供事迎往地下若於餘食施龍食者中央想跋茹惹餘處如前即可施食以裝彩土之瓶滿注淨水持回為息災故遍洒曼陀羅室次於牛糞所塗曼陀羅室與諸童女共作乳糜歡會如云次由阿闍黎普集諸財物唯應自受用弟子勿少用奠基及善住護摩壇輪財彼唯屬師長勝金剛持說奠基四百五十頌等譯為滿穴必是灌頂一分儀軌之名意謂灌頂所得資具總續亦說一切曼陀羅中資具唯屬師長弟子若分壞三昧耶若師不欲則傘蓋拂鈴等當供養佛座及燒香塗香等物當供養法衣與鉢等供養僧伽若無僧伽可施苾芻苾芻尼或鄔波索迦又云諸嚼噉飲食隨意施貧人惟於狗烏等不應施少物於阿闍黎及諸門阿闍黎事業金剛諸瑜伽母隨力所能奉施諸藥淨牙物等令生歡喜作僧歡會及資粮輪毳衣大師等說未送聖前供資粮輪此等任何時作皆可亦於貧苦皆令飽滿從後依法至後結法嗢柁南曰三禁行授記隨許慶慰六護摩供受施施食供旋繞忍送收所化收彩土拔橛送彩瓶水淨資粮輪歡會眾多密教數數稱讚如是灌頂為修諸道與修二種悉地之本最為重要故依無畏生護大阿闍黎金剛鬘論為本隨順諸淨經論一切大小儀軌觀想次第皆廣宣說嗢柁南曰由瓶灌頂恒河流洗除身垢庸現執由嘗密智甘露味語處風動現真言第三俱生歡喜鈎鈎導意夫入勝義第四曉示雙運義直達究竟斷眾疑除斯勝解四灌頂當說更無勝教授將自所知詠為歌供養師長及妙音或謂灌頂諸次第唯是修道前加行棄本逐末意冥闇為除彼過如是說明須二種次第雙運修大菩提品第十一之一巳二為天灌頂善住儀軌子二灌頂支分儀軌次第此二科中飽滿諸天修妙悉地之方便謂護摩毀犯還足令空行母歡喜之方便謂資粮輪受持不失行儀之三昧耶支謂金剛鈴杵大小油杓六莊嚴具手皷顱鉢喀敞迦等依量而作如是作已守持皆是咒行清淨方便極為重要恐繁且止別如餘處應知總攝一切教義為一補特伽羅成佛支時為令知彼何處攝故令此道次第中已以略義攝彼等竟辛二淨三昧耶律儀已得灌頂補特伽羅當先修習何等先應如灌頂時所受律儀及三昧耶精勤守護更善修習曼陀羅輪等二次第教授乃得悉地若不守護律儀縱復勤修多劫亦無成就如律生云若如所教示勤行三昧耶由成法器流修輪等漸次圓滿正教授乃成就非餘平等結合經云未入曼陀羅及捨三昧耶不知密真實雖修不成就金剛頂經亦云假使經百劫精進勤修習世有四種人雖修不成就未發菩提心具足猶豫念不如教正行無信不成就此復灌頂成就法器未久即應教諸學處師長五十論云次授真言等成為正法器十四根本罪應讀誦受持律生經云若求上成就寧捨於命根縱至於死歿當護三昧耶幻網第二品云次說三昧耶告子汝今後縱至命及骨不應毀正法菩提心師長承事金剛兄汝終莫離欲勿慈愍惡人如說寧捨身命當護律儀及三昧耶應如是行尤以犯根本罪損壞身心功德難生故當勇猛策勵莫為彼染亦應勵力不犯餘罪設有毀犯應當懺悔防護如法出罪若得圓滿灌頂勵力守護諸三昧耶未為罪染雖未深修諸道七生以內亦能獲得上品成就若不守護學處及三昧耶雖復勤修餘法終墮惡趣善趣尚不可得況悉地乎薩惹哈於佛頂經疏引神密庫經云若正授灌頂生生得灌頂由此七生中不修亦成就若具足修習住三昧耶戒業故今不成後必得悉地若犯三昧耶人生且難得況云得悉地又三昧耶第五亦云若未犯諸罪十六生必成解說月師亦云無罪縱未修十六生必成此上所說凡阿闍黎開講經論教授為他灌頂與諸弟子聽經教授俱應修學雖或未作彼事凡是得灌頂者皆不應違以是現修上悉地等上中下品三類補特伽羅共所行故經論數數宣說師長即是悉地根本依此昔諸先覺說修師長瑜伽是為修道初門廣說第一根本罪類攝入師長五十頌論三昧耶中此即諸學處中最重要者故若了知諸咒學處是勝教授則如是等一分修持道前行者悉皆攝入護三昧耶及律儀中是故智者當知二次第之前行即是灌頂護三昧耶名稱幢師說此義云未經成熟信密乘縱修深法感惡趣佛說不得餘上果故當依師受灌頂灌頂而求深教授縱於世間遍尋求主要教授三昧耶無此便同頹廢屋若善成熟護誓願二次深教縱未修十六生中必成就眾生親友利者說我雖寡聞無慧眼由見淨教最善說當受灌頂護誓願恭敬合掌普勸請此是了知續部宗要之言我今亦當如是勸請令知如是學處是師長事若不教示師長犯罪教而不行是弟子過此於師長五十頌釋以及根本罪中三昧耶品已廣宣說如彼應知總於一切學處諸於根本三昧耶中唯師長三昧耶最為重要應善了知隨力所能策勵防護以請師長及勇識瑜伽母作證守護所受律儀不可少故辛三住彼如何修道分二壬一聞思了知其道壬二修習所知之義今初如是已得灌頂如理護律及三昧耶次修何事解七莊嚴論云先應由聞慧聞知於文續次乃以思慧學文義相屬謂若自修及教他等皆須先以聞思求無謬解自若未知不能教他及自不知無可修故隨自所知而如是修知若謬誤修亦錯失修無錯失必須正知無倒謬故歡喜金剛釋難珠鬘論云無慧而無聞無聞亦無思離二無瑜伽離行無悉地又五次第釋難顯義論云聞圓滿生慧思惟亦如是具二善修習成無上悉地智者思擇已先勤求聞義恒常精進者悉地在其手若於文猶豫焉能達其義又五次第論云若敬信師長恆勤修承事能受持所聞是為勝弟子此說弟子德相為持所聞平等結合亦云不知密真實雖修不成就若是具足大慧大精進等可學續部不爾應學隨一智者所造密論最低限度定須聞思具顯生起圓滿宗要之論若作金剛阿闍黎者開示他人咒教授等尤須於彼二種次第與曼陀羅儀軌應得善巧若視諸大經論唯是依據斷外增益更執別有甚深教授為彼所未說者是於諸法究竟全無愛護及是於大咒典發生恭敬並彼現為教授之障是令密教速滅最大因緣當依師長教授於諸經論現為教授方便勵力修學如五次第論云勝集密經中印封此諸義當隨釋續行從師語了知此說究竟教授五次第之真實佛於集密根本教中以印封護須從師語乃能了知此說究竟深處謂諸續部根本教典了知彼教須依師長師長非可隨意而說須先了知隨諸釋續解根本續故教授者即是隨行釋續無倒宣說根本教義易令弟子相續發生了解之勝方便從師語知準是應知非謂經中隱而未說唯從耳根次第相傳故凡最勝教授須於彼義久修習已次觀續部定量教典於多教義能與定解若持教授觀察教義全不能與定解則是慧劣或義有失隨於顯密何宗皆須先以聞思了知所修次乃修習所決擇義如彼乘馬先示所行之地現時至心欲修行者於學諸大咒典視為可笑彼於續部學與未學二者修行全無差別諸有樂求真解脫者於是等處應審觀察
