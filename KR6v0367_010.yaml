body:
  text: 宗喀巴大師造法尊法師譯明預備儀軌次第品第六之三卯四啓白諸尊然燈賢云復供養壇輪謂於預備諸尊非唯先應供養此處亦應供養啓白總續亦如是說故當供養右膝著地舌從吽字生為金剛吽字莊嚴右手執持香爐左手振鈴白曰敬禮某金剛世尊大明王為愍弟子故供養諸尊等我今畫依怙悲體曼陀羅故我恭敬求願世尊恩許佛作壇利生住果位菩薩及餘密咒天諸天與護世含識住菩提樂正法有情諸具金剛目皆請憶念我我某甲金剛於某曼陀羅隨力而供事為利生畫壇願哀愍攝受我與諸弟子一切壇場事唯願速降臨思惟其義三次啓白律生經與金剛空行如其所應亦有此文總續完全具足唯譯文稍異耳金剛空行與總續俱說誦三遍說須思惟彼義而作啓白言作壇利生者謂以曼陀羅事而利衆生住果位菩薩者謂已得地所餘密咒天者謂未得地其下句總續作及護世諸天再下句律生作情住大菩提寂靜論師釋彼義為安立菩提之人即是趣入大菩提者金剛目者謂金剛眼鬘論中僅說有情謂人等顯係與有金剛眼者同為一事如總續云諸有金剛眼樂正法有情餘文易解金剛空行經說此在瓶預備後然燈賢亦作如是說此論亦隨彼行卯五弟子預備分四辰一四門阿闍黎與業金剛預備辰二弟子預備數及次第辰三正弟子預備儀軌辰四舉升曼陀羅夢相吉凶應如何行今初守門之阿闍黎若是自己灌頂弟子不須預備若非爾者應令住於曼陀羅室東門之外而受二種律儀或先授阿闍黎律儀以預備法而作預備此須四人若無者三人或二人乃至一人除彼餘如是預備之第五弟子餘續名業金剛若無別業金剛鬘論說即以守門阿闍黎任之是隨難勝月說如云恐壞三昧耶非弟子莫入無者用二三下至用一人此中弟子謂是自傳灌頂或為作預備者總之助自修行之守門師及業金剛若非自傳灌頂而令入者壞三昧耶故若非是弟子雖灌頂事亦應遮其窺視辰二弟子預備數及次第同時可為幾多弟子作預備耶龍智燃燈賢毳衣難勝月黑行等諸論師未明顯說數應若干答日迦跋說可攝受二十五人以下唯除偶數此是總續意趣如云智者於弟子一三五或七乃至二十五攝受非雙數弟子過彼數是不知攝受大日經云弟子信貴族如是信三寶成就甚深慧精進具尸羅安忍無慳吝勇敢志堅定十或八七五一二四或多攝受不須觀此說具彼德相弟子亦許雙數彼以十數以內為數量者謂具彼相者如金剛薩埵極希少故此依灌頂而說若但令入壇者則許數無定量即前經云祕密主諸已修習無邊大乘密咒行者彼等即是金剛薩埵為彼等故說此數量然阿闍黎成就大悲唯應發誓廣盡諸有情界由此可成菩提心之因故應當攝受無量有情此等文義疏如前釋非說灌頂同時攝受無量弟子准此差別攝真實經金剛頂經亦當了知建立三三昧耶經云合掌持花一二三四五弟子可令入此亦連數鬘論亦說若一弟子或二或多藏中智者規式多如總續而行總續中云總之諸弟子內心互賢善靜調利師長不攝互仇怨此最重要若經攝受弟子儀軌所攝受之弟子至預備時未全在者當如何行如總續云所攝受弟子預備時未在當作彼形像作所說諸業若攝受弟子由餘少緣故未能來至者可令餘暫代律生經說畫曼陀羅後作弟子預備持祥與此論師說修曼陀羅後作善住即開光及弟子預備此是講說次第而非實行次第以餘三預備法及繪曼陀羅法顯係為與天及弟子作灌頂故如鬘論云如是弟子略作預備為預備故供養安立諸天為彈智線等故於曼陀羅地基上升虛空心想安住此處說作弟子預備次將預備諸尊舉升虛空其後乃說彈諸智線辰三正弟子預備儀軌分五巳一教正發起傳內灌頂巳二請白令持巳三受戒加持巳四令投齒木給三水等巳五慰勵守護觀察夢相今初此中若於曼陀羅室作預備者藏中諸先覺說當遮畫像等面勿令觀見天預備之花等以及諸瓶當如賢攝經說令諸弟子沐浴著新淨衣供曼陀羅長跪合掌手捧花鬘當教示云非為希求現法後世善趣安樂當為證得如來三身圓滿德故入曼陀羅如是亦得二種善趣此是略攝總續之義總續之文四百五十頌中所譯最善有為修密咒而入曼陀羅除有為求福更有求他世由希求後世智者修淨信而入曼陀羅不應求現果若求現法者不得後世利若希求他世亦增現世果入曼陀羅有三發起有為修密咒而入者是求現世善趣餘有為求福而入者是求後世善趣有為求他世而入者是求二身圓滿如是三中當如第三入曼陀羅不應求現果句表示不應如彼前二如此論說以是下劣世間故現後二善趣同名為現非唯指今生之圓滿寂靜論師說後四句明彼道理最為善哉亦與經說入壇三種發起極相隨順故知如明顯雙運論等一類曼陀羅儀軌譯為諸求咒悉地當入此壇場是譯未善師長應善開曉使弟子等發如是心若求無上佛果二種善趣亦能兼得故當為求成佛入曼陀羅次應想諸弟子從自口門入自身中順金剛道出住妃蓮華中心間種子放光召請諸佛佛母入自口中溶化灌頂安於曼陀羅之東門此處當住何尊之慢由何方便召弟子入自口如明顯雙運論說自為主尊由心間種子放光召入弟子生為何天此論不明然毳衣大師說修一面二臂黑茹迦故應修為當時一面二臂之主尊也論中未說以此等觀曉示弟子似但師長自修即可然於一一弟子皆當明了觀想巳二請白令持次由東門令其請白入壇教令誦云生老死可怖如摩竭魚等度我出有海大樂師唯汝大菩提法固依怙我樂求賜我三昧耶賜我菩提心佛法僧三歸亦請賜授我大解脫妙城依怙令我入然燈賢說三請答日迦跋說令供曼陀羅呼師長曰大樂唯汝一人是我大師大樂是金剛持之名視師應同彼也寂靜師說法是彼道固是餘不能壞金剛頂亦云菩薩法堅固樂求者即欲彼三昧耶謂咒續印等賜我菩提心者金剛鬘及金剛頂經作賜我諸律儀三皈者謂皈依三寶金剛鬘及金剛頂無此二句律生中有金剛鬘經有同初三句者餘文易解今解彼義以猛利欲而行請白次以一弟子為上首普對一切如是告言令其受持兒來此大乘密咒行儀軌應正開示汝汝是大法器身語意金剛三世諸佛陀以金剛咒力正得無等智無等密咒行釋迦師子等諸佛以大力降伏惡魔軍達世間隨衆轉法輪涅槃為得遍智故兒當修此慧大乘密咒行句餘曼陀羅儀軌多作大乘之密咒儀軌者謂方便說彼之理謂因汝是大法器故其次四句律生僅後二句毳衣大師曼陀羅儀軌中具有四句諸佛能得智慧係金剛咒之力寂靜論師謂是念誦之力大師由了達或證知世間隨自行弟子之心行而轉法輪毳衣大師曼陀羅儀軌亦譯云知世間隨衆此者謂密咒法此是曼陀羅儀軌中所引大日經文現譯大日經中第二頌作過去諸佛陀如是未來者現在諸依怙利生住世者彼一切了知此勝密咒法勇士往覺樹獲無相遍智無世間隨衆等二句總之三世諸佛皆依咒軌乃得成佛汝欲成佛亦當依止此咒前白云我樂求豈非自白己樂咒道此處何須教欲咒耶答云無過意謂如汝所請我為汝作汝莫散亂當善持此是令勝解堅固故鬘論說此名令正受持巳三受戒加持此中毳衣大師寂靜無畏寶鎧常金剛毗布底俱說令受共戒阿闍黎戒此二戒體如寂靜論師云此中若有律儀雖不作阿闍黎亦可與者是總律儀謂即皈依及唯發菩提心如前已說若須作阿闍黎方授與者是阿闍黎律儀謂即五部所攝此說皈依為先發菩提心是共律儀五部律儀是阿闍黎不共律儀鬘論與律生釋亦如是說唯發心之唯字但遮五部所攝之三昧耶非遮諸行而但說發心也共不共者不空足云次應傳與事行部等共同律儀及無上瑜伽部十四他勝六粗罪等彼謂四部所共名共律儀若傳離十四根本罪等三昧耶為無上瑜伽所獨有然非唯爾亦共瑜伽部故以瑜伽部亦說用受五部律法受律儀故若謂不許瑜伽部有十四他勝罪者則與金剛頂經所餘十四種說為他勝罪成相違故是故阿闍黎戒為瑜伽與無上瑜伽兩部共有不共事行又如弟子灌頂於受不受五部律者皆可傳授名共灌頂若阿闍黎灌頂唯傳與受五部律者故名不共灌頂如是第一律儀隨受阿闍黎與弟子何種灌頂皆須受持故名為共第二唯受阿闍黎灌頂者方可授與故名不共又第一是菩薩律儀故是顯密所共第二唯金剛乘律儀故名不共是故安立共不共別總有三義傳授二律儀之儀軌前六論師皆許我皈依三寶等四句及受五部律法故令三誦我皈依三寶悔除一切罪隨喜衆生善意受佛菩提而授律儀此儀軌是幻網第二及金剛幕十二中說若問初三句義但是皈依懺罪隨喜非受戒軌第四句中亦不顯說受戒云何可作受戒儀耶答云實爾故第四句當如歡喜金剛及依寂靜論師論中所說作發心佛菩提以是受發心故唯受願心非是律儀故知是受行心以此略文受律儀者是依最利根者莊嚴能仁密意論云皈依佛法僧乃至證菩提謂依色身法身菩薩僧寶自當成正等覺拔此一切世間令出苦海安立正等覺位是故以此略法令上上根發菩提心律儀自性以此受菩薩戒文簡難了故阿闍黎當為明顯曉示初三句為受戒加行第四句為受菩提心及菩薩行之法金剛幕經十二彼四句後尚有皈依佛法僧乃至證菩提發此菩提心為辦自他利我發菩提心希有請有情行菩提勝行為利生成佛若受戒法連此儀軌而受易於曉示集學論於具行法之發心說為受戒故以儀軌兼行受者是受戒法但受發心則是發心儀軌寂靜師云又於何者唯應授與明灌頂耶謂諸不求阿闍黎灌頂者或雖希求而唯受總戒不受阿闍黎戒者此說若不欲受阿闍黎灌頂者及雖欲受而唯護持共戒不護不共戒者唯傳弟子灌頂餘五論師亦如是說故唯護菩薩戒而不護咒戒者除弟子灌頂外不應為授阿闍黎以上之灌頂若傳諸上灌頂則必應持咒戒是故蓮華鈎等於事行部受五部戒不應正理以智點經說彼二部除水冠等無餘阿闍黎灌頂故事行部經以及堪為正量者之解釋皆未說受五部戒故慶喜藏師亦明顯說不受五部戒者不傳阿闍黎灌頂故此於根本罪釋已廣說訖總之受共律儀即受菩薩律儀復是受學菩薩六度等行故應了知壞菩薩戒諸根本罪因緣勤慎防護不應妄執學六度行與學咒道違如水火攝真實經與金剛頂所說全不護戒但可入壇之義慶喜藏師明了解釋佛密論師亦以但可入壇釋大日經如餘廣說如是具共戒已為受阿闍黎戒更令請云輪不退灌頂最勝傳授我依怙輪諸尊真實上師業諸佛三昧耶密戒願為說為利諸有情恆為阿闍黎次令發菩提心三誦一切諸佛菩薩請憶念我我名某甲始從今日乃至未證菩提如三世諸佛乃至立生於涅槃此文通行故不全録此請白者寂靜論師說是已受近事等戒無畏論師慶喜藏等亦說灌頂弟子須受別解脫戒故若堪受別解脫者應先傳與近事以上別解脫戒亦須受有菩薩戒者寂靜論師說彼手中捧花先禮阿闍黎足散花請白毳衣大師亦說頂禮阿闍黎足餘師亦同請白之義謂為利有情故令我作阿闍黎請說彼法此由授我能生不退殊勝種子金剛阿闍黎灌頂故成阿闍黎輪者灌頂處之壇輪有作輪之謂曼陀羅阿闍黎之灌頂言輪諸尊等者謂請說曼陀羅及天之二真實并阿闍黎諸事次第請傳阿闍黎之勝三昧耶及律儀者謂諸佛等四句諸曼陀羅儀軌或有不作此請白者若不作此請白則於前請白時當為說此等義令於一處請白受律儀前說律儀者如金剛頂經說無上部曼陀羅儀軌亦多如此然亦有不說律儀者彼二隨依何者皆可然阿闍黎皆應先令了解五部三昧耶之大概俾令弟子善發為利一切有情當受五部總別諸三昧耶之心而後受戒以緣戒生欲受之心及於諸三昧耶不分類別欲受一切是發戒體必不容少之因支故以是金剛頂經說應先問欲不欲受無上部曼陀羅儀軌堪為量者亦多作如是說如鬘論說誦此儀軌三遍龍智及難勝月明顯雙運日生寶鎧毗布底等亦多宣說此最重要以任何戒凡能發生戒者決定須於正行儀軌無殘缺故故初受及退失重受正行儀軌定須圓滿三誦有說如三世諸佛等初四句明發心其次四句受菩薩戒餘者受密咒戒不應道理如上所說諸大論師皆別宣說受菩薩戒之儀軌故從如三世諸佛至立生於涅槃多說是受五部律儀之儀軌故故彼文中所有受二發心學三聚戒是受密咒律儀支分非受共戒藏師有云若廣宣示律儀則可略受戒云如尊所教敕我一切奉行即此便足若略宣示律儀則應廣受此極非理金剛頂中宣說戒相最廣然受戒時仍用受五部律儀之儀軌毳衣大師寂靜勝賢師等亦廣宣說其受戒時亦以受五部律儀儀軌而受故受咒戒之儀軌無上部二經與金剛頂經俱說是受五部律儀法故故僅受三昧耶與受咒戒儀軌非無差別受咒戒之時者薩惹哈與慶喜藏等依金剛頂意趣說於正行時受龍智與難勝月答日迦跋及鬘論等則說於此處受然燈賢等於問夢相後受故在任何時受皆可生戒於正行時受者彼阿闍黎於先自入壇時如前所說觀想而受縱先犯根本罪亦還生戒則於傳弟子時自亦具足律儀若在此處受者以根本罪數多易犯現是防護極緩慢時應審觀察自身而傳多應自先入壇次傳弟子律儀乃覺契理發生戒之時者三說儀軌即生不待獲得瓶水灌頂與冠灌頂以金剛頂經云安立三律儀次示曼陀羅說於安立咒戒之後方顯示諸尊故此論中說次以甘露瓶咒守護如何作者如難勝月說灑香水或如三昧耶金剛說以手按弟子頂誦甘露瓶七遍鬘論與隨行者說諸弟子心喉頂上如次想有金剛蓮花妙輪其上如次有二日一月或一日二月上有黑色吽字紅色阿字白色嗡字次誦彼字以執金剛右拳於心等處塗以香水頭上供花面前供燈心間復供以香然燈賢說修觸念誦皆自下起漸從三字變成三相三字莊嚴明顯雙運則說修觸念誦自上漸起隨一即可說修三相者多唯慧鎧說修身語意三尊然燈賢等說誦一切業咒供諸供物寶鎧則說各以自咒而供亦有說供食與樂者總之應如答日迦跋等說於諸弟子生為主尊三處修三金剛相後即成供境而應供養從今日起乃至未染生死過患恆應具足供養巳四令投齒木給三水等投齒木處鬘論說作四肘方曼陀羅塗牛糞等言如牛皮許者毗耶跋達說是厚薄之量作怖天說四方圈內畫八葉蓮上安花聚堪為量者餘均未說投齒木者無憂等木此處難得可如龍智所說用有乳木非太粗細端直無蟲不裂無傷兩端相等洗以香水熏以燒香長十二指端繫妙花次阿闍黎面向北方授與弟子弟子向東或北口誦嗡班哈薩兩手夾持木端目向上視心無希望向前投擲總續中說向北而授弟子弟子向東而投若阿闍黎未能念誦長咒加持齒木可如不空足說誦摧魔咒即集密之事業尊咒或可如難勝月說誦嗡阿唧哈桑跋惹達尼吽七遍慧祥師說投齒木已想從青色吽字放光齒木亦成光明餘諸智者論中皆無此說投木之相若向東北西南上下而墜如其次第能成息災增益愛敬降伏持明地下悉地若落壇外即無成就向者意謂木端所指隨繫花處說彼為端次從字生水誦加持授令嗽口次給三掬甘露咒加持之香水念誦嗡室毗虛答達摩薩嚩跋𭋞尼阿茜穴答耶薩嚩毗迦羅跋那阿跋那耶吽而注漱口及三掬水鬘論分別而說藏中有說為右手者然作怖天說是左手藏中有許為令夢想明了然龍智與答日迦跋說是為淨語罪次從吽字所生吉祥草聚誦吽字及甘露瓶咒草端未壞以為敷具如是為作枕故從什字生少吉祥草誦什字與甘露瓶咒次誦嗡班底叉拏𭋞而授與律生經云什字咒加持授與吉祥草難勝月說二吉祥草皆從什字所生論說前者作敷具用者多故後者作枕用者應少藏師有說多者交與右手少者交與左手三昧耶金剛但說交左手幻網經云木草交掌中則說彼二齒木與吉祥草俱交合掌之中毗耶跋達說此為令瑞夢不錯亂故次從吽字所生紅線長齊弟子身量而作三折念誦甘露瓶咒七遍結為三結或為六結繫於弟子右臂有經說繫左臂口誦嗡補答梅只惹卡惹卡薩嚩那娑訶親為繫縛而作守護線齊身量作為三折即是身量三分之一彼結六結或結三結繫右臂或左臂皆可大日經說繫左臂幻網經說繫右臂龍智毳衣難勝月等多說繫右臂結三結金剛鬘經說線量長一肘四指結三金剛結纏左臂三匝藏師依於男女而分左右及於結處所有作法曼陀羅儀軌中未見說此龍智與明顯雙運說用童女捻線慧祥則說於五色線修從吽字成金剛線餘為量者皆未說此巳五慰勵守護觀察夢相誦云諸佛於世間或時出不出塢曇鉢羅花多時乃一現無等利有情能不般涅槃密咒行出世較前更希有昔多俱胝劫所造諸罪惡見此曼陀羅彼一切當盡況能正安住無邊稱咒行持誦能救咒當得無上位諸於此勝行妙慧最無垢生苦諸惡趣彼等皆寂滅汝等諸大士今得無能等汝等由何法能為佛菩薩於此教攝受安住而生長汝等即由彼善生大乘中此吉祥勝道能出最大乘由此令汝等皆當成如來宣說此義令生歡喜無等利有情等二句現大日經中無釋亦未說然曼陀羅儀軌多有說者從第一句至更希有說咒出世之少其次四句明見曼陀羅之力大再次四句明誦咒修行之力大再次四句明信咒之力大言見曼陀羅者非唯眼見要具三法乃有彼力一加行謂為入曼陀羅故悔罪皈依受戒二根本謂正入曼陀羅時發菩提心見佛菩薩像及印等發生淨信三見後謂受持不謗正法不捨發心等三昧耶由具三法見曼陀羅能淨多劫所集衆罪無邊稱者大日經疏說是無量功德名稱之咒寂靜論師說佛為無邊稱慧無垢經作慧無動謂於咒義心不散亂攝受經作正生疏謂今日正於大乘中生明日已生於大乘中鬘論則於入曼陀羅說為已生咒行大乘是生無上菩提正因故名出最大乘經疏釋此為出生大與鬘論說大乘能生最大勝果義相符順次以甘露瓶咒守護弟子令持誦故當傳其咒教云各觀所夢明晨來為我說或於曼陀羅室或於餘處令如獅子而臥爾時如總續云敷吉祥草處令首向東臥亦如薩惹哈而教云汝臥草敷具賢者明早起汝等於明日即得見佛頂廣大曼陀羅佛頂僅是一例辰四舉升曼陀羅夢相吉凶應如何行自入曼陀羅室為守護故應誦甘露瓶咒毳衣大師於此及前二處皆誦主尊根本真言此處為彈如下所說智線等故供養預備諸尊舉升虛空舉升之法依前所說咒印而作毳衣大師說請白後無間即舉答日迦跋等說明日方舉鬘論則說於此時舉又總續說送往薩惹哈說攝入自心餘論師說舉於虛空共為三法翌晨師先施食問諸弟子夢相若見三寶與親友等讚慰令喜若夢從山墜等應為守護又分夜分為四前三分中夢無定故取第四分如曼殊根本大教王經云初夜分諸夢當知從痰生次從膽病生世人所輕忽第三由風起第四乃真實遮凶夢之方便甚為繁廣鬘論說以甘露瓶咒守護然燈賢說以摧礙咒摧伏龍智則說修無我義而為淨治總有二種遮止方便總續說作息災護摩此為最善答日迦跋說以一切業咒摧伏弟子惡夢若阿闍黎有惡夢者說有多種遮止方便如云所夢吉或凶明晨為我說一切業治凶若阿闍黎耶見不善夢相於護剎空行如法施供食誦百字堅固遍修守護輪誦一切勇識親口所說咒披甲自防護勇識瑜伽母白莊嚴住慢勤作供火業息一切魔礙此依勝樂說以施食護輪誦咒修披甲尊請白諸尊著六莊嚴自住天慢及燒護摩七種遮止方便餘尊亦同餘時若有惡夢亦可修此最為善哉寅三餘曼陀羅預備依止布繪而灌頂者前說三論師中語自在稱雖都未說預備但說正行然餘二論師羅睺羅友與常住金剛說瓶與弟子預備故此二法決定應作依止靜慮曼陀羅者如前已引鬘論說訖依身曼陀羅者須否預備諸梵典中皆無明文或如藏師許為不用或准靜慮曼陀羅法亦可頌曰灌頂近分預備法能成甚深道法器由見預備清淨軌於密法中最殊勝故雖軌則微細分亦從智論善攝集不違諸佛菩薩意以顯了語善宣說繪修供養曼陀羅儀軌次第品第七之一丑三正行儀軌分三寅一彈智線分彩色寅二安諸瓶飾壇場寅三修行供養灌頂初又分三卯一彈智線卯二分彩儀軌卯三繪壇辟魔初又分二辰一預備智線辰二正彈次第及送往法今初自先東向修金剛持或修主尊瑜伽獲得瑞相線因與撚線者如前已說次將五聚五線置五器內用芥子末和五甘露香水調為五色別染諸線金剛空行與律生經說具足五智之二十五線以鬘論說五聚線以五智為體一一智中有四智隨行故又以一一種子各放收五如來故為二十五線由是線數決定須二十五染色之法除前所說勿用其餘次與弟子俱如前修於左手中從小指根至大指根安布諸線白者毗盧黃者寶生紅者彌陀緑者義成藍者不動為體各各從自種子而生種子為繃蕚什吭吽或繃蕚繒吭吽或嗡娑痾哈吽即是諸經所說五部種子智尊入三昧耶尊者謂前升虛空之各方諸佛攝為五尊從彼心間繃等種子出生智線光明為體口誦嗡阿夏穴達班蘇多羅梅波羅耶剎摩訶曼陀羅蘇多羅孥耶吽白毗盧佛次於夏穴達處改為其餘四部佛號啓白彼佛咒文義謂為彈大曼陀羅線故請授我金剛線夏穴達者常義即勸請毗盧佛次於左右二眼安立黃色字如次成為黃色日月自性口誦嗡底達枳札蕚姑希眼睛疾轉眼睫啓合以如鈎狀熾然視法鈎召毗盧佛等所生諸線入自手內各色線中薩惹哈與黑行論師說是召請諸尊毳衣大師燃燈賢等多說攝召諸線次共弟子念誦嗡阿阿那臾內阿奴伽達薩嚩達摩薩帕惹薩帕惹阿奴波羅毗札薩嚩達摩阿達印達阿奴波羅毗札薩嚩達磨嗡阿吽先將五線搓為一線次將五線合搓一繩第一咒義謂一切法互相隨行即是互相安住第二咒義謂一切法互相隨入即是相互錯雜第三咒義謂一切法極相隨入即是互雜不可分別律生經云諸法性自爾令線互相合線之長量除在師徒左手從食指繞四指中部由下伸出以食指背按壓地處餘為曼陀羅之兩倍粗為門量草分之一搓畢置於前說香塗地上之金盤等潔淨器中以妙香水及五甘露牛生五物侵潤入三字中香花供養用手摩觸誦甘露瓶而為守護四百五十頌云入三字行者釋云入三字已故非三字入於線內是攝線入三字之中此如歡喜金剛次第儀軌中說嗡阿吽三安於二邊及以中央左右二眼次從摩札二字變為日月口誦班底枳摩札令堅固住灑誦一切業咒之甘露水以及芥子香水右手執杵而摩觸之先誦嗡班三昧耶蘇多羅摩底札摩吽再誦三種子字一百八十遍而為預備辰二正彈次第及送往法次以一切瓶水散灑曼陀羅地念誦嗡薩嚩桑穴達尼吽泮於作淨法之地塗以妙香外面散花想空中有所繪之曼陀羅奉獻閼伽為先供養稱讚自與助伴次修左右二目從所成日月有黃色光此如律生經釋所云月日次第而修次自左手作金剛拳執線平臍誦雜雜雜三字及三字授與助伴彼亦念誦諸字而受以左手金剛拳平臍而持想一切方皆平等性與不背師行之弟子同以持杵右手大指食指提線而彈并應彈指作聲凡彈一切線時皆誦嗡班三昧耶蘇多羅與吽嗡娑阿訶弟子不背師行彈業線時亦同觀想以此彈線之聲勸發遍虛空界諸佛諸佛降臨入諸線中如鬘論說彈線之聲表示是汝利生時故當降臨此然燈賢毳衣師黑行薩惹哈等亦作此說故但應想彈線之聲為是汝利生時等義不須自誦其詞如是入智線者義為以彼加持業線此如前說彈線之前雖先明想虛空有所繪曼陀羅修供養等然彈線時非想出生所繪之曼陀羅是勸諸佛而令攝入大日經疏說彈虛空之線以在餘壇已用非是新者不在地彈故應別取五色線彈然彼建立此中不許如前已說慧鎧論師曾於歡喜金剛說彼建立極不應理以須用彈虛空之線加持業線故亦應以彼彈地也彈空無間即彈地者鬘論等說師資之手同時下降而彈俱彈虛空與地線者諸大論師曼陀羅儀軌中僅說彈二梵線諸餘智線不須向空彈也傳謂勇金剛所造之曼陀羅儀軌云上望而彈十六智線下視而彈十六天線然不可信若爾於地彈智線時為有加持業線觀想否耶彈智線時須想分出五智為體五色智線入業線中如前所引寶金剛論亦說攝入智線耶茜那亦云分布彩色時由誦根本咒舉智線於空繪畢仍降入說分彩時為免跨越智線之罪而舉智線於空故於彈智線時應如前說攝入最為明顯若不爾者應無智線可舉毳衣大師鬘論亦說舉彼至下當說又鬘論與律生經釋說於地上彈智線時以彈虛空觀想而彈故以彈線聲所勸發想降臨之諸佛皆入線紋此與前說觀想是彈智線正行須無缺失所彈智線之量如鬘論說彈二梵線從此光鬘至彼光鬘意說長線若用短線彈者則從杵端至於杵端彈二角線從此垜端至彼垜端彈諸根線為壇輪量彈諸餘線亦如業線牽繩而彈如前已說彈智線畢即應送往金剛空行與多曼陀羅儀軌中皆說五色線彈一切線後即送往故又以智線加持業線無分別故彈智線後隨跨何線須以金剛勢而入故故於一切業線悉皆應彈智線彈智線時毳衣大師說阿闍黎手執鈴杵當如是行先應以金剛拳持線後可隨便而持如金剛空行云左手金剛拳平臍而執持其後隨便持修一切方為平等性謂旋繞方師弟住處面所向處及彈線次序等如前廣說如鬘論云於空中持線時以金剛足又云於地上彈二梵線時左足作半跏趺右足著地弟子反彼二隨行者亦如是說前者毗布底謂以金剛步龍智亦說故行走時如前所說加持雙足而行正彈地時應如所說坐法而坐餘線亦同業線亦如是彈智線業線名義云何體以五佛五智為性相為五色線狀故名智線以是一切業尊為體之線故名業線猶如業瓶如是善彈一切線畢供養獻食次誦嗡阿吽班穆想諸智線入前所請預備諸尊心間其五色線如應安置原處
