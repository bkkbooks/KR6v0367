body:
  text: 宗喀巴大師造法尊法師譯預備儀軌次第品第六之一丑二預備儀軌分三寅一預備總建立寅二各別預備儀軌寅三餘曼陀羅預備今初預備法者結合七觀察第四品中說地神預備後續中說初天預備次瓶預備後說弟子預備共為四種預備且皆說於預備之時龍智答日迦跋然燈賢等亦於彼時說彼四種其中地神有在地軌中有而預備時無者如金剛空行經及黑行論師等諸論有在預備時有而地軌時無者如結合幻網經及龍智然燈賢等所著衆多曼陀羅儀軌有二時俱有者如鬘論等共有三派彩線繪畢之後律生經說弟子預備黑行論師及難勝月則說修瓶持祥論師亦於修曼陀羅之後修瓶次說弟子預備鬘論雖如律生經說然非在預備時不作弟子預備下當廣說地神與天預備須在預備時作弟子預備不論說於何時實行唯應在預備時實行修瓶亦須先修鬘論於瓶預備後說天預備者是依然燈賢於瓶預備之後啓白天預備之次第此是啓白天之預備非謂天預備之正行不在瓶預備之前也如鬘論云曼陀羅地塗以妙香散布衆華下午作天裝來入內於地中央面向東坐或可由東向西而坐具曼陀羅主尊瑜伽於諸尊處用甘露栴檀紅花等作諸圓壇善修自三昧耶輪已請召住虛空之智輪令入彼中供養稱讚嘗受甘露次於所修曼陀羅外東方等處安置諸瓶或於餘方面向北方應善預備自在隅處諸瓶此說於諸尊處塗香壇基作天預備其後乃修瓶預備故若如是修亦順四百五十頌釋然燈賢云妙香等塗地散布衆妙華安立月輪等智者作壇場於彼諸智輪次結縛界等供讚嘗甘露次應預備瓶其釋論中亦如鬘論說於下午天裝入內修主尊瑜伽已於諸尊處各想自座於彼召請安住虛空智輪供養等已修瓶預備釋論於啓白天後云此是天安住之儀軌說在瓶安住後然本釋二論皆未於彼說天預備之正行鬘論雖似說於瓶預備後修天預備正行然是為令知啓白境而說非說於彼作天預備故天瓶預備之次第同金剛空行結合及然燈賢等此等是正行儀軌之近分故名預備亦名增上安住其增上義日生論師說是善住寅二各別預備儀軌分五卯一地神預備卯二諸尊預備卯三瓶預備卯四啓白諸尊卯五弟子預備今初釘橛畢坐壇中於自面前作香壇場或如寂靜論師說於壇中作香壇場於彼修從字變成地神律生經說從字生金剛空行則說從朗字生次想手中月輪有三吽字指端按地三次毳衣大師說以持杵指按以按地聲吽字光明策發智慧地神從地湧出而與修者相合具歡喜心其身黃色著白色衣具諸莊嚴一面二臂左執金瓶右手作無畏印此二手相同律生經結合說與智尊相合金剛空行經說湧出半身兩手持瓶不入智尊修供讚等梵典多如是說供彼閼伽等後三誦嗡善來極善來地神世間母衆寶充滿母妙飾莊嚴母瓔珞鳴釧母供金剛心母受此閼伽供善辦壇場業默默默默默娑訶此是請召與請住之預備言善辦者意說請其安住或誦一切救世佛修行及勝德諸地波羅蜜汝皆與作證如釋迦獅子降伏諸魔軍我亦摧魔力當畫曼陀羅如是三誦而行預備此與乞地時之地神生不生及供讚等無有差別故儀軌相同善來等是結合七觀察文與金剛空行四十六品之梵語讚義同一切救世佛等二頌初頌出幻網經第二出大日經次想地神答云當如是行即入地中黑行論師等說想地神云欲令我何所為為答彼故獻供等後啓云一切救等次想彼聽許云可如是行次以兩手作金剛內縛而按地三誦嗡班集跋嚩吽想從金剛縛印所生吽字放光熾然乃至金剛地基皆成金剛次三誦嗡班只札底叉而加持之鬘論中說由此令地為自作證謂由前說諸軌能使地神為自作證說於諸佛往昔勝行作證與薩惹哈所說以手按地策發地神是佛昔緣起者如大遊戲經說大師告魔羅言汝行一次無遮施尚得欲界自在况我廣行無量百千俱胝那由他次無遮施魔言我如是行有汝作證汝如是行無有證者爾時佛以右手遍摩全身而按地言此地為諸衆生依動非動等無親疏此為我證我無妄汝應於此為我證說已無間大地震動發大音聲爾時地神共百俱胝眷屬於大地震未久從地涌出半身一切莊嚴之所莊嚴恭敬合掌白言大士實爾此我現見世尊即是人天世間勝證勝量聞是語已魔軍逃散福頂大師說如昔時作證現我念誦圓滿於曼陀羅獲得自在願亦為我作證大日經疏中云如昔大師在汝地上行菩薩行已坐菩提樹下降魔成佛汝為作證我亦為利有情於汝地上畫曼陀羅當成正覺義謂願為作證令無魔礙乞地與預備時同誦一切救世佛等其差別者前是求地作曼陀羅此是於彼作曼陀羅求其作證此時自修之天瑜伽意說前吽迦羅瑜伽即可是故未說餘者若於餘時可用壇主瑜伽卯二諸尊預備分二辰一為定天處故彈線辰二應如何修天預備初又分四巳一彈線曼陀羅之量巳二彈線次第與時間巳三彈羯摩線之次第巳四釋所彈諸線之義今初此中彈曼陀羅線當齊何量而彈耶此中有二一由諸尊建立二由施主建立初如幕經第二中云金剛持三肘佛壇四肘量五肘作明壇舞自在六肘七肘馬王者此說不動毗盧寶生彌陀不空成就之曼陀羅從三肘至七肘集密經說身語意曼陀羅如其次第十二肘十六肘二十肘此依四面根本線說前者亦爾二施主者如轉輪王說廣踰繕那量觀待所化鬘論引教說畫掌許亦可是故曼陀量但隨共許而說非定唯爾如世尊云若贍部洲主或轉輪聖王周圍踰繕那應畫曼陀羅智者應正觀所化衆生心隨欲而為量全無少過失隨欲曼陀羅畫於手掌中尚辦論說義况畫於地等以是然燈賢云依有情意樂立為定量等方便慧所生悉地量何定此從一肘起乃至於千肘如是輪彈線此說為彼樂數量決定者安立肘等定量事實不定龍智亦說隨弟子力所能從一肘起乃至千肘律生亦說從半肘起巳二彈線次第與時間彈羯摩線與智線有無決定次第耶二線次第決定應先彈羯摩線次彈智線多數智者論中分明說故龍智說是次第最為明顯薩惹哈云先以白粉等决定依次彈其上彈智線應周遍舒展如說先彈白粉所塗之線次於彼上再彈智線黑行論師亦如是說難勝月云如彈線次第善展彈智線又云如經所說線於變化壇彈更善彈智線謂如所彈羯摩線之次第而彈智線跋縛跋札亦云先彈一切羯摩線已應展智線不空足云於一色線加持一切羯摩彈為土線於彼線上再彈五色智線加持初線此說智線能加持羯摩線寶金剛論師云如業線次第應善展智線又云於曼陀羅線應融入智線彈智線者是將智線融入羯摩線中而加持之故定須先彈羯摩線有許先彈智線後彈業線謂是金剛空行彈智慧線已應善作此業及律生經智於空彈線如是向下彈所說不應道理金剛空行經云彈智慧線已次應作此業分布諸顏色豫欲及解脫此謂彈智線後而繪彩色非彈羯摩線也跋嚩跋札於金剛空行釋亦說先彈業線後彈智線律生經說如於虛空所彈智線亦於地彈彼是說於虛空彈智線後再於地彈智線之據非彈智線後彈業線之證若不爾者龍智亦云師資緩行金剛步如於虛空所彈線如是應於地上彈黑行論師亦云向南方站已於空如是彈又云地彈二梵線說於虛空彈後無間於地上彈毗布底云爾時如虛空線雙手平降於地彈二梵線汝許彼三乃是先彈業線後彈智線之宗寧不相違其尤甚者成立先彈不彈業線兩派二線各別引大日經疏說已於餘壇用訖智線不堪作業線者亦未應理智線誠不可再作業線用然彼疏文是說彈虛空之智線不可作彈地之智線故所引文不足為證佛密論師以在餘壇已用之理成立前線不可用者非成立智線不可作業線是成彈虛空之線不可彈地故此如大日經云於東舒展線齊臍執持已應於空擎持次往至南方應向北方畫次將第二線自以親手取謂彈虛空東西南北二線後彈地者另取餘線解釋前線不可彈地之意如略疏云意謂由於餘壇已用同劣物故文疏亦云次自取後線者義謂前線由於前壇成劣不適畫用是故另取餘五色線用畫後壇經說二線初謂於空彈自性曼陀羅次謂於地彈彼影像之曼陀羅彼二皆為五色羯摩線則唯一白色意謂彼易知故經未明說又略疏云其彈曼陀羅線說二種五色線謂於空彈自性曼陀羅線及於地彈加持彼影像之曼陀羅線如云說線有四種謂白黃紅赤及說為黑色第五說如空向虛空持已應觀彼為壇又以第二線於地建壇場又云雖未明說濕線之相為離顏色錯亂故唯用一白色文疏亦云如是牽線分地捻一白色線為濕線許二種五色線及一種獨色線共三線故以是彼引諸證欲成諸線各別應許彈虛空之智線不可彈地如是則與律生及多定量無上部曼陀羅儀軌皆說虛空地上二種智線用一線彈及汝自亦作如是行皆成相違業線雖定不彈虛空智線則可俱彈空地故不應執凡彈地線一切皆用羯摩線彈佛密亦說用五色線彈地是為加持曼陀羅線其所加持之事即一色線所彈諸線故若不取講說次第而依實義次第則諸意趣皆不相違彈虛空之線不可彈地者是別建立彈智線時更當廣說雖般若室利於歡喜金剛曼陀羅儀軌中亦同大日經疏說三種線然堪為依據之無上部教皆無說者故不可信金剛空行經與律生經四百五十頌等五色線外未說餘線說用彼線彈諸線者意為先已彈羯摩線即如是彈智線非許即用彼線而彈業線如薩惹哈黑行論師雖說用五色線而彈諸線然亦宣說先彈線業次於彼上更彈智線鬘論中於證線量有六十四分時引經云次作白色線於彼說白色線然亦說五色線故許有二種線線有六十四分與九十六分兩派者非謂論師所許彼此相違是明各續之規則故寶鎧與毗布底二師所說線等建立隨鬘論行前者寶鎧雖未明說後者於勝樂曼陀羅儀軌引云初先彈白線其後彈智線答日迦跋於說五色智線以後次云大血所染線三縷具量度用甘露白檀善塗而彈線此說前線為草五縷後為三縷故亦是說智線與羯摩各別此師曼陀羅儀軌云八種智線後應想賢善相次分諸部分其善非謂彈智線後再以業線分各部分是彈八大智線之後彈餘智線以餘智線須具彈故二線次第如是何時彈耶羯摩線者應如龍智琅迦勝賢耶茜那說於天預備之前金剛空行經云於諸如來處栴檀等方壇此說曼陀羅中何處有天即於彼處作天預備香曼陀羅若未彈線則不知彼處故難勝月云決定壇何處即於彼壇塗五香或餘香毳衣大師黑行論師寂靜論師日生師等多說天預備塗香之處即為諸天處故彈智線者如龍智說於弟子預備後彩畫之前堪為據者多如是說故當於彼時彈巳三彈羯摩線之次第分二午一預備繩線午二彈線之法今初繩線之因如答日迦跋云由淨未壞棉此若難得則可用潔淨未壞未雜毛髮之棉線作之搓者及如何搓如總續云其彈壇繩線染色淨堅細如是童女搓新鮮極潔淨美妙最柔和香馥安樂觸善搓撚為細搓令粗細等無諸結斷過花香供線繩智者彈諸線言染色者意說五色之線此論師鬘論作者即無畏論師與勝賢耶茜那說用童貞女所搓線或勇士價值所買線故若隨賣線者所索之價不與論價付值而買則餘人所搓者亦可日生說具三昧耶者所搓故彼搓者亦可線之數量如答日迦跋說三縷白色長短粗細之量猶如智線除執手處為曼陀羅兩倍門量草分之一初句指長量次句指粗量生起儀軌生為一切業尊此是跋嚩跋札與不空足所許塗以香水及五甘露牛生五物置於金等器中自具正尊瑜伽辟魔清淨為先生為各各法之一切業尊入智尊等供養稱讚用手觸著誦甘露瓶而為守護再灑曾誦一切業咒之五甘露水與芥子香水次用持金剛之右手摩觸誦嗡班薩摩耶蘇札摩底札摩吽誦三字百八遍以為預備此等二線相同次如勝賢等說用和白檀之米粉或石粉或餘白粉染其繩線午二彈線之法分二未一彈曼陀羅外線法未二彈曼陀羅內線法初又分二申一彈二派共同線法申二彈二派各別線法今初從於曼陀羅地灑以瓶水至供讚虛空曼陀羅應如後說而行先求曼陀羅之中心作一圓點次於四方以量等線各作一點次以長過前量之線於四點上各作一圈此處雖但說作四圈下文說拭五圈故中央應亦作一圈此中東西南北與中央各作一圈者為求東西南北兩條梵線即縱橫之直線與兩條角線即四維斜線之端直次自修為正尊瑜伽想助伴為毗盧遮那或甘露軍茶利放線取線及持法等當如下說而行生為毗盧是龍智說生為甘露軍茶利是寂靜論師說毳衣大師說弟子作本尊勝賢論師說生為段生母勝樂中之一尊日生論師說為伽摩日歡喜金剛之一尊此謂弟子有為自之本尊或各壇之一切業尊二派次金剛空行經云緣諸方平等衆多曼陀羅儀軌中亦說觀一切方為平等性而後彈線謂東方等唯是分別假立都無自性故應先想無性平等由此可滅方向錯誤之過彈八大線之次第者如金剛幕經第八說先彈梵線次彈角線次彈根線即曼陀羅墻外之方線此師依彼即說如是次第律生經疏亦如是釋答日迦跋黑行論師薩惹哈及勝賢論師亦作此說現見亦是毳衣大師意趣龍智與四百五十頌本釋跋嚩跋札日生師等則說梵線之後彈根本線次彈角線此非父續母續之別以鬘論依二續共義而說跋嚩跋札說是金剛空行經意日生論師則於歡喜金剛曼陀羅儀軌而說故其梵線中薩惹哈及黑行論師毗布底說先彈南北梵線次彈東西前列諸餘論師則說先彈東西次彈南北藏地智者說毗布底所說之南答日迦跋所說之東二者義同以隨勝樂所向為南即立為空行母之住處故毗布底說故隨所向為南諸瑜伽師意故此是毗布底引布嚩具慧師曼陀羅儀軌之說如云行至南門後遍繞諸餘方是母續次第瑜伽續從東繞至南門等是為實語者說畫曼陀羅應觀為世俗方由無量分觀南等非有所說面向南行者知世俗此謂瑜伽母續說由南繞瑜伽續中說由東繞畫曼陀羅雖說二方不同然同知方非勝義有是故南方是如言義又毗布底引布嚩具慧師教云先面向獄主住壇輪地北於空地彈線謂彈初梵線時面向有獄主方說北既是曼陀羅地之北故知南等亦為壇外彈角線者如此論說彈火風角線後次彈第二角線前諸論師亦同四根線之次第如此論說東西北南依次而彈答日迦跋然燈賢勝賢等亦如是說龍智與黑行論師說東南西北依次而彈毳衣大師別說東西南北依次而彈亦有先彈西南二根線者故無定准彈梵線角線根線時師資各有二處决定彈梵線時師長二處為北東弟子二處南西是說先彈南北梵線三師所說前敘諸餘論師則說西南二方為師長處東北二方為弟子處此與律生第十七說相順如云西方及南方師長定善住東方與北方弟子處等引此等亦非二續之別隨依何行現見皆同彈角線時如此論說師長二處謂火與離實弟子二處謂風與自在前敘諸師亦許然勝賢與耶茜那反上而說跋剎所譯中說龍智說師長住自在弟子住離實而彈角線賈師所譯與上相反彈根本線如此論說火風二角為師長處離實自在二角為弟子處前敘諸師亦同面所向者隨彼所住方隅即自彼處直向所對其餘方隅彈線旋繞總有三派如此論說右繞日生寶鎧四百五十頌本釋等亦說左繞者薩惹哈黑行論師毗布底等所說左右錯雜繞者如答日迦跋云由左繞加行彈一切種線隅分向右繞此說方線左繞隅線右繞而彈龍智毳衣大師未有明說布嚩具慧與毗布底於勝樂曼陀羅儀軌中說若不左繞有害弟子然金剛空行經則說此中師弟子應於右旋繞釋論亦如是釋答日迦跋亦說隅線右繞是故不須定執母續左繞如此論師說右繞為二續共規寶鎧論師於勝樂中亦說右繞勝賢論師於勝樂曼陀羅儀軌中說次師與修伴旋轉而繞行左行為主故應俱作左規然由世難達觀待作右繞耶茜那金剛空行曼陀羅儀軌中亦同彼說彈曼陀羅內外諸餘線時其旋繞法住處次第皆如前行鬘論中彈九品諸方線時作如是說毳衣大師說諸餘線以前法彈彈羯摩線龍智雖但宣說師資住處决定未明旋繞之法然當與彈智線相同必須師資共彈羯摩線者乃是龍智琅迦勝賢耶茜那所許諸續與曼陀羅儀軌於分彩土時說阿闍黎若不能圓滿分散如下所說容有例外彈線時說若有弟子則應同彈無者阿闍黎繫線於橛而自彈未說可無師長故彈二種線皆定須師長次從墻線至𣐟口線分為諸分彈線彼等攝頌如鬘論云東方等點上執線為四輪魚頭至尾邊彈梵線角線角門量七方方是十之代名謂從角至角十七門量也肘等根本線中拭八分一門分四小分根外離一二一二一一邊由角平六線從梵線漸遠三小分初線二線二小分端連八小三台線伸四線三為五小分四四分其初正觸平線端三各隔一分第四端平線具足十小分由根端出線四分再平竪各二分對直八分共三曲此門面門側門量不等者雖是九十六分線與六十四分線之共規然九十六分者門面門側門量有等不等二種若面側門量相等則無幡處暗處其台線伸四線則為伸二線也此師俱說長短二線毳衣大師薩惹哈等多說長線雖有經說門為壇輪十分之一及九分之一者然印度諸師皆未立彼名故此論師亦捨彼等而說八分此是金剛幕經與金剛空行之意趣印度諸曼陀羅儀軌亦如是說正彈線時如金剛空行云線斷師長死線長生疾病方誤弟子瘋應知彼事論說若有彼相應修治法而未說用何法修治應如治惡夢之方便又總續云有凶相不成又云長短生疾病如下所說之量若線長短當生疾病寂靜論師說師長病言方誤者義謂住處錯亂弟子瘋者如答日迦跋云方錯弟子惱謂弟子苦惱也有謂長短是指所彈紋線非是繩線彼非經義若果爾者則不應彈壇外長線所須外線不可彈故此線凶相為是彈何線之時耶寂靜論師謂彈二梵線時鬘論亦於彈彼二線後說故意相同日生說有彈二梵線彈八大線與彈一切線之三派故總續云故智於一切殷重善彈線謂彈二種線與作二線時應善謹慎申二彈二派各別線法其牌樓等由說二種線量故有差別此復總明線之長量謂曼陀羅兩倍粗量謂門草分之一如律生經第十七云長為輪兩倍門草分之一曼陀羅儀軌等多如是說說如是長量者鬘論說唯為彈梵線彈諸餘線彼雖無用然為彈二梵線故說彼量其梵線有長短二種若牌樓高度與法輪杵端共為二大分即二門量一大分有四小分者則從根線至彼根線為曼陀羅以此兩倍為線繩量若牌樓高作三門量法輪杵端合作一門量者則前線量不敷應用故是根本曼陀羅及其眷屬之兩倍如鬘論云唯以四根線內所畫之根本曼陀羅兩倍長線應彈六十四分梵線又云又曼陀羅亦攝雜金剛臍邊際謂曼陀羅及其眷屬即從根線外出八分共為四十八分說此等後又云故線繩量九十六分引文證成六十四分線云次作白線繩自與修行伴用白檀所和米粉而浸染梵線二清淨所有壇輪量應用二倍彈半為根本線此文出琅迦勝賢曼陀羅儀軌此云梵線半量彈根本線故顯線繩量為十六大分從墻至墻內之宮殿是為正曼陀羅從磚至𣐟此就平面畫圖而說是為施設於彼之支名彼眷屬如王偕彼眷屬行時唯言王行如是曼陀羅與眷屬同名曰曼陀羅故說曼陀羅兩倍者可引通二義也如是初者從中心至根線之曼陀羅內量與從根線至蓮蕊邊外量二者相等故從杵端為曼陀羅之兩倍後者從中央至𣐟線與𣐟線至光鬘相等故從光鬘亦為曼陀羅兩倍其中初說如律生經第十七云線相六十四是壇場線相此於初繞外圓線時說線相望為六十四釋謂六十四分之分為一小分薩惹哈與毳衣大師等亦多如是說如六十四分者則說牌樓高一門量龍智說門門框門面門側四量相等故說牌樓為門三倍者是高量若說橫量其最大層亦不及柱頂故以是龍智讚許二十四大分即九十六小分線二十四大分之牌樓與圓等如鬘論云柱端外平面橫彈十一線各捨一小分五七捨分半或可三七九各捨一小分第四六及十各為半小分餘五各分半彼雙方寬量於梵線左右箭分半箭即五數邊際條層二分半線長三分半六分邊第二第三長三分四分邊第四五分及五半第五條之下半也捨三分四半三邊六五分四線長七分十一線五分第五條上邊平量三分半七條下三分上半為六分諸條至邊線與餘邊相連成一曲其內離半分亦爾其外吠陀邊四分之外也圓線又二線各捨棄二分捨四餘圓線面側與門等則無暗條層彼中亦無掛幡條層十六大分即線長量六十四分者之牌樓與圓線等如鬘論云牌樓門三倍橫長非竪直爾時三直線從台如是量各方彼無間牌樓猛利條猛利為十一代名高量一門量財天八之代名財天日十二之代名勝者二十四財天勝日財天及日勝財天如次謂十一條中第一條占牌樓八分之一餘准應知此等謂平量從梵線左右各捨四分半條長二分半線長三分半第二與第三捨五分長三第四捨四分長三分箭五者捨三半三半六捨三五分次三長八分一七分後六其外吠陀邊圓線二又圓二分邊圓線最後四分邊共四道圓線此無暗條故二柱間相隔十二小分說爾時三直線故有幡條若謂此中門面門側門量等者則不符順鬘論牌樓柱與柱間隔門三倍之說若如門面有二小分門側亦爾則與此說無暗條而成相違若將門上一分歸入牌樓則與繩線六十四分不合柱與幡處極不雅觀是故門側應作三分如是門至門側四事謂門門框門面門側量等非等共有三說一說門等四事相等一說門與門框相等而與面側非等然彼面側亦自相等一說面側亦不相等一門量牌樓一門量中寶鎧論師說門側外為五小分其內為二小分內端外一小分為梁再外一小分為空層藍色此許梁上無墻為虛空層然此梁上無墻未見美善此論師說牌樓高度有三大分與一大分二種初中又有二等九等與五等三三等兩種後者為五等三三等總此三種牌樓皆十一層然鬘論中王十六代名三罪罪十八代名及日王方與三人人為十四代名方對直諸分是牌層次第此以曲線以內諸層隔斷為因破第二層實水口為十八分等之說故曲線內所對諸層各左右有二層總合彼二數為十一若分別數則多於彼繩線長短兩派從𣐟至𣐟長短無異惟六十四分派𣐟口之外梵線僅二大分第二大分為法輪與杵端是故牌樓高度唯一門量以是彼諸教中說牌樓為門三倍者是說橫量門與牌樓無空暗層三倍亦是柱與柱間是為此師所許如鬘論云雜金剛臍總有十二門量其根線內為八門量外長各二門量中無暗層牌樓柱中為門三倍論說為十一層許二柱上橫層各餘一分依此而作為十四分毳衣大師於一門量牌樓宣說門面門側各半門量牌樓長量為門四倍故知許有暗層然燈賢說牌樓為門三倍之意寂靜師謂長為三倍高隨美觀應作牌樓之外一大分中內半為法輪外半為中股杵端如鬘論云法輪外二小分為金剛股端故旁股尖觸中股處以外即為股端非從中股盡處再將杵端左右各開作為兩分此亦二派相同沙羅答論師說內一小分為輪座之蓮華次二為輪次一為傘鹿對輪住次圓線者若長線派蓮鬘與金剛墻各半大分光鬘為一大分如是自中央至𣐟口自𣐟口至光鬘各六門量以是每方梵線各有十二大分即便圓滿故於此派鬘論破斥蓮鬘與金剛墻各一小分光鬘二小分者於短線派則說蓮鬘與金剛墻各一小分或各二分光鬘二小分或四小分隨一皆可金剛空行經云外有光壇場彩地二倍量毳衣大師謂是金剛墻與光鬘各一小分又鬘論云有一勝樂曼陀羅中依經中說金剛蓮輪形亦安立三墻故於金剛鬘外說有蓮華與輪鬘者此說共有兩重蓮華琅迦勝賢所許正爾繪圓線時以檐木橛下為獨股上為五股杵相想從吽字所生誦釘橛咒一百八遍誦椎橛咒以金剛椎釘壇中央次將九十六分長線雙掛橛上從自在方右旋而彈六十四分線時亦可以單線作圓線為繪圓線故說繩線增一張手量等前說線長生病須除此也若無實橛釘於中央修定亦可准前釘橛時說可知毳衣大師說六十四分者亦從自在旋繞而彈當先於梵線上尋求量度當於何處繪尸林耶此論未明了說鬘論引前金剛空行經說光鬘之文次云彼旋繞處外樹等八尸林經謂彼輪圍之外答日迦跋曼陀羅儀軌中亦如是說慧鎧論師亦云當於金剛墻及火光輪外繪樹等尸林雖舊譯之律生經云於金剛墻內八尸林莊嚴然新譯云金剛墻於內八尸林莊嚴此譯清淨以律生經釋云光明謂五色應於彼外畫諸尸林毗布底亦如是說故跋嚩跋陀羅師未明了說如勝樂尊可住尸林圍繞之中餘尊不須若為攝受無善根者勝樂亦不須繪是為鬘論之意此師所許除時輪本經所說不同外餘無上部諸曼陀羅定須蓮華金剛墻及火焰其餘尸林與勝樂之三墻則非必須繩線二量非是父續母續之別隨一皆可門面門側門量等或非等亦可隨一作之非許如是所說之曼陀羅唯作彼軌未二彈曼陀羅內線法此中略說少數曼陀羅之內線集密內線如鬘論云梵線八分邊及七邊圓線從此正伸出至餘方線界梵外二三分漸次彈二線外圓線之外離一分圓線次捨三小分平線至角線拭一切梵線諸格中隔線其前六句明九格線兩派集密相同其次四句明龍猛派集密之線謂前兩道圓線之外捨一小分再彈一道圓線如龍智云五色光莊嚴金剛鬘明了此說一光鬘及一金剛鬘為繪初鬘而彈然燈賢唯說金剛鬘未說光鬘為繪初鬘但一圓線即可次捨三小分處乃至角線彈格層者是四金剛母處其外四小分處為繪八菩薩及四隅明王而彈此即龍智於內輪之外四線平等繪之義妙吉祥金剛中集密別派從外圓線至根本線有八小分故彼長行說彈線云根本線內捨一門量之處二角線間彈一平線次為安布色金剛等捨一門量應如是繪若爾龍猛派之圓線如鬘論長行云特於二圓線內捨一分金剛鬘彈第三道圓線第一圓線內為光鬘其外更無圓線此說前捨七分所彈圓線之內繞金剛鬘一分於八分處所繞第一圓線之外更無圓線似與彈線頌文相違鬘論於此為證龍猛派依前彈線引頌云由梵作中台半台量第二第三一台半半台彈餘線則頌應依長行以龍智說台量為第二小分故故從梵至二小分為第一線次去一分彈第二線次去三分旋內圓線是為第三此後圓線是為第四此線須作一小分故此四句頌跋剎譯缺賈師譯台為臍然鬘論又引文證云中央輪之量為半根本線此說以半根本線量作中央壇則從金剛鬘之圓墻為內壇界以彼是根本線半量若如此說則應依於彈線頌文而作頌及長行恰師榜師所譯俱同故非書訛鬘論於說八分旋金剛鬘時云金剛空行說第一圓線外為繪光鬘捨一小分旋一圓線此與彈線頌文相順意謂兩派皆可雖現譯金剛空行經僅云內輪金剛墻及光壇二次從自在隅起右旋而繞線然梵本中定有於八分外繞光明鬘最為明顯鬘論於此集密兩派僅說從根本線捨一門量彈一平線未說於內天處亦彈平線彈內線已中格內外之角線及彼層之衆線并內外諸梵線皆當拭去餘處角線及天層線則須存留覆以彩色用以界分天處彩處之別勝樂六十二尊之內線者如鬘論云根本內壇場由天別彈線當說稍別異餘勝樂內線非離梵角線即梵外二分彈線至根本角傍亦如是從中臍八方各長為四門臍外捨四分彈四分橫線平住梵角上此復彈五線各捨二小分彼等及第六直達於邊界梵線及角線左右七線中從第五三一一小分邊起到各第二端回達第七中一線成五曲其內捨半分如是彈餘線梵外漸捨王十六日十二龍八河四眼二分彈五層圓線前三內半分更彈三圓線除輻及圓線餘盡應拂拭鬘論於此引文證云從根本線起彈四種圓線三輪各門量應正旋周達餘為八葉蓮其量無增減意輪等輞上有杵蓮輪鬘意輪輞上有杵語上有蓮身輪輞上有輪琅迦勝賢所著曼陀羅儀軌有此文唯譯文稍異耳鬘論彈線之長行云第四意輪之轂內除小分四分之一再捨二分半為蓮葉為顯蓮蕊彈一鬚鬘體性之線此與彈線頌說從中央捨二小分旋花蕊者文句各異雖不相合然頌文是粗算當依長行細數而繪即於餘處亦多宣說一方華葉之量為一方華蕊之兩倍故華葉應作二分半華蕊應作一又四分之一雖毗布底依於鬘論彈線頌文安立然亦應如是繪有為繪金剛鬘故於內輪之中彈半分之圓線者有於諸輻之旁繪四猛利金剛而圍繞者又有於輻邊上如其所應繪作金剛蓮華及輪鬘者鬘論說此三派第二派即琅迦勝賢所許第三毗布底亦許之歡喜金剛九尊線者自中向外捨五小分為明華蕊彈一圓線其外捨十小分為明華葉彈一圓線其外一分為安諸瓶或作金剛鬘也紅威德五尊者亦如是彈日生論師於歡喜金剛九尊處為九格線作怖金剛亦如是彈此等為例餘可准知彈線時開門者有說彈完八大線時有說彈完一切線時彼二隨一即可其法謂自明顯想為主尊目從希字右生為日左生為月以忿怒視遍觀一切口謂唏唏增上勝解拂拭礙解脫門所有諸障於梵線及根線交會之處左右拭去根線各二小分此如四百五十頌云以唏字怒視次應開啓門龍智菩薩亦云應正念幻身次開啓諸門謂觀自天身如幻行相也線圓滿後供養稱讚送去線之智尊繩線安置屏處此中亦爾
