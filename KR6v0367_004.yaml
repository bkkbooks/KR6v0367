body:
  text: 宗喀巴大師造法尊法師譯事部道次第品第二之二辰二前請智尊修供養等分六巳一起所依處巳二請能依天巳三示印巳四供讚巳五行懺悔等巳六修四無量今初於自前方陳設繪像等處想有衆寶所成地基金沙遍布誦嗡拉毗吽娑訶而加持之再想其上有香乳海離諸垢穢青紅蓮等衆華莊嚴無量寶鳥飛翔其上誦嗡摩拉答哈吽而加持之次想海中有須彌山四方四面級鬘莊嚴金銀琉璃玻璃所成周匝叢生妙如意樹千座尊勝幢幡為飾又想其上有大蓮華衆寶莊嚴具足種種奇珍為瓣純金為蕊玻璃為珠蓮實之上銀絲圍繞量廣多踰繕那從須彌山中出又從此生百千萬億妙蓮華網敬禮合掌互相交叉以右大指按左大指誦那摩薩瓦達塔伽達南薩瓦塔塢伽得帕惹那黑芒伽伽那康娑訶百遍而加持之剎那於上想有寶蓋此處雖未說修宮殿然儀軌中下說送回宮殿故亦當修於前蓮華中心或如餘師不從字生忽爾頓現或從字出生後生蓮華為諸尊座亦可此二論師於自起時未說出生宮殿及諸座位餘師修法則說出生獅子座等蓮華月輪諸有情座並說尊勝佛母於塔中出生等巳二請能依天迎請須用閼伽故當先修閼伽其器或用金銀木石或諸餘物一切吉祥謂赤銅器若修息災及上悉地用大麥及牛乳若修增益及中悉地須用胡麻及酪若修降伏及下悉地用牛尿及粟米或血閼伽通一切羯摩吉祥者謂用米花塗香白花茅草胡麻淨水配合陳設熏以燒香誦前所說或明王咒或總部心或各部一切羯摩咒或誦迎請真言七遍加持閼伽次向前面繪像等處禮拜以膝著地諸指內交仰手向上竪二食指搖二大指結召請印誦云由信三昧耶世尊請速降受此閼伽供維願愛念我次於咒尾加誦鄂黑耶醯捧閼伽器若是佛部齊額供獻於餘二部平胸及臍供獻觀想自類智尊降臨所用真言蘇悉地經迎請品說以明王真言請天子以明妃真言請天女或以各各咒請若以總部心請最為殊勝如請尊勝佛母即誦唧那唧鄂黑耶醯又所請天若坐若立若側應亦作是狀用閼伽迎請若不能如所說而辦閼伽應求容恕隨有而請請幾尊者後靜慮云具足密咒等衆明咒忿怒皆向如來身滿定故常住釋云於自前方想有佛身剎那而想明咒密咒忿怒使者及使女等遍虛空界周匝圍繞自亦任持天慢安住其中以明咒等常住佛前故持咒者亦應修天瑜伽向佛而住次結前說蓮華部之三昧耶印是即蓮華坐印即從此印三指如金剛杵是為金剛坐印從此印二中指相併是為勇士坐印此等真言謂嗡迦摩拉雅娑訶又嗡班阿薩尼吽泮又嗡班迦吽泮由此咒印奉獻諸尊適宜座位奉座請坐或可誦善來大悲尊等頌及愍我及衆生等頌奉獻座位巳三示印次誦嚮迦熱薩摩耶娑訶右大指按小指餘指作金剛形示此三昧耶金剛印次示下三部印誦唧那唧等三心咒印者兩手互握為拳示二大指又即此印左手大指內收示右大指又示左手大指如其次第是三部印次應結諸部大三昧耶印旋繞於諸隨來魔礙所作一切障難成大守護若不能行當誦爾時明王真言加持芥子驅逐隨來魔礙巳四供讚分二午一供養午二稱讚今初諸供養物應如前說辟魔清淨增長威光蘇悉地經說以供養咒及各部真言清淨應如是修次小指無名指向內互鈎二手中指並竪食指鈎觸第三節上二大指附其側結閼伽印誦云善逝薄伽梵請降臨住此受我閼伽供維願證知我敬仰於世尊又於本尊咒後加誦阿岡札底剎娑訶供獻閼伽右拳食指與大指作鉗狀取浴足器內花作諸指漸放印誦前頌文於閼伽處改為浴足咒後加誦嗡札瓦惹茜迦讓札底剎娑訶供浴足水若能辦者次於鏡中現影像而浴佛若不能辦則可平仰合掌食指與大指端相合結浴身印誦嗡薩瓦得瓦達阿臻底阿彌達娑訶想以金等無量寶瓶香水充滿成香水雲而浴佛身次自運意供養衣服莊嚴奏諸伎樂運意演唱讚美歌音次右手結施皈依印左手擎其腕是為塗香印誦清淨從淨生諸天妙塗香我今信供養受已愛念我阿訶惹阿訶惹薩瓦毗雅答日補唧得娑訶奉獻塗香唯除燈明餘三供養咒亦如是兩手諸指交叉二食指端在手內相鈎作環狀大指附著其側形如蓮華是為花印誦清淨從淨生諸天微妙花我今信供養受已愛念我供獻妙花兩手小指中指及無名指互相附著前前指甲背處稍屈二手食指別竪二大指附其側為燒香印誦可意林精華和成天妙香我今信供養受已愛念我以此供香由仰合掌略屈食指為飲食印誦可意藥精華此諸真言食我今信供養受已愛念我以此供食大指中指並竪手握為拳是燈明印誦吉祥除損害善妙遣黑暗我今信供養願受此燈明阿羅迦雅阿羅迦雅毗雅答日補唧得娑訶供獻燈明經說各部各尊應供各別供物若未能辦他部供品可用餘部真言加持而供閼伽以下諸供若不能辦經說以彼咒印運意明顯觀想而供彩繪花等亦可供養縱有供品亦須運意為先故說意供最為殊勝如是隨力修供養已前說加持處所真言此處亦當誦一百遍午二稱讚次如蘇悉地經所說當讚三寶及三部主依怙具大悲大師一切智福田功德海我敬禮如來清淨離諸欲善故脫惡趣純一真勝義敬禮寂滅法解已說解道善住諸學處具功德勝田敬禮諸僧伽受持童子身莊嚴智慧炬滅除三世暗敬禮妙吉祥諸佛所稱讚修集妙功德名稱觀世音敬禮常悲者大力忿怒身善哉持明王降伏諸難調敬禮持金剛又當念誦本尊別讚次誦百遍出生讚真言云那摩薩瓦布答薄底薩埵南薩瓦札桑姑如彌達阿毗賈惹希尼那末都得娑訶巳五行懺悔等於先造罪猛利追悔具足堅固防護之心後不再造當悔罪云一切世界中所有諸如來菩薩阿羅漢願皆證知我於我一切生所造諸罪障在生死海中往生及現世由貪欲愚癡恚怒所憤發於佛法僧伽師長及父母阿羅漢菩薩隨一供養處并餘有情類有德或無德自造諸罪業及教他令造或復少隨喜放逸微細罪身語意所造總集盡無餘我今如現對諸佛菩薩前至誠恭敬禮以厭患心意合掌將諸罪數數而懺悔我所造衆罪如佛所現知我今如是悔後終不復造又當勇猛至誠皈依誦為滅衆生苦我乃至命存恭敬正皈依佛法及僧伽次誦於諸正法財等住我隨喜為生無分別故請轉法輪至所化滿足願不入涅槃如昔諸佛子所發宏誓願我亦以善心如是發宏誓願一切有情安樂靜無病願能作衆事亦具足功德有財能施捨慧忍信善法有情一切生能憶及悲愍於此等義專意念誦巳六修四無量次緣一切苦惱衆生發悲心願令離一切苦發慈心願令得一切樂發喜心願令享成佛之樂發捨心願令證無上大般涅槃次誦令無邊有情息滅一切苦度越諸惡趣解脫衆煩惱逼迫三有中所有種種苦為救護彼故我發菩提心我願常救護一切苦衆生無依者為依無怙者為怙無皈者為皈苦者令安樂我為一切衆息滅諸煩惱此生及他世所修諸善業維願悉皆成福智二資糧我由六度門精進所修習願彼能饒益一切諸有情無邊生所修或復少修習總為諸有情息滅一切惑度脫而精進乃至證菩提為欲度脫苦惱衆生發菩提心願當成佛決定令與身心相應面前所修之天二大論師皆許為迎請之智尊未說新生餘師則謂前請之天為資糧田修資糧已自起為天鈎入智尊修習念誦僅有少數說緣前面天而修者修天疲勞次修念誦修天瑜伽為修悉地之正方便故今此中如前所說於自所起天身明顯持心為主亦於時時明觀前方如自之天隨力持心此二即四支念誦中二種事支卯二依彼如何念誦分三辰一預備數珠數念之法辰二緣何所緣念誦之法辰三遇障重修念誦之法今初如是乃至未厭煩時修天瑜伽修厭煩時當作念誦數珠之質蘇悉地經中說佛部用菩提子蓮華部用蓮實金剛部用茹惹夏最為第一此若不備可用木槵海螺水晶真珠珊瑚摩尼牙骨泥土所作或餘草子妙臂問經說錫銅鍮亦可作珠數量或一千零八或一百零八或五十四或二十一摩尼等須鑽孔及以牛身五物洗淨珠索以童女所捻三股線穿貫作結將珠捧於手中頂禮師長本尊誦三部真言百八遍那末惹那札雅雅嗡阿部得毗雅悉得悉答退娑訶又那末惹那札雅雅那末阿雅阿瓦羅格得穴惹雅薄底薩埵雅摩訶薩埵雅嗡阿彌當迦雷希耶希摩利那娑訶又嗡格日格日熱只尼娑訶如其次第即是佛等三部真言此是最初加持念珠時修後念誦時合掌敬禮師長本尊捧珠手中念誦真言七遍嗡拔伽瓦帝悉地悉答雅悉答退娑訶又嗡巴蘇摩底希耶娑訶又嗡班雅達那則耶娑訶如次即彼三部真言平胸持珠隨用左右一手伸中指與小指食指置中指後於一切業皆可以大指及無名指數於降伏事則以食指數之妙臂經說誦時應持前說之羯磨杵若未備者應結金剛拳而念誦辰二緣何所緣念誦之法分二巳一緣字形念誦巳二緣字聲念誦初又分二午一緣前尊心間字形午二緣自尊心間字形今初後靜慮云住聲心及事咒依不變事不失支誦咒疲於自休息意謂應當誦咒持誦之法謂不失支即不捨棄四支而誦事有二種初謂自住天慢二謂於前修為如自之天心謂於前尊心間所立之月輪即第三支聲謂於月上安立所誦之咒鬘即第四支住彼等者謂持誦者相續緣彼繫著不捨自緣何事修習念誦即於彼事極善修習令天明顯無有退失故云依不變事即是聲心之咒所安立處之事總謂如前所說防護命力由具四支念誦門中俱時緣慮前尊三支而修念誦放棄息時觀自所修天身次仍如前修習休息者為除散亂故於自事休息即異熟身謂於自身捨天身觀想異熟身而從定起捨觀漸次由緣字形而捨持誦咒字之聲由緣無字月輪捨彼字形次由但緣佛身捨彼月輪由唯緣自天身捨前尊身由緣字形捨自天身由緣字聲捨其字形由緣智身捨其咒聲由緣法身捨彼智身此即緣無所得我之真實復想現似幻化陽焰等異熟身此即於自休息之義由緣字形捨自天身等者即初修本尊時所觀字天聲天月輪及自與天真實合一之慢我之真實離戲論等此中休息說為止息散亂故若戲論散亂起時當漸收攝所緣最後住於空性次於如幻起定故起座時不應不持本尊之慢餘師依止事續所造修天儀軌亦多宣說一切威儀當持天慢午二緣自尊心間字形後靜慮云從事中起事具足不變字如是自咒觀應想意清淨言如是者謂除前說顯餘所緣即應想意清淨從意所生故說名意即是心間月輪無貪等垢具一切分無垢光明故名清淨此復具足真言字鬘由善修習光明不變故是不變諸字意現為月具足諸字不變不離故名具足不變觀是月輪是為安立自咒處所總謂如前所說防護命力於自面前較自略高非太遠處修如來身想彼心間月輪安布咒鬘轉於自修為天之事謂入息時想隨息入移入自心乃至未放息時緣彼念誦若放息者與息俱放還住天心次復如前移入自心而誦巳二緣字聲念誦後靜慮云由防護命力收攝鈎録意合密咒明咒當修意念誦即以此儀軌或復小聲念求明咒悉地莫作餘念誦緣咒聲之意當合咒念誦此應如前所說防護命力將彼任運流散非等引意收攝鈎録謂先明觀四支念誦次不緣念所誦咒形及月輪等唯緣咒聲念誦此復非如聽他誦咒是緣彼咒所發之聲而自持誦此緣咒聲儀軌或意念誦或小聲念釋論中說若護命力則不能作小聲念誦經說防護命力及以兩種念誦釋謂此於前二緣字形之二種亦當例知若爾三種所緣一一皆有二種念誦何者應先修耶從粗漸修先當小聲念誦若能於彼心不散亂次護命力修意念誦釋論中說初於天月咒鬘三法為三所緣中於月輪咒鬘二法為二所緣後唯緣聲為一所緣每一補特加羅俱須漸修此三若勝菩提論師雖僅說緣自與前尊心間月輪所布咒鬘而修念誦今依佛密論師詳釋經義天竺餘師依止事部所造儀軌亦有說想咒鬘放光供養諸佛饒益有情正念誦時如何行者妙臂問經第五品云漢譯第六品誦時不應太急緩聲不過大莫太小不共他語不緣餘字體勿令有缺失又云懈怠貪愛不善心隨於何境起散亂速從彼境回其心善住密咒最勝字蘇悉地經如上已引謂正誦時除緣爾時本尊等境雖餘最勝所緣亦不應起作意息災增益宜緩降伏念誦可令他聞念珠初用及最後時應禮諸尊珠串滿時當用目視彩繪等像或塔或座念誦時量上午應修一時初夜後夜各修半時日中或修半時或三分或四分或略念誦晝日念誦者夜作護摩夜間念誦者晝作護摩念誦終了若作護摩最為第一念誦數量如蘇悉地經說十五字以下應隨字多少誦爾許洛叉十萬若字三十二應誦三洛叉字若多於彼當先誦一萬不如餘部隨眷屬多少也辰三遇障重修念誦之法如蘇悉地經說若念誦時勿爾惛睡或復呵缺嚏噴謦咳或失惡氣大小便等即應置珠起立經行次作灑淨還從首念以上所念不能入數或由放逸誦他真言意白本尊重修念誦或遭魔障或為病苦或是懈怠放逸身心疲倦修法違越所說時量或不防護或不潔淨所作念誦或是夜間惡夢晝日未誦部主真言百遍所作念誦皆不得入念誦之數又說若於一處誦至半數另於餘處誦滿半數如此念誦數雖滿足然彼一切皆無義利前說念誦越時時非時者始從日出半輪至一人影是上午時日中八時九時此是一日作六十四時分是為中時下午從一人影乃至日沒半輪是下午時此為晝間諸時從日沒半輪至初夜半量是初夜時從後夜半量至日出半輪是第二時從中夜起修降伏法隱身尸林等法如修息災法等則與彼時相違此是儀軌中說務須了知以說非時所作念誦不入數故儀軌引之行者念誦畢當誦草一遍部母及部主常恆為衛護三部部主謂妙吉祥觀自在金剛手三部部母謂佛眼白衣摩摩格寅三四支念誦靜慮之後行每座念誦滿數或餘之後右中指置無名指後左手中指亦置無名指後互相交叉右手食指握左手中指無名指左手食指亦握右手中指與無名指兩手小指並竪二大指按二大指之中節結為瓶印獻善根云我此善根為某悉地之因今奉世尊維願世尊賜某悉地有說不念誦時以此手印奉獻數珠念時仍取是無觀慧者之言說次求容恕未能全如經軌之過如前說修供讚次以前召請印二大指向外撥為發遣印念誦各各心咒或總心咒末後加伽剎字想諸宮殿一並發遣次仰左手右掌按上諸指互交指端下垂平心而住是不平等支印由左旋繞誦嗡呼魯呼魯軍札利摩地格毗娑訶解除前所結界次讀般若等經修六隨念塗曼陀羅印制多等日日洗滌供器供奉鮮花三時禮拜所著法衣等須三時咒洗香熏灑淨念誦護摩供養等時常著上衣除睡臥時除睡眠洗浴外不脫下衣勿得汙衣加持衣咒嗡惹卡惹卡摩那薩瓦布答阿底叉那阿摩唧拔惹娑訶如說於承事時施鬼神食故當施食又以童女所捻紅線用俱遜婆紅藍華或鬱金染結成七結誦嗡阿訶惹阿訶惹奔答尼許札答惹尼悉答替娑訶千遍夜繫腰間防泄不淨如是上午日中下午三時沐浴修如上說念誦儀軌蘇悉地說半月半月絶一日食取黃牛乳酪酥糞尿和水茅草咒經百遍面東蹲坐置閼伽器頓服三兩半月所受一切穢惡之食皆當清淨真言即誦那末拔伽瓦得塢尼沙雅鄂毗許得毗惹希毗馨底迦日娑訶又嗡雅穴剎娑訶又那末惹那札雅雅那摩軍札班拔那耶摩訶藥叉茜那拔達耶嗡希喀希喀尼摩雷札北娑日得左得左拔底娑訶如其次第即是三部真言丑二不待念誦靜慮分二寅一釋住火住聲靜慮寅二釋聲後靜慮今初後靜慮云咒住火成就住聲給瑜伽聲後給解脫是此三真實此說住火真實住聲真實聲後真實釋論說修六天以上是二種靜慮之前行然於此處亦說現證密咒及明咒之色等是故生此靜慮亦須先於六天明顯相續久住本尊瑜伽亦須明顯而修言住火靜慮者後靜慮云不分別生法智者善自護咒師超支住無著修靜慮聲連合為鬘字相串不變如鈴聲無斷意取著思惟住火內寂靜語靜支具足思惟止命力斷睡眠為性此中最初四句顯示先思我之真實意謂當修靜慮誰能修者謂持咒師如何修者謂應無著此中著謂執實著世俗天非此所遮此復抉擇眼等諸支非勝義有超出眼等住離戲論住謂不起安住之理謂非眼等根識所能分別不能執取即是意識從彼相應所生諸心心所即自謂自意中不令生諸垢纏防護而住智者謂具智慧能觀真實本尊諸咒於彼定中或如聽聞或發音響此是聲天真實與我真實猶如水乳二合為一如是思惟瑜伽若時明顯則彼咒師是已住於聲天瑜伽咒字連合安布為鬘意於彼中取著思惟是字形連合為鬘耶謂彼咒聲連合為鬘經說如鈴聲故為令此義決定說字相串不變者謂字不斷不動如外鈴聲相續生故即於彼聲應不執實而修靜慮次想自為本尊心間有火熾然如燈燭焰復想其中有前所說聲鬘而住此無熱等損惱故云寂靜語清淨者無彼微誦意誦之二其所修咒一一字之支分無間具足如是思惟遮掉舉故云止命力此若不遮等同畜類無有等引心故遣沉沒者以除沈分所攝睡眠顯示此非謂是自心默誦之相是如聽聞他人誦咒自心變成咒音之相安住火中若時現起不飢餓等內外諸相如所思惟即能成辦乃至爾時應修此二靜慮釋論中說外相謂無飢渴等惱內相謂由緣火及風加行力故依止樂暖之三摩地此於四支念誦之後修之或餘時亦可修釋論說此是為發生咒力及住心而修故住火能令念誦有力令心安住故說由此能給成就其住聲者後靜慮云住聲靜慮者謂心間微細無垢淨月輪其中最寂靜火焰具妙光彼住不變事樂住思惟聲或不變安字唯應思惟聲於心間思惟微細無垢月輪者以大則難斷分別故前說彼月輪中所有火焰於彼安住不變咒字天身之事其次捨彼唯緣咒聲而修靜慮出息之時還復緣自天身此中緣聲不緣天身月輪火焰故與彼四支念誦中二種念法及住火皆不同所以作是修者以餘論說修聲或息之靜慮時若緣色者心散亂故通達勝義之菩提心安住一相謂無餘相故名不變是故表示此心之月亦名不變緣彼月上所布咒字次應捨彼唯緣聲音而修靜慮故與四支念誦緣聲不同彼是先於天身心休息已後唯緣聲此乃先於咒字休息而緣聲故釋中如是判別且就所緣境分然主要之差別前於默念之中而緣聲音此則非念誦相緣咒聲故又數說為不待念誦之靜慮故釋論於此亦說遮止命力之風瑜伽寅二釋聲後靜慮分二卯一放捨住聲次第卯二正釋聲後靜慮今初言聲後者謂於唯住咒聲亦盡捨後為無二之真實由修習此脫離二障能得法身自性解脫後靜慮云觀待現為支有聲及由意語淨明咒王捨支佛所知此說聲後靜慮由修何等漸次能給法身解脫故此顯然說道次第及於何時修空性之界限釋論云入密咒行諸瑜伽師由於密咒支分有聲意誦語清淨時次第漸捨而得現證法身故說聲後修習法界自性能給解脫言明咒者是舉一例亦指密咒彼二王者即自所修天子天女等相彼支者謂屬彼諸天即彼一分或彼一時捨彼者謂漸捨諸位此復有四一待命力苦行及靜慮等咒師自現為天之支即自現為天身二有聲支即微聲誦咒時三唯意支即由意誦咒時四微念意念二語清淨支即離彼二住火住聲靜慮心現為咒聲之相也捨彼等者謂於前前穩固轉入後後如釋論云欲求解脫從粗漸捨之次第者謂修收攝苦行靜慮及命力等緣自天像令最粗三摩地極為穩固由緣微念咒聲之三摩地遍捨緣最粗定粗三摩地修令穩固其緣粗者又由微細意聲三摩地故遍捨次復捨彼安住最細密咒分別三摩地中次復捨彼欲求解脫當善緣法身三摩地如是漸捨四支而修空性是給解脫次第謂佛所知或釋為呼明咒王曰若捨諸支便當成就了知咒義之佛是兩釋中後者與略標云聲後給解脫極相符順若緣天身亦須棄捨何故聲後唯說捨聲捨初支者是捨咒聲依處現為天身之咒即是持咒者故捨中間二支者是捨咒聲作行捨後支者是捨咒聲自性故捨彼等亦可說為捨聲彼等一切於緣真如定前皆不顯現故說爾時棄捨此中所生之三摩地總有三種謂緣天身緣天語咒及緣天意真實初云最粗者即極粗顯三摩地第二較前微細第三最細以於身中須從粗漸生故次第決定如是其中先須天身明顯及能久住二和合生是故須以多相靜慮修令明顯以所修相須數數作意乃能明顯故如修欲怖若未專住縱能明顯然於所緣不能如欲而住故須以專住三摩地令其安住如上已說由如是門能得身調柔者如妙臂問經第五云觀視鼻端捨分別若時境擾不搖動其人即得明了住彼心決定得調柔其擾亦不動之住分須離沈沒以若未生最明了之住分則不違沈沒故念誦之前先須成就堅固緣天之三摩地最為主要即前經云若人具足心一境其意便生大歡喜喜故能得身輕安由身輕安身安樂身樂心定由定故爾是念誦無礙著其修無過三摩地法及修已先生心輕安依此起身輕安其後乃成具相奢摩他以前唯生奢摩他隨順是諸道理已於共乘道次第中廣說茲不重述四部續中最初成就具相奢摩他時多是於天瑜伽引導之時故若未能分具相奢摩他與彼隨順亦未詳辨如諸大論所說成就具相奢摩他時則未能知於天瑜伽初引導時須修幾久如是堅固緣身三摩地已即應捨彼進學緣語咒三摩地捨者謂捨於身持心另於其他所緣持心非謂此後便遮天相顯現以三種念誦及住火住聲之時亦多說緣天故緣咒有三粗者謂緣字形或聲小聲持誦即於月上安布字相或咒聲相學習持心不令他散能略自聞而誦如是語中誦咒心於所緣令不他散念誦瑜伽至穩固時捨此所學進學微細語不誦咒唯意持誦心於字形或咒聲相持令不散乃至此二極穩固時應善修習此堅固已亦應放捨進修最細聲性二種靜慮謂即自心達我真實之所取分現為咒聲火焰持心修習乃至獲得前所說相既堅固已復放捨彼令自心所取分現為明了咒音之相與能取分住彼咒聲音鬘而不流散學此明了安住不離瑜伽此若堅固即住聲給瑜伽之義此二喻如自心專住於所緣時所取分亦同時明了現為天面身臂等相如是字鬘所現諸前分相於後分相現時亦明了現心安穩住卯二正釋聲後靜慮如是從修天身乃至住聲持心由遮命力之風加行即由緣火緣天身等衆多粗細所緣心專住力能得如妙臂問經所說堅固住分及於身心生勝喜樂發生身心調柔輕安尤以久修風加行力及緣火力引生樂暖依此發生有力安樂光明無分別定然彼不名圓滿次第亦復未得能斷三有根本我執之道故當放捨住聲更修聲後給解脫之空性靜慮應如何修此處僅略說者意謂前修我真實時已廣說訖此中唯應取前所說而重解說如前所說當以教理破除人我法我先求通達諸法非勝義有中觀正見若未得此但不分別則全無修空性之義得彼正見修習之理如經不動光明謂具二種差別而修若無我見觀察太過便生掉舉令心散動當專住於無我義引生之定解不可太為觀察若止修太過則不樂擇法欲起不能任運而趣不分別住太安住故便能引生沈沒惛昧成惛沒性喻如觀察太過觀分增上其後反生掉舉故當雙修觀慧以及專一安住釋論中云今當顯示我之真實智慧自性全無沈掉說云不動光明言不動者即不轉動之名此破慧掉諸瑜伽師由修擇法分別令心散動不寂靜相而有掉舉故說心不散動於道寂靜此引教證過觀之失故當學習止修說擇法慧為掉舉者義說太觀察後發生掉舉非說慧即掉舉彼論又云如是言光明者即離惛沈澄淨之名此亦破除一向修止諸瑜伽師於擇法時心太安住擇法逆品沈沒相之惛沈此亦是說太安住後所生惛沈及為擇法逆品之義非說寂止即是惛沈與此義同之修次後篇云若時多修毗鉢舍那智慧增上由奢摩他力微劣故如風中燭令心搖動不能明了見真實義故於爾時當修正奢摩他若奢摩他勢力增上如睡眠人不能明了見真實義故於爾時當修智慧若時此二平等俱轉猶如兩牛並駕前進乃至身心未生疲勞應於爾時住無作行此說止觀何者增上即應多修餘一務令彼二平等而修若於止品增上止觀不等不應執為於無分別修得自在又不應執支那堪布之規謂於正理所破未知分齊凡有彼此之念一切皆為實執妄謂中觀論中皆破彼等便執一切觀修皆是成佛之障後靜慮經本釋亦皆顯說如釋論云如是我真實義雖是無支無得無色無相不動光明領納為相然許不斷觀察之道故云覺觀住前覺即是慧彼於境轉即是觀察故曰覺觀彼覺觀以慧明為相住於我真實義之前故云覺觀察住前彼意說云所了自性雖無分別然慧光明於前觀察而轉此即成立於修真實義時亦不應捨觀察之慧總謂住聲靜慮以下修奢摩他聲後即修毗鉢舍那然於此時若以觀慧太多觀察則壞先有住分故當雜修止觀而得止觀雙運若欲成辦如事行部所說無邊事業殊勝成就則須先修四支念誦三種真實靜慮若但欲修諸小成就則不定須如是修習癸四得堪能已如何修習成就蘇悉地云諸最勝事業由勝念誦修若先承事者亦成諸小事妙臂問經亦云先當如法誦十萬次乃進修諸密咒其次速能獲悉地密咒儀軌非久惱後靜慮亦云盡知咒真實及以我真實軌則念真實其人得成就皆說先修四支念誦瑜伽後修悉地故於修增慧延壽等息災增益降伏事業之時須先承事此乃四部總軌息災增益降伏事業如其次第以如來部蓮華部金剛部而修上品中品下品悉地亦如是修息災者謂能息滅橫死疾病時疫魔害傳染等災增益者謂能增長壽命形色威光勢力功德及所求事降伏者謂殺逐等修行時節謂於臘月八月正月二月四月白半月應修上品悉地及息災法臘月無諸難事又息災多宜於秋季如是增益宜於冬季降伏宜於春後又修中下成就於前五月之黑半月為宜又修上中下品悉地及修息災增益降伏時分如次應於早晨初夜中夜日中又息災法從白半月初一至十五日增益從月半至月半降伏應於黑半月修又通宜於一切事業之時謂神通半月蘇悉地經謂十二月一日至十五日及日月蝕時初一初三初五初七十三以及鬼宿諸時處所謂上中下悉地如其次第可於山林等處海邊等處除此所餘隨順咒處不應於傾屋等中修坐相修息災法宜蓮華坐修增益法宜吉祥坐修降伏法宜足壓足面則如次向北向東向南一一部中各有三品成就息災增益降伏三事又以各部部主部母明王修息災等三事又三品成就有多門分別就自性者持明神通知諸論等為上成就隱身合藥及疾行等為中成就攝召殺逐等事為下成就就部別者三品已說就現相者其物光焰煙氣溫暖是為三品就事辦者屬身屬物屬財富之成就就能說者謂諸聖者諸天地仙真言給成就者雖是上品行者不善承事亦有給下品成就者若善承事雖是下品亦可從他轉求給豫上品成就修悉地前觀察成不成相謂於月半或於白月吉日受持齊戒一夜乃至三夜觀察夢相用酸果等澡料及以香水沐浴灑淨著鮮淨衣於初夜分如上所說奉獻閼伽次請本尊用白檀等燒香熏後而為供養供獻衆多上妙酪伴供食以酥護摩一百八遍次用隨順事業之白膠香而作護摩再將童女所捻線索結成七結用本尊咒加持七遍繫左臂上祈禱本尊願於夢中示知所修成不成相自作本尊觀想安置茅座上敷散華誦持真言而臥夢中若見三寶本尊菩薩四衆弟子或夢登山乘象度河得財得衣服等諸可樂夢即當起修次正修者或修護摩或持誦真言等如前修法皆當修行謂應三時供養懺悔隨喜發願諷般若經作曼陀羅受三律儀三時守護三易其衣而修若由放逸未能三時修者當誦本尊真言二十一遍上中下等三品成就如其次第三日兩日一日受持齊戒此等皆如蘇悉地經所說修此等時唯於前方迎請本尊猶非具足要須新生其修曼陀羅及修瓶等法此二論師所許以前所說六天而生正念誦時於四支念誦中如應取其初二裝瓶藥物及生起等可如通規又修如是天瑜伽時蘇悉地說若少飢渴若從病愈若發勝慧若增威光廣大堅固若得善夢常夢實事若於念誦倍增歡喜若少疲乏身香芬馥樂修功德敬重本尊是為持誦相應之相後靜慮說若心不信懶惰飢渴逼惱增上掉舉增上憂戚猶豫事業念誦靜慮心不愛樂喜說雜言作非所作魔所著附夢惡夢等是為本尊棄捨之因若貪瞋憍誑等皆寂滅心於念誦相續而住是為本尊現前之因初承事時當知亦爾又為利益自他修治病等微細成就及行灌頂開光等事若先已由六天三摩地及四支念誦門中圓滿念誦之數則雖未修三種真實靜慮亦甚可行有於彼時亦修三種真實靜慮及修三種念誦所緣是未能知界限之過堪哂略知於齊戒一分念誦浴軌等自謂盡解事行義故愛契合經義道此於事部四總續特於妙成後靜慮如印二師所解釋詳求密意而開顯是觀事部唯一目
