body:
  text: 宗喀巴大師造法尊法師譯明須二種次第雙運修大菩提品第十一之二壬二修習所知之義分四癸一破離二次第之妄說癸二不離二次第之修法癸三增進二次第之方便癸四彼等為三士道之理初又分二子一破離圓滿次第說唯生起次第成佛子二破離生起次第說唯圓滿次第成佛初又分二丑一述宗丑二破執今初如心莊嚴論云毗穴彌多羅仙童軍持明大阿闍黎勝足論師與寶論師賢友婆羅門等說修諸法自性清淨但為破除分別佛果係由福德所成以生起次第道斷庸常事以妙色身饒益有情成正等覺故應無倒修行天相勝行此是妙吉祥稱論師敘述外計彼等意謂饒益有情是大乘人所欲作事能作此者乃妙色身得色身時即成正覺故當無倒修習諸天瑜伽與三昧耶律儀諸行以修生起次第能斷凡身而成相好身故經說應修諸法自性清淨之空慧者是於真實義中為破邪執分別而修非成佛因佛是福德資所成果故以是若得無倒空見於真實義能斷顛倒邪執即於實義無所迷亂若有彼見與天瑜伽以及諸行是則方便智慧二不分離定能成佛彼等雖許生清淨見然不許修彼見倍復增長意謂中觀論等決擇空性是為破除內外道之邪執若得無謬正見彼執即遣更無餘執可遣何庸更修空性所依教證即前所引金剛幕經之文意謂破斥空見為成佛之方便佛說空教唯為遣除顛倒分別若修壇輪諸天瑜伽速得成佛故當以此方便而修彼等非是未習續部諸續部中亦多說脈息等瑜伽修或不修雖未明說意謂彼等攝入行中丑二破執此等不須令其更修諸餘咒道即彼所修空性當令倍復增長親能饒益有情之佛誠是色身而非法身色身實由福德所成然若未得法身即亦不得色身以是法身亦應證得汝若修習福德資糧何故不修智慧資糧理無別故若謂亦修智慧資糧以有通達無我真實見故此不應理以汝不許修無我見倍復增長唯具正見不能圓滿成佛之智慧資糧故若不爾者則應生起次第已得了解能依所依曼陀羅義不須更修即能圓滿福德資糧若謂修習正見為於實義遣除邪執獲得無謬見者即彼相續更無於真實義顛倒妄執邪分別故此是未辨分別俱生邪執之別若時正量所引真實義見作用未失爾時雖無宗派所計虛妄分別然無始來不待宗派所轉俱生我執猶未遣除若不爾者則得真實正見無間一切見修所斷皆應頓斷生起次第亦應不勞修矣以是非唯了解無我即可斷彼諸障須於見所決擇真無我義數修現證應知中觀論等決擇無我義時破內外道非唯破除宗派邪執障解脫者是俱生我執故若唯宗派妄計而為障礙則諸未為宗派轉者應無解脫之障然若欲破俱生我執之境必須破斥妄計實有諸宗以彼成立實有性故故中論等破內外道計實有者是破俱生我執境之支分彼論決擇之無我義亦是破除俱生我執所顯僅得彼見雖不能遣俱生我執若更修習則能遣故子二破離生起次第說唯圓滿次第成佛分二丑一述宗丑二破執今初心莊嚴論又云又空慧婆羅門迦濕彌羅光明論師慶喜金剛悉曇迦惹居士吉祥獅子論師光明金剛大乘祥苾芻善施賢青裙大師勝足論師寶論師賢友波羅門歡喜苾芻尼等說修生起次第及諸行等是為破除斷見及明以緣起因成緣起果並為方便攝受世間怖畏甚深義者而說正等覺者是無二智不可思議非從不順因生此中空性不可見相不可思議斷諸戲論諸瑜伽師由自意樂說於世間具殊勝果此出他宗勝足等三前派已說而今復說疑書有誤應更考察彼等棄捨生起次第及諸行品說欲成佛唯應修習圓滿次第由何所見而作是說實無正理僅依相似道理及昧經意唯依於文而作彼說所依理者彼謂所得正覺是無分別無二妙智故得彼之方便理亦唯應修無分別由修生起次第行等有分別事不得彼果以有分別是所斷故修有分別唯生隨順分別果故若爾佛說生起次第及諸行品應不中理彼答宣說彼法所為之機蓋是怖畏甚深空義世間有情此為方便暫攝受彼衆生而說又此宣說諸行為除毀謗染淨因果之斷見故宣說生起次第為顯由天瑜伽誦咒護摩及藥物等緣起成就息災等法劍丸等悉地諸緣起果故一切垢染對治是證空性離諸戲論諸瑜伽師唯由修此修至究竟得殊勝果是故唯應修此何勞修餘法為所依教者如金剛空行第五十品云如世諸仙人造諸聲明論自心所動轉士夫假造事唯隨相續轉策勵而生苦是故勤勵行壇等事儀軌遠離於解脫士夫唯煩惱結合第二觀察第四品云能引共悉地修及三昧耶身像并慢心咒印復何為由本尊加行即能證所證佛果最究竟三地如虛空前經破生次第如律生釋所引又修生起次第且不能成正三摩地况能成佛以此由多分別擾亂身心三摩地是心一境故雖多修習稍可明顯如多貪者愛女之相是一剎那非能長久假立瑜伽較諸世間假法尤為虛幻如修骨鎖故錯亂想於勝成就全無所益此是寶鎧述敵方意此有二派一謂修勝成就全不須修生起次第一謂利根不須鈍根須修丑二破執分二寅一正破寅二斷諍今初通達真實離戲論慧雖是成佛無二智之親因然唯修彼任經幾久終不能至最極究竟以離方便支故譬如種子雖是苗芽親因若離水肥等緣終不生苗以是通達空性之慧能到究竟要待方便方便能到究竟要待空慧此是大乘共軌尤於密咒大乘二身之因要修空性與天瑜伽二相之道前已數說又修分別若定不能入無分別則修分別所修之境應定不能明顯以彼境相明顯與緣彼境為有分別二相違故正理王法稱論師云分別所隨逐則義非明顯以是若極明顯不雜時處不能成立為離分別則諸外道許諸根識為有分別應不能遮若修分別不能明顯則多貪者數數作意可貪境界應不能見彼相明顯而起捉觸等事及於鬼等極恐怖者數數作意彼亦不應顯見彼相正理王云不淨遍處等非實而修習說修力如化無分別明顯論謂經作是說則應誹謗如來經典又對不許有解脫之外道成立可有瑜伽現量因之同喻外道尚不否認而今否認則對外道成立有聖者之能立失壞無餘故於修境令其明顯不論境之真妄唯隨修習而轉正理王云故隨其實妄凡能善修習至修習圓滿明顯無分別遍行第十一云隨於何種法諸人正作意由此成彼體同雜色摩尼若許久修分別境能明顯則已成立離分別義縱不安立無分別名亦唯言說有異若謂境相明顯雖離名義分別然猶未離二相分別非無分別若從二相分別定不能生離分別心乃至未得聖果已還一切心意皆是二相分別則從資糧加行二道定不應生無分別智如辨中邊論云三界心心所是虛妄分別又聖菩薩諸後得智亦有二相彼等亦應非成佛道又說不從不順之因生不順果因果隨順義何所在若謂無分別果定須先有無分別因則應許從無始生死即有無分別因若謂佛無分別智因是於道中即須先有通達真實無分別智修習生起次第之心未證真實故破除者許生起次第位全無通達真實之心極不應理至下當說若以修顯色等相狀生起次第不證真實故非修勝成就之方便者則應未證空性全無成佛方便是為大失又說生起次第不能成就三摩地者凡有善性心一境性無論久暫皆是三摩地攝故許全無三摩地者不應道理若謂不成奢摩他者設以彼理破是成佛之道最為錯亂如於慈悲及菩提心亦以多相觀察而修斯類非一然修生起次第非皆觀察而修俱有止修觀修二故此及發生明顯久住之理至下當說金剛空行五十品云為證真加行當修假加行及以假念誦若證真加行假行為外事證真加行已不應修假行譬如乘船筏能度河彼岸到彼則應捨假行亦如是曼陀羅等業由假心所造於初發業者讚顯諸外事非於明佛者悉地皆住此其後乃云如世諸仙人造諸聲明論等此是未得堅固圓滿次第必須修習生起次第堅後乃捨之據引為修勝成就初發業者皆不須修生起次第之據等同囈語即以筏喻亦可了知到河彼岸雖應棄捨未到彼時須依止故圓滿次第是無造作堅固證德非如生起次第造作修空及天瑜伽安立生起次第非於明佛者謂非唯以風息猛利瑜伽便名圓滿次第經於初發業者稱讚生起次第故於初發業者彼極重要五次第與攝行論說生起次第未到究竟一切皆名初發業者前說勤修壇場等業遠離解脫及說士夫唯煩惱者是說不修空等圓滿次第唯修能依所依諸天瑜伽唯增疲苦終不能得最勝成就結合與餘類似諸經皆應作如是知經中多說修習生起次第一尊功德如結合第二云行者如是修等金剛薩埵修生起次第能給勝成就教證無邊若唯依教成立如前諸經可廣引說斷彼不須修習生起次第疑已次應明了顯示第二觀察第二品云說滿次瑜伽其樂為大樂不修滿次第生次第何為薄伽梵告曰希有大菩薩由信力失壞無身有何樂不能說安樂如所遍能遍樂遍諸衆生猶如香在花無花不知香如是無色法樂亦不可得此問初發業者不修圓滿次第而修生起次第何所利益以彼大樂俱生即圓滿次第瑜伽故答云汝由修解圓滿次第之力失壞生起次第次乃成立生起圓滿如花與香為能所依心證真實是修圓滿次第而成身成色身是修生起次第而成身是心之所依故說彼二為能所依即在道位亦有隨順能所依也即如上根補特伽羅現世成佛若不許有初發業位應如支那堪布許有頓悟衆生若許有者說彼成佛不須生起次第則違一切密咒教典若謂往昔多生已修密咒之機為上根人說彼不須修生起次第者是失時處之談以此是明入咒初業漸修道時須否初次第故又於彼機亦可捨置多種圓滿次第道故此如觀察成佛是否須從資糧道起而答證初地者不須始從資糧道行提婆菩薩特破此執如攝行云金剛弟子問曰我等異生從無始來貪著種種外事執有執無非有非無執一執異執俱非俱及常斷等由習氣因執著分別學習圓滿次第三摩地時為當如次漸修學耶為唯以師教授一剎那中皆頓學耶金剛阿闍黎答當漸修學非能頓學次引多教證成漸學又說先學佛乘意樂次乃學習生起次第總之若說第一次第非是成佛必經之道則亦應說下三密部全無殊勝咒道不共波羅密多大乘誹謗下三部教與無上部多分教典如是咒師實屬罕見凡說波羅密乘上根所化不須修學施等波羅蜜行而有成佛之道與說咒乘上根所化不須修學第一次第而可成佛此大邪執二無差別善能融貫佛經前後文義智者皆當遠離以彼下至諸大論師於修法等名為勝樂修法歡喜金剛修等立名之義亦未知故語自在稱與寶論師於彼七支論疏及律生疏廣破彼等邪執恐繁不録寅二斷諍如無垢光疏云如來所宣說種種分別道十六四差別離道不能得生次第說吽泮等離分別即次滿瑜伽彼非餘修法又云修色等分別曼陀羅輪等成世間悉地豈有大成就此說離於圓滿次第無餘成佛之道及說生起次第唯成世間悉地無勝成就又說修主尊時無東方等諸尊如是亦無面部幖幟等相次云故瑜伽師為修大印悉地不應修諸分別以由分別心無曼陀羅輪為因故說為成佛故不應修學生起次第若謂生起次第是成佛道則與上文有相違失答云是汝未解教義妄說其第一頌是說若離十六歡喜圓滿次第大樂之道唯修生起次第不得成佛非說成佛不須生起次第第二頌說無餘修法準是應知所說生起次第不成大悉地者是破唯修能依所依諸尊身色首臂等相展轉增長修至現顯堅固即為成佛之計謂此僅能成共悉地不成最勝非說成佛不須生次第如無垢光疏云若現證遍處界或一曼陀羅輪即能現證三界及一切智等者爾時不應為得一切智果而再現證一切智道智道相智以現證遍處或一曼陀羅即能成正等覺更不求得聲聞獨覺及諸成就又云諸瑜伽師若除福德智慧資糧唯修蘊處界等為曼陀羅輪相由修分別增上力故便成佛者則應餘少福者除福資糧但自思惟我是國王即能成就然無此事此破不修福智資糧唯修生起次第證曼陀羅便為成佛最為明顯故若不修餘道唯修生起次第僅能成共悉地不能成佛大疏之中亦數宣說故不應說時輪教中破生次第為成佛道言便能成佛者義謂汝許爾時為佛非破依彼而當成佛如大疏云有作是念由修習力蘊處界等成曼陀羅輪相豈非佛說彼即成佛又云然彼失壞一切智道彼由邪慢所覆自謂我是具足十力金剛薩埵此非十力此是十力違品極大愚癡此瑜伽師所得佛果從來未有最極罕見以具一切障故謂於爾時便得佛果是大愚癡成佛違品具足諸障而許是佛誠為昔所未有是可笑處大疏中說為得大印悉地不應修習生起次第分別以修主尊時無東方諸尊等相為因藏地諸師即以此理謂一心中不能俱現諸尊支分不能全修曼陀羅輪故說非修勝悉地之方便此極非理純相違故若果爾者則別攝等諸支隨修一時無餘可修應亦不能俱修六支應非為得大印悉地所修又自安立彼理而復破他說所立時無因可立理相等故又彼所許與般若經及彼教授現觀莊嚴本釋論中敵者所說前發心時無後白法後時亦無前時白法得大菩提不應道理同一宗要以是應知彼因之義疏說若何剎那修主尊相則彼剎那不能修東方等諸尊是說修右面時不能即修左面非說現起右面之心不現左面正理王云二分別心不頓見謂二分別不同時生然一分別有二相現現量極成如觀雜色之心若不爾者見眼之時見鼻相違見眼中時與見二邊亦應相違則分別心應無所見七支論釋中說見人前時不見後及內藏應不能見女等又屋柱等亦然應無房屋可知以如是等衆喻而破作是計者律生釋中亦廣破斥修右面時縱許不能修習左面然依彼理云何成立生起次第為勝悉地所不應修答曰實爾然彼經論意趣是破通達諸法真實非破是修大印悉地方便作是破者以前疏中所述敵者謂修天輪明顯現證以五蘊為五佛諸界為佛母等便許成佛彼宗不許別有通達諸法真實之道然復不許未證真實即能成佛故許唯修天輪即是修真實義今破彼執如汝所宗為得大印悉地僅以分別而修曼陀羅輪實非能修勝義真實論出無一切故因者謂於所修唯應漸修不能頓修成立彼時謂修主尊時無東方等尊修右面時不能修左面等成立決定謂修無我真實諸所修義可頓時修若說如是許者是時輪宗則與大疏所說諸品次第成相違過與明所為究竟所為亦犯相違與釋七灌頂果現證曼陀羅輪此身即成七地自在未得此果離十不善死後餘生當證彼果是由福德資糧而證亦成相違如是教證文繁不録若謂無二無分別智不從異類分別因生生起次第分別瑜伽非成佛因金剛藏釋亦作是說如汝所破云何應理如云從同因生果一切皆共見非從憍札跋能生粳稻果從有分別因生有分別果從無分別因生無分別果答云無過彼義蓋謂如憍札跋種子不可作粳稻種唯修能依所依天相生起次第非是無分別智親因非破生起次第能為無分別智助緣譬如水肥土等雖非麥芽親因然生麥芽定須彼等即前釋論亦云初為修治田下憍札跋種後於所治田種粳稻種子此以先下憍札跋種善治彼田後下稻種為喻次云於人清淨田下無緣悲種由是故能生空性如意樹謂以生起次第清淨田已次修無緣大悲大樂圓滿次第果易發生故彼文是定須先修生起次第之據如是分別非說任何分別其無分別亦非全不思惟謂得佛無二智須先修不分別二種我相了達無我真實之道為同類因故與彼釋於深廣諸法捨離善根性我宣說可意印壇及咒等未來諸論師有是魔眷屬說印壇咒等是佛金剛心亦不相違以初頌義謂於暫離圓滿次第善根咒所化機為說生起次第非謂凡說生起次第之機現世定無發生圓滿次第善根可能第二頌義謂如前引無垢光文唯修天輪瑜伽至彼明顯便為成佛說此論師是魔眷屬金剛藏釋引喜金剛根本經云由見三類人墮入分別網如如能度脫說彼彼方便分別習氣縛先說分別軌知分別自性方入無分別所說壇輪屋及生起諸天召智與灌頂如是輪及脈界性諸風息為令愚夫入故世尊宣說了義觀餘處壇軌及諸天召智與灌頂觀所修身界不知喜金剛此明了說先修生起次第次修圓滿次第若不知此偏依一二宣說生起次第是不了義與戲論法之教便捨彼而不修則如此說界性諸風息乃至不知喜金剛有多經論亦說脈息空點瑜伽是不了義是戲論法彼等非為上根補特伽羅而說則應彼等亦非咒道成佛必修之道若爾究竟可修之道唯是心不分別枯寂而住便當棄捨一切佛經是故有說波羅蜜乘所說行品是不了義是戲論法唯應修空及說密咒生起次第修持念誦是有分別是戲論法是不了義若知了義則不須修如是二說全非真實諸有智者應遠應捨應於方便智慧雙運轉道生起圓滿雙運轉道漸次修學了知永離戲論中道深義依止諸三昧耶趣入雙俱二理大車軌道故心莊嚴論云暫見一分而趣入者非於正等覺道能獲定解應於彼分離見而住正見之理謂當通達離諸戲論於生起次第圓滿次第三摩地漸次修學依止諸三昧耶了知漸修諸行即於大乘發生定解金剛持道證真實已乃具欲塵修道次第應正受持如此二理此是敘述如前二派敵者次出自宗之義癸二不離二次第之修法分四子一二次第之名義子二二次第之數量子三二次第之次第子四二次第之修學今初藏中先覺有謂龍猛師資正以凡常生死為生起與圓滿彼由次第而成次第而滅是為次第故所淨事是實生起與實圓滿如次而修能治之道是假名生起與圓滿此如攝行論云生名世俗諦死名勝義諦師恩得二次此是未來佛彼非龍猛師資所許生起次第之生不許即凡夫身由自因而生故攝行論文之生亦非說是生起次第當如明炬論說別說施設與圓滿次第之方便生起次第多次說名施設次第故是由心施設或是由心生起非以大種生起得名又彼攝行論文之前說若究竟生起次第已得圓滿次第未及修行則當於正死時證勝義諦死後生時起於幻身俗諦隨其願力如是成佛是知彼頌所明追述前文釋二次第非說生死為二次第若不爾者讚二次第由師恩得是未來佛則為無用以諸有情已得如是二次第故若引彼教證瑜伽師死時與光明合生為幻身應許彼二俱是圓滿次第有云菩提心釋說圓滿義謂無增進即勝悉地修此之次第名圓滿次第由能漸生勝悉地故於共悉地說明生起修此之次第名生起次第是由果法立名彼諸論中雖多宣說圓滿次第修勝悉地生起次第修共悉地然彼生起圓滿之名未見作如是釋依毗嚩跋與種毗跋專就道上立名最為善哉以釋生起次第道位圓滿次第之義唯就道立如寂靜論師云次第行相分品是諸異名是誰次第謂瑜伽者確定二次第名所詮之事以及確定釋名之義後者尤難以若定解此中深義則能分辨生起圓滿不共差別諸大論師皆未明了廣釋名義又二次第金剛空行經中亦別名假瑜伽與真瑜伽春點經云捨假曼陀羅諸假護摩業及諸假修道諸假念誦法此一切假法由性瑜伽捨善行外假事為證自性故並說筏喻是故生起次第或曰施設次第或假瑜伽皆是第一次第之名圓滿次第曰非施設次第曰真瑜伽皆是第二次第之名生起等三謂是由心生起施設虛僞所待圓滿即非由心施設圓滿成實若爾何為由心假設非假設耶答云此二次第雖各自依方便修成完具天身然其修法不同生起次第從音韻諸字及所生日月或從種子及標幟等方便自身生為完具天身唯是由心生起假設圓滿次第則依音韻諸字及日月等所表法義由於二界及風息等調柔之力現證明相增長近得三智由此增上唯從風心現起幻身如此完具天身非是由心施設假造以是生起次第完具天身方便是心假造從此方便所生天身亦是假造圓滿次第完具天身方便脈息空點瑜伽等非心假造由此方便所證空性及彼所起天身亦非假造攝行依此密意說云始從生起次第至身遠離三金剛等亦唯增上勝解其相故身遠離亦無天身此謂未得幻身以前三種遠離與生起次第時唯除由心勝解天身無餘天身以是三遠離之天身雖是圓滿次第所攝非實智身設作是念若爾則應唯以字等所表法義及風點等瑜伽圓滿次第方便生起天身何用字形標幟與日月等方便而生假天身為若云非爾若未修習假立方便不能圓滿真實方便故若未修假方便生亦不能證真方便生依此密意宣說如前筏喻譬如彼岸有施主家可受飲食有水間隔不能往受當乘船筏而往彼岸如是欲受圓滿次第飲食有凡常境執水於中間隔不能受用當依生起次第船筏度越凡常境執彼岸又如船筏但是能往彼岸方便辦飲食等須餘方便如是生起次第唯能成熟相續引生圓滿次第其能成辦圓滿次第空與天身諸受用事別須風息點瑜伽等方便此中顯示生起次第須到究竟然唯生起次第猶非圓滿生天身之瑜伽雖皆有以字形標幟及月輪等引生方便然若以彼方便表示引生猛利空點等諸瑜伽而作成熟相續最勝因緣唯無上部乃有此義若於如此方便說名生起次第生起次第即非下三部中所有彼根本經若時說有生起次第則於彼金剛句可作了不了義二種解釋故亦應許俱有生起圓滿次第此是集智金剛經規如明炬論應當了知二次第之名義歡喜金剛經釋珠鬘論云由真言幖幟等次第生起天相謂瑜伽之生起何處有彼彼即生起次第圓滿者謂俱生行者本性俱生信解為真實性諸瑜伽師何處修彼即是圓滿次第前者如上所說後者但是圓滿次第一分以亦有天身故其次第者如彼釋說行相或分或品非說時間次第善根金剛雖云言生起者由月等生故名生起餘謂次第言圓滿者謂大空智由於方便圓滿有彼或由圓滿彼故功德圓滿名曰圓滿餘謂次第然以前釋為善子二二次第之數量如集密後續云諸佛說正法皆依二次第謂生起次第及圓滿次第說道決定為二次第其理云何二次第中各有現品天輪及空性法故非由天及空而定數量此二次第決定之理如集密後續云由共勝差別許二種承事共由四金剛勝由六支分謂所得果現前究竟有二悉地故能成彼果者決定有二次第共有二義一者因共謂初次第於修勝成就及八大成就皆須生起二者果共謂八大成就等悉地通為二種次第之果彼續文義如明炬云上說由四加行次第已令金剛薩埵歡喜今當說以六支次第圓滿大金剛持謂令金剛薩埵歡喜圓滿二事決定故二次第決定初義如明炬云如是恆常四座修學成熟善根證金剛喻三摩地已即於現生獲得大印悉地謂如上說成就衆多殊勝因緣成熟相續四加行者即是四支承事子三二次第之次第要由生起次第成熟相續乃生圓滿次第若未以此成熟圓滿次第雖有少分可生然必不生能入勝道圓滿次第故經多說先修生起次第次修圓滿次第如金剛空行經說如筏喻解脫空點與春空點亦如是說二觀察後觀察亦云由生次瑜伽行者修戲論知戲論如夢彼成無戲論五次第云善住生次第欲得滿次第佛說此方便次第如梯隥攝行亦云諸初業有情轉趣於勝義正等覺說此方便如階梯種毗跋云善慧先應修生次第手印音咒悉清淨定不離正念具足一切甲善慧次應修剎那具一心修圓滿次第以此離三有恆思俱生樂是故未教第一次第便以第二次第引導顯違一切聖教故若至心欲修大瑜伽道先應生起第一次第然於修時為未堅固第一次第第二次第全不修耶為上半座修第一次第下半座修第二次第耶龍猛師資許如前義攝行論云若時已學佛乘意樂爾時應於新乘學一念三摩地若時已於新乘學一念三摩地爾時應學分別瑜伽若時已學分別瑜伽爾時應住初發業三摩地若時已住初發業三摩地爾時應入百部差別若時已由百部差別知身遠離爾時應住身金剛三摩地住身遠離應由阿利迦利入語遠離若時已由金剛念誦次第了知命力爾時應住語金剛三摩地此中扼要宣說已學第一次第乃學第二次第第二次第之中學前前已次學後後鈴論師與毳衣大師勝樂修法亦說如是殷重相續修習令心堅固應修滿次第三摩地然燈賢師分初發業作四位學故可了知亦如是許藏地大咒師中如果譯師及其徒衆亦如是許然苗原論師與瑪跋譯師善學密部之流則許上半座修生起次第下半座修圓滿次第此道次第最為重要若有錯誤任何勤修全不生果或於所生相似非真虛廢時日若能善知次第無亂則隨所修皆達扼要正修之道易生由彼力故果亦易成總之修習圓滿次第初發業者或能不能其能修者若未堅固生起次第而修雖非不生隨順功德然不能生如彼已以第一次第成熟相續之所生者若見棄捨生起次第亦可生起風息及猛利等隨順功德即捨生起次第專行彼等失道宗要實為不可若於第一次第未堅固時修此為主兼修風息及猛利等則無大過若唯修於空性則共波羅蜜多大乘若兼修天瑜伽則下三部亦有然彼等中皆無圓滿次第故說唯修空性即修圓滿次第誤之甚矣故於第一次第亦須修習空性觀慧精進船筏小復無知識智商主未見密咒教法海欲一分道而度越破彼光顯智者喜龍猛大車善妙規二種次第漸生起以具足道往佛地
