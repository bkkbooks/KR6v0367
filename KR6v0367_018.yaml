body:
  text: 宗喀巴大師造法尊法師譯明生起次第品第十二之二卯三爾時云何修空性是否初次第時唯修現品天輪第二次第方以修空為主答曰初次第時亦須修空以是成熟相續引生圓滿次第圓滿智德之方便故若不修空則不能如是成熟故又密咒乘無量經中於生現品天輪之前皆說先修娑跋嚩等真言真言即無我勝義故又於初次第時須修三身為道法身為道須修空故又於生有死有中有三所淨事皆須淨治淨治死有須修空故又有無邊經論多次宣說能依所依瑜伽須於幻中修故如五次第論云咒及印加行曼陀羅等事護摩施食事常應如幻行息災與增益自在并降伏及鈎召等事一切皆如虹受用嬉戲事習近歌樂等及行諸藝術皆當如水月若於色聲香并於味及觸眼等轉趣時當觀如幻事金剛乘行者凡諸所緣事皆當觀如幻何須絮絮說尤於此道若獲正見而不相續憶持智祥除二邊論說犯意三昧耶十四根本罪中亦云於離名等法分別名十一故非不修亦可若不修者則為犯罪又初次第須修曼陀羅輪行相顯現與達無我義慧和合無別以此故能滅除我執三有苦本此義智足論師明了宣說如普賢修法云非離庸常分別外更有所餘三有苦與彼行相相違心即是所當現證事所有甚深廣大性分別於彼皆不現此所斷疑如他伽那釋云前已廣說修天瑜伽之理有作是念若此精勤一切皆為解脫生死則修所說初次第道應不能脫生死以未修無我故為答彼難故此論明初次第道違彼生死根本之理藥足亦云今為總結此品故說以上所說曼陀羅輪不思議性即是對治三有衆苦智足派諸師釋皆同斯義此中庸常分別藏印諸師或有說為不現天相唯現常相之分別在絶非智足之義如他伽那釋云庸常分別謂分別我我所四百五十頌釋亦云寂靜亦說此中庸常分別謂我我所所取能取行相意言說名三有自性苦者謂是三有自性苦之正因祥米金剛與藥足普賢等亦皆顯了說為我執即由其時亦能了知我執庸常分別由是三有苦本故亦假說名三有苦與彼相違心者諸釋皆指曼陀羅輪行相之心相違義謂行相相違即是二心取相正相乖違即此壇輪行相之心為修行者所當現證普賢修法所說所有甚深等文即明與彼相違之理意謂正起壇輪行相之心庸常分別即不現起若有難云非彼生時不見我執便由彼力能滅我執應修空無邊處亦能滅故寂靜論師答云由曼陀羅行相之心於破一切虛妄分別轉故非唯由彼不俱時現又云空無邊等不於無我相轉以彼不遣我見故亦不遣以彼為因之苦又此多生展轉所受老病死等是謂苦諦苦因之我見等是謂集諦集之對治曼陀羅輪是謂道諦為令畢竟苦不起故心相續相轉依是謂滅諦彼即此中勝義此分別說空無邊處之心不趣無我修習彼定無損我執故雖修彼終不能脫三有壇輪行相之心則破我執於無我轉是故修彼能遣我執又通達無我慧由行相相違門破除我執亦因是否倒心而定成立此義須觀有無所依正量如正理王說云彼等誰有量即能損餘者智者起疑之處謂若無有與彼繫縛根本我執行相相違之無我見則失能得解脫生死道中心要此等問答之理是二次第之所共須智者應知由如是門若能一次觀見彼為能治所治修能治品其所修事如如增長所治品即如是減少最後乃能根本拔除如普賢修法云若有於諸相違事觀見一次此進展由所學習極增長便能滅除所治品釋量論云滅及增長依皆有不順品修成彼體性故有漏盡者即是此義寂靜師說轉依不退引釋量論無害等文證成祥米金剛則引有我知有他等成立我執為生死本故他伽那祥米金剛多引釋量論文决擇普賢修法所說正見密宗論師餘亦多據釋量論教而善成立故有起如是見立如是論二正理王陳那法稱所有諸論總於內明別於密咒全無用者彼是順正理慧力用劣弱故於難思大慧所趣正道淨理建立無所堪任而對精審正辨教理智者出此狂言如祥米金剛說壇論行相之心轉趣無我真實瑜伽是三三摩地之通規當知亦即智足意趣故初次第雖以修習現品天輪為主然於諸法無自性義亦當引生猛利定解令一切法皆現如幻修習天輪之後緣天為境修無自性行相發勝解慧轉入空性其慧相分現為能依所依天相如是甚深明了無二瑜伽每次修時皆當修習歡喜金剛由見此義故云由生次瑜伽行者修戲論戲論悉如夢即戲入無戲釋續金剛幕云譬如水中月伴虛妄無實如是曼陀羅明淨為自性故二次第皆須修空非謂咒中所修空性一切皆是圓滿次第所修天身如水月現或空中虹然無自性猶如幻事生起次第亦有如此瑜伽此與自加持之幻身亦應分別攝行論云若修經義顯教或住生起次第諸修行者雖亦宣說增上勝解一切諸法如幻如夢猶如影像然以彼喻不能了知自加持教唯由智慧之所圓滿意性天身如是智足所說定解空性相現為天甚深明了無二瑜伽印度諸大論師並多依據如持祥論師札拏修法云除此更無餘智足大師等明了說此義寅二別釋現觀次第分三卯一修時之瑜伽卯二中間之瑜伽卯三安立彼瑜伽為廣大之理初中又三辰一瑜伽加行辰二瑜伽正行及其支分辰三結行初中分二巳一成順緣集積資糧巳二除違緣修守護輪今初如普賢修法云暇滿極動搖世善友難遇故當修最勝慧方便作意此說暇滿難得復極搖動值遇善友修清淨道尤為難得若知此已當修心要諸修行中最殊勝者謂金剛乘此復當從第一次第而修修行處所如前論云若具清淨水妙樹善莊嚴於此山應修妙音薄伽梵此說當於悅意遠離之處修曼殊金剛等房內先塗栴檀等香散諸奇花預備鈴等用具修初座時若因洗浴能助三摩地者則當洗浴否則不浴亦可當先施食海生黑行論師俱說先施食故若毀犯三昧耶為圓滿故還清淨也諸先覺說應修金剛薩埵誦百字咒當如是修身者幕續釋說居靜慮室於安樂具結跏趺坐手結定印枳迦卡惹說目注視鼻端齒合微啓身不傾動面所向方修集密者藥足說向東方勝樂向南方等當依經說次於心中安種子字自生為天未明說者雖多然亦多說安立爾時主尊種子故當生為爾時主尊教授穗論并說先淨為空次俱明妃剎那頓生毳衣大師則說心間種子放光充滿身中乃至毛端自住欲天之慢是故隨修一尊即可祥米金剛說從心間放出標幟種子莊嚴餘師所說多唯種子隨一皆可祥米金剛次說從種子光化為福田毳衣師等說由光明顯現福田無畏師等說以光明召請福田故非定一召請十二穗說從色究竟如燈分焰鈎至近自前虛空中攝自光明收入種子福田毳衣大師與教授穗論等說如所修曼陀羅論行相智足師等則說如佛菩薩常相故亦無定金剛幕云供佛金剛持當修七清淨發大菩提心謂於福田修集資糧此說師長亦在福田中攝幕續釋等多說師長與曼陀羅主尊無別毳衣大師則說於曼陀羅東方尸陀林中帝釋天前坐寶蓮座以如金剛薩埵莊嚴之所莊嚴七清淨者釋論說是悔罪隨喜回向皈依請住說法修道豫此等前先修供養多論說從自心種子化生衆多天女奉內外等供養歸依多論說是二種大乘所共歸依毳衣大師與海生之修法則說曼陀羅主尊為佛寶佛所說咒即為法寶眷屬諸天等為僧寶於此歸依金剛空行十二結合第三觀察第四品中於此說受五部律儀故當別受共與不共二種律儀佛密說是已受律儀以此方便令得堅固次如二觀察說當修四無量心毳衣大師說後誦百字咒思諸尊加持次持祥等說送福田毳衣大師說想皆不可得餘師多未明說教授穗云應令彼義明了持誦謂初勿隨沉掉流轉唯除當時分別相續而轉不使其餘分別間斷又於彼義當令明了莫落空言能如是者先須決定所修數量次第發猛利心不令改動若隨意修終無所成時間宜短次漸增長餘所修事皆如是知寂靜札拏儀軌教授穗等皆說此等是集福德資糧次修空性是集智慧資糧智資糧者謂修虛那達等或修娑跋嚩等咒義此處咒師當緣見網所縛諸有情類如是想修勝義菩提之心嗟此有情本自具足涅槃體性然由癡暗所覆而不自知當以如何方便令彼自覺如普賢修法云悲緣此世間普為見網縛無等菩提心咒師如軌修虛那達即空性以一切法永離自性因果空故若那謂與空無相無願之空性等同一味之心班謂空性境與能緣智二無分別名曰金剛以非逆品所能壞故能摧所治品故無始終故猶如法界無始無終緣彼之心亦得彼名以緣真如為彼相故娑跋嚩謂自性由自性淨即住離垢之體性故阿達摩迦者謂體性阿杭謂我謂自性清淨之體性即我以是空性智者表自雖係通達空性總相然能增上勝解法性究竟自相金剛表勝解彼為究竟淨自性表至究竟於自性淨亦無所增體性及我表彼清淨於自成為自性清淨此依寂靜論師意說嗡字含阿塢摩三字是自己身語意三業謂於三業空悲一味自性安立為我普賢修法亦云離自性故空離因故無相由離諸分別故諸法無願釋三解脫門後說前真言此頌即明彼真言義虛那達等咒義有修三解脫門義者如藥足師說空無相無願三者就名增上安立為異若就勝義唯自性空便攝餘二此與龍猛菩薩普提資糧所說相順如云無性空故空以相復何為滅一切相故智者何所願雖說有三空解脫中亦攝餘二藥足祥米金剛說以離一異理決擇諸法皆無自性即是彼空故於此時當憶諸法決定皆無自性之見境即虛那達心即若那由無明力別現心境破除此力令無分別如水注水即是班通達諸法自性無別離戲論智雖須新生然彼心境真實無別之自性淨於因果位原無差別即娑跋嚩彼於自身本性安住離彼之外自亦非有即阿達摩迦與阿杭此上釋咒義為三解脫門又可釋為三種金剛嗡字明身金剛空智金剛自性明意金剛此義易知安立我為語金剛者我無實體唯依言說而假立故又可釋咒義為五部謂嗡字表大圓鏡智空性表示平等性智智表妙觀察智金剛表示成所作智自性表示最清淨智後二表自為五智體大金剛持自性後二種釋即於初釋緣空性智就義別開教授穗論謂此三釋皆是世尊續中自說又結合經與四座云先思性空性洗滌衆生垢於此皆說抉擇十八界無自性印度論中亦多於此說無我見故有人說不須通達無自性見但得粗顯二取如虹消滅即是修彼娑跋嚩等咒義全非經論真實意趣當如寂靜論師所說諸餘加持真言凡有班娑跋嚩阿達摩廓杭等文義皆准此應知謂娑跋嚩虛答等顯示空性之真言文雖不同然當如前所說憶念其義寂靜與藥足等說此真言為能堅固及能加持故誦此咒加持先應明想咒義又以妙觀察智抉擇生死涅槃一切諸法勝義空時其所現境雖未除二取相然所定解已滅二取是故不須別修滅除二取相之所緣如是定解一切諸法遠離二邊無性為相是真法界永離一切諸戲論相此如入行論云若時性無性皆不住心前爾時無餘相無得最寂靜謂一切法無得為體皆入空性若爾為何修空如扎拏修法拘摩陀開敷論說由前福資糧與後智資糧出生主尊迦摩羅惹其達師說防護魔礙最為第一彼等皆是所為一分正所為者謂如下說所修一切皆為任持色身天慢彼慢由證法身之力乃能任持種比跋大師云先修自性空行者憶宿願此說入空性已隨念宿願而起定故海生修法與鈴論師歡喜金剛修法亦作如是說故又為將一切相收入光明起諸天故又由先發猛利定解正見之力後修諸相乃能顯現如幻事故歡喜金剛修法斷謬論說入空性中無現相者是無分別智性從彼起相修護輪者即是清淨世間智性此說護輪僅是一例凡能所依一切現相務當勝解是無二智相分現為彼彼行相以是此處修習空性所為非一是故非唯短時修空乃至獲得猛利定解當勤修習巳二除違緣修守護輪於修空後未修護輪之間有修不修表中有字兩派修者復有三說如穗論十二云於二紅色賀字中間或修種子或修三字或有唯修那答三種皆為生成身語心故謂於二賀中間有修吽字有修嗡阿吽三字者有唯修那答者若於此處不如是修於後生主尊時隨其所應說修彼彼諸字羅伊跋之學者說於未生護輪下基之前唯修那答共護輪者謂從囕字出生日輪彼上吽字生羯摩杵杵臍吽字莊嚴從彼放光猶如劫火其杵各股體皆熾然幕續等說同此無畏普賢論師說所放光變成金剛墻等普賢說彼一切皆是羯摩金剛與二觀察相合如云日上有吽字出生羯摩杵想即由彼杵結為墻與幕無畏論師說為五股結成一片全無間隙上至色究竟天下至金剛地基毳衣大師則說墻形四方寬量隨諸行者所樂幕下墻上即幕與墻交合處懸金剛蓋頂上四周圍有箭網慧鎧論師說修五股杵形箭網作箭鏃形於彼等外應想火鬘殊勝護輪謂修十輻黃輪於輪轂中間修作吽明王於十輻上修十明王無畏師說此係多法通用此於輻轂內修護輪主尊如穗論十二云自住十輻轂之中央又云於輪轂內自身之下謂於彼中修四大種故轂有中空處轂內上下二端為上下輻於彼安立上下二大明王餘八明王安於方隅八輻稍離未觸無畏師說黃輪向右急旋火光四射種比跋師雖亦許護輪主尊為作吽然未說輪旋轉於破魔時則說頂轉輪王以為主尊輪向左旋誦那摩三曼達等咒臨睡修已誦咒七遍是十真實中說若無大障可修共法若障大者則修十大明王以及黃輪鈎諸魔礙用橛釘之若彼魔礙有大神通更當殷重修於空性將所護者安護輪內義同將所繪曼陀羅安於護輪如前已說辰二瑜伽正行及其支分分三巳一生所依宮殿巳二生能依諸尊巳三圓滿之支分今初十輻護輪有修不修兩派修者龍猛派於修護輪後淨為空性生起風火水地四輪彼四合為一體生起金剛地基其上有𠽾𠾐字出生宮殿總論中云虛空界中央二吽從漾字當修為風輪虛空界謂法生中央者謂蓮花及由四大合一生羯摩杵此如鬘論所說於法生及蓮花臍上從四大種生羯摩杵唯於此上出生宮殿龍猛父子多未說此唯龍智云牌樓金剛端其外謂輪圍金剛鬘有光此顯然說有金剛墻故亦當生幕蓋金剛地基及光鬘等於彼中央修法生等穗論十二中說不收十輻輪及明王而生所依有於轂中生起四大與須彌山或有自從護輪主尊變金剛持再變法生於法生中生起蓮華華上生羯摩杵杵上生起宮殿不修勝護輪者如羅伊跋於勝樂法說修共護輪後修習空性起定修習風火水地須彌羯摩杵上蓮華次於彼上修五相證菩提頓生一切所依能依無畏論師謂彼於蓮花上生金剛杵然無法生阿底峽尊者則說修法生羅伊跋及弟子說能所依同時而生集密兩派與毳衣師海生種比跋等說前後生又種比跋與海生師於無我母及歡喜金剛修法中雖說於共護輪內修法生於彼次第生四大種彼與自心和合生為宮殿然非不許修蓮華與羯摩金剛以種比跋弟子難勝月師於六支論亦作是說而賢攝論則說於法生中什字生為蓮花痾字生為羯摩金剛於上修四大種此上修𠽾𠾐字變為輪故又此與斷謬論亦說四大和合修為宮殿則化大種生為宮殿非唯限瑜伽部即於瑜伽部中亦但一分非皆如是於護輪中不修四大層次唯於法生蓮花羯摩金剛之上生宮殿者是集密智足派與持祥論師大威德派修法生法智足論師等說由金剛持或名普賢變化而生毳衣大師等說從鄂字生斷謬論等則說由金剛持體性頓生為法生相隨一皆可又教授穗論等多說為白三角下細上寬中有空處是故當於三角豎立之內修生宮殿集密龍猛菩薩派與毳衣師等說宮殿從𠽾𠾐字生智足論師等說𠽾𠾐生輪輪變毗盧遮那次生宮殿此二唯是詳略不同說由四大和合而生與說能依所依俱從五相出生如前已述如是生宮殿法有生不生四大層次兩說生四大者有在不在十輻輪轂中生兩說不在轂中生者又有四大化與不化兩說化四大者又有順次修逆次修兩說四大化後又有生起羯摩金剛與生宮殿兩說生不生須彌山亦有二說其生宮殿則係頓生漸觀令顯並諸座位皆令顯現巳二生能依諸尊分三午一正生天法午二以所淨事配能淨道午三攝諸要義初又分二未一依止五相生起法未二化後歌勸生起法今初五相證菩提者謂從真如證於菩提從月種子標幟及從身證菩提此聖父子所許如餘應知諸餘論師多如結合第三說從五智現證菩提月為圓鏡智如是平等智本尊種子幟說為妙觀察合一成所作像圓滿清淨智者說儀軌當修五種相然從父音生日輪否則無决定即前經云於月輪中央有二月菩提於修金剛薩埵法中說修二月輪故結合經於此處但說十六母韻與三十四父音須否加倍修習智足論師未見明說然燈賢論師云韻字具妙相伽等隨好光加倍修否亦不明顯寂靜論師所造釋論舉他不加倍修成立自宗應加倍修持祥論師說加倍修毳衣大師與羅伊跋所造母續修法亦說加倍修寂靜論師歡喜金剛雙身修法則說從不加倍之音韻等生起本尊種比跋無我母修法與難勝月歡喜金剛修法加倍修否俱不明顯加倍修者羅伊跋說各各皆應左繞右繞祥米金剛說韻白色在內音為紅色在外藥足則說韻下音上此皆先安音韻次乃生起之派持祥論師說於母韻所生月上安布父音故知隨一皆可智足派與持祥及羅伊跋說從父音出生月輪歡喜金剛雙身修法等與毳衣大師勝樂十三尊修法中說生日輪持祥與無畏論師說第二月為紅色無畏又說修滿月相給合於說月輪時云三角廣大性此謂月如拘摩陀色阿字莊嚴生為三角法生是於果立因名法生三角非說月形三角倍修母韻之理教授穗說十六母韻表示身內諸處之十六界此分方便智慧成三十二故於韻字亦加倍修引契經云如世尊說阿字拇指根阿字在脛上伊字於兩股咿字處隱密塢字在臍根塢字居臍中日字於乳間𠯐字在雙手利字於項處唎字居唇上厄字於兩頰厄字在眼中鄂字居耳根諤字住於頭昂痾在頂上智者如是想白分如斯住黑分則反爾女性金剛心男性一切時律生經等亦同此說律生疏云左者謂於白分拇指至頂依身左分漸向上升於黑分時從頂至拇依身右分漸次下降此說菩提心十六分於分方便智慧二品引二觀察證云界相謂世尊其樂謂欲母此謂母韻所表之十六義可分方便智慧二品故十六字亦分兩聚教授穗說由遮非界非樂各有十六分故分三十二亦就上說彼彼身位而分次從迦至羼字有三十四父音於上再加楂答也惹拉嚩六字共為四十再加一倍三十四上所添之字有多不同父音分八十者教授穗說父音攝為五界每界有四共為二十地至風界各有四者如云凡有一界即有四界空界表喜有四喜故此二十界各具塵分故成四十此復各有智慧方便空樂二分故成八十意謂父音正表塵分此分五界與塵差別故能表字亦如是分教授穗論又云此阿字等如餘處說當觀能詮所詮無別而立如云阿字虛空界等此就信解能詮所詮無異亦當了知總攝諸字為五界者如迦俄娘拏娜摩訶羼是表空界字伽哈雜哈擇答答薄也也霞是表風界字伽雜楂楂陀婆惹惹卡是表火界字喀剎叉叉頗嚩嚩是表水界字查達跋拉拉薩是表地界字持祥與藥足說次由音韻所生二月合為一體教授穗等多未說此次想二月或日月中從種子字變成標幟種子莊嚴生標幟中難勝月與寂靜論師於歡喜金剛雙身儀軌說生父母兩標幟普賢修法等則但說生一次從標幟種子放光饒益有情復收為一多有不說收放光明但說合為一者此後當觀身相圓滿此中安立五智教授穗說母韻父音之異熟果與等流果如其次第是即大圓鏡智三十二相平等性智八十隨好標幟上有種子莊嚴即妙觀察放收合一即成所作身相圓滿即法界體性智許第二為日輪多同此說持祥說二月為大圓鏡智彼二合一為平等性智種子為妙觀察智標幟為成所作智身相圓滿同前藥足師亦說二月合一為平等性智若無化後勸請前四立為因金剛持第五則為果金剛持若有勸請則前五相皆是因金剛持然於因金剛位不從表中有字修於圓滿種子未二化後歌勸生起法如是因金剛持化後以歌勸請生起果金剛持餘論多於此處宣說化後勸請總論則說於最勝業時修其化亦非化表中有之字復是化入光明於此初加行位化者如幕續云乾闥婆入已墮後憶溶化四維天女請謂表中有之字入已溶化智足派與持祥難勝月等說三種子字入二賀字中有說種子及那答等入彼中間如前已說羅伊跋意於前證菩提時唯那答入入內之法如祥米金剛說直入佛母蓮花藥足則說入本尊口由金剛道入母蓮內又有說從頂上入者故非定一由此入為緣故父母俱被大愛所化成空點形由佛眼等天女以歌勸請多說從空點生種子標幟圓滿天身此是三段生法教授穗云兩返修習五相證菩提者為令了知於因果位皆有大樂謂於此處亦修五相而生生眷屬時難勝月說由因位金剛持父母入等至已生八天女是隨幕續而說如云當修五種相先想為士夫次放空行輪斷謬論等說於果金剛持從胎出生歡喜金剛法中亦無定準智足派等亦多說由果金剛持父母從胎中生眷屬金剛持身於因果位如歡喜金剛法難勝月說前者白色因位後者藍色果位斷謬論說二位色同曼殊金剛有說身色標幟不同面臂相同其說非一不可定執教授穗說無所化時唯住大安樂身有所化時則現色身作利他事順此義故化後以歌勸請又於利他其身常現剎那不滅依此義故無化請也午二以所淨事配能淨道時輪本釋與建立次第論明顯建立順所淨事生起諸尊餘經論中未明說此如前所引幕續略說中有入於因金剛持佛母胎中教授穗論廣例餘所淨事當如彼說此如先造受胎生業死後成辦中有次彼中有入母胎中後産生已娶妻生子女等隨順此法而修生起次第先緣福田多集資糧如造生三有業即此亦可配資糧道教授穗云如是即菩薩資糧地猶如過去有支造因同故此修施等福德前造善不善業此中願心行心等道共波羅蜜多乘義同攝行論說先學佛乘即須先修共道之義雖羅伊跋說於修護輪後方緣佛田修集資糧餘諸論師多說於彼前修此依多說又修空性總論與羅伊跋雖說於守護輪後修此在前修亦依多說次修空性如同死有决擇我我所執五蘊無性彼相悉滅如捨舊蘊此後乃至未入表中有字所有一切配加行道教授穗云趣向死歿如加行位勝解行地是决擇真實之加行性故後由過去有滅生中有位如是由加行位臨最後剎那滅即最後剎那性極歡喜地無間道位初地之無間道即加行道最後上品世第一法以下十地配胎中諸位故莊嚴經論亦云爾時速當證無間三摩地於世第一法作如是說故從入表中有字乃至天身未滿是見修道配十地位教授穗云其後如中有生色滅之後成入胎位當知菩薩無間道滅後為十地以此諸地有障在故此中有二如無乾闥婆入化者則從那答等表中有之字入二月輪中間是住胎位乃至種子標幟收放光明其未別說表中有字入月內者則於二輪中間初種子字即中有生第一月表界第二月表塵此從女性月經出生猶如日輪故餘處說從父音生日輪月輪紅色亦即此意表中有字入彼中間猶如中有入於父母赤白二渧混和之中次從種子生標幟五股杵教授穗說一端五股表四支及頭部餘端五股表手足有五指及頭部有五根各攝為五聚故標幟如歡喜金剛為頂骨紅大威德為棍但能表示胎中成就業體即可若有乾闥婆入化者則由五相現證菩提圓滿生起因金剛持猶如父母次中有入內至身未圓滿以配胎中諸位其那答者為攝三字自性三字義即廣大同表中有入二紅色賀字中者教授穗中敘述二派一表中有貪增上覆二表父母所生方便智慧自性之貪亦有論說表為甚深廣大所縛表中有字趣入之相教授穗云依此密意或有修法說乾闥婆從金門入有說從口有說從餘門入如世尊續部中應當了知金門謂頂與建立次第說中有從毗盧門入者義同言餘門者如對法說從胎門入共有三門從此諸門入胎之理謂欲吻其唇者須從口入欲執其髮便從毗盧門入有說貪男性者從父而入貪女性者則從母入有說唯從母入雖有多說最後皆入胎中此是教授穗論所說金剛鬘續與大印點則說從父口入律生密意亦如是說由中有入胎有種種不同故諸經論亦說種種修法又當中有入胎父母俱為樂所悶絶為順彼相故於中有種子入母胎後父母俱現溶化化後以歌勸請若依果德而釋是由四無量心發動利他於諸有善根者現起色身若約所淨之事則四天女謂四大種中有入胎之後羯羅藍由地持水攝火熱不腐由風增長如緣起經中說迦摩羅惹其達說歌勸後歌勸之天女亦攝於彼點先雖未修曼陀羅四天女至溶化時諸大論師多說彼四勸請故不相違臨時觀想也主尊父母身相圓滿如出胎位由父母生勝曼陀羅諸天如生兒女如教授穗云果相圓滿受用諸境界者如出胎後受用一切諸境界故次生子等喻放化身諸尊之位此配無學地說如是果金剛持如所生子前初二證菩提說為因果金剛持者猶如父母與子與此相同中間二相證菩提者說為因金剛持其因果理與此稍異如文易知教授穗論為證彼義引結合云十月即十地有情十地王釋此意趣謂從入胎至未出胎配十地位故此中間即見修道出胎以後配無學道未入胎前為加行道然於福田修集資糧是資糧道似須從修空性方立為加行道祥米金剛說為對治生死中有故造普賢修法應順彼三而修然亦此中攝也午三攝諸要義生起次第須明所淨能淨之理即如生死中有三事而修故此應說受生之相能受生者謂修道之咒師彼受何種身者謂受果金剛持主尊父母之身於何處受身者謂從金剛墻至宮殿諸座正謂宮殿中央座上由修何業而受生者謂緣殊勝福田修集禮拜供養發心受戒等諸資糧如是勝妙天身若不棄捨庸凡五蘊不能受生故當修空性滅庸凡相執捨前凡蘊未得後生殊勝天身其間若無中有不能生起天身故於修空性後果金剛持未圓滿前須住那答等行相之瑜伽祥米金剛於此設問何故不於修空無間受取天身利益衆生而修賀等五字答謂以此修法對治三有故亦須順中有而修此說善哉次由五相所成因金剛持父母入定中有行相由見彼故而入母胎此亦如祥米金剛云由見金剛薩埵入大樂定拔濟一切衆生故往彼處為得上妙境故起欲樂心當生如是勝解有情雖具煩惱所知二障然一入此法生印中即得成佛我為獲得普賢尊故亦當入此此念堅住表中有之五字猶如燈滅入智慧祕密蓮花中此說由見何利如何入胎次溶化後以歌勸起是圓滿生有位如前已說若善了知溶化歌勸之理則能了知說佛地中不須色身唯以法身利有情者不應道理及知正利衆生色身不容或少故大乘人以修色身因之方便為主受此生後所作事者即下所明謂生勝曼陀羅諸尊生已各作事業利益衆生若不溶化唯由五相生主尊父母者應知亦取彼喻配合而修易解不說是故應捨僅知配合諸所淨事便謂已知能淨所淨之見當起如前所說定解此於曼殊金剛勝樂歡喜大威德等皆不容少聖龍猛菩薩派明順生死中有所淨能淨最為無上之理如龍智論所說前於建立論釋已廣說訖茲不繁述又捨凡蘊別修天身須順生死中有次第而修修習此門圓滿次第諸道最為殊勝故圓滿次第時當知依於脈息空點等瑜伽力身生智德通達空性猶如死有次從彼起如月輪標幟等以三智及息為因故生幻身及雙運天身若不爾者圓滿次第則缺淨所淨事之義故當順所淨事了知二次第之宗要而於初次第為第二次第作因之理更當發起堅固定解集密龍猛菩薩學派說此最顯如彼當知
