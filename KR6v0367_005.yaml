body:
  text: 宗喀巴大師造法尊法師譯行部道次第品第三壬二行部道次第分四癸一為成修道之器而行灌頂癸二成道器已淨三昧耶及律儀癸三住三昧耶先應如何承事癸四善承事已應如何修成就今初當於行部所說大悲藏等曼陀羅中獲得灌頂成為修道之器其唯入壇及入壇已灌頂法等於根本罪釋中已說曼陀羅及灌頂儀軌恐繁不錄應於大日經釋及金剛手灌頂經等中知癸二成道器已淨三昧耶及律儀大日經云當說三昧耶汝從今以往乃至命因緣悉不應棄捨正法菩提心汝不應慳悋損害諸有情佛為汝宣說此三昧耶禁如汝護自命如是護此等又說應住斷十惡等學處事部所說餘三昧耶多屬共同故當修學事行兩部大乘律儀如文殊根本經說即菩薩律儀故此部根本罪當如菩薩地善巧方便經所說而釋彼於戒品釋中已廣說訖此兩部中不可以受五部律法而受律儀其受菩薩戒之儀軌所有根本罪等根本罪釋中已廣說茲不更錄癸三住三昧耶先應如何承事分二子一分別瑜伽子二別釋其義今初大日經云秘密主天色復有二種謂清淨及不淨清淨者謂現證體性離一切相不清淨者謂即顯形有相之色此二天色能成二種要義由有相者成辦有相由無相者亦能成辦有相佛許由有相得有相悉地由安住無相亦能成有相是故一切種當依止無相此分有相無相瑜伽有相者是離修空性之本尊念誦無相者是兼修空性之本尊念誦勿謂但修空性若不爾者應許但修空性瑜伽亦能成佛以說無相能成二悉地故經中亦云不清淨之天色謂有相色此非但說面臂等色是說有差別色此顯無相中有淨色佛密論師雖說修空名勝義天亦立天名然此經義是分天色為二及明依之成何悉地故應如是而說明炬論中亦說此教顯示二次第之天身復可分為世出世間二種瑜伽大日經云由外內加行我說第四支此復是世間有所緣無上可加收攝句意隨逐本尊微誦為第一對有緣者說意誦名出世棄捨收攝等與本尊合一意取為無異修自性無別非是修餘事此中出世非是聖者身中無漏是說無我及彼所攝瑜伽善根金剛道次第論云事部行部瑜伽部中修有相方便及無相方便大瑜伽中生起次第圓滿次第即是正道此說二種次第為無上部於下三部名為有相無相二種瑜伽符順此經極為善哉理由至下當說子二別釋其義分二丑一釋有相瑜伽丑二釋無相瑜伽初又分二寅一外四支念誦寅二內四支念誦今初事部本尊念誦現有多種然依行部本尊念誦非有爾多若知於相續中生起有相無相瑜伽之理則道支分易於了解故此不說先護身處供養福田供養稱讚本尊等法當說二種瑜伽修行次第及其念誦外四支念誦中初事支者於自生為本尊之前應修空性當如是思自與本尊俱無自性自身五蘊依止四大諸佛了達於勝義中猶如虛空於名言中猶如影像除彼所見更無過上故自亦應如彼所見而正通達自及所修本尊俱無自性是緣起故猶如影像次想自與本尊無自性之空性二無分別必須獲得堅固定解乃生本尊大日經云若諸菩薩由密咒門行菩薩行當於身中生起身色較正等覺更無過上如我之眼耳鼻舌身是四大種所攝自性本空唯假名攝等同虛空從業因起不可取執猶如影像如是如來現正等覺亦是互依緣起相續凡是緣生即同影像由是因緣互緣起故天即是我我即是天如是應由身色生起天身四部修天之前皆應如是修習空性若未以見抉擇唯誦娑拔嚩等真言收攝現事全無心要略釋論中亦引以離一異正理決擇蘊無自性修天瑜伽之教又從空中起天之法略釋論云修本尊瑜伽師此世俗次第中明二種相一者謂自心相離一切相變成月輪等相而修自身為天此說有先修月輪等而生及不修彼等頓生之二法說是此經天真實品等中所說現譯經中缺此若依前法先想自心變為圓滿月輪上有嗡字從彼收放光明自身變成毘盧遮那佛一面二臂手結定印其身金色光鬘圍繞坐白蓮花及月輪座頭戴寶冠頂有髮髻身穿絹羅上下二衣咒印加持之法廣略隨宜茲不詳述次於前面修與自相同之如來是為第二事支次於彼尊心間月輪安布所誦咒鬘是為四支念誦此如大日經云字與字相合如是事成事善防護心意持誦一洛叉字是菩提心第二是為聲事於自身處當立自為天應知第二事是佛兩足尊咒師於彼心想清淨月輪諸字如次第於中善安布當加收攝句修習命及力命即說為風說力名為念防護此二已先善修承事二種字者兩部大日經釋皆未明說然如前引後靜慮釋說是四支中之月輪咒鬘有說為修天時之月輪及咒者非是經義防護命力先於明顯天身求安住分次緣諸字修念誦等與前事部所說皆同此經又云咒師一月中善防護念誦先行密咒者一事入一事大稱一切佛說名為前行此說修習一月一事入一事者謂緣前方心間月輪所布咒鬘若生疲厭可與自心展轉而修經說意中念誦且舉一例俱說意誦與微誦故大日經云或由意持誦或微聲二相勝瑜伽當觀又此二中先修微聲念誦意念誦時遮止命力與前說同寅二內四支念誦由空性中哀阿闇痾四字隨一如前生起是第一事略釋說此生起釋迦佛身於此心間修一月輪清淨堅固猶如明鏡乃至能見自身為天而修第二事者於月輪中修前所說毘盧遮那如住龕內想彼心間月輪有咒安住而修念誦於此亦說誦一洛叉此似亦須二種念誦及意誦時防護命力說名為前行後又云其後可略加供養花香等為求成佛故皆迴向菩提咒師無所畏持誦第二月此說不雜花等供養承事一月及雜華等供養承事一月前經又云我多說咒數當誦三洛叉是對無罪障清淨持咒師說此念誦數非說餘所行如是緣天身持心及依風加行乃至獲得奢摩他時應當修習丑二釋無相瑜伽若已獲得緣天身等正奢摩他當修空性大日經云若於苑囿或於寺院或於崖窟隨於意遠離處修菩提心乃至見相應當修習相者釋論中謂通達一切法皆無自性三摩地乃至欲住幾時心能堅住此中說於四支念誦之前修於空性是顯修天之前作意空性然正修空性之次第是於先修天瑜伽後如釋論云由修本尊法身行相無相三摩地門而修念誦加行之次第者謂如前說先修四支念誦等一切法次於本尊二無我性現似顯形色等徧計執性觀察分析為多極微如何修無相者如彼經中廣說秘密主若諸菩薩於密咒門行菩薩行而欲修行無相三摩地者應作是思所有諸相為從何生為從自身或從自心自意生耶其中身者謂從業生應觀彼如艸木土石無自體用猶如愚人或如外物或如偶像如所造像雖或有人於彼憤恚或火或毒或刀或水或用金剛若壞若焚若斫然彼無有少分不喜或用飲食沐浴塗香華鬘衣服栴檀龍腦香等人天種種上玅資具而為供養然於彼人亦無歡悅所以者何以若於彼性空色像由我慢故發起顛倒虛妄分別或行供養或作損害其人乃是愚夫自性秘密主如是於身當隨身念自性本空此說抉擇身自性空而善修習觀察自心之理亦如經云復次祕密主心者謂無自性離一切相自性本空祕密主心無三世當思離三世者即由自體遠離諸相復次祕密主愚夫異生計意有相當知此乃虛妄分別增語諸虛妄者即名不生祕密主若諸菩薩由密咒門而行諸行如是思惟便能證得無相妙三摩地祕密主若時安住無相三摩地者彼於爾時便能趣入如來所說一切密咒此說心無自性之理及唯於心增益執彼實有如是觀察身心便能證得無相妙三摩地得彼三摩地已能修諸咒悉地略釋中云自與天身無二之中現起顯色形色次即於彼或以分析觀為極微或以本來不生之理或以自心內向加行攝命之理或於所現不作意門如其通達應當現證唯心了別離天色身無所現境意如所應誦自明咒此說以離一異或金剛理觀察或於前所說義以攝命法攝意不散而住或於諸戲論境由念正見不作意門離天形色顯色修無所現此與修次第論亦極符順修次第下篇云寶雲經云如是善巧諸過失已為離一切諸戲論故當於空性而修瑜伽如是於空多修習已若於何處令心流散令心欣樂即於是處尋思自性了解為空又於內心亦當觀察了解為空次更尋思能了解心所有自性亦知其空由如是解而能悟入無相瑜伽此即顯示若不觀察即便不能悟入無相由說以慧觀察乃能悟入無相即說若捨觀慧不能悟入無相瑜伽此經亦說欲修無相三摩地者當觀身心非實故亦顯示若不以慧觀察諸法真實則不生無相三摩地故須恒修正見決擇諸法無自性義所有定解若無正見但不起念分別或有正見而正修時不修正見空解唯不分別皆非修空性者此復不可毘鉢舍那觀察太過當如前說止修觀修間雜而修如是事行部中有四最要瑜伽謂天瑜伽空風念誦瑜伽此中勝義世俗二種瑜伽是修二身正因念誦是策發本尊心誓之支分攝於修世俗天瑜伽之中風瑜伽者是能堅固二種天瑜伽之支分通二分攝故總攝為有相無相二種瑜伽然於此中說無圓滿次第故由向內攝風之力所生樂明無分別定及依此之無相瑜伽皆非圓滿次第無上圓滿次第諸不共法皆當無雜了知若不詳知下部所有道之差別則不能知上部不共道故癸四善承事已應如何修成就或依劍等外物修持明劍仙等或依內身諸處修地水火風輪作息災增益等事業或修曼殊室利等法感彼菩薩摩頂或讚善哉若念誦後能感彼相即得不失菩提心三摩地此經宣說此等眾多悉地之法若於彼四攝道總聚善能貫攝二部續中諸雜亂義將諸續教現為教授乃能墮入知教者數若不如是僅能了知道之一分非為了知總道宗要故具慧者當於二部續教現為教授之法勵力修學行部要典大日經依據佛密論師解今釋二瑜伽次第是為易入行部門瑜伽部道次第品第四之一己二瑜伽部道次第分二庚一經中所說庚二修彼次第今初攝真實經為瑜伽部一切經之根本初緣起分顯示圓滿二利毘盧遮那令於彼德發欲得心以下經文俱說發彼心已證得彼之方便修世出世悉地之共方便根本經中廣說彼分金剛界勝三界調伏眾生及成事品四品初謂如來及如來部即毘盧遮那種性第二謂金剛部即不動種性第三謂蓮華部即彌陀種性第四謂滿眾生願之寶部即寶生種性五部之中根本經僅說其四者佛密論師說成滿眾生意樂中就作者門即是寶部就作業門即羯磨部業與作者二合為一故也其後續者為挕能修出世悉地上上有情說上品成就之殊勝能得佛菩薩之因此亦宣說總屬四品之道後後續者為攝不能悟入真實修上悉地之勝方便為彼怖畏專修要有所緣愛著念誦供養等之有情而說此亦通屬四品之道然此與說瑜伽續為以修為主之機而說亦不相違正所被機以修為主旁化之機非修為主不相違故若爾此四品道為對四類補特伽羅說耶抑為對一補特伽羅漸次引導四位不同而說最勝大疏有云如來行者本性仁賢是等分行佛部行者是貪欲行第二品之所化是瞋恚行第三品所化是痴分或邪見行第四品之所化是慳悋行此說為對四類補特伽羅如無上部說如來為五部行者彼釋又云如來及金剛部寶部蓮華部羯磨部如次即是自性異熟受用變化四身大圓鏡平等性妙觀察成所作四智菩提心布施度智慧度精進度此就所得果門而說若如是說則一一所化之所得皆須具彼四部現證毘盧遮那果者一一品中為樂廣中略三機各說三種三摩地樂中者之四類三三摩地於每品四印曼陀羅中說樂略者之四類三三摩地於每品一印曼陀羅中說樂廣者之四類三三摩地於每品中皆說大曼陀羅陀羅尼曼陀羅法曼陀羅業曼陀羅之最初加行最勝曼陀羅及最勝事業之三三摩地真實光明論謂身是大印意是三昧耶印語是法印業是羯磨印是以四品四部別配身語意業四印阿嚩達惹論中亦云彼印即此身等差別說名大三法業四印彼並廣說能立之因如是所配身等四法即於毘盧不動彌陀及餘二部說為身意語業非指某尊之身意等真實光明論中又說四部各有大三法業四曼而配四印是依各部身意語業四法而說如阿嚩達惹論亦云四部中大曼陀羅當知是為安立諸尊之色身故攝身無盡藏變化三昧耶曼陀羅為表所證解脫門故安立杵鈎箭鈴等等攝意無盡藏變化法曼陀羅為表所證法之方便安立住定諸尊攝語無盡藏變化如是業曼陀羅安立供養等尊當知總攝一切如來利有情真實光明論文是就主要者言例如金剛界品第一曼陀羅中雖以自部之身大印為主然非全無意三昧耶印等說四印印定故餘品諸曼當知亦爾阿嚩達惹論云以此次第雖就身等四事而說四曼然實無有離身之心及離身心之語以是當知各曼陀羅皆有身等四分故於四部一切曼陀羅中俱有身等標幟如次即此所說大三法業四印若能詳知此等差別則亦能知最勝大疏有時說四品道為一補特伽羅成佛之緣有時說為各別補特伽羅之道都不相違瑜伽部中多說自起本尊召入智尊以四印印定者是得果位四印方便以自身語意業四事修成本尊身語意業四德淨治庸常身語意業四法如是雖依各部說有多種道次然以佛部或金剛持部之行者最為第一以於金剛界曼陀羅得圓滿灌頂者是一切部之阿闍黎若得餘部唯是少分之阿闍黎疏中引證而成立故若爾修證毘盧遮那之方便道唯彼三種三摩地耶答彼非圓滿道尚須先修圓滿自體大瑜伽之道故修天瑜伽下三部中皆未宣說順生三有染品次第而修故彼唯是無上部之別法然有順清淨品修法以修五相證菩提道如最後有菩薩成佛次第作彼慢而修故其前所修之道唯真實光明論略說別配四道資糧加行見修三大論師皆未宣說然於五相證菩提前順有學道而修甚為明顯於成大日如來以後之道則是順成佛後所作佛事而修庚二修彼次第分四辛一為成修道之器而行灌頂辛二成器已淨三昧耶及律儀辛三住三昧耶先應如何成事辛四善承事已應如何修悉地今初入金剛界曼陀羅等灌頂傳授三昧耶及律儀令成修道之器此有但入曼陀羅者及入已灌頂者後又有二謂不受五部律儀但受菩薩律儀者唯傳弟子灌頂俱受二律儀者可並傳金剛阿闍黎灌頂此依金剛生論及上疏意根本罪釋已廣說訖故不重述辛二成器已淨三昧耶及律儀得灌頂已淨治所受三昧耶及律儀是初修者所不可無須善精進不可懈怠阿嚩達惹論云承事師已於彼所說大三法業曼陀羅中如法灌頂依於大乘現觀儀軌受持律儀次於所護三昧耶毘奈耶正行禁行皆當善巧次為善護三昧耶等應常勇悍無懈以修一切自他利為前行故三昧耶者即是欲得果者不應違越之事隨順本尊所喜身語意行進趣善法遮止不善為相是大師所制之特勝勝吉祥經初品及金剛頂所說諸三昧耶及根本罪已於根本罪釋廣說茲不重述若不具足護持三昧耶等即不成就金剛頂云雖經百千劫恒精進修行世間四種人修亦不成就未發菩提心具足諸疑惑不依教而行無信不成就此說具足四過雖修多劫亦不成就故須具足四德謂依教授善修大菩提心為入大乘之門起深信心全無疑惑依佛所制進止學處諸三昧耶如教守護於本尊師長所起堅固信是則在家出家行者皆當安住律儀而修金剛頂云當遠離殺盜淫欲及妄酒安住在家戒爾時修明王若是出家者正住三律儀別解脫菩薩持明律第一若在家身堪受別解脫者亦當具三律儀而修辛三住三昧耶先應如何承事分二壬一有相瑜伽壬二無相瑜伽初又分二癸一緣粗天身四座瑜伽癸二緣細標幟四座瑜伽初又分二子一四座修法子二不能時如何修初又分二丑一唯得弟子灌頂之四座瑜伽丑二得阿闍黎灌頂之四座瑜伽今初上疏說阿闍黎弟子二種不同道者是依已得阿闍黎灌頂與唯得弟子灌頂二種次第唯得弟子灌頂當云何修上疏中云依弟子增上者自加持等當如是知謂自護沐浴又自護護處所次請本尊修行禮拜悔罪隨喜福德請轉法輪請佛住世迴向發菩提心及皈依三寶等金剛合掌結金剛縛金剛合掌當心解放所降金剛令堅固住修無我觀如前修月輪等當如本尊而結大印令入智慧薩埵修大印已次誦吽賀意善觀想召一切如來入自身修自體三昧耶印已以本尊與一切如來及以法業大印印定用本部三昧耶加持自體灌自部頂既灌頂已善供喜等四供喜鬘歌舞敬禮一切如來善修自身大印誦班雜薩埵等本尊真言於一年中日修四座此謂沐浴為先修忿怒瑜伽與護輪於福田前修皈依等修金剛合掌乃至降智尊用五儀軌生為本尊召入與自相同之智薩埵而以四印印定次復召入無量如來亦以四印印定自部加持以自部灌頂而灌頂献供養敬禮已修身大印以及本尊念誦此中僅有一尊瑜伽無大瑜伽亦未說修宮殿出生薩埵修法廣略二論皆說修習金剛薩埵一尊之後彼住虛空次想四大漸次積聚上有須彌宮殿中有獅子寶座自從空降安住其上廣修法說誦班答都結勝菩提印自成毘盧遮那次誦班薩埵從自心中變出金剛薩埵住於前面所想獅子座上次誦金剛薩埵心咒結彼大印想自身成金剛薩埵又從吽字變成吽作明王誦結開門咒印意想開啟四門以金剛攝咒印挕集諸佛修為金剛薩埵誦百名讚以四守門咒印修鈎召等次以四印印定修供養後修三平等以及念誦略修法說自從空降變一金剛薩埵住於前面所想第二獅子座上未說自修毘盧遮那上疏說依弟子增上者為一尊瑜伽依阿闍黎增上為大瑜伽故二修法所說一尊瑜伽顯係依於弟子增上疏雖未說宮殿及中間與前面諸尊然二修法說故弟子亦應修之二修法中所說修金剛薩埵者意指投華所中故當如疏所說而修本尊若欲依彼漸次而修四座瑜伽當以上疏所說為本出生薩埵修法廣略二中隨依一法而修即可義既易解又恐文繁茲不廣敘修至生幾許瑜伽者下當廣說丑二得阿闍黎灌頂之四座瑜伽得阿闍黎灌頂者有二若欲為弟子灌頂者則如金剛生論所說自圓滿大瑜伽三三摩地具修無減為廣承事攝為最勝曼陀羅生法等為中承事修大瑜伽各尊真言誦滿十萬為略承事隨一即可若欲修本尊者如上疏云如是已說弟子瑜伽與隨瑜伽當說諸阿闍黎修曼陀羅與修本尊大瑜伽之儀軌此說修本尊時亦須修大瑜伽金剛薩埵修法廣論亦云諸得阿闍黎灌頂者修大瑜伽遍行一切儀軌此說若得圓滿灌頂須俱修諸本尊未得圓滿灌頂不可俱修本尊此非謂略修大瑜伽便足是須俱修三三摩地如上疏云當說方便差別其三摩地是正方便其三摩地分為最初加行等三下至為樂略道一印曼陀羅中亦說修三三摩地故能成毘盧遮那之正方便說三三摩地故若不能修廣中三三摩地亦須修略三三摩地及大瑜伽大瑜伽中無廣中略三種差別修行時量金剛生論說修一年或六月或一月因彼補特伽羅上中下別時無一定若灌頂者則說乃至獲得諸尊開許而修修現觀法至何量者如上疏云如是乃至見金剛界大曼陀羅日日勤修謂於上午日中下午半夜四座依於儀軌次第遮止散亂所修次第勿落空言務當按文現起總義以觀察慧觀察而修遣除魔碍堅固受持三昧耶及律儀以敬禮供養念誦等修治相續觀察本尊明如現見乃至爾時而修此明初生瑜伽之量非說此後不須再修阿闍黎與弟子修法皆爾此未明說於一所緣修心專注之住分者意謂緣細金剛時修於說彼勝利時可知自圓滿大瑜伽金剛生論甚顯恐繁不錄佛密論師未由己得不得圓滿灌頂與由為他灌頂以及自修本尊之別而分修道漸次然說得金剛界大曼陀羅灌頂補特伽羅具足三昧耶與律儀修如來與佛部菩薩之二種法彼二隨修何種皆唯一尊於前宮殿座上如大曼陀羅時而修本尊若不能者則如四印及一切時修其本尊受持律儀献內外供并稱讚等日修四座此說似較慶喜藏師之規易於修學子二不能時如何修若不能以五相證菩提法起如來等修本尊者則當念誦本尊心咒即修自為本尊於自前面亦如是修後供養稱讚等圓滿念誦如阿嚩達惹云若不能如所說而修本尊三昧耶薩埵瑜伽之行者則當念誦以彼義故加持自成所持誦之本尊薩埵受灌頂修三摩地及供養於前面亦如是修而持誦此中唯以本尊心咒起本尊者是為不能修行唯欲從持誦等取成就者而說若能修行則不應爾前論引教顯了說云此第二法唯以心咒修習三昧耶薩埵者是為唯依念誦而求成就者說非為能以大印等法修成就者若爾云何後後續廣說惡見無貪者此密法非理等次說下至以心咒義自成佛身前面亦唯誦咒而修佛身如欲修習誦金剛句一百八遍此是念誦本尊瑜伽儀軌假名為修然此亦甚殊勝是故以瑜伽部為諸存亡灌頂及開光等最下須依此修而圓滿各尊之念誦癸二緣細標幟四座瑜伽分三子一修習細相之所為事子二由緣細相令心堅固子三得堅固已修收放等今初攝真實會初品中云次極善安住修習隨一相彼皆堅固已智觀三摩地真實光明論說成就微細三摩地已次善安住所修之天身等一切堅固猶如現見由此獲得殊勝堪能心故所修一切皆能增長阿嚩達惹亦云諸欲得三摩地所生成就之瑜伽師定應先修微細金剛如下所說若唯以靜慮而修眾多成就者定須先修此也總之此是修習勝奢摩他故凡奢摩他之所為皆此所為子二由緣細相令心堅固佛密論師許先修天瑜伽次修細相阿嚩達惹論云如是廣略二法皆先修本尊三昧耶薩埵加持自體灌頂三摩地供養已為令自心得自在故修細金剛三摩地修行漸次如初品云令舌抵上顎住想於鼻端金剛端樂觸心當得等至前二句明得安住之方便次二句明住已生定之法此亦應如阿嚩達惹中說憶念本尊瑜伽而修身者如憍薩羅莊嚴論云圓滿一切事已處遠離處無諸喧鬧結跏趺坐端正其身舌根令抵前齒上顎雙唇平等餘三摩地威儀亦當具足次修所緣微細金剛色等如所決定想住鼻端於彼攝心阿嚩達惹論說細如髮端粗如胡麻同本尊色上有五股慶喜藏論師許此先於臍生起誦蘇叉摩班次想上昇從鼻孔出安立鼻端釋迦友論師則許從心間引生阿嚩達惹論釋說從心間生起與息同時意誦心咒引至鼻端佛密論師說緣微細金剛修時止出入息於鼻孔中持息隨順住心生殊玅觸持心之法釋迦友論師引中觀心論心意如醉象狂奔於邪道念索繫緣柱慧鈎漸自在說如是修慧即正知謂以調象喻顯正念正知二法令心調柔住心所依微細金剛如繫象之堅柱意不調柔如未調象依止正念於所緣境令心不散如繫象索若心不住所緣即以正知了知離過安住猶如象師見象邪行不如教住用鈎制伏以是持心有二關要一能安住所緣令不散亂二若散亂無間了知仍如前住初依仗修不散正念之法故須先令所緣明了謂起有力正念憶所安住令不散亂若無明了有力之念則不能斷昏沈故憍薩羅莊嚴論云由慧明了不昧而住正念第二依仗修正知法故非住念太久太急須於安住不捨之中時時觀察如所住心為住未住此謂若太策勵心便掉舉若太渙散心便沉沒故須了知離彼二過處中而修若於微細金剛善堅固已則由鼻端或餘身分發生樂觸由此玅觸即能除遣不堪修行善事之身粗重生身輕安若離粗重身即調柔便能精進由身輕安引心輕安經云由身輕安而受安樂由有安樂心注一趣此是憍薩羅莊嚴論明了宣說依於微細所緣引生心一境性奢摩他法瑜伽論說由心輕安引身輕安從此引生正奢摩他亦不相違以此中心輕安許為心一境性奢摩他故由其所引經證即可了知此乃至成就奢摩他而修甚為明顯要至引生身心輕安此方生故此復先應修習明顯天像修此時量於二月中每日四座恒修不斷如上疏云若日日中四座加行乃至兩月定得相狀子三得堅固已修收放等初品中云若微細金剛現起樂觸相其相應普遍心亦應隨遍心如欲遍已乃至遍三界上疏中說由修微細金剛之力能遍自身若欲增長次令遍滿聚落乃至三界開放之法阿嚩達惹中說誦薩葩惹班猶如風吹微塵散布眾多微細金剛漸令普遍如是久思惟已應誦桑訶惹那班隨入息觸收聚鼻端成一金剛如初品云次彼漸收斂乃至住鼻端憍薩羅莊嚴說次從鼻端入右鼻孔安住心間誦嗡祗札底叉先求緣微細相之奢摩他彼成就已復於種種收放練習定力此乃殊勝調心之因故與唯修安住其力不等上疏中說收放以下修習一月共修三月細三摩地即得圓滿攝真實本釋皆廣說微細瑜伽若能於此獲得了解則於龍猛派集密現觀等多說先修住分次習定力極易了知壬二無相瑜伽分三癸一挕真實所說癸二釋續中所說癸三略說修法今初攝真實云由悟入阿字而修一切字自口入他口修習得成就有定穿智慧名曰三摩地應由此修印修已速成就有慧音隨行善出正定語修此能速得秘密咒悉地密咒明咒等悉皆無差別由修習此慧能速得悉地初頌雖無心咒之名然阿嚩達惹說四頌如次是依心咒手印密咒明咒而修通達真實之慧阿字是無生故說為一切諸法之門由阿字義悟入本性無生故於所誦一切咒字皆以法無我理而修即寂滅無所見也口門及悟入義同謂自悟入與他悟入以入阿字義故自無所見前面本尊即他次亦入無所見也若口作門義解謂自及前面所修本尊是解脫門是故名自他門入彼二門義如上說此文正說漸次展轉觀察自與前面本尊并諸咒字皆非實有之分別慧定穿慧者謂緣勝義名曰三摩地者謂遮揀擇分別略住正定第三頌有三摩地語第四頌中亦同此說阿嚩達惹論云諸大論師謂後三頌正說修奢摩他文雖別說止修觀修然正修時須等分修若無分別展轉隨咒音轉而能專注即修密咒之慧明咒亦爾二字異者應以觀察無自性理而令無異决擇自及前面本尊并所誦咒皆無自性修習彼義四者相同然分修習心咒等慧之差別者是由佛部等四部念誦者而分至下當說癸二釋續中所說分四子一佛部修法子二金剛部修法子三寶部修法子四蓮華部修法今初自修為毘盧遮那等佛身於前面亦修如是身心間想有咒字次於自與前尊抉擇人法無我獲得無性定解專修色等不現之三摩地如金剛頂經云佛部持誦者住吉祥佛性三千世界中當修習佛身於彼佛心間修習自咒字修自身無我是人法空性次於彼佛身亦想為無我觀佛色為何其自性非有佛無數取趣非蘊亦非界佛非能所取亦非全無佛六波羅密種以慧善將護無賴耶依處即無我菩提由如是瑜伽持誦佛部者頓超於大劫修得極歡喜子二金剛部修法想自身為金剛薩埵前面亦想金剛杵形徧滿虛空杵臍安立咒字次由漸析色等而得無性定解應專修習如金剛頂經云金剛部誦者自為金剛心於此三千世應修金剛色於金剛杵中應想明咒字此杵即無性菩提心妙果此何名金剛何性無變異何以名自性何名空法性色等一切法修習為空相析色為微塵微塵亦非有說色即是空亦名為金剛由如是瑜伽速得極喜地子三寶部修法想自為金剛寶前面空中想諸咒字次於所抉擇之能取所取無實平等性義獲得定解專注而修如金剛頂經云次寶部誦者自為金剛寶於此三千界應修為空相行者於虛空想諸明咒字名諸法無性名空性真如外內遍計色暫時皆無生若色且非有彼云何名眼由無色及眼諸識亦不生如是則一切皆離能所取由此瑜伽法得極喜最勝子四蓮華部修法觀想自為世間自在前面想有蓮華徧滿虛空安立咒字次於所抉擇之一切諸法無自性義獲得定解應善修習金剛頂云蓮華部誦者自為蓮華心於三千世界修習蓮花形於彼大蓮華修諸明咒字智者於蓮華思惟法心要如蓮不沾水亦不染泥穢如是諸法淨法界本無生如來藏為何即此空法性色等諸法性即名真如性由此瑜伽法難行大瑜伽現生成正覺定當修蓮華由於此等數數修習假名念誦非誦咒字阿嚩達惹論於說有所緣念誦後云有法無我慧瑜伽師其勝義慧瑜伽如挕真實會及金剛頂經所說諸餘念誦差別此亦應說次即如前所引挕真實會以及釋續所說而說癸三略說修法如是金剛頂經所說是以毘鉢舍那為主用觀察慧觀察而修攝真實會所說則有觀不觀察止觀二分憍薩羅莊嚴云奢摩他者於三摩地思惟為相謂心專注一所緣境毘鉢舍那即慧是心所法擇法為相謂於定心決擇此是有漏此是無漏此是雜染此是清淨此說止觀行相簡擇漏無漏等名毘鉢舍那者是緣盡所有性毘鉢舍那緣如所有性者准此應知若專修習止品住心後當惛沈若專修習觀品思擇後當掉舉故於止觀二品當平等修若掉舉者當作意無常等可厭所緣若惛沈者當想心光明等策舉所緣而令除遣由如是修若無功用平等任運而轉即得雙運如憍薩羅莊嚴論云若奢摩他增上心當惛沈散亂毘鉢舍那增上則當掉舉散亂故應如次以光明作意與無常作意遮止二種散亂於所思義雙運轉住用正念索繫止觀馬遮所失坯之心念趣正行即雙運轉雙運轉者即是無功用轉之義佛密論師意許修空性兼修遮止命力加行阿嚩達惹論云如所思惟我天所誦諸字由修習無生門勝解諸法皆為空性心所依處命力二法皆向內挕以離色等之心作意我天及所誦字等同虛空至出息時領納鼻內微細風觸而放繫念前面本尊後仍如前遮止命力而修如是若有不以正見决擇無我唯令內心全不執著無分別住或由挕息加行等力引生樂明無分別三摩地而許為修諸法真實之瑜伽者且非下三部規况云無上瑜伽雖以正見抉擇無我然正修時若不繫念正見而修正見所決定義唯令住心不分別者亦非修真實義故諸樂解脫者先當求無我見得已當知無謬修法慶喜藏雖於挕真實會及勝吉祥大疏中處處散說決擇空見之理於金剛生論修本尊之後亦略說修三種平等性之種子然未如佛密論師解挕真實會與釋續修空性之理一處總說亦未如釋迦友論師別說止觀之相增減之失雙運之理然前所說修習空性之理是善巧瑜伽部三大論師共同意趣是故瑜伽部中由修四座細相本尊瑜伽引生有相三摩地法次生無相三摩地法之義皆應如前了知此中說為先承事者義是漸近所得如集密後續云由共與勝別許二種承事說修二種成就方便皆名承事此中亦爾是故四部皆說先承事者是顯進趣上上道之次第此須善能分別天瑜伽與空瑜伽於身生起界限若不知此僅執念誦修法儀軌與彼時之持咒而為承事其所為果亦僅為行灌頂開光等儀軌而求了解者未見能得任何一部密道之要義也下三續部及造彼釋諸大論師解釋修空止觀之規皆與蓮華戒論師之三篇修次第論寂靜論師之般若教授論無著之瑜伽師地論及慈氏諸論等所說相同先修奢摩他已次修毘鉢舍那次第之理未得二種輕安但是毘鉢舍那隨順得後始是真實毘鉢舍那之理修無我中俱有止觀之理以及成就雙運之界限等詳如共乘道次第中廣說修承事時能得悉地之因如阿嚩達惹云諸印密咒明咒等中雖外供等儀軌亦是成就之支然一切法本性於正勤念誦及精進修行者速與悉地故諸精勤行者尤當於此精進此說勤修本尊圓滿念誦誠為最要然於修治能碍成就之障極讚修空故此尤為重要即前論云若於正等覺等本尊隨念修習無相如是由於一切我法無所得故則無障悉地之惑業速當獲得如欲悉地又云若時諸瑜伽師已善承事密咒而猶未能得如欲悉地者當於修大印等加行及念誦加行之前後增上緣本尊之法身此是若未能得悉地於本尊修猛利法時所說故於修本尊身大印之前及念誦後若修空性速得悉地
