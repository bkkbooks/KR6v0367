body:
  text: 宗喀巴大師造法尊法師譯明預備儀軌次第品第六之二巳四釋所彈諸線之義分二午一釋曼陀羅外線義午二釋曼陀羅內線義初中又二未一釋圓線及牌樓線義未二釋𣐟線至墻線義初中又二申一釋圓線及杵股線義申二釋牌樓線義今初線是分別宮殿相者依所彈線應知如何修宮殿法茲當解說尸林如律生及十二穗論應當了知諸方火焰量相等者是表光量均等之義非不射往四分之外故於火端不繪彩邊以表放出無量一切方所火焰熾然其內之金剛墻量厚質堅是大輪圍山體於所修義下自風輪上至色究竟天是此論師所許故於金剛墻處當如是知金剛自體或為五股或為三股或為雜杵故於畫時亦如是繪金剛與蓮鬘中間之圓線鬘論說有兩派自宗是表法生所修有法生者當如是知若如勝樂等少數曼陀羅不修法生則入法界之內故許彼線表顯法界他派說彼線是大輪圍山為體火焰與金剛墻間之圓線雖未明說表顯何事若作輪圍體性顯然是金剛墻所攝金剛墻護輪之內端觸於法生線者是蓮花葉華葉在處即是法生其內第一圓線即蓮花鬚從鬚至鬚是圓蓮蕊鬘論中有許從蓮鬚邊即為輪圍者謂龍智云牌樓金剛端其外為輪圍杵鬘具妙光此說二金剛鬘為輪圍體破云唯金剛墻是輪圍體蓮鬚蓮葉法生皆非金剛墻攝故非輪圍然說雜杵端外即為輪圍故許彼等假名輪圍則為善哉又因彼文說自杵外即金剛墻之輪圍山破彼許無蓮華及法生者成立雜金剛杵在蓮華後如云說無蓮華有雜杵者是大錯誤故於說有雜杵未明說有蓮華之教堪為定量者之意趣皆依有蓮華派解釋以是故許從蕊此邊至蕊彼邊所有量度即雜金剛從此股端至彼股端之所按壓雜金剛臍形為四方從臍此邊至臍彼邊量有十二大分線量兩派於此義同其上所安杵股長量若線長九十六分者有四大分如六十四分者有二大分鬘論破許股量十四分者於前二種令成決定故此師規若許杵股為二大分則牌樓量為一門量唯以根本壇場兩倍為繩線量若許杵股為四大分則牌樓量為三門量根本壇場及眷屬之兩倍為繩線量若爾於臍何處安立雜金剛諸股耶此中杵股四門量者其金剛臍每方皆有十二門量左捨四門右捨四門於中四門量邊起諸旁股如鬘論云牌樓旁側懸幡處上從摩竭陀魚口出雜金剛諸股略向外去中寬三分長十六分此於牌樓高三門量時說彼時兩幡中有四門量故摩竭陀魚口者是彼所出諸股之根本故以是旁股外邊不可越過幡處外線故於彼層之外繞股杵者不應道理此派離去梵線左右各二門量而繞杵股法以十六小分線量鈎回二分觀由何處牽線能到中股外端餘二分處即可了知此是杵股內線門面門側與門等者離去梵線左右二門量處所出杵股外線亦不可過柱之外線更未見說繞杵股處較此長者論說諸股略向外去之義毗布底謂略直向前說諸旁股長十二分故與中股相等然中股端較旁股端長二分者是由旁股彎曲之故即與餘處說金剛杵左右兩股與彼中間三段相等如普通杵兩旁股之長量與中間臍之長量相等故名三段相等亦不相違餘處有說一方蓮蕊兩倍即為一方華葉之量然此蓮蕊極廣華葉僅說二小分也如許股長二大分者當從何處出生旁股鬘論律生經疏皆無明文然鬘論中為證牌樓之柱安於方台上之瓶中引勝賢曼陀羅儀規文云鯨口至鯨口牌樓三門量從方台瓶出直畫牌樓柱如初二句說鯨魚口至鯨魚口為門三倍則於左右各捨十八小分中間從有十二分處出生旁股如是亦順空行海經所說從柱頂處出雜杵大光明此中亦說旁股觸處之外杵之中股有二小分故曲二分與前說同此去梵線左右一門量半而繞杵股法以八分之線鈎回二分觀從何處牽線能到中股即可了知此是杵股內線杵股外線亦不可過柱之外線杵股量有長短二派有說於股中央繞一圓線自此邊至彼邊前者股長者是四大分後者股短者為二大分然若每方作三股者不須彼線若作五股則自中股中央直往左右以及前後前者股長者各二門量後者股短者各有一門量半前者旁股之最粗處說有三分中股未有明文諸師長說為一門量杵股短者未明了說粗處之量然應同前申二釋牌樓線義若爾後者說牌樓量為門三倍不應道理以自下層此邊至彼邊間有十四小分故然彼無過言三倍者非說牌樓頂之平量是說基之寬量基亦無墻唯是二柱根本之間門面門側與門等者鬘論說為四倍亦是二柱間也其面側與門不等牌樓高為三門量者則二柱間有十四分其摩羯陀魚口至彼魚口雖有十六小分然牌樓中心之寬量是說二柱之間柱外雖有懸幡之處然彼是頂邊所懸之莊嚴非下寬量之所攝故若爾牌樓齊幾許寬如曼陀羅四方之墻任何外出終不能越雜金剛臍如是牌樓下部寬量終不能過雜金剛杵左右二股又牌樓柱決定不在雜金剛臍若依所繪有暗層者從門側前去一小分即到雜金剛臍之邊故臍盡處有牌樓柱若如所繪無暗層者則門側外線之下端與雜金剛臍邊相齊次去一分空隙之界有牌樓柱此於門側外端平去一分處作一切皆同有於面側與門等者而作暗層與諸大車說從根線至垜口線唯八小分而成相違說柱高度僅有五分有最下層不能蓋覆柱端之過故所繪者當缺暗層高度一門量者從梵線左右各去六分處而出旁股如前已說若於彼界而作暗層云何彼層可出旁股故齊彼界理應安柱於所繪中少暗層者非是所修義中門與牌樓中間無空而不作暗層也如鬘論云有說牌樓之柱從墻線起量長七分不應道理以牌樓諸柱離宮殿稍遠一一皆安於四方台上故由在平地見其如與供台相連故於台外當繪此等此以諸柱離宮殿稍遠為因而破許諸柱從墻線起者所破敵者非於所繪分別有無暗層而許如是所出責難亦未分辨所繪有無暗層乃是總破如是許者故言離宮殿稍遠者是依牌樓總相而說具密彈線儀軌亦云牌樓一大分離宮頂一分門與多惹那牌樓不應過密接彌底大師破許一門量之牌樓與門相連自宗宣說台與柱間不應太遠又說彼二下基相等故於臍上似與台界中無間隔應從台線繪出雖台實在臍上柱從臍出然亦顯示不應有高下也略遠之量鬘論說暗層一小分即是彼量故曼陀羅與牌樓之空隙亦有名之為中層者以是所修暗層非在二柱之中乃在門與牌樓之間牌樓之柱即在所繪對直而有寬為一分長為五分下有方台台上有瓶柱由瓶出此是彼一切之總量柱根柱端嵌飾衆寶中繪獅子伸手上承有說於柱中段作圓鏡者柱之數量教授穗等諸大論說每方各有二柱懸幢幡者牌樓下層與柱擎持之間若有梁者即懸梁上若無梁者懸於寶簷彼上嵌有寶雲窮其艷麗懸諸紅黃色等雜色飄帶寶柄小拂此亦如所繪者懸掛故非柱上莊嚴有說幡處從象身上獅子口中懸掛衆寶瓔珞此非說是從獅子口懸諸綵幡是說於幡幢旁從象身上獅子口中懸掛瓔珞之規牌樓諸層由下至上謂金水簷寶蹄暗嚩惹那暗水簷寶蹄垜此諸層中二等厚薄相等九等或於三門量及一門量之牌樓作五等三三等自下至上謂水簷寶蹄金魚金蹄寶蹄金垜有於初規二等九等者最下層處說無金磚而為升斗論云於馬蹄層與嚩惹那諸邊盡其美妙安諸幢幡亦可安列獅子八足獅子鵝王孔雀緊那羅及緊那羅女故以彼等有情形像擎持二暗層之上層如應當作榜師所譯作八足虎論云牌樓當懸雜色寶蓋瓔珞寶繐謂在曲線之內瓔珞等者義謂從上鯨魚口內懸諸珠串盡美應作珠串即鬘曲線以內留半分者為畫寶等藏地諸師說於暗層安放除暗寶珠論云第十一層有說唯鹿無諸箭垜龍智破云安住瓶柱上牌樓門三倍具有方箭垜如鈴聲宣揚此說輪座之側牝牡鹿尾之後各有二垜言有方者是二之名有方義通鳥及上弦下弦故跋剎譯為鳥是譯者過故鹿非在垜上是在垜層後二垜上有猴持傘頂有初月寶珠金剛其傘寶柄長三小分白傘周幔高二小分掛雀舌帶亦有說懸紅絹與飄帶者傘量有說六分有說上柄寂靜量傘幔量亦爾論說有此兩派鬘論引教證云四小八寂靜此謂門之八分名曰寂靜最外二垜之上應作一小分之幢幡杵股已說輪者謂具足十輻之法輪寬量二分其座蓮月在第十一層上此座左右箭垜層處有牝牡鹿首望法輪離輪半分許處而住連頸共有一分仰首眼望輪頂有說具八幅法輪具五分量輞謂輞量是一小分中五分之一十輻之輪亦同於諸輻間可見中股杵之中股此是所繪所修義中則為竪立牌樓左右非太遠處諸如意樹生寶瓶中具足輪等七寶輪寶八輻黃色象寶六牙白色馬寶色緑女寶紺色二八年華珠寶黃色具足六楞長者紅色具無盡藏兵臣黑色身披甲鎧手執鎗劍是光顯密意論所說經說珠寶藍色八楞當如是繪鬘論未說彼等行相於空隙處繪諸得成就者於諸雲中繪諸天子手執華鬘未二釋垜線至墻線義分二申一釋墻線義申二釋磚線至垜線義今初墻之五重論中說有上下重叠及內外五層之兩派未說何者應理然以後者為善以五重墻說為一分是厚量故於所繪中多明顯說內外五重即所修義亦無不可之理有說彼五重墻共祇門量四分之一每重為門量二十分之一故是相觸未合中無空隙然燈賢云應畫諸紋間麥許未相觸又云門分二十分平均畫諸紋此是自語相違此言過矣若爾律生經云諸紋畫之間麥許應彈繪應亦相違以墻為門四分之一是彼規故於墻厚量分為五分即門二十分之一故故彼二說是依根線一肘量者而說門量四分之一有五麥又四分之一故是每紋此至彼邊作一麥量非是二紋中間有一麥量雖餘一麥四分之一然就粗算捨而未計未相觸者如答日迦跋云麥許未相雜應繪一切紋是諸彩土互不相雜之義非說中空未觸又寂靜論師云言麥許未觸者謂下分量其上隨美而作意說所繪墻基稍粗有一麥量上無彼量非所修義說門二十分之一與一麥量之意趣至下當說墻所到界若是面側與門等者則門側五重墻俱達於雜金剛臍之邊際此有門側之梁如鬘論云龍智菩薩謂門側二線上之線即為橫梁是故不許中隙暗層與上頂層彼線有十四分然梁安於墻內門側直至對方門側之間若於門側前面安梁則超雜金剛臍不應道理故長為十二分寬為一分此派於門側之梁上決定不作五重墻也如面側門不等而牌樓作三門量者於所繪者亦有暗層故從門側之端至雜金剛臍邊中有一分於彼中間有墻相連此中門側內線之端直至對方內線之端線長八分即是梁長八分此是鬘論及隨行者所說次門側外線之端至對方外線之端線長十分即是支梁升斗處或頂簷處或是梁上五色墻處此是鬘論所說藏地諸師有作此說二線中間寬一小分作五色墻就所繪說約所修者墻在門側八分梁上是故門與牌樓中空二分彼說非理梁上五墻即門側五墻之相續彼等不當間斷以是門側前之五墻是於梁上而來須如所繪而築故於門與牌樓之中絶非如彼所說若門側內墻界至外墻界平頭截斷則與鬘論第四四小分說門側外線長四小分而成相違論說梁有八分不應錯誤彼是正說門側內端互望之量非謂彼外便無梁到以是門側之前內外五墻非全平齊實有長短梁為斜形漸漸長至外墻之端故梁外端約略未滿十小分也此說或一大梁或具升斗故梁寬量如是如說門側外端至對方之外端線有十分亦說彼為五色之處除外層色內四層色皆無十分如是梁為八分但依內面說非謂外面定為彼量律生經釋亦云八小分上梁應知為十分有說為十分者彼就一門量牌樓之量者而說此中門側下邊應如何作雖未明說然非如側面門等者五墻相齊若覺不美五層墻有長短故不美於橫斷處略向內斜即可美觀若牌樓作一門量者門側內外皆須長於門面如前已成故門側外層墻直到雜金剛臍邊梁處在下五色墻在上門頂通彼二上故凡側臉與門不等者梁上之墻與門側之墻相連如所繪者甚為美觀如是三派門側梁下所繪雖無柱然修時應有論云四方有四門八柱而莊嚴若謂彼是壇內八柱故所證不成者不應道理以內八柱如勝樂等壇中非有言八柱而莊嚴是一切曼陀羅之共規故藏地諸師有作是說有四方壇有一門者有圓壇場具四門者如空行海經及最上訓釋亦說勝樂壇內有八柱者故說彼通一切曼陀羅者乃此論師未住正知此是未知對方意趣鬘論說通一切曼陀羅者引八柱而莊嚴一句未引四方有四門故是故雖有圓壇與方壇一門者全無妨難四方四門為八柱之所莊嚴處八柱乃能莊嚴故凡四方四門之曼陀羅皆有八柱莊嚴非是說一切曼陀羅皆爾勝樂曼陀羅雖有八柱者亦無妨難此中四方四門之勝樂曼陀羅但有一內無八柱者即定以是說四方四門定有八柱破說八柱是內柱故若謂意指門旁八柱云八柱而莊嚴不須顯示門側梁下之柱論云四方有四門八柱而莊嚴此說所莊嚴處顯見是指宮殿門旁諸柱乃牌樓柱應思云何可引彼釋有以門側梁下有柱為因便說門框等三互相重叠論說彼等未解經義意謂若重豎者門面之處不能懸空門側之墻無從建立故無門側之梁其下亦無柱也申二釋磚線至垜線義磚簷安於墻上乃至門側之端隨墻而有如鬘論云於寶磚層有三角點形四方平圓依次嵌飾衆寶乃至柱旁此說乃至柱旁意指所繪諸師說磚出墻半分若爾則有半分安於墻上網鬘層處論中僅說四金鍱外從摩羯陀魚口懸諸瓔珞及半瓔珞未說於磚簷上為何所有藏地諸師以論中說磚上為黑色故說於中空處有寶升斗用支金鍱高量如所繪者其中瓔珞謂紅線串真珠為鬘中有摩尼兩旁上下皆以金鑲半瓔珞者論謂瓔珞兩旁所懸較瓔珞略短之寶鬘此亦顯瓔珞為曲者於半瓔珞之端有懸金鑲大珠有懸寶柄小拂有於鈴中懸諸小拂論說此三故於一一端上隨懸一種間錯莊嚴有餘師說於前所說半瓔珞旁懸可意之花鬘再於彼側懸種種衣若如此說則半瓔珞成五重或四重又餘師論說懸花鬘及懸衣鬘之半瓔珞懸此之處有說為諸空隙有說為諸角處瓔珞之中有作蓮花初月上有日輪半杵莊嚴有懸寶者有於華上安圓滿杵非半杵也寶水簷者論說是從房簷垂下故是四金鍱上頂簷椽端所懸如何繪水簷者論云有說於七小分寶水簷處繪諸珍寶此說繪水簷與繪寶二法然未明說水簷應如何繪藏地師說如瓶無嘴頭底倒懸或說如舊式骨莊嚴薩惹剎端之相後說與恰師譯龍智曼陀羅儀軌云薩惹剎及升鬘等譯水簷為薩惹剎者相合此又名跋姑利鬘論於水簷時說從頂簷懸掛此頂簷者諸師謂於正宮殿頂之外另安頂簷箭垜所在及其量度如鬘論云如八分之箭垜宮殿莊嚴若離箭垜則寶水簷猶如斷頭即不如是諸大寺廟現見如是故此所繪曼陀羅之箭垜乃至綵幡之線所修之曼陀羅則至門側之上金剛鬘經亦說旁有諸箭垜故此說若從根線去八小分在第八小分處宮殿莊嚴若在七分以內則諸水簷猶如斷頭極不美觀故應作在水簷之上箭垜梵語迦羅摩希日喀直譯為頭次第亦有譯升鬘者論說此於所繪雖僅通至綵幡之線然所修者直通門側之上故彼下之水簷瓔珞半瓔珞寶磚等亦有爾許箭垜之形鬘論中說半花葉形論說彩土墻上寶磚瓔珞半瓔珞水簷等次第重叠此中所說之彩土墻是於五色墻上說彩土名莫執唯是所繪彩土然諸水簷在瓔珞半瓔珞之外非如所繪頂簷寬量印度論中未見明說藏地諸師說與欲層廊下之台邊齊然於門框及門面處難容彼量故立壇時一高一下應隨美觀而作台階廊下之欲層如所繪者修時亦同門處間斷非有是故又名四緣陀羅尼層舞層雖未明說於彼安布諸尊然當安立各種各色舞狀之天女也門與門框等界初月之上安有紅黃緑黑隨一種寶其上更有半杵或以全杵莊嚴從月至杵共一小分鬘論引文證在外界而作頌云台內外角處有日月寶杵杵飾或唯寶智者依次繪若如此說則欲層內外角皆應作月日等論云四方半花葉形垜上於金瓶或寶瓶有八幢幡此是四方共有八幢八幡非是一方即有十六或有八幡安立幡處有說是箭垜層而非箭垜或是箭垜側間然論明說是半花葉形之垜上故是箭垜插於彼二側間之瓶口中幢者繫於寶桿上有初月寶珠金剛之頂三條絹帶繫諸鳴鈴端有獸王鵝王食龍毛魚鯨魚莊嚴風飄動時成為三屈形相端嚴諸鈴發出錫錫之音并有小拂其作有情形像之端即是絹條舌端幡除有情形像餘與前同此等每方四個四角垜上當作四傘量如牌樓上者午二釋曼陀羅內線義宮殿中央有九格金剛鬘層者如勝吉祥釋云為表諸佛常無間斷善轉金剛乘法輪故八柱上有圓金剛鬘周遍圍繞此說柱上安有金剛圓梁若唯如彼所說未在地上作者則不能知齊何界限為內曼陀羅之差別故凡無有雙層門者地上亦應有如是墻圓墻中央主尊處外之方層者鬘論說名主尊標幟或主尊層地上亦應有之諸餘尊處之外各方所彈兩線之間是立柱處有許彼為梁者不應道理如龍智云內中繪八柱金剛妙莊嚴其中分九孔於金剛柱間多作是說第十八穗論云由四無礙解清淨故於彼之上有四橫梁以能荷負利他擔故此說柱上有四橫梁金剛頂經說主尊座量八萬踰繕那四如來座各六萬踰繕那故中央格當較大於四方諸格四分之一藏地智者說於繪時雖為柱線隔斷無容彼處修竪起時即無彼柱故可容受然主尊處四邊方格非梁交叉所成中孔以所繪中未繪梁故亦非是柱乃以判別主尊位者故於修竪起時亦應有彼若於繪時不可大小則應修時亦不可能是故彼派說五佛處有其廣狹若依彼說則不能依原線大小相等當於所繪亦大四分之一若如彈線繪布壇場四角有天似稍難畫然主尊處有大差別鬘論雖廣說彈線法然未明說蓋頂之法堪依據之梵典亦未明說故是總蓋宮頂抑為別蓋兩層內外兩層非上下兩層宮頂極難決定藏中智者說如憍薩羅釋迦友造云一一直對門處各有二柱一端依金剛線一端依曼陀羅中心此說柱根自墻柱端達曼陀羅中央有四大分准此道理外壇頂量亦為寬之半量五重墻量高三大分及一小分磚一小分瓔珞等處有二小分此與內梁高量相等佛密亦云於內有八柱擎持四梁端四梁孔格處覆二十八椽座頂如所應此說自梵線與根線合處內去一大分平去五小分安立八柱寬量一分用持諸梁而覆其頂傳為佛密所造論中未見明說內有別宮故是蓋覆根本曼陀羅法然未見說柱安何處及說頂之厚量彼釋迦友之教雖未明說柱長有四大分然總觀諸無內壇者以及二種集密等之有者如是蓋頂似為應理當審觀察傳為佛密所造論云外形如塔寨王宮及帳幕此說外形如塔城寨王宮帳幕四種隨一傳為蓮花生所造之論中雖亦宣說然不可信藏地諸師有說從頂至基量等宮內量寬亦未見有確證諸餘內線易解如勝樂者雖須廣說恐煩且止密咒軌則初作法器時須入壇灌頂中修二次第瑜伽時亦須修能所依之曼陀羅瑜伽而進諸道後證果時亦須以能所依之相而成正覺於彼一切曼陀羅為最要曼陀羅相應以彈線決擇線以金剛鬘論最為明決故依彼派而善解說彈線儀軌已竟辰二應如何修天預備前略標時說坐壇中或向西坐之二派者是自修現觀之坐處若修天預備時當說由東向西於曼陀羅地基塗諸妙香散布衆花以五甘露所和香水於諸尊位作曼陀羅此復五部主處作為方壇餘作圓形如金剛空行云遍塗五甘露於諸如來位作檀等方壇所餘諸尊處各別作圓壇慧鎧於勝樂六十二尊時亦如是說故空行母等四處亦應作方形准此道理餘亦應知龍智及然燈賢鬘論除散花外未說餘花薩惹哈答日迦跋不空足於諸尊處亦說安花後者是於香點中央安花為座此亦如安花堆非是修彼為天答日迦跋說以各尊真言而安置花論說次如前說於各尊處修各三昧耶輪次從自心種子放光召請安住虛空智輪入彼身中彼即前地軌時升虛空者如是入智尊已隨應安於蓮上月座或日座上供養稱讚嘗受甘露此論與四百五十頌皆說有座故安座之宮殿亦應先修跋縛跋陀羅說天輪剎那生起與住空者合為一處然歡喜金剛羯摩次第儀軌等亦說於各尊種子生起故所緣明了者即可頓生若不明了從種子等依次而生餘更應修灌頂及印證等供養數量如答日迦跋云燈等諸供物如諸尊數供不應減於十謂應與諸尊數量等不具者亦不應少於十供設供品法藏地諸師說預備供設為方形故有於墻上供有於各尊之前作方形者然依通規即可持祥與毳衣大師等於此雖不說修三昧耶尊唯請智尊作供讚等然詳彼等意趣當如薩惹哈難勝月黑行論師答日迦跋鬘論等說生三昧耶召入智尊最為善哉卯三瓶預備分四辰一明瓶之因量數辰二瓶物及畫相法辰三如何陳設諸瓶辰四修瓶法及支分今初因者金剛空行經云金銀銅瓦隨一及隨力所能而作瓶謂除彼四鍮石等類亦可量者時輪中說息災增益之瓶腹圓十有六指從腹之下至瓶口邊高二十指從瓶口處至所懸邊量為二指瓶項量高六指從懸唇此邊至彼邊共有八指其中二分為項孔量一分為二唇之寬量愛敬瓶量亦爾諸餘續說瓶無根本及諸黑色唇懸項長腹大一根本者謂瓶座無黑色者若本性白即可不則應用米粉或白石粉或白檀泥塗染令白亦說用石灰及白土塗染唇者非如通常所說乃從口邊之所懸者明顯雙運論云此等諸瓶內尊勝應具相以齊八指量項高而端嚴腹寬五張手若小於此量施主不吉祥遠離諸黑色不與根本連全無諸孔隙如是無破裂說尊勝瓶應具彼相餘不決定數者此論師說曼殊金剛廣者隨諸尊數之瓶又加一事業瓶略者一尊勝瓶一事業瓶或唯一尊勝瓶或隨宮內天數或依五如來數或如不動金剛略攝為佛佛母菩薩菩薩母明王而作五瓶如勝樂者依五輪數用五瓶等宣說衆多略攝規則准此等理餘亦應知明顯雙運論引善住續云彩土隨天數或五八九瓶准此等理數量隨宜應知辰二瓶物及畫相法瓶內裝幾許物如金剛空行第四十六云五藥五寶穀氷片紫檀等藥水善充滿又說五香五寶謂珍珠金瑪瑙珊瑚水晶若無瑪瑙可用銀或銅螺隨一若無水晶可用摩尼五藥謂枳哈底根札迦日白阿跋惹姊達紅白二種敦札塢曇鉢羅即棍塢曇鉢羅初者有云虎刺第三即白難勝灌頂品中亦數白芨為一五穀者謂胡麻大麥莞豆稻麥恰師所譯說以辛枳塢代替小麥榜師所譯及灌頂品說替稻米其辛枳塢與摩辛得塢諸師說即大豆小豆五穀五藥金剛空行經說與此稍異此論說用五種甘露所和香水香者如答日迦跋云氷片紅花檀紫檀及麝香誦咒而注入即是五香共五種五慧鎧論師又說五藏共六種五三十瓶物言五藏者如智金剛摧壞釋云地藏胡麻水藏海鹽穀藏酥油果藏甘蔗花藏蜂蜜次答日迦跋云熏辟魔為先滿注妙香水如慧鎧論師說善洗諸瓶用黑香熏芥子打而驅魔誦甘露瓶等一切事業咒而為守護灌瓶之水如日生論師說取未經牛馬等所涉之水莫觸餘器當取淨水無諸蟲類和以妙香中量注入非太滿莎惹哈說水中和以乳酒於何瓶中裝何物者如此論說若貧乏者尊勝羯摩二瓶裝寶為藏非餘諸瓶此復尊勝瓶中定須裝寶餘諸瓶物似裝不裝皆可不空足說主尊瓶中裝穀藥寶諸餘瓶中滿注香水寂靜論師與跋嚩跋陀羅亦說穀藥等物裝尊勝瓶寂靜論師說其理由謂尊勝瓶為主多諸作用是與餘瓶差別之義此是四百五十頌說裝諸物法慧祥師說穀藥五甘露等先誦主尊真言一百八遍加持用布包裹繫於瓶口莊嚴用香熏後裝入瓶中然跋嚩跋陀羅與毗布底說注瓶中當如是作作怖天說以裝瓶物之器安置瓶上非是正義加持彼諸物之真言謂嗡奔北沙則阿吽嗡奔惹那阿吽嗡奔北伽阿吽嗡奔伽惹北阿吽嗡奔阿彌得阿吽慧鎧論師說是五藥五寶五穀五藏五甘露咒其五香咒為嗡奔根得阿吽繫於瓶項之衣為白黃紅三色亦有書說加緑及青故用彼等隨一餘多有說繫一雙布及花鬘者金剛空行經云項纏雙新布謂纏二層新布作怖天許各瓶項布順各尊色然無確證又龍智云以廣大白衣應繫於瓶項智者以白線如法纏衣上有隨順此說誦吽字七遍加持七縷白線而纏纏線咒謂嗡班協喀惹茹札摩札底嚮跋那答吽毗布底說以此線纏項衣然餘經說順息災等事業繫五色線故是非唯用白之據金剛空行經說以染色線飾故此項莊嚴多說為布亦有總名曰衣三昧耶金剛說名為曩補衣之一種若有清淨新布即以彼作若無新布如其所應用絹等作亦有曼陀羅儀軌說布須未壞邊者繫項結法梵典曼陀羅儀軌中皆無明文佛密論師摧壞金剛疏云繫未作餘用之淨布作三髻形當如是作瓶口莊嚴如金剛空行經云口滿鮮樹葉曼陀羅儀軌中多說用有葉樹莊嚴其口總續亦說用諸上菜樹葉嚴飾瓶口諸曼陀羅儀軌多說樹為阿摩羅等五樹此論亦說然彼等樹藏地難得故凡有果葉之香樹即可金剛空行經云吉祥草墊下說以吉祥草為瓶墊未說莊嚴瓶口諸可依曼陀羅儀軌亦未說吉祥草為口莊嚴但說以有葉等樹作經云摩尼芥茅草釋云茅草者即青茅為吉祥故具足新葉應插七吉祥草及孔雀翎佛密此文非說瓶口莊嚴即彼論云其口為吉祥故用無憂等果樹莊嚴其上置金剛杵繫吉祥線說以此等為莊嚴故以是插茅草者如智金剛釋說於繫項上塗以牛糞為遮魔礙等故於上插七茅草雖毗摩羅彌札與樂苗論師說茅草為口莊嚴然彼不順祕密總續故不取為定量縱許茅草為口莊嚴亦非以吉祥草為口莊嚴之據若捨無上部所說口莊嚴而取事部之教亦不得成此等之清淨者即表法歡喜金剛羯磨次第儀軌說藥穀及諸寶如其次第為曼陀羅諸尊菩提心意身色之相等合曼陀羅儀軌云瓶是諸尊處口項飾牌樓繩線大悲相五藥悲覺心穀是天本性五寶為身光藏為心智界香等勝戒德此是姑姑惹所說畫相諸法尊勝瓶上於法生中畫蓮花月輪或是日輪諸餘瓶上於蓮華月輪或日輪其上畫各尊種子或幖幟如龍智云一切諸壇尊種子或幖幟調和紅花等智者畫瓶側第三句明用墨第四句明畫處即畫於瓶上也畫法生者是寂靜論師派標幟顏色如金剛空行云幟隨各尊色字色亦應如是若唯一瓶前面畫主尊相左邊畫一切事業相若許四方畫毗盧等相者則於毗盧相處畫主尊相亦有論說於瓶口上畫主尊相又有他派許佛眼等相亦畫於四方俱如鬘論所說辰三如何陳設諸瓶論說兩派謂設於所修曼陀羅東方等位及向北坐而預備自在方所有諸瓶前者謂於天預備曼陀羅之外東等方隅安設諸瓶主尊之瓶置於中央後者如於彩土曼陀羅中安置幖幟次第於一一香曼陀羅上設順各尊吉祥草等座位安布曼陀羅相答日迦跋慧鎧論師說安八瓶於四門及四隅第九設於中央答日迦跋說於東門左側安立業瓶安布諸瓶總有二時此是預備時安布也辰四修瓶法及支分應於瓶上安置吽字所咒之螺水或顱器若無此等瓦器亦可明顯雙運論云於瓶瓦杯上安置金剛杵四百五十頌本釋與毳衣大師亦說於香水器安置金剛持祥論師等多不安螺水說將有花鬘之金剛安置瓶口於螺杯中如所獲得五種甘露及以香水誦嗡班阿彌多迦叉吽及三字七遍而咒之如鬘論說由咒七遍智慧甘露金剛微塵為性此說誦彼咒時觀想智慧甘露及諸水微成為金剛自性咒義亦爾故金剛水非以灌注水時執金剛於瓶口而注得名由尊勝是諸瓶之主作用衆多故此論說於彼瓶口安置螺水餘瓶不爾於彼螺上置金剛杵中繫花鬘誦嗡禱得禱得摩訶禱得得娑訶想召殑伽河水與瓶水成一體後生為天寶鎧論師毗布底等亦如是說次先辟魔清淨從榜字中修成寶瓶鬘論兩譯俱如是說寂靜勝賢寶鎧毗布底說亦爾答日迦跋慧鎧論師說從字而生宮殿次於瓶中剎那想成天輪及諸座位從自心中種子放光召請智輪於前供獻浴足洗面閼伽令入智尊由大貪溶化為菩提心性想與先注之水合為一味論說於相亦想三昧耶與智尊合一故亦修諸相為各三昧耶尊與智尊相合於業瓶中生為一切業尊寶鎧及毗布底亦如此說然未明說某瓶應修某尊龍智與四百五十頌本釋毳衣大師黑行論師難勝月等亦未明說慧鎧師云於尊勝瓶中應剎那而想圓滿諸天輪餘瓶想天輪隨從諸部衆歡喜金剛羯摩次第儀軌亦說主尊瓶中俱修諸尊不空足說主尊瓶中但修主尊諸餘瓶中以三段法而修各尊與此論師意趣相順以誦咒時說主尊瓶誦主尊咒或誦塢答迦咒未說誦持餘咒餘尊瓶中各誦彼自咒故以是應知若唯二瓶或一瓶者則主尊瓶中應修一切天若瓶較多當觀由諸尊門如何攝瓶即於彼瓶修彼諸尊若不修瓶為宮殿者主尊瓶中若不俱修諸尊雖無宮殿但修座位即可生起之法不空足與耶茜那說由三段法生故如天預備時所說而修海生所造二觀察經疏云由本尊瑜伽從前說瓶內略取少許水注於瓦杯中安置尊勝瓶榜生寶瓶上於彼修圓滿三昧耶壇輪召請智慧輪漸供浴足等與三昧合一獻供令滿足藏師有說此是於螺杯中俱修諸尊然彼教文非顯此義以彼釋論於初觀察明瓶數量與瓶物時未說修諸尊法故後觀察善住時說於瓶中修諸尊儀軌於彼修圓滿者是於尊勝瓶中修曼陀羅之據若謂彼文顯示於尊勝瓶上瓦杯中生諸尊者則應許此處及前文俱未明說尊勝瓶中修諸尊法餘定量論未見說於螺杯生諸尊者故彼杯中似不須修諸尊應審觀察此於瓶上所安香水充滿之螺或顱或瓦杯者說是供瓶閼伽之器如毳衣大師云瓶上安閼伽器注香水及白花上安繫花鬘之金剛又云以有白花之閼伽器供獻瓶尊水之修法誦塢答迦咒及三字七遍想成智慧甘露金剛微塵自性鬘論此義如前已說此處先化諸尊而後持誦乃是鬘論及隨行者之規與琅迦勝賢說相順耶茜那亦隨彼行不空足說業瓶之天不化此論未說彼別毳衣大師等亦說誦咒後方化故知隨何次第皆可天化水時若瓶先修為宮殿者亦應化成瓶相諸相若修為諸尊者亦應化成諸相諸尊化後次誦吽字左拳執花鬘端念誦主尊心咒或塢答迦咒水一百八遍主尊瓶中裝入甘露瓶咒所加持之白花三朵諸餘尊瓶即誦彼尊真言一百八遍或二十一遍或七遍於彼瓶上執金剛花鬘端如前裝花左手執花鬘時日生師說右手持珠跋嚩跋陀羅說弟子手執繫花鬘之金剛安置瓶上師長另持花鬘一端誦吽咒百八遍勝賢論師說誦主尊咒一千零八遍誦塢答迦一百八遍四百五十頌云正供養閼伽應裝入白花故亦供螺水等閼伽釋論則說誦壇主咒及吽七遍而後供獻總續中云裝入諸花已應用妙香熏於灌頂瓶作如是說故應亦用香熏修瓶念誦之時未說其餘觀想似應作如修現觀時念誦之觀想從各尊心中咒鬘收放光明鈎召諸佛菩薩智慧甘露融入各尊即此便足藏地諸師有說想自口中放紅色光順咒線照瓶內諸尊皆成紅色為自自在從彼諸尊毛孔流注甘露次以花等供養諸瓶以業瓶口莊嚴取業瓶水灑淨守護祝云直至此處曼陀羅事未圓滿頃當遮魔礙施食後灑淨時誦不動等金剛讚頌為先遍振鈴聲所請能遮魔者勝賢論師說是一切業尊毳衣大師說融化後亦誦讚文餘諸論師說先供讚後方融化勝解瓶水為天本性供獻食物及讚誦等若覺不便可如餘師所說而修佛頂曼陀羅儀軌云先供顱閼伽香等及飲食與瓶數等供亦以內密供令諸尊歡喜如前天預備法於瓶亦隨天數而修供養不空足說次將諸瓶藏於自室為灑自身及諸弟子故從諸瓶略取少水貯於螺杯等中安於曼陀羅室若無室者隨設壇處壇東門外稍北三足架上為灑餘者當置業瓶及吉祥草墊於彼處瓶尊念誦及供養等每日三次或修一次總續與四百五十頌本釋并勝賢論師等多說每日修瓶念誦三次鬘論說修一次故從次日至未灌頂以來如前修法日修三次若無暇者每日一次
