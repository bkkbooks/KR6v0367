body:
  text: 宗喀巴大師造法尊法師譯圓滿次第總建立品第十三之一丑二學圓滿次第分二寅一圓滿次第總相建立寅二圓滿次第最初所修今初無上續道二次第中主要者謂圓滿次第若知諸大論師種種釋彼修道之法則於續義獲決定解不為似道所引緣此即能令彼善說久住詳明所緣以及引導次第易可了知故今當說總相了解生起方便此中分二卯一父續圓滿次第之建立卯二母續圓滿次第之建立初中又二辰一龍猛派圓滿次第之建立辰二智足派圓滿次第之建立初中又二巳一明二諦別之圓滿次第巳二明三遠離之圓滿次第今初凡能具足進趣圓滿次第須有堅固生起次第此則諸師皆同如前廣說集密本續十二品云承事智甘露一切應觀察此即能修習一切咒真實明炬論釋須以六支甘露修勝承事如後續云由六支瑜伽修勝承事事若以所餘法不得勝成就六支與五次第義無差別如龍猛菩薩云由得風真實漸入咒真實了達咒所緣學習金剛誦金剛誦行者能得緣自心住如幻等持以實際修治從實際起定當得無二智住雙運等持更無可學者金剛誦或名語遠離緣自心或名心遠離加持幻身或名世俗諦實際光明或名證菩提無二智即雙運故成五相攝行論亦說身遠離並說始從生起次第乃至雙運須學前已方學後後若無前前身遠離等後則不生次第定爾如是即成三種遠離及於二諦別修雙運三種圓滿次第此若未知何為所修不共之果則於生起圓滿諸道易於肴訛知則以彼為例即易了達諸能修道如五次第論云正學大瑜伽已修習雙運雙運雖有學無學二然是一類故合說之所雙運事雖多異說要在世俗勝義二諦如五次第論云世俗與勝義了知各別分何者正和合說彼為雙運雙運之理彼論又云此如彼次第自加持光明唯此二和合是雙運次第此謂身現自加持之清淨虹身心成勝義真實一味之智此二非是一有一無各別存在謂得同時和合智身此於無學位時心既恆住真實身亦成就相好莊嚴之究竟身有學位時則與彼異然二俱是心從三相明增得三身由五色光息所成雖以己修治故非異熟身然於此時猶應暫現任持異熟身相此與幻身之差別等若盡抉擇篇幅繁長欲於餘處廣說故今且止有學雙運心身是彼佛位心身最勝親因即是殊妙圓滿次第故他諸派若於將近果位有學位中不修同此或復類此最勝圓滿次第則必不能趣證究竟所得之果此有學雙運位如云了知各別分故若先無二諦各別圓滿次第離隻無雙即不能成故別修幻身以及光明幻身是三空後所成雙運則是於四空後唯從逆起風心而成如五次第論云具自性諸光兼具足六識自加持次第現起利衆生如從淨河流諸魚疾躍起如是一切空現起幻網身攝行論明炬論亦數宣說故於雙運之前須入四空以後微細二相畢竟淨之光明此復數說須淨三心境相乃能入此故是現量親證能得此者先須得自加持幻身之世俗諦如五次第論云自加持正定及以光明處以因果差別宣說為二諦由加持次第乃得真光明是故金剛師先說自加持其幻身者謂三空後唯由逆起三心與風自身現為金剛薩埵之身如五次第論云真實與風俱經於三識後仍生行者身說彼為幻身攝行論說此如夢中意身是故但就行者心前似得此身說為智身而非實得此與有學雙運實身雖同由彼風心而成然有大別此與夢身相同之理餘處當說故五次第論云由鏡中影像應了知幻身諸色如虹霓周遍等水月此義是說前述唯從風心自身現為金剛薩埵之身如彼諸喻非說僅覺自身非骨肉等粗體明了顯現清淨無礙如水月等以於生起次第亦能如是修故即於生起次第未堅固時亦多明了顯現勝於眼見清淨無礙猶如虹色又攝行論說從生起次第至三遠離皆無幻身以是生起次第究竟於細點位雖能於一芥子量中圓滿現起能所依曼陀羅明了堅固然非幻身是故此等全無幻身之義如是天身猶如虹霓現起清淨無礙身時憶念正見雖覺全無自性如幻相現然亦無幻身義以攝行論說生起次第人以幻等喻勝解一切諸法皆如幻事然不了知自加持義論於執彼為幻身者特破斥故彼文前已引說又生起次第位漸收情器入空性時滅顯色等一切粗境明了安住唯心後從定起雖不作意亦能顯現天身及現清淨無礙然彼亦無幻身之義以幻身者要由究竟第一次第及身遠離於語遠離風得自在修心遠離引生三空智後方得生故此派成就幻身之法最為難解故若未知心遠離位於三空後成幻身法則於光明及光明後成雙運身之理全不能知故於通達彼義當勤修學幻身收入光明論說由整持與隨壞靜慮頓將一切境相收入光明及漸收二種方便其入光明必須幻身之理有說若未了達有法如幻則不能證法性光明有說於幻身上有幻執垢要由光明修治故須收彼幻身入於光明此是全未了知幻身之言以無性而現雖是如幻義然彼全未涉及幻身之義提婆菩薩說波羅蜜乘與生起次第雖能如是抉擇修習然未了知自加持義特破執彼為幻身故由見幻身是入光明不共方便故令生起幻身非幻執垢亦復非由幻身增上而生幻執垢故是故幻身是三空後唯由風心所成之身未證三空智時則必不能入第四空證三空已若不能修風心所成之身則於第四空後亦必不能成就彼身故光明前須修三空及幻身者俱為光明雙運而修非但為光明而修也此說雙運之前要有光明光明之前要有幻身巳二明三遠離之圓滿次第修成如是幻身須先生起心遠離三空智如大印空點第五云說歡喜即明明增為勝喜知妙喜為得俱生即光明教授穗論亦如是譯最為善哉此說四喜同四空者約通義說如以增上勝解收入空性亦即說名收入光明譬如但修光明與五次第中之光明有大差別如是應知通說之三相與心遠離之三相亦有大別此三相是究竟第一次第與身遠離修語遠離風自在後之所生故攝行論說身遠離等六支若無前者後不生故此說幻身之前要有心遠離心遠離智之外緣雖如前引一切幻事中等要依明妃乃能生起然須先依內緣修調柔脈與空點之殊勝方便此於續部雖亦說有多種但依龍猛父子所許修風調柔最為切要故未說餘猛利火與空點等衆多所緣次第而唯說風瑜伽如五次第論云一切有情命謂風作諸業此即識所乘五性亦是十此中意說因位衆生為風自在是故於風若得自在則易發生諸道功德此說心遠離前要有語遠離能自在風之瑜伽續部雖亦說有多種此處唯取金剛念誦依是密意金剛乘中多次宣說諸修行者當以自身三業與如來身語意和合無別而修諸道能於自身遣庸常慢成佛身者謂初次第與身遠離其從修種子等生為天身即是第一次第其能通達諸法性空真實一味即由與彼無二之智現為天身大密金剛持之一部從此出生身語意三部五部乃至百部以此身遠離三摩地淨庸常慢而修天身即身遠離依此密意故說身遠離為身金剛三摩地此與生起次第所斷庸慢雖同而能斷則大異此說語遠離前要有身遠離及生起次第如於所修天身能修之三摩地雖有無邊但至究竟唯是大密金剛持之一部如是所誦真言雖有無邊念誦勝利亦無量種但辨咒有了義不了義說了義咒即是金剛念誦故於語根本風能得自在亦唯稱讚金剛念誦為語金剛三摩地一切念誦此最究竟如攝行論中說如是從生起次第乃至身遠離修成天身乃成究竟能誦咒者即以彼身持誦究竟念誦於發語風獲得自在即由風力而能任持引導界等故若結合外印然猛利火溶菩提心即能任持不墜滅八十種自性分別生三空智證得意金剛三摩地此後乃得生起幻身由生圓滿大空智力乃能入光明一切空由大空後唯從風心圓滿生起幻身之力乃能於入一切空後現證雙運轉身次由修習雙運轉義以彼等流而往佛地此即龍猛父子諸論要旨此等皆以生死三有為二次第所修治事故於三有現為三身之理務當獲得清淨定解第一次第能治所治之理建立次第釋中已廣宣說故不繁述惟是聖派龍猛派教典辭義古奧極難明了若能不以淺嘗略修而自矜足能久祈禱師長本尊依智者論精勤修習自能窺見彼諸教典為教授也由是諸入此法修心要者先當勤修第一次第生身遠離次當善巧命力金剛念誦要以修風為主以餘派風點等瑜伽之所為者此亦能成辦故辰二智足派圓滿次第之建立文殊菩薩攝受智足大阿闍黎口授甘露名為曼殊室利口授此論師依菩薩聽許所造解脫點論即廣抉擇圓滿次第此派在天竺曾出無量有智行者故成大車軌道光如日月此派圓滿次第建立今當略說如解脫點論云故深顯菩提證無二解脫非唯證甚深亦非但明顯如是甚深空解脫非我信故證無二性現世定得果離一切分別超越思議境如空淨出生離執名甚深任持大印色如幻如虹霓修治自他身說名真明顯此說大印如幻天身與入真實之心和合不離深顯不二之智為圓滿次第之主旨生起次第之天身為咒身圓滿次第之天身為智身此又有智身清淨身之二即前論云二次第差別分咒身智身智身中有智與清淨二身釋云智謂略得智自在者所證略清淨之幻身清淨中有住德相之不欺誑身與如實之果身前者與幻身同第二即是有學雙運第三正同無學雙運此如口授論云諸法從色等至一切智性清淨如虛空深顯無二智又云遠離諸分別勝因難測量顯現為大印光明熟自他無二性最勝初遠離等二句意說甚深其次二句意說明顯是故圓滿次第究竟要旨或名二諦無別或名深顯無別樂空無別無別之義即能成佛之親因此於諸大論師圓滿次第皆當了知由此因緣亦於生起次第說由娑跋嚩等真言入空性中次起天身諸餘圓滿次第亦須修辦雙運智身故當思惟云何修習乃能攝持圓滿次第宗要如是建立咒身智身亦是聖派之所共許如是最後圓滿次第是已究竟生起次第細點瑜伽於第三瑜伽略得智自在之瑜伽師修習圓滿次第之所成辦彼所修之圓滿次第是由四歡喜門收為四義之道其依俱生喜之圓滿次第口授論說當於心間智慧薩埵行相標幟中央如前生起次第所說修圓滿曼陀羅從彼主尊心間不壞空點放諸光明漸收器界有情及曼陀羅諸尊後於空點盡力而持次依收攝次第漸令明顯修習現品之三摩地由數修習此二法故便有地入水等五種相現此後乃成深顯無二智身次修諸行即得成佛收入光明之理如五次第論云從頭乃至足直至於心間行者入實際說名為整持先攝動非動令入於光明後自身亦爾是隨壞次第猶如鏡上氣一切盡消滅如是瑜伽師數數入實際此二靜慮中之隨壞次第與口授論所說相同然以不壞空點光明收攝之理則多差別口授論說從光生心從心生風火水地等流轉次第與地入水等之還滅次第與聖派同不壞空點如口授釋論云無二智謂甚深光明無二正智淨如虛空彼云何住世俗色者謂住五色空點量如那迦粒言彼堅固已者謂從彼生風等本論亦作此說故是與五色風無分別轉表心之空點也生時既從彼生風火水等收時亦復還入於彼順所淨事修三層薩埵已入三摩地薩埵光明之理此與聖派所許相同此是發生情器之本故於第一次第亦說此點安立字形口授論云住三昧耶印心間行相上諸佛最勝智於初次第者顯現為字形不可壞本尊種子五光明是故應知咒乘生起能所依時多修一字為因而生要旨唯在於此餘不能壞故名不壞不舒散故說名空點此住心中如口授云若人不可壞乃至住身中業非業差別其釋論云乃至住身中者謂此空點住於有情心蓮之中由此亦當了知於心中修字形或修空點之義如是生死流轉還滅不共次第及如死時漸次入光明法俱由多修收放後從不壞空點五色光風之因修成深顯無二智身是故此派圓滿次第究竟要旨與龍猛派最相符順於此深顯無二俱生歡喜圓滿次第之前當修變化空點即是修風金剛念誦此與聖派有多差別說由修此之力能達一切諸法皆如幻等於此之前當修密點即降心間空點下至密處摩尼任持於此點中修能依所依圓滿曼陀羅於彼主尊心間空點任持其心及有多種收放差別又說此時有五相現云何五相如口授釋論云空點光明明不明顯之喻如陽焰起又云言如烟者謂較陽焰明顯然非青色或白色等此中非說生陽焰等是喻後後明顯於前心成無性處者是為取支六支之一其後放出標幟與天身等是隨念支六支之一於空點持心說是滅息支謂由於彼持心則風入於中脈在此之前於如上說圓滿曼陀羅中主尊心間依於不壞空點多修勝收放已說於空點持心論文恐繁不録圓滿次第所修空點瑜伽與彼生次第之細點亦大差別故或有說智足派於他派第一次第細點說名滿次第者實是未知此派而妄宣說修心中不壞點與摩尼中密點及上鼻端之變化點三者如其次第是依歡喜勝喜離喜而修又修不壞殊勝點已如彼隨壞次第修收放者是俱生喜總之由前二修空點瑜伽第三修風瑜伽以風與點堪能之力順逆收入生起光明數數修習成辦深顯無二清淨智身次即由此等流進修其果卯二母續圓滿次第之建立分二辰一時輪派之圓滿次第辰二諸餘派之圓滿次第初又分三巳一明所得之樂空無別巳二决定修彼道之數量次第巳三別釋不變之樂今初所得究竟樂空無別之果即前第四灌頂所謂大樂心與空色身二法體性無別盡一切垢之無二智此於第五品之大疏多返問答而善成立如彼疏云如來豈不宣說若無蘊處界離二根和合則不能生慧智自證以無流注事故諸瑜伽師云何能於自心所現自心起貪淨自心障受用不變大樂之智以無微塵所集身故故此誠大顛倒如說天授乘自肩上而往聚落此敘他難故當且說敵者之意此是攻難前說時輪中之前段文以水銀喻繫菩提心無蘊等障由修自心所現空色手印而得成辦難云若修大印無諸微塵合集之蘊諸瑜伽師唯與自心所現空色入定而能受用不變大樂妙智不應道理以無微塵合集身故成其决定無不定過故言如來豈不說等引教顯示意謂佛說若無微塵合集之蘊則無二根交合不能流注諸界若界不能流注則應慧智不能了證自境前時輪說無蘊等時說於果位遣除微塵合集之身故是所許總之彼謂若無微塵合集之身唯現空色父母受用不變妙樂理應相違故興攻難疏中答時不答已許及因不成而答不定故是果位之諍乃至未得果位樂空未能永盡蘊處界等之粗色故言汝此語如說乘自肩而行者是難心所現之空色還以能現之心為體以於此難之前經說鏡影喻故又經與疏處處皆說知與所知同一身等多說彼二同一性故永盡微塵合集身時空色明妃抱持空色方便若許彼二同一性者則說天授自乘肩行亦應無過此出齊頭過失大疏答此難云諸愚鈍者說離微塵合集為體之蘊處界唯心慧智不應自證實非如是以由客心習氣力故此云蘊處界者謂由客心習氣由此力故心有苦樂若以勝義觀察非唯此身而有損益如是廣說義謂他說若無微塵合集之身唯心不應能受樂者不應正理唯由內心習氣之力即能受苦樂故此言微塵合集為體之蘊處界故前文中雖但總說無蘊處界理亦應加此簡別也所言若無微塵合集之身不能受慧智者此文可顯微塵身受與受苦樂二不相違然此非許蘊處界等為心習氣是說由心習氣之力所成蘊等言勝義觀察者若解為二諦之勝義而答外難義不相關故是就正理觀察之義也如在夢位雖微塵身安臥牀上無所損益然似夢中身往他處遇損益事而受苦樂故受苦樂不須微塵合集之身義謂若總成立受諸喜樂不須微塵合集之身則亦能立別受不變妙樂不須彼身如是力勵成立之所為者是為成立永盡粗界果位以空色身為受最勝不變妙樂之身三部疏中多次稱讚修空色者其稱讚之密意應知亦爾既說空色唯是自心故許離心是別常法亦是臆說此如第五品云身淨無塵如虛空一切相好皆圓滿種種一切三世間清淨離障如夢現語音無斷俱多音能於他人心中轉心滿妙樂不傾動一切時中俱生持此明永盡微塵清淨無礙等同虛空之空色身相好莊嚴不變妙樂為心故此品說由烟等諸空色上上轉依最後成彼智身如云地入水中水入火火入風中風入空空成十相相轉成一切無盡勝安樂不可摧壞智慧身由智成就妙悉地士夫能於此生得如集密龍猛派讚自加持幻身俗諦為彼雙運虹身之不共因三部疏中稱讚空色以代彼義應知亦爾勝樂上疏於幕續中復應自加持以隨順軌次外表示諸相作是釋云自加持者謂由別攝支名見世俗諦相者謂如烟等相現此是初見燈炬究竟此中說自加持與世俗諦拏熱跋師亦說其所修者謂以別攝與靜慮支六支中之支名善堅固已三界明顯體性即世俗諦由隨念支六支之一正開放彼瑜伽彼瑜伽者謂世俗諦瑜伽正開放者謂當觀察遍諸空界空色究竟即是相好莊嚴佛身故彼空色之無性空雖是勝義空色仍是世俗諦攝故或說為自在常住乃未了知為何修空色也如上所說烟等空色上上轉依乃至第六支時空色欲天父母之相即是果金剛身不共親因爾時唯現如是相身身實未成空色之身以粗色界猶未盡故故欲修成彼身必須滅盡塵聚色身如以變金之汁點鐵為金如是由繫身中菩提令無漏泄而能盡諸粗色第五品大疏云如由火力繫縛水銀化一切鐵皆令成金如是由以法生加行繫菩提心令蘊處界皆成無障又云如鍊水銀能化鐵石任持彼等大色即其精華而住然非粗界以彼大色著諸鐵石鐵即離垢石變成寶如是修菩提心能化蘊處界等及諸命根任持彼等大色而住然非粗色此處不變之樂即當龍猛派中所說心為光明此中樂空之空是世俗身樂是契入勝義之智與餘經中所說樂空略有不同由繫身中菩提令無漏泄不變妙樂最圓滿時一切粗界悉皆永盡界亦無存爾時界與妙樂能所依之關係皆已滅故如灌頂略標云能依所依係乃至不變樂得心不變時無能依所依乃至頂中界未充滿有能所依既充滿已得不變時則無彼依故於空色金剛身如虹霓莫起如乳滿腹之執巳二决定修彼道之數量次第何故圓滿次第安立六支非多非少以所證佛果有身語意三故能修之圓滿次第亦唯六支謂由別攝靜慮二支於前所說空色未生令生已生令固成相好莊嚴之佛身由命與持二支於語根風獲得自在成一切種相之佛語隨念是樂近因三摩地是妙樂自性由二成不變妙樂之佛意以是經論於彼彼三說名金剛身金剛語金剛意三摩地有學位中能俱時有三種金剛三摩地者要得三摩地支以後六支數量决定如是次第决定理復云何謂如上說果位樂空無別要等流因乃能成辦此即自身現為空色欲天父母由隨愛力自心趣入能取所取二空真實得不變樂身心雙運三摩地支如勝樂上疏云三摩地者謂由隨愛欲天所得不變妙樂即此一心離能所取諸佛說名三摩地支發生此支要依隨念由隨念時猛利火力溶菩提心從頂降注摩尼中間引生四喜其第四俱生喜即不變妙樂三摩地支故爾時現無觀察空色之天如勝樂上疏云次修天影像者由任持力於臍輪間然猛利火修瑜伽師自見大印離一切障猶如鏡影放無邊際佛光明雲光輪莊嚴說此名隨念支又修法品明隨念云若抱虛空慧安住俱生樂自心即解脫主尊修法隨根分三其大印母非指隨一空色是須現為如雜色之明妃若此不能增長妙樂亦可用餘方便如大疏云若由色門不能歡喜爾時於蓮華中以金剛聲或徐修習生如是隨念者要由執持於中脈中持風不動要由此力然猛利火溶諸界故如是執持要賴命力瑜伽攝令左右脈風入於中脈以未入彼不能持故其左右脈入中脈者復有賴於別攝靜慮修治中脈是故次第决定應爾修治中脈之義謂由別攝修成十一種相次以靜慮堅固於風略得堪能左右脈風自動欲入中脈此後修諸加行遮左右風最為切要若在此前雖修不入故初二支即明修習命力之量故若未生十一種相生或未固應善策勵修初二支若已堅固其力圓滿齊此應修命力若仍唯修彼二則是未能判於界限如是遮左右風趣入中脈堅固不動命力功能由此圓滿此後應修執持以於中脈堅穩安住非命力之果要由執持方成辦故若風入中脈入已安住次以隨念猛瑜伽力然猛利火溶解諸界下降至金剛端不向外泄成辦俱生不變妙樂總之由初二支成辦金剛身之因色修治中脈由第三支令左右風入於所淨中脈由第四支持所入風不令出入由第五支依執持修三印隨一溶菩提心任持不泄而修不變妙樂由第六支於初二支所修成色自成欲天父母空色之身隨愛大印得不變樂展轉增上最後永盡一切粗色蘊等身成空色金剛之身心成不變妙樂一切時中住法實性證得雙運之身當知此是總攝三部疏中心要之義此派空色身與不變妙樂等於龍猛派之幻身光明已如前說有謂此派別攝見境別攝之身相與龍猛派幻身相同不應道理以別攝是風瑜伽之加行而幻身是語遠離得風自在已於三空後唯從風心所成之身體性時位俱不同故如是此派之不變樂可於見道前得光明則從現證聖諦方得安立以說清淨三心微細二相亦清淨故然續部中諸金剛語一一可作多種異解故非定須說為相同然亦决非更互相違故拏熱跋解說集密後續之六加行如明炬論解於灌頂略標疏中六加行又依時輪釋也巳三別釋不變之樂分二午一明由不變妙樂證無我理午二破以全無思取為時輪軌今初不變妙樂名不變者非說因緣所不能生上曾屢說界向外泄名為變壞故是繫界不漏名為不變從此所生之樂非謂於身繫界從身內可意觸起身樂受亦非以此為無間緣意適悅相所有樂受又非依於樂受為因所發無分別定是以通達諸法無性正見為親因緣繫界不漏為增上緣所生通達真實之妙樂也是故此經說樂為無得空色為有得如第五品大疏亦云空謂諸法無生無滅自心所現智謂證彼之不變樂此說通達空色於真實義生滅性空無性之性為不變樂任於何派凡許通達修習彼義能永清淨繫縛生死根本及習氣者則皆安立通達彼義為甚深義與無得義此派亦許我執能為繫縛生死之本故應許達無彼所執我義淨治生死繫縛及習氣故此如第五品大疏云若由貪愛習氣流轉生死則違經說由無明力流轉生死答云經言無明此中說為有情無始貪愛習氣此說餘經所說無明與此續說貪愛習氣為生死本其義相同第二品云由幻愚迷諸有情於諸苦事執為苦大疏釋云此中由於生死幻事執我我所愚迷有情於彼地獄餓鬼旁生諸苦執以為苦此說由我我所執而愚迷故許彼為薩迦耶見以彼即是貪愛種子故亦說名貪愛習氣許我執為生死根本大小顯密諸乘所共故許證無我慧能斷生死繫縛根本亦最明顯以是第四品大疏云次當憶念三種根本謂發大菩提心清淨意樂斷除我我所執此說能斷我執之道以證無我慧為道之根本又說中觀諸師修不變無二智亦由二無我門而修如第五品大疏中云諸中觀師修習如幻不變無二智者謂人無我與法無我其破人我如第二品中說破法我者亦如第二品大疏云故中觀師說若識勝義有亦非智者許由離一異性猶如虛空華非有無非俱亦非二俱非遠離四邊性中觀師所知此說離一異理又云故果非從自生非從他生非從共生亦非無因此說金剛屑等正理皆如中觀論等所說又續及疏略說無我性已亦說廣如餘論應知如第二品大疏中云成無我等此但略說於諸大論應當廣知又大疏云金剛者謂不壞不斷即此是乘名金剛乘謂即咒法與波羅密多法果與因性合為一性如前灌頂略標所說咒法果謂不變妙樂波羅蜜多法謂决定境無自性之空故有說時輪派不許正理决擇之空不許隨順中觀理聚之正見者顯是倒說續疏之義故具慧者當知多次宣說空色離於有無常斷如幻夢等之義等同龍猛父子中觀論中所說於勝義中離一切邊於名言中雖無自性然縛脫等一切作用皆悉應理以如幻理斷邊執縛往解脫位莫於法我實執轉深轉固午二破以全無思取為時輪軌若未如是求解無我無有正見决擇引生定解可資修習而說隨取何義皆是分別是故全無所思為時輪軌此是倒解續疏之義以第五品大疏中特破彼執故彼復先敘敵者所宗如云如是般若波羅蜜多經中為令證得正等覺故世尊宣說如來無思維智非有思維以有貪與離貪性故若時有情有思維轉爾時於勝妙所欲事而起貪著於不欲事而離貪著由此生死若時無思維轉爾時於所欲事無諸貪著於非欲事亦無離貪如是則無貪與離貪由無彼故則無生死無生死故成等正覺以故能成佛者是由如來無思維智非由諸餘有分別定略釋此義謂世尊說說何事者謂修如來無思維智為何故說謂為成佛何經說者謂般若說若於有無空非空等而修行者是行諸相非行般若波羅蜜多於此經文而起誤解若有所思即非能修甚深成佛之道以有思者即是分別分別或於所欲相轉或於非欲相轉發生貪與離貪之瞋由此即能繫縛生死故由全不思維能遣欲非欲相隨轉分別由遣此故即滅生死而得成佛是故成佛之道唯是全無所思非餘有分別定此言如來智者指成佛道非果位智以是能修如來智故假立彼名大疏於彼有破執與釋難兩段初中又二先以理破如大疏云若無思智能成佛者一切有情何故猶未成佛彼等於極重睡眠位亦有無思智轉於諸欲事無有貪著於非欲事亦無離貪此說若全無所思維唯止住修能成佛者則於重睡眠時有彼現起彼復是從無始即有故一切有情當皆已成佛總之若無正見所抉擇之無我可修唯以不執諸邊而住謂即能成佛之無分別者則重睡眠亦復相同若就不執一切邊義重睡眠中亦容具有若約安住正見彼中則無此是不執諸邊與遠離邊二義不同以此關要彼有所說過轉蓮華戒師破和尚時敵方亦如是許破時亦以悶絶位之無分別破與此義同次以教破如云此中寶炬若無所思或無所現云何得名寶炬三摩地耶如是餘三摩地亦非無思以是自證相故非色與空性故此引般若經破若謂此說自宗之三摩地有所現相破他無所現相之無分別若有空色相現而全不取則雖不修决擇無我義之正見定解亦是修甚深義此不應理以彼敵者所許謂全不起執取唯修住心之無分別大疏中說若如是住一日之內即現空色汝亦自許亦可修驗則彼敵者所許之修亦應是修甚深義也故知大疏之意趣非爾在釋難時所說極顯以教破後即釋難云若諸愚夫作如是問若謂如來智是自證云何如來說一切法皆無自性答云如來智者通達一切諸法無性非無事相重睡眠心境非全無事相名曰無性智非如重睡眠心全無知覺名通達無性也此以前說非無思維因云以是自證相故他即出過破云若如來智是自證者說一切法皆無自性則犯相違如來智指為成佛道修甚深義如前已說所言是自證相若指唯明了性或就了別自體而言則不可作非全不思之因故是於所修義决定有所了別之義他說若有如斯了別則違無自性者蓋彼心想其所修義若無自性則都非有應無少處可執是此若如是者則於所修深義心無所了以是乃起諍難答彼難云無自性義非無一切事相此破說無自性是全無事之宗即執性空緣起相違之空故自宗是雖無自性然縛脫等一切有事作用皆應道理之中觀宗又說修甚深義之智是能通達一切法無自性非重睡眠之心是說若無自性都不執取如重睡眠之心不能安立為修深義以是若無定解無自性義正見可修說唯現起空色全不思惟而住是修深義或由智慧惡劣於無自性執為全無於有便執實有而說全無可執之處餘復有說為轉法輪故說有等凡所說有皆是實有中觀正理聚等則說斷空此等指上三說皆出時輪宗外謗清淨教若以教理抉擇無自性義而修定解正見是為修甚深義則於略標正見云何乃說觀察蘊性空如芭蕉無堅具一切勝相空性非如是汝若許修教理决擇善除妄執之義為無堅實之修誠乃昔所未有是故彼教非說不可修習觀察蘊無自性之空若不爾者既說通達一切諸法無性而修一切法皆無性之决定解若不能以教理觀察尋求唯作彼宗作如是想而修習者是愚夫之修故論說諸中觀師以離一異之因及空花喻觀察識蘊無有自性了達真實亦相違故若爾彼義云何謂所說之無自性空於諸有法雖無差別然與彼無性空俱修之有法非復微塵集合之蘊乃是空色之相謂以定解空性之慧與彼所現空色修習身心無別乃能成為智身其微塵集合之身不能成為智身故如是破空非破一切空性是破不善觀察執為一切無事之斷空也此如第五品大疏云微塵集合為體之法觀察之空遠離斷空此於蘊說別蘊非一切蘊指一種特殊者於觀察空亦說別空如是若不以修不修决擇無我之見而為判別則亦不能破除敵宗為修深義總之若於我執未少除去許為現證無我義者是諸智者耻笑之處故於異生無我非現若不許由總相定解無我則所修道如何能害我執汝當審思彼大乘加行道上品世第一法尚許由總義門定解無自性義而謂初修業者發起無我定解而修是分別執非修真實究何居心而作此說若謂中觀論等說無分別智前一切二取相悉清淨然此續疏說於無分別定前有種種時輪明妃之名空色相現故二相違此亦非理以空色相與證無性之智體性無別能緣所緣各別現者現相與體性非如實相符故異生地境智各別現時能知所知有別係屬現證無自性時則滅係屬成平等味如第五品大疏明顯說云於無生滅自心所現合智為一智與自心所現平等一味非有能知所知係屬然此是說於聖無分別智不現空色之相非說爾時全無空色如集密云從真際起已當得無二智說雙運位如虹之身與入光明之意自體不可分之為二於入光明智前三相皆淨故無二取然於爾時非無身相若不爾者說空色為有得不變樂為無得不應道理要有種種相現乃名有得在得聖者不變樂前亦要有種種相現故以是當知爾時雖有然於無分別智之前為無義不相違此中雖有衆多邪執當引續疏詳審决擇恐厭文繁不復廣顯若說瑜伽瑜伽母續與智慧方便無二續為相違者第五品大疏中已破內品自說時輪教為母續彼以三年日數說明瑜伽母續之天數時大疏釋云三年分別是瑜伽母續之定義此等極顯總之凡入此法修心要者當以守護三昧耶與律儀為本堅固意曼陀羅生起次第次如上說次第引發六支如大疏說道有三種根本故於清淨無我定解堅固大菩提心必不可少當俱此二善為修習
