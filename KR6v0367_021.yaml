body:
  text: 宗喀巴大師造法尊法師譯圓滿次第總建立品第十三之二辰二餘派之圓滿次第分二巳一勝樂金剛之圓滿次第巳二歡喜金剛之圓滿次第今初羅伊跋大師云前想音韻字大瑜伽休息修圓滿月輪住於臍根處最勝字轉依應於彼中修身語意金剛當修諸天身此超越諸色是無事法性想彼不思議不應觀心性由想不思議當得陀羅尼顱杖為天身慧是小鼓聲晝世尊金剛夜為瑜伽母涅槃出諸勇第六心變化清淨法所化現為亥母身室利無二智黑表離因等茹字離集合迦表無所住此為生起抑為圓滿現觀論中雖未明説然毳衣大師云如是殷重心堅固已當修圓滿次第之三摩地大瑜伽休息前想音韻字乃至當得陀羅尼初現如鹿愛第二相煙色第三如螢火第四明如燈五相無遍計如虛空離雲獲如斯相已當得大手印次云室利至無所住黑行論師亦云次欲以圓滿次第三摩地堅固其心先想音韻字乃至當得陀羅尼故於生起次第堅固之後亦應配修圓滿次第阿底峽尊者疏中亦以音韻判別前為生起次第圓滿後明圓滿次第慧鎧論師及如來金剛之疏中未明説彼為生起抑圓滿但如來金剛造羅伊跋修法疏抄中以配圓滿次第並説此於四座生起次第末座時修彼文所説之義雖是隨壞漸次二次第中皆可修習然此處如毳衣師説是已堅固生起次第於圓滿次第時所修鈴論師攝勝樂圓滿次第為五次第其第五不思議次第即此所説故是圓滿之主阿底峽尊者解釋彼義云月是金剛薩埵之座最勝字者是三摩地薩埵身語意金剛是智慧薩埵超越諸色謂心三種識相依次收入此之體相謂是無事想彼不思議謂修習光明不應觀心性是住心方便其教授謂為令世俗因入勝義果故從三摩地薩埵放光遍照一切有為化成五種光明護輪宮殿守門八尊身輪語輪意輪四方四維天女主尊四面次第攝彼前前入於後後主尊父母智慧薩埵三摩地薩埵亦如是收入次想漸細當於細點策勵住心而修此心當離三種識相住於光明從是不思議光明中現起幻身名為得陀羅尼以得如幻天身之念故是無二雙運顱杖等四句是修行教授廣説前義謂涅槃是光明彼所出生謂二十五勇識支分即頌文中第六二字謂諸慧天總即方便智慧六十二尊此等皆從三心及風之所變化本頌作支分心變化清淨法勝義諦所變化者謂現亥母身形世俗諦所化者謂主尊等為顯無二云室利無二智即是雙運因等謂離自生他生共生及無因生集合謂雖住壞成住壞空之聚無所住謂雙運大印其教授謂隨力隨能心住光明而修次從彼中剎那頓起如幻之天於彼當以智慧觀察而修於初二句未加解釋慧鎧釋云想彼阿利母韻迦利父音咒鬘具五色光隨右息出放出三輪身語意輪諸天令諸衆生皆成三輪體性與無始成就之勇士勇母合成一味次從左鼻孔入成為臍上月輪前者謂初於彼月輪中央想從最勝處金剛持種子吽字出生勝樂金剛白色伸展右足一面二臂手執鈴杵猶如虹霓金剛亥母紅色一面二臂手執金剛顱骨等持而住以幻化聲召三界入尸林彼入外輪外入身輪身入語輪語入意輪意輪四方諸尊入於空行母等四維諸尊入於有色母等彼四復入四面主尊父母入於一面二臂及智慧母彼等亦由大愛所化成一吽字色如黃丹以及赤珠吽之塢入訶字訶入字頭頭入半月月入空點點入那達當觀那達如髮端百千分之一是為超越諸色之義利根見彼亦無可得謂即無事心性不可思議即明前義不觀心性者謂於不思議亦不應觀明觀彼者謂由想不思議陀羅尼即大印悉地天身即黑茹迦之身或觀脊骨為顱杖之體性智慧空性當了知小鼓聲猶如谷響由有所得名晝由無所得名夜涅槃謂死從彼出生謂神通相好莊嚴之中有智身勇識者謂世尊即修為世尊身或涅槃謂法界為利有情從法界起智身第六謂彼能量法界之心依所化機各別現故名心變化清淨法等二句如前若入光明心疲倦已當起天身修金剛念誦等如來金剛亦同此説從前想音韻字至當得陀羅尼出遍行經第十二品顱杖等四句出第十五品其室利等四句出第九品涅槃等四句出第十七品此後四句遍行經作次黑茹迦因説心為無垢清淨法等義同黑行論師毳衣大師並於生起次第圓滿之後如前而説鈴論師與毳衣大師雖説生起次第末座依次收攝然亦別説生起次第堅固以後當修圓滿次第故生起次第時所修收攝次第與圓滿次第之收攝次第種類雖同然説前者便是圓滿次第不應道理鈴師雖未引遍行經收攝次第之文但義則如是修此師之俱生修法云彼作意廣大有為戲論流如是常修者當隨念光明雜色蓮及日作怖與時相愛母主空寶五如來以下身及最勝支頭也月點那達等令此漸隱沒如鏡上吹氣一切皆消滅如是瑜伽師數數入實際此如集密五次第論所説謂以隨壞次第廣大天身入光明中此中如佛所説加持身觀察身不思議身三種圓滿瑜伽差別彼説不觀種子剎那頓生圓滿勝樂為入俱生光明之所依者非生起次第身是圓滿次第之天身是故第五不思議次第云第五圓滿次無漏俱生者亦非唯修光明其五次第論云由色等引攝自性散動心於心間堅固與慧俱自在由離能所取心離諸所得不思議性故全不應思惟令心入空性令空入於心心入空者是如上説收攝次第空入心者是從彼現起之次第修習智慧薩埵父母之處無畏論師勝樂修法説臍上或心間是羅伊跋師意鈴論師與毳衣大師之修法中説從心間放諸光明漸收攝已仍收於彼故與於心間堅固文全不相違如是攝已由入光明任持其心説有地入水等五相現者義同毳衣大師所説初現如鹿愛等總之以隨壞靜慮法漸收清淨未淨情器於光明中數修入出成雙運身是羅伊跋及鈴論師毳衣大師黑行師等所許故阿底峽尊者所説入光明法從彼起時由三心及風力成就天身室利字義之無二智即雙運位皆可善知如斯圓滿次第為於生起次第堅固無間而修為於中間尚須修餘法耶若以隨壞次第而修則雖初修生起次第亦可修習如前已説然於圓滿次第時修彼者則非生起次第堅固無間而修中間須修餘法以是不思議次第故如鈴論師於修彼前説四次第黑行論師亦説咒次第等勝樂五次第釋有本傳為鈴論師造然於自加持次第時説從五空點生勝樂五尊漸入光明又羯摩金剛次第時説從吽字生勝樂等與鈴論師所説不依種子剎那生起及令彼入光明之理皆成相違又彼説五次第時各修一生起次第亦與鈴師五尊修法所説生起次第堅固已後修圓滿次第及金剛空行經説如筏喻圓滿次第善堅固已不復更修生起次第皆成相違如是説者由執凡修天身皆是生起次第未能分辨二次第修天法之過又彼論説具別解脫戒者發菩提心其戒即轉成菩薩戒若犯密咒三昧耶時即失三戒此亦乖理若受後戒須轉前戒則無同時具三戒者又若由受密戒身中餘二戒即轉依故説密咒之根本罪是壞餘二戒之因者違汝自宗以説諸戒得因捨因各不同故故有餘本説是不空金剛所造當是彼所造也圓滿次第時修二靜慮者如兩派集密説是於衆多風點瑜伽獲得能力時修若風與點先未堪能其收情器世界入光明中較之生起次第所修全無增上力故以若勝解作意而修則於生起次第已修習故故自加持次第羯摩金剛次第滿摩尼次第楞達惹次第此四次第是由風點猛利瑜伽調伏脈風空點令入光明之勝方便其由隨壞次第數收情器入光明中如死漸次入光明者要攝左右命風於中脈內以猛利熾然力溶菩提心依彼引生四喜此是楞達惹次第所作鈴論師云臍與膀胱界修五色空點表示五佛性三角輪赤白遮命而修習剎那即熾燃由此能令猛利燒然故名持然楞達惹又彼論云從餘孔而出界由餘速入此説鈎召諸佛甘露從頂而入是為持然次第頂上之孔四炬論釋説是七萬二千脈網出生之處若如此説則是持網之義其先依印引生四喜即滿摩尼次第此有四印三昧耶印謂依所修智印引生歡喜是前加行業印謂依真實明妃引生妙樂是為正行法印謂憶所受守護其樂是為結行大印謂依彼等修真實義此之前行第二羯摩金剛次第即是空點瑜伽無種子之自加持者是風瑜伽若由此二令風點得堪能乃能與印相結合故有種子之自加持者是於心間等處空點強攝心之方便如是生起次第先堅固已次鈎五境散動之心於心間處任持此堅固已當於鼻端緣風出入修風瑜伽次於四輪臍中堅修空點瑜伽次依內外二印溶菩提心修習四喜之後漸攝情器入光明中及從彼現由多修此瑜伽之力即成前説無二智身即此相續近果加行鈴師之五次第與黑行師之真實炬及春點論多説圓滿次第若於彼義總攝為四次第獲得定解則於餘師所造勝樂圓滿次第要義皆能通達引文廣説誠恐太繁故此不録巳二歡喜金剛之圓滿次第歡喜金剛圓滿次第收為三灌頂道修習之理如毗嚩跋大瑜伽師所造道果宗要及持彼教授之歷代智者皆已顯了宣説當於彼知此中是於諸大論師所造圓滿次第總軌未顯了者欲令顯了有邪執者欲除邪執以彼教授無此二故種比跋大師所造甘露光修法宣説春點圓滿次第猛利瑜伽如彼弟子難勝月云此所生悉地由於六近支第一見如雲第二見似煙第三為電相第四如燃燈第五普光明猶虛空無雲最後同幻相夢相一剎那臍間然猛利焚燒五如來亦焚佛眼等由焚抗出兔此説由修六支引生如雲等相此六支非生宮殿等之支是甘露光修法所説六支如彼論云先當修黑色第二當修赤第三修黃色如是第四緑第五為藍色第六白色相行者修六支後遠離諸色寂靜論師斷謬論中亦云次以六支瑜伽修平等性黑赤次黃色緑藍白漸次唯於俱生喜想壇輪諸尊修法如海生論師之修法及楞達日跋所造釋説想由主尊心間吽字黑色變成空點此放光明從主尊毛孔出一切能依所依皆成黑色餘色亦如是説論中雖不明顯釋中具修六支壞色雖有二法由説此是入光明之方便故知此是由修六色後入光明任持其心而生如雲等六壞色入光明之方便如海生論師修法云次從世尊心間日輪月輪中央吽字放出阿利迦利光聚由出入息收放入自真實成為一體於月與日結合之內住種子身爾時應如是想無始亦無終非生死涅槃非他亦非自此是最勝樂如是種子字與月日合成甘露自性光聚行相及如燈焰漸滅乃至無所得時而修此所標義釋論廣説釋論解此義謂從自出息之道放出阿利迦利以彼光明照三世間合為一體入曼陀羅如其次第曼陀羅八天女收入八面佛母收入主尊後住月日中間種子之時誦無始等漸修彼義次收主尊入於光明字及月日三合為一是為明顯增長近得三智清淨甘露自性者謂光明猶如燈焰漸滅大光明聚展轉攝入最後識入如虛空之光明次説現起次第如釋論云乃至證菩提如是修出入圓滿次第出入光明次第如是修已如前於勝樂與智足派時所説於彼持心則現如雲等相亦是種比跋及難勝月之所許此如前引種比跋説先堅固修生起次第後以隨壞次第而修圓滿次第雙運此前所修圓滿次第謂修猛利春點故由專修第一次第及猛利時堅固生起次第以及調柔風點或名壞色次第或名越色次第是以隨壞出入光明之宗如是兩派集密與勝樂歡喜之圓滿次第最後要以二靜慮之隨一收攝情器入光明中要以出入次第而修雙運智身及於生起次第先須究竟諸派相同要由風點堪能乃能出入光明亦復相同然令風點堪能之法則有多説如龍猛派攝入金剛念誦智足派與勝樂則説多種空點瑜伽及猛利風瑜伽種比跋等則以專修猛利為主此外雖有多種圓滿次第然若能於上述獲得定解則皆了知故此不録嗢柁南曰吉祥集密與時輪勝樂輪及喜金剛圓滿次第道修法總建立規一切説審觀深細諸教理善能究了諸正義辭句詳盡明顯説三處空行垂悲恕明最初修圓滿次第與諸行及道果之次第品第十四之一寅二圓滿次第最初所修分三卯一明修行所依之脈風卯二如何專住卯三依此修空性法初中分二辰一釋脈辰二釋風今初身脈總有七萬二千其中主要有百二十其尤要者有二十四最切要者則有三脈如律生經第七品云七十二千數為身隨行脈脈與隨脈等各依處而住一百二十脈説為脈中主脈處與諸境數為二十四此中有三脈為所依遍行釋論説脈為風所乘為識所依之主要者心間法輪八脈喉間受用輪十六脈頂上大樂輪有三十二脈及臍間變化輪六十四脈其中能為爪等身中二十四界增長安住之因故説頂等二十四處諸脈為主律生第七品云拉拉那等脈一切脈中主故為他所依如餘水入恆河此説三脈為主之理結合經第六云心間蓮華脈八瓣及中蕊又云諸瓣中四瓣有四大種脈猶如燈自性安住於四方又有四支脈安住於四隅常降五甘露供養住自色故説彼自性名為四供養又於身心中有五脈安住由身語意別説為二十四此説心間八支脈輪四大種脈安住四方四隅則為四供養脈脈在胎中生起次第如教授穗論云在胎位中先生心間五脈其後生三脈等謂有八脈然此非説先生三旋母等五脈後生主要三脈以律生經説彼三脈為餘一切脈所依故故應是説先生心間主要三脈以及五脈次生家等諸脈於三十二脈中除三旋母等最後五脈與左右中三脈所餘二十四脈住頂間等二十四處是為身語意脈所言有八脈者謂餘八脈破魔母脈共中脈雜住於中央如教授穗論云三十二脈中之破魔母脈共中脈合雜住上自舌端乃至臍部是為時脈諸瑜伽母遮遣為相流注正法又云三旋母脈為色欲母為聲家母為香猛利為味破魔母脈為法又云其中四瓣四脈立為諸大種脈以四方脈是四大種注彼自性律生釋云此五脈謂法輪如其次第是地界等自性故表從此曼陀羅往餘曼陀羅經論皆説破魔母脈依止中脈三旋母等四脈是四方脈心間四隅四脈如教授穗論云四隅四脈各別流注大香小香痰及精血為大種脈作增上緣由能流注色香味觸故是供養自性然此體性實即大種大與所造無異體故此説大種與大種之所作無異故許四方大種脈以及四隅供養脈皆同流注大種或色聲等此是三旋母等四脈各分二脈故成八脈次由八脈轉成二十四脈如教授穗論云謂與中脈俱生五脈其後三脈次謂二十四脈珠鬘論云心中蓮蕊以及四方華瓣如其次第即是三旋欲家母猛利破魔母説此五為心間五脈是否即四方及中央應更觀察孤穆枳論亦以五脈配色聲等跋嚩跋陀羅師亦説流注五種甘露故許八脈皆能流注彼等若説三十二脈流注三十二菩提心是依通相若説流注齒爪等者是依別相然破魔母不能流注歡喜金剛經云策勵斷諸餘説脈為瑜伽母之體性時説除彼脈故由彼脈雖令世間生為樂性然以不見彼輪終歸死亡此就有障時説若離障時教授穗論亦説彼中菩提心得充滿結合經云菩提心自性三十二勝脈珠鬘論云有許彼説係依華瓣之數而實不爾無依華瓣數之文故亦説心間蓮華中之脈故此破三十二脈非是頂脈以彼經中無有三十二脈為脈支數之明文故及説是心間蓮華中央之脈故後義如前引結合經於説心間八脈之後又説由身語意差別分為二十四脈共為四八三十二脈説初八脈為心間脈故非頂上脈支以是彼經所説由處等差別安住處隨處頂上所生脈説名為頂生亦非頂上脈支若不爾者則應處隨處等二十四處一切皆成頂上脈支故知是約同一脈系而説三脈齊何而住如教授穗論云脈謂阿嚩都底從頂髻至摩尼及足心際然於頂髻頂喉心臍密輪摩尼中央如其次第有四三十二十六八六十四三十二八支於蓮華及薄伽輪中作脈結形又云拉拉那與惹薩那等諸脈上自頭輪乃至密輪結如鐵鎖纏繞阿嚩都底而住此説於六輪臍中纏中脈而住此亦上自頭頂至摩尼端及足心中結合經云從項左邊脈為受用身母於臍間休息口下流能醉從臍上右脈如是口上流於項間休息説名注血脈能醉説名月説血名為日釋云言於臍間及項中休息者非説彼後脈不流通教授穗説江摩左脈名少雜血分多注身分心力月分故名身脈心力脈月脈方便脈亦名彼等之道熱摩右脈名少雜精分多注語分塵分日分故名語脈塵脈日脈慧脈是依多分而説中脈多注精血意分暗分羅𬑟故名心脈暗脈羅𬑟脈不定脈結合亦云二脈生處中及於左右處左脈名精識右脈名為血由彼互相攝是攝為法界心力身塵語暗意為自性能生心力精寶塵及暗分教授穗説自臍輪以下江摩降大香熱摩降小香中脈降精分又説右脈降精分左脈降小香中脈降大香熱江二脈各有上下二孔而説江摩向下熱摩口向上者如律生經疏云言下孔者雖二孔皆是口然由下臍間脈能作取捨如口作用故説是口故名下口上口亦爾謂由能不能取捨精血而説律生經云入道從左脈右脈是出道説左脈為入道及右脈為出道如疏所説應知彼云入者從右脈出取境無間乘風之識由拉拉那脈入此身在胎位中係由精血轉變而成諸餘身分是彼變相故説赤白二分乃是身界之主又頂蓮華白分增上赤分微少臍間相反教授穗論云中間諸位頭蓮華中白分增上塵分微少密蓮華中與上相反應知密為臍間此類甚多白界或亦暫居餘輪於一切時多居大樂輪中如教授穗論云常者謂一切時意謂暫住餘輪非一切時臍間赤分亦準此理應知故應於彼二處觀想燃注又有師許熱江二脈與中脈相連接如是左右風點入中脈中尤為便利教授穗説四大種漸收已風入明了明入明增增入明得得入光明一切空光明即死有從此起大空得是尋香心從此生起方便明增是欲取心生起智慧明了是受生心次由中有隨入三門從人中結生相續而起風從風起火從火起水從水起地從地起五蘊等為證此義引大印點經云由依識體性先於四大種由決定自性爾時入自位從識出生風從風出生火從火出生水從水出生地從此等生蘊從此生諸處從此生識性一百六十種如此生次第今滅亦如是提婆菩薩亦云地等四大種如是四種空當知是八事為生滅之因光明生大空從空出方便從此生智慧從此出生風從風出生火從火出生水從水出生地有情生如是地界入水中水界入火中火亦入風界風界入心中心入於心所心所入無明此入光明中如是三有滅從無始時來流轉三有輪乃至如幻定未見此本性論説斷此生死當以二種次第修如幻三摩地總扼由脈等成身之要理如無著菩薩説中有心識最初入處即成心藏故由識入赤白中央圓滿蘊等最後死時亦漸收攝仍入彼處如死次序而修道時亦由心間之三摩地薩埵或替此之空點放光收攝情器世間最後漸入光明如死光明現起地入水等諸相入光明中如水注水次成虹身如彼唯由心風所成之身此於瑜伽續中所説最多母續大印點經亦説如上所説於母續之圓滿次第隨壞靜慮亦最切要意趣相同復有要義謂若了知三脈住相及於彼處上下有赤白菩提心如臨終時赤分上升白分下降由會合力明了等相漸次收攝乃至於死如是行者當知赤分火增白分下引由會合力引生明了等相漸入光明圓滿次第後起幻身辰二釋風金剛鬘經説有百八種風密意授記經云命下遣上行周遍平等住龍龜及蜥蜴天授與勝弓此説十風金剛門經説持命等五風及行遍行正行善行與決定行為十彼以行等名字説龍龜等此等住處如攝行云心間密相喉內臍中一切身節如次即為持命下遣上行平等周遍之處眼等五根為行等五風處此等作用有二各別作用如云由根門相續有命力遊行一切時中行故説名為命風小香大香如是諸精界導下為下遣行者恆應知嘗噉及舌舐遍飲與吸吮若常時等住是名平等住上行及收攝食諸嚼嘗等與識俱和合當知上行用周遍與任持若往及回還由遍一切節故説名周遍攝行所引是五根本風之作用教授穗云由命與力長遠廣大為命為息故名為命成十種風又云住臍飲食等等引故等住又説上行者謂從鼻孔等上行收攝者謂入息與識和合者謂流注十風教授穗説五支分風之作用云依止眼根引生色識是行風用餘四亦如是説如五次第論云諸風微細色與識合雜已從諸根道出緣慮諸境界攝行論以五支分風説為五境其密意亦如是應知如五次第論云一切有情命名風作諸業此是識所乘五性亦十性先於風能作業之理獲得定解次當修令風自在之瑜伽故風與三字共不共之用於攝行論應當了知由論説五性亦十性故就自性唯有五根本風其支分風是彼分位此如前引説持命風於根門轉故知多是彼風如是攝為五根本風謂上鼻孔遊行四風與唯死時遊行上鼻之風此復左右二鼻各行一風二鼻共行二風此五風配五部之理如金剛鬘經云安住五佛種從鼻端孔出五風於上行遍行一切身於世俗鼻行從此門而出左右與二俱徐行為四種從右所出界是火曼陀羅最勝赤紅色是蓮主遊行從左所出界是風曼陀羅現為黃緑相是業主遊行二鼻所出界現見如金色是大自在輪地輪即寶主遊行徐緩無動界清淨如水晶剎那為水輪金剛主遊行出生一切界取能依所依是毗盧佛身死時乃現起從鼻端孔出等二句義謂從男性金剛與女性蓮華鼻端出風光明向上遊行攝行論説是從上鼻門出之義目風界自性為度母之主而論應先説不空風此中先説彌陀風者律生疏謂依金剛念誦語金剛而説修行次第亦應如是律生經説四風遊行亦同金剛鬘經所説左右行與俱行藏師有説為每鼻孔之左右者不應道理以攝行論説是從左鼻孔從右鼻孔從二鼻孔中遊行之風故從右鼻行者謂上行左鼻行者謂平等住此色攝行論説是黃緑色黑光為性二鼻所行之黃色者謂下遣風徐緩無動界者攝行論謂遊行緩慢律生亦如是説結合經云火性與風性地性及水輪心之所行處上側平下行謂火在上風在側地直出水在下行攝行論云周遍謂遍四界輪風不動而有普遍光明謂毗盧遮那佛虛空平等體性然於一一光明生時亦有五光俱生以一界輪遍四界故此中説周遍風現在不於鼻孔中轉普遍四輪為虛空風此周遍風雖不遍於鼻孔中遊行時然遍身內所住四輪亦不相違第五大種虛空界之風者即於四輪行時而行故未別説又説此為引生安樂之風教授穗説中脈所行之風離四輪風無別風體又教授穗論云密意授記於説二十四半座時未別説有虛空之風金剛鬘中由攝於虛空風內亦唯説四輪無二尊勝亦於四輪各説一主要作用及三副作用辦二種事未別説虛空風成辦何用故無別虛空風時輪中別説者為引外道令入法故律生結合金剛鬘經無二尊勝密意授記同説離四輪風無餘輪風遊行其四方便主風一一風有四慧妃風各經二百二十五次畢已移動一尊此是九百一換之規如密意授記云白衣等念誦二百二十五四種善配合四行攝九百所説九百風二十四漸次彼各別現起二萬一千六白衣等者謂蓮華主風中火中之火謂白衣母火中風謂度母火中地謂佛眼火中之水謂摩摩格各有二百二十五風餘三準此應知教授穗論説此有二十四半座如是方便四大種風各有智慧四大種風於一日夜如説數有二萬一千六百次風是瑜伽續所説然從何脈輪轉則未明説瑜伽母續則説四脈輪中一日夜間風行次數如律生云説梅齊為座四座為一日夜四座亦爾轉支十六風是一日夜數常於鼻孔中每半座而轉又云説脈三十二一座之四分亦名脈及時日夜杖桿數共為六十四半脈時名杖為一座八分風出入鼻孔説名為一息此説出入二息合為一息於一日夜有二萬一千六百息遊行臍間脈輪六十四脈一一有三百三十七次半是為一杖之息頂上脈輪三十二脈名有杖息兩倍是為一時之息喉間脈輪有十六脈各有時息兩倍為一改換之息心間脈輪凡有八脈各有改換息之兩倍是為一座之息律生疏説此與歡喜金剛派同此是改換十六次之規也時輪亦説換十二次教授穗云一切共許三脈之中一日夜有二十一千零六百息此謂諸氣息調和者就三脈門一日夜有二萬一千六百次息是所共許卯二如何專住分二辰一風瑜伽辰二火瑜伽今初結合與律生經説四輪風之動相與差別雖未明説金剛念誦然諸釋論亦説修習金剛念誦金剛念誦瑜伽續中明了宣説如金剛鬘經云如是四壇輪住定常念誦咒師數念誦晝夜恆持誦密意授記亦説於風念誦攝行論云此説圓滿次第謂從阿利迦利以女男不定相出生三字三字決定配入住出由四壇輪次第修命力自體之金剛念誦又云此中蛇等諸咒皆從阿利迦利而生此等真實謂從不壞所生三字此説咒之真實所説不壞如彼論云謂俱生字如金剛曼陀羅莊嚴經中為顯阿字故云心中不可壞明了等同燈不變最微細阿字最殊勝如是了知金剛念誦扼要應修瑜伽此於三字為一切咒之主及彼三字從不壞生之義又彼三字與風和合本性已成唯令明顯此等皆當了知金剛念誦建立説者雖多然説一切要旨為攝行論惟彼文極古奧故為師者應為弟子廣解其義由此念誦能調柔風點者如教授穗論云修金剛念誦者遮止左右風動令入中脈爾時猛利本性熾然溶化諸界證大樂輪龍猛父子論中所説要義餘處應知數息念誦亦能摧壞非時橫死律生經云住定瑜伽師乃至億等數無聲恆念誦無聲誦十萬圓滿修行者雖年壽已盡五年活無疑恆應於晨起數風一千遍是故風瑜伽常應安住定先修本尊瑜伽每於晨朝數一千遍曾無間斷定能摧壞非時橫死下中上品修瓶相風亦能免死即前經云或瓶相加行皆能勝於死自了至心足一切風遍滿由依於瓶相三品能摧死下品三十六兩倍是為中三倍為最上瓶相皆能勝先了知瓶相自結跏趺坐手摩搓三返次應六彈指乃至三十六而修瓶相風三倍最上品數為百零八此亦先修本尊瑜伽而後修習餘經説此是發功德大風瑜伽先修本尊瑜伽次於心間蓮蕊月上白色吽字令心堅住修上下風結合亦能免死律生經云心間華上風等同白吽字思維而住定不為境界縛生死風上行涅槃風下遊無住大涅槃安住心華蕊上下遊行風由意令結合修習此瑜伽當得堅固位疏説彼三是依鈍中利根差別修不死之方便非唯免死亦是引生功德最勝之風瑜伽故當修習如律生云不知風瑜伽或知而不修彼為衆苦逼生死可憐蟲師長亦應為諸弟子詳説此等
