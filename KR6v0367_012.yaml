body:
  text: 宗喀巴大師造法尊法師譯自入壇受灌頂次令弟子入壇次第品第八卯二灌頂儀軌分二辰一自入壇請悉地諦語加持辰二為他灌頂儀軌初又分二巳一入壇灌頂請其聽許巳二請求悉地諦語加持今初如鬘論云入曼陀羅室時諸弟子誦嗡波羅毗夏薄伽梵摩訶蘇喀末卡蘇讓薩嚩悉地蘇喀波羅當跋惹摩蘇喀塢達摩悉地吽賀波羅悉地娑發生歡喜以曼陀羅自在主尊之身入壇右繞住於西門等處誦嗡班佐伽札耶三昧耶波羅北夏耶吽開東門等如此論説弟子入內誦上真言發生歡喜以主尊慢重行開門律生疏中亦如是説此處説弟子入曼陀羅室右繞開門似未中理傳謂無畏師造勝樂灌頂品説入曼陀羅室時師應先於弟子入故然勝賢説主尊阿闍黎作勇自在身次於入壇時弟子如是説於阿闍黎入壇時説先誦波羅毗夏真言入內繞三匝後請降智尊其後以跋惹摩蘇喀真言投花次取繫自頭上鬘論之文與彼相同彼想自師長為主尊是自入壇之義故言阿闍黎者是指作法者之師長弟子如是説之弟子是作法者自己非自己之弟子鬘論諸譯稍未逮也其灌頂品是熟悉鬘論之印師所造非是無畏自造理如下説造彼品者雖係觀察鬘論方作是説然鬘論義多隨勝賢論師故此亦應順彼而説故阿闍黎自入曼陀羅時口誦波羅毗夏真言歡喜而入由門入內先須開門故此説開門是以主尊慢而開不同前説住於吽迦羅慢而開前説以金剛勢入曼陀羅乃至自取花鬘繫於頭上其後必復閉門彼若未閉不須復開門故弟子入內自門入故生歡喜之真言勝吉祥經譯成藏語大樂世尊入微妙諸成就樂解脫城以勝安樂妙悉地吽賀善成就由見入宮殿之勝利歡喜入內龍智於縛眼帶時亦説此真言次鬘論云誦嗡跋惹摩蘇喀夏耶蘇拉利達毗拉薩那彌達那彌得那摩彌薄伽梵當吽貨黑黑黑黑黑波羅底剎姑蘇曼黎那塔賀於曼陀羅投擲花鬘次自拾起以得花鬘灌頂意樂自繫頭上勝解於曼陀羅自在師長現前受彼所授之花鬘灌頂等下説一切灌頂皆如儀軌得阿闍黎隨許律生釋中亦如是説投花真言勝吉祥經譯為具勝安樂遊戲心以喜愛手禮世尊吽賀黑黑黑黑黑依怙願受手中花若依彼文似阿闍黎自入壇時不須投花以前入壇法類然如勝賢論師於餘入壇法類隨宜略説説是略攝智者儀軌是故此中入壇法類應與弟子入壇無別然燈賢與毳衣大師薩惹哈等多如弟子入壇説阿闍黎入法鬘論亦云此是阿闍黎入壇儀軌故如是若修自前不異則須自從主尊分出想師長與主尊無異作一切師長事師所作事實由自作若修自前異者則不須也圓滿入壇受灌頂後然燈賢與毳衣大師等説亦當受阿闍黎隨許諸事受法如耶茜那云次為弟子入智者如是白我某阿闍黎吉祥黑茹迦諸佛諸菩薩所説諸儀軌以圓滿儀軌我作利生事於此願聽許諸佛諸菩薩維願愛念我次應自思惟得彼等隨許如是白已想聽許云可如是行巳二請求悉地諦語加持次為令弟子入故以大樂體性方便智慧真實性讚為先求曼陀羅悉地諦語加持即是虛空生等九頌前五頌是三昧耶之三供養歌次一頌是宣真實義後三頌是宣諦實義三歌謂真實義歌法性歌印歌初中有三一自性真實歌虛空生相故無始終最勝薩埵金剛性修不動金剛其薩埵者真如一味無戲論無分別智菩提心即是金剛薩埵自性彼由分別所不能壞故是金剛何為此中菩提心耶謂諸菩薩無始相續心性本淨於諸地中漸除諸垢究竟淨之法身彼即勝義菩提心故無始無終最為第一如除墻壁等障假名出生虛空彼虛空相謂能表之譬喻於此中有名具彼相真如性亦爾由離障明顯假立生名故無始終生滅勝吉祥之金剛薩埵諸曼陀羅儀軌可改誦為不動曼殊金剛及勝樂等此等是以歌讚供養曼陀羅內諸尊故不動金剛等可作二釋謂呼讚之境及賜我彼位以下諸讚亦同二圓滿真實歌最勝大悉地大自在上天持金剛中王我修勝不壞諸悉地中最勝之大悉地謂即正等菩提於十力等皆得自在名大自在故能超上諸世間天由得一切身語意金剛故名為一切持金剛者諸佛菩薩一切圓滿皆依此故亦名為王彼之圓滿即是常恆不變之勝德也三清淨真實歌尊無過常住一切貪中愛世尊大貪喜我修真實性言無過者謂斷一切障及習氣常住義謂盡虛空際三身常住得悉地之一切貪欲能作貪著一切有情事業故是具有無緣大悲之大貪者以無相法而生歡喜故名大喜有作以真實者義指前三頌中所説此是寂靜論師所解故以有具聲者為善具聲即第三囀聲二法性歌最清淨勝法本解脫如來普賢一切性修菩提薩埵由具不退轉之清淨名最清淨般涅槃為一切法中之勝勝中最勝謂佛涅槃是彼自性故名勝法由自性淨故名本來解脫如實了知諸法法性故名如來賢者謂善普謂無餘由此能生彼也法界是一切法相或自性故名一切性有菩提體性之心者名菩提薩埵三印歌大悉地最勝大自在勝印由拋大金剛我修金剛慢初句及大自在如前已説印謂金剛薩埵身語意金剛自性身由此印是佛母金剛慢印之主願我成就此説以右手拋擲金剛者唯是譬喻此諸三昧耶皆説金剛之真實由曼陀羅諸尊皆是金剛持之自性故亦即是彼等真實次宣真實義者遍諸有情意住諸有情心是諸有情父三昧耶勝欲離障清淨真如為主之智是所希欲故名為欲是具最勝正智三昧耶者之最勝法得勝欲名所希欲之真如遍於佛及異生心意此復在佛地時以究竟淨遍於佛心於諸菩薩由斷自地執障清淨而遍由緣真如修無分別能與安樂故説如父有論作住於心謂由與安樂故令心歡喜名住於心此所欲是一切有情之父諸佛菩薩淨智皆從此生彼二亦是異生之父以彼等身心之安樂皆依清淨真如而安立故遍於異生之理前未説者準此應知次宣諦實義者勝智慧方便曼陀羅諦實由彼令依怙圓滿我所欲諸法如影像明淨無穢濁無取亦無説正從因業生由實性真如出離諦實義壇影像明顯弟子見無障勝智謂無二智即是方便智慧無二體性之曼陀羅諸曼陀羅儀軌多作慧方便壇諦實者謂由彼無顛倒故滿足意中所思欲樂諸法謂曼陀羅諸尊如影像者謂是唯心所現由離煩惱所知等至三障故名清淨光明無濁由無自性唯可自證非餘識所能了故名無取亦非名言分別之境故曰無説此等之因謂即法界業即聞思修三慧等真如實性即正智金剛持一切曼陀羅尊皆從彼生影像即所繪曼陀羅明顯謂繪何尊形像即見彼尊之身無障或無垢者謂由諦實世尊加持能滅諸罪見曼陀羅餘論作諸弟子無量曼陀羅儀軌中多説此等善解此義最為切要故依寂靜無畏論師所説而釋勝吉祥經無後五頌第一頌首謂嗡虛空彼疏所解亦多同前後四頌於四百五十頌及毳衣大師等曼陀羅儀軌多有宣説答日迦跋説誦三遍辰二為他灌頂儀軌分二巳一為弟子灌頂成法器儀軌巳二為天灌頂善住儀軌初又分三午一灌頂儀軌午二犯三昧耶還淨法午三曼陀羅後法初又分二未一依彩繪曼陀羅灌頂儀軌未二依止餘曼陀羅灌頂斷疑初又分五申一入曼陀羅申二入後灌頂申三灌頂後法申四釋灌頂義申五釋後法理灌頂開合初又分二酉一遮面入壇酉二見壇而入初又分二戌一入幔帳外戌二入幔帳內今初次著裝入壇者若諸門阿闍黎不欲入壇令餘人入若欲入者即令彼等與前預備具二種律儀之弟子沐浴清淨塗妙香等安置帳外生為毗盧佛或主尊紅色等衣誦甘露瓶而為加持下衣則誦嗡薩嚩達塔伽達阿奴達惹薄底阿朗迦惹嚩薩多羅補美伽薩穆多羅薩帕惹拏三昧耶吽上衣則誦嗡班惹卡杭頂髻則誦嗡班塢尼沙吽泮此是加特披著共同真言次縛眼帶或紅或黃毳衣大師亦如是説攝真實説各品色別故非定紅加持眼帶之咒謂甘露瓶繫縛咒謂嗡曲奔當跋惹末那耶吽然亦非定此咒繫縛之法毳衣大師説中下根弟子全不令見上根可以略見用布縛者以乃至未投花阿闍黎為除眼布時不得全觀曼陀羅故除後教云金剛應視始令視故次僅説誦阿康毗惹吽供養花鬘未説請白意謂前之請白即是入壇之請白也寂靜及跋嚩跋陀羅著衣入壇未説下衣餘師多唯説執花鬘及縛眼布次加持者先用一切業水灑淨想於心喉頂處金剛蓮華輪中有日月輪上有黑色吽字紅色阿字白色嗡字諸字放光照徹全身口誦吽字令安立於曼陀羅之東門寂靜論師日生亦説加持眼等僅廣略異次問種性以及勝解由業金剛導諸弟子為入曼陀羅故阿闍黎當問喜所喜者汝是誰彼答云我大樂善根此問答以答日迦跋之曼陀羅儀軌譯文為善兒是誰何喜善根住大樂應如是問答此是問種性與勝解言善根者如薩惹哈説為勝子由表勝解大樂知其堪能入曼陀羅等行經中問何所喜答喜善根此義如上説律生經云應問汝是誰答云我善根餘堪為量者亦多作是説故知善根是能喜者非所喜境毳衣大師如上問後復問兒欲何為彼答云欲行佛勝三昧耶義謂汝善根勝解大樂欲何所作為答云為修諸佛勝三昧耶等行二部曼陀羅儀軌俱有此問答次令發一切瑜伽心令誦嗡薩嚩瑜伽即當塢跋達耶彌發菩提心鬘論及隨行者二隨行者謂寶鎧與毗布底皆説令弟子誦此咒發心極為善哉勝吉祥經於説此咒之前有云最初令誦一切如來最勝祕密真言一遍而發與此咒義應當發一切瑜伽心極相隨順然燈賢毳衣師答日迦跋師等皆説以此真言發心龍智及跋嚩跋陀羅黑行師等亦多有未説者發心之理如勝吉祥經説發願心後更發通達諸佛本體菩提自性之心於心間月輪上修金剛而發者兩部經疏皆未見説慶喜藏諸餘曼陀羅儀軌及無上部曼陀羅儀軌亦多未宣説藏中諸師有於心間唯修白色五股杵者有俱修月輪與杵者又勝吉祥經云由略發此心成佛定無疑勿捨菩提心謂是金剛印大疏釋彼義云空性金剛謂於月上修五股金剛印誦云底義略發此心即生不退熏習等同一切如來故當了知即現在佛經説以底義咒而發此中未説彼咒彼論師意謂當上疏所説四禮第一禮時金剛薩埵入內於心間月輪上觀為五股金剛杵形此意即發方便智慧之心四百五十頌與寂靜論師釋論未説四禮然釋由略發此心等頌時釋論則云言略發者謂從願菩提或行菩提心於心月上想金剛相此文若不作發一切瑜伽心解更無餘處可解故知是此發心之證四百五十頌亦略説正發瑜伽心想心間金剛又勝吉祥經云由略誦此故不離一切如來永不退轉映覆諸魔當知此大菩薩即是如來此説發彼心之勝利彼疏亦云以由略發此心之力不退轉故由決定得無上菩提等同諸如來故當知即是如來此與由略發此心等義同故亦可作發彼心解慶喜藏與寂靜論師於此發心俱説通發願心與了達菩提自性之行心故諸先覺皆説通發世俗勝義二菩提心慶喜藏説月上金剛是空性體故金剛配勝義發心以月輪配世俗發心亦極善哉若解此義則以密咒方便善巧令於大乘種性決定最為殊勝應善分別於正見上發勝義心及為利益一切有情發求成佛之願現為月輪金剛行相由於此文及此類文能盡了解則成衆多殊勝因緣故於灌頂備極讚揚次於心間執杵及花誦云嗡蘇惹得三昧耶當賀悉得斑耶答蘇康今一切如來皆加持汝於諸未入曼陀羅者汝不應説此一切如來最勝祕密曼陀羅亦不應為不信者説賀字以上勝吉祥經中有以下之咒然燈賢等多有宣説如此處於心間執杵勝吉祥經亦説答日迦跋等亦多説於發心前執杵言今等文此論與然燈賢毳衣大師等所宣説餘多未説末句有譯亦非對諸不信者極善義謂雖已入壇若於咒懷不信亦不應為彼説此是初番安立三昧耶之所無者戌二入幔帳內分三亥一入壇繞禮亥二立三昧耶亥三降智諦語今初次誦嗡閻曼達枳吽手牽弟子又誦阿康毗惹吽令入幔內次誦摩訶惹達蘇枳札蘇朵稞蘇蘇稞斑薩埵阿得悉得芒令其旋繞此二咒由阿闍黎誦寂靜論師説以前咒鈎召弟子毳衣大師亦説以守東門母咒鈎召弟子故應想以彼咒召於東門毳衣大師亦説次以五字令入幔內集密十六品云應告彼言此是入大曼陀羅金剛三昧耶阿康毗惹吽説以此咒入曼陀羅故事實上雖入幔內所修則須令入曼陀羅內凡欲灌頂先須入曼陀羅內者義謂是説諸尊殊勝密語之器須入諸尊之內此是最初入曼陀羅故須善為曉示如毗布底曼陀羅儀軌云我引兒趣入最勝安樂宮黑行與薩惹哈亦云一切如來處黑茹迦妙城心藏曼陀羅我使弟子入故是由阿闍黎引導亦應開示弟子觀想跋嚩跋陀羅説誦此阿康毗若吽時意想與曼陀羅諸天無二令入曼陀羅之近分答日迦跋亦説應與諸天無異義謂令入曼陀羅中想與諸尊無內外別與諸天成同分即是入內之義旋繞真言是勝吉祥經説彼大疏云於東門等誦一一守門之心咒想諸守門鈎自入彼彼門後入東門誦此真言故是先入東門退出旋繞餘門亦準此理應知次於曼陀羅之東門合掌誦云嗡薩嚩達塔伽達補佐跋窣塔那耶阿達摩南尼耶達耶彌薩嚩達塔伽達斑薩埵阿底底義芒嗡薩嚩布答布佐跋窣塔那耶阿達摩南尼耶達耶彌薩嚩達塔伽達斑北熱那阿底底義芒南門誦云嗡薩嚩達塔迦達布阿毗克迦耶阿達摩南尼耶達耶彌薩嚩達塔伽達斑惹那阿毗克芒西門誦云嗡薩嚩達塔伽達布波羅跋惹達那耶阿達摩南尼耶達耶彌薩嚩達塔伽達斑達摩波羅跋惹達耶彌北門誦云嗡薩嚩達塔迦達布迦摩內阿達摩南尼耶達耶彌薩嚩達塔伽達斑迦摩姑如芒以此五咒如其次第令禮曼陀羅中不動等諸如來又於東門解義為先教令誦云嗡姑如惹娜跋薩塔那耶阿達摩南尼耶達耶彌嗡薩嚩薩埵跋日達羅那堂阿達摩南尼耶達耶彌除第二第五咒餘是攝真實經初品所説此論師説第一為主尊第二為毗盧依中央為不動種性而説龍智於不動佛説前二真言等僅作四禮然於此宗許中央有不動佛者四方之禮應同鬘論毳衣大師與黑行師薩惹哈等先以那摩得等禮身語意三業次禮四方則初是禮主尊彼改誦空行母等各方諸尊之名號而禮勝賢亦説金剛薩埵等四以改不動等四而為四禮以主尊為彼四自性説空行等四尊加持禮時須先解彼咒義阿達摩南尼耶達耶彌等四句義謂將自供養為何供養即由四咒上句表示謂於一切如來為作供養承事供養灌頂供養善轉供養業故薩嚩達塔伽達斑薩埵謂是一切如來亦是金剛薩埵故同一事餘亦準知後四咒謂呼召彼等請加持我為我灌頂為我善轉為我作供養業第二咒義準此應知如是於曼陀羅五方五佛或彼種性諸尊隨時配釋龍智與明顯雙運論説爾時修不動等四尊頂禮之法如攝真實經云初伸金剛合掌以全身體第二平心金剛合掌置於額上而禮第三頂上金剛合掌置口而禮第四頂上金剛合掌降至心間以頂著地而禮慶喜藏説於四禮時想自金剛薩埵至金剛業入於心等四處成金剛等四相而住由觀彼等即是供養承事等四如鬘論云有説於此心間安住等至大樂有説安立心等處者此不應修是餘規故破説於心間修諸尊等至及於心等四處安立標幟在此師意請白各佛之時唯應勝解由彼加持堪於一切如來供養承事供養灌頂供養轉法輪及事業圓滿未説收入諸尊勝賢則云世尊入心中用意遍觀察又云應觀寶生佛用金剛灌頂又云由彌陀自性善觀彼堪能又云想不空成就為能密供養故想各佛分出一尊入弟子身亦不相違頂禮師長之咒義謂為承事師長故為盡度一切有情故兩返以自供養除少不同是金剛空行第三十二品所説薩惹哈及黑行論師勝賢師等説四禮後受咒律儀後二師説授律儀時執弟子手而授薩惹哈師僅説宣説律儀未説受戒儀軌意謂宣戒之文即可改為受戒儀軌易知故略答日迦跋説用業瓶水浴弟子繫遮目帶取花鬘後即請受咒律儀彼是預備正行二時俱受之規若如是行果利極大亥二立三昧耶立三昧耶是阿闍黎教如是作雖非弟子自受然亦應須守護同於自受若唯入曼陀羅不能防護戒者則不須此立三昧耶之處毳衣大師等説是曼陀羅東方初由説勝利門立於三昧耶者教云汝今將入一切如來種性我當為汝生金剛智由此智故尚能令汝獲得一切如來悉地况餘悉地於諸未見曼陀羅者之前不應為説説則汝當失三昧耶毳衣大師及難勝月説此時應執手而教藏地諸師將金剛杵置頭而作入曼陀羅即成一切如來種子故云入彼種性金剛智者謂了知三世之天智如下所説降下而生即令生彼由此智故等文明示發生彼智勝利即勝與共悉地言見曼陀羅者謂須如法入內示知諸尊不爾則為未見曼陀羅也由飲誓水等令有三昧耶若違所受之誓即退失三昧耶現法當害病等後法當墮惡趣等苦此是釋迦友説慶喜藏謂一切如來即是五佛彼之種性謂即生彼之佛母等入彼種性有二入彩繪曼陀羅者謂外入若誦三昧耶吽由一切如來降一切如來之智者謂內入此處降智是由曼陀羅門入內諸如來之加持不同下説之降智也金剛智者是有初地等自性智生彼智者即是現證其殊勝即由此智等上疏所説當生金剛智者謂無間所入者謂以三昧耶吽令入壇時為諸如來之所加持即內入之降智説者謂説金剛界曼陀羅如此此是一例意謂一切咒中密法當失三昧耶者謂教於三昧耶不可違越如是説已次以金剛置頂振鈴告云汝此金剛誓若汝對餘説此頭當破裂此是隨攝真實經云此是汝金剛三昧耶若對餘者説者腦當破裂慶喜藏釋迦友雖未説此然云不許宣説祕密是汝不可違越之三昧耶由此不可壞故名曰金剛非説置於頭上之金剛也為於誰説説何事者同前言裂頭或腦者是身生之過患次於心間持杵教云嗡金剛薩埵尊今日入汝心若宣説此理無間破裂去所説此理及對誰説攝真實經及二部疏皆未明説意謂於初安立三昧耶時已説自能了知此處所説金剛薩埵入心係先來已入弟子者為何時所入耶慶喜藏所説見瑜伽部別入法於此無涉釋迦友説前請聽許之時入阿闍黎頂四禮時弟子請白世尊聖言亦於爾時金剛薩埵住弟子心如彼所説此中亦爾攝真實經亦説彼頌唯無嗡字毳衣大師等云黑茹迦吉祥即配金剛薩埵之時智尊入身不住而去一切曼陀羅儀軌中皆説是於未由入壇示知諸尊得見曼陀羅者宣説祕密之過故於未由入曼陀羅受弟子灌頂者雖作微分加持儀軌及傳諸餘灌頂即便開示密義亦為最不清淨雙由勝利過患二門而安立於三昧耶者次以大指與無名指持杯取尊勝瓶上水注弟子口告云此汝地獄水燒犯三昧耶賜護者悉地飲金剛甘露嗡奔阿彌達塢答迦義令飲誓水此與金剛鬘經文略不同不空足説水注手中有説三義字或説一義字由治罰故名為金剛由饒益故名甘露水攝真實會金剛頂經及龍智菩薩等説名誓水謂令發誓守護密咒諸三昧耶如金剛頂經云以金剛薩埵誓心令發誓以諸咒師憶及此事能大策勵守護三昧耶及律儀次由奉師教門安立三昧耶者教云從今時起我即是汝之金剛手我教作此汝即應作汝不應毀訾我令汝未捨苦惱死墮地獄此是攝真實經所説教誡此時龍智説應執手而教龍智所説未捨憂苦真實光明論於餘處説損惱或不樂是違佛教所感然此是教莫毀師長是違師教之所感也如説由未捨彼縱經百年壽猶未滿然即爾時或於餘時速當死沒墮捺落迦故有譯為由未捨苦惱用第三轉者譯文善淨然燈賢説以此堅固誓願此如難勝月云安住淨信者恐有未堅固師長應觀察義謂由前安立住三昧耶猶恐未固故作此令奉教安立三昧耶也此注誓水之安立三昧耶是安立令總受根本支分諸三昧耶餘者是安立於別三昧耶由於非器宣揚祕密及輕毀師長違越師教能奪成就過患最重故於守護第一與第七根本罪殷重別立於三昧耶亥三降智諦語鬘論於此處及餘處宣説共同降智儀軌降智所為謂於修悉地前為欲了知修何悉地降智之境者謂弟子與器器者有經説為十二歲之男女肢體圓滿未染聚落法者然餘多説若師長於金剛持前常時修習集多福德能剎那頃堅固修者雖根殘缺年老染世亦能降下所降之境説須作預備法二者相同能降之人先於山等可意處所善修承事令心穩固已得金剛薩埵堅固瑜伽能降下者依儀軌而請降若不能者不作降法可於授三昧耶水後問其所覩此是他派明顯雙運論云若阿闍黎已得降法堪能可以龍智儀軌請降故此不説謂自曼陀羅儀軌中未説降智毗布底亦未説降法有二一隨行集密而降者先令弟子在前剎那想空次從阿字生為無量光佛令如攝真實經所説而請敬請一切如來加持金剛薩埵降臨我身想彼心間從朗字生方形黃色地輪有杵莊嚴日上有藍吽字毳衣大師説四角上有三股杵而為莊嚴想頭上從榜字出生圓形白色水輪有瓶莊嚴月上有白杭字喉中從讓字生藍色弓形風輪二幡搖動以為莊嚴月上有紅阿字次想自心種子放光召請身語意諸金剛如其次第入三字中足下風輪熾然讓字紅色三角火輪讓字莊嚴紅色則字放光舉升弟子則字放光從足孔入吽等光明遍滿全身謂如前修足下風輪上有火輪其上兩足掌中則有則字次燒香爐為先振鈴誦云阿北夏耶當跋耶惹惹惹惹拉耶拉耶吽哈阿則誦咒百遍心住靜慮而行降請四百五十頌疏説心間地喉處水頂上風足下如前毳衣師説想臍處火心間地頂上水足下風及則字猛火熾然由風吹則字火上升及臍與彼火合然燒地水皆沸降滴甘露心生飽足由風吹起而降二以億現説經所説而降師長作勝樂身右伸而住弟子亦爾平心合掌左手振鈴右熏燒香洪音誦咒而降咒為底叉摩訶卓答阿北夏耶吽豈利黑如迦耶毗摩黑毗耶惹耶底摩黑娑訶以此真言勸發勇識所熏之物鈴論師謂婦女染汙之月經帶塗以五肉五甘露及貓糞和以黑香於顱杯中燒尸炭火而熏此是依物降智之法薩惹哈説若不降者於心間修佛頂父母量如芥子由彼空界放諸紅光遍滿全身誦咒而降佛頂父母僅是一例若所降者跳動太甚爾時於彼頂上修須彌山金剛為體其上復有大自在輪金剛地基再上又有黃色五股金剛上有阿字字上有毗盧遮那佛便得止息如是降時想弟子由吽字光明策動舌或月上紅色阿字光鬘閃耀教云説金剛語即能實説若自若他善不善等此與主黑班即義同次由自心種子光明召彼入降弟子之天入自心間種子次於弟子頭上持杵先説嗡汝為等次誦吽哈阿則穆而送往此是自宗若投花後而降令説善等次誦底義班令堅固住從問眼何所見乃至繫於頭上後當送往所降之天此是敘他所許此師與寶鎧師皆説送往餘曼陀羅儀軌唯説安住降後問時想為彌陀或彌陀部諸天而問次弟子向曼陀羅住問云汝今眼見何色若云見白色等當告令知有修息災等悉地之善根次用執金剛之右手握弟子二大指以金剛舞誦甘露瓶令繞三匝作諦語加持云我令諸弟子入此正壇場諸尊種次第隨福如是降此悉地何等是何種性器有何等福力如是降壇場是集總續之文彼等義謂我令諸弟子衆為於諸尊投花入曼陀羅隨是何尊種性次第願隨彼等福力降落壇中此是總説諦語次説別諦語謂此悉地等總續作此修何悉地文義較順謂上中下三品悉地當修何等於此壇中願如是降言種性者謂是諸尊種性有何等福力者謂修彼彼悉地經時久暫有無善根於投花時願如是現酉二見壇而入次於所執華鬘念誦𦺡字加持生為一妙鮮花授與弟子掌中以不全投花鬘僅投其中之一花故論説爾時勝解彼花為鬘義謂供花鬘者想花繫諸尊首亦想以花供諸尊首自想三字放光明顯洗除衆罪次於師長如是加持恭敬為先想住於曼陀羅自在之前意想入於曼陀羅內口誦嗡底義班枳朵美跋嚩夏穴朵美跋嚩什答揚美阿堤底叉薩嚩悉地美札雅剎吽阿康毗惹吽波羅底剎姑蘇摩阿林塔賀投花於彼尊首吽字以前真言是攝真實經説彼説投花真言為波羅底剎班吽若以前咒投花是龍智規然彼尚説四哈字及賀字嗡字毳衣日生説用𦺡字加持不空足説連投三次大日經疏説已得灌頂者可置花於本尊之上依彼五色墻內花所落處觀其種性而授彼尊瑜伽亦能表示悉地若曼陀羅有形像者落於諸尊毫相或頭上或頂髻堪修大印若落目部或口當修密咒悉地落身上中下分修上中下悉地毳衣大師説修菩提自在資財若離身太遠者須長時修近者速能成就諸尊處所由格線等分別應知若落兩尊中間何者相近即彼種性此是總續意趣若相等者俱修二者悉地信樂何尊即彼種性若落牆外應再三投仍落外者成就微小毳衣大師説此不應攝受若落諸外圓線以及外金剛牆之外全無悉地然亦令其見曼陀羅由持咒等成就善根餘時更入總續説燒息災護摩次乃令入落於牆上亦如是説若落主尊説速成就若落外金剛牆之內須大劬勞次取彼花繫花鬘上口誦嗡波羅底格那當伊芒薩埵摩訶跋拉繫於弟子頭上多經及曼陀羅儀軌説繫頭上鬘論則説將彼花鬘置於弟子頭上即可咒義謂大力有情攝受此律生釋云汝大力薩埵當善攝持此於頭上繫花鬘已乃作如是説故知言大力薩埵者義謂稱喚投花所中本尊當攝受此弟子如攝真實經云由繫花鬘彼大薩埵即當攝受故速成就憍薩羅莊嚴論亦云言摩訶跋拉者稱喚彼天此是第一花鬘灌頂彼摩訶薩埵即當攝受者謂至菩提當永攝受上疏亦云次云投花鬘者謂供花鬘諸尊攝受為圓滿此上中下品悉地説永攝受故云嗡波羅底格那娑彌芒薩埵摩訶跋拉此由師長宣誓諦語弟子亦如上説觀想誦咒次當至心信念自與何尊有緣即依於彼而正投花次由師長取花繫弟子頂將弟子交與本尊云汝於此自種性弟子乃至未證菩提應當攝受此即花鬘灌頂須善開解作如是交付者謂若依彼修行速得悉地一切生中本尊攝受最為重要故持祥曼陀羅儀軌譯為大力有情應當取此是譯似稍遜也無垢光論時輪釋有云若於彩色投花有壞彩色之罪故當於尊勝瓶相上投花鬘論依於不知者説故云善心無過次修心中月上主尊主尊種子額上讓字二目熾然有二嗡字誦云嗡現金剛薩埵欲為汝開眼金剛眼無上一切眼今開嗡若那曲吽阿娑訶除去遮目攝真實經此頌仍存梵語彼云黑班跋歇寂靜解云金剛眼者謂於一切色中無障礙眼言無上者謂如佛眼一切眼者謂見一切之眼言今開者謂除諸障鬘論意亦同彼總謂金剛薩埵或勝黑茹迦今為汝開眼開後成為能見一切之無上金剛眼弟子亦應作如是想耶茜那於此處云次二目月上嗡字心中月正緣為主尊由眼視諸光與壇場諸尊眼性無差別次想諸尊眼攝於二目中謂由二目放光自眼與諸尊眼成無差別次仍收回此是勝賢師派鬘論作如是解意趣相順緣主尊者若如明炬論説可修主尊然彼與此不同故是主尊種子如吽字等聖天毳衣等説亦以若那曲等而開眼黑行與答日迦跋等説用眼錍誦開眼咒而為開眼黑班跋歇者教令觀曼陀羅非開眼真言也次令金剛觀視始從主尊乃至守北門者或至下方妙害明王由説諸尊名字為先開示令知此是集密兩派之規毳衣則從東門乃至主尊若持祥等則從北門漸次開示隨作何種漸次皆可次當告云今當以信力觀此壇真實汝生為佛姓印咒善加持諸悉地圓滿成佛三昧耶金剛蓮遊戲正修諸密咒此如金剛藏莊嚴經第三品説唯彼文作修勝三昧耶金剛蓮勝戲當知咒本性除第七句餘文總續亦説彼云為悉地護戒精進修密咒次令弟子誦云我入金剛曼陀羅大曼陀羅我見瑜伽曼陀羅大曼陀羅我於祕密曼陀羅大曼陀羅而得灌頂令説三昧耶賀賀賀賢攝論於入金剛等三句之首各句有一吽字及説三昧耶賀後者此亦應有以云令説三昧耶故金剛藏莊嚴經第四雖於傳上灌頂供養師後而説然勝天與難勝月亦於此處説故與經不相違言入曼陀羅者謂前入幔內時及投花時入曼陀羅投花故云入彼言見曼陀羅者謂除遮目開示諸尊之時於曼陀羅得灌頂者此上雖是入壇法類然是獲得第一花鬘灌頂此處如龍智説開示能依所依曼陀羅之真實勝賢耶茜那亦作是説聖天亦云開眼後頂禮告示天真實堪為量者多作此説故非限於阿闍黎耶灌頂之後藏師有謂由先降智獲得第一花鬘灌頂而説真實與餘者成就遠亦無相違開示諸尊之前説令頂禮餘師亦有説者故應頂禮入曼陀羅儀軌次第諸大論中有種種説是故次第無定彼諸時中除降智等特殊時外弟子為毗盧佛或主尊像師長可住主尊瑜伽此阿闍黎無畏總攝經教及諸大論師曼陀羅儀軌之義編為次第若略釋此義者入曼陀羅是此處之正行從著裝至教令祕密是入壇之加行入曼陀羅是令與天同分此中有二入曼陀羅內與彼同分者是以二咒鈎入之時既入壇內令於諸尊發生信解禮拜旋繞及令祈禱修諸悉地以三昧耶而為根本為令守護三昧耶故次當安立於三昧耶由降智尊使與諸天同分是內同分前者是外同分如是令與諸尊成同分已尚須觀察可否灌頂故問所現及投花等由是了知可否灌頂可者復是何尊種性於彼種性三品悉地當修何等修彼久暫經幾許時由彼投花了知可否灌頂是此時之所為修何悉地與如何修是灌頂後之所為也如是發瑜伽心二種入內立三昧耶獲得花鬘灌頂為入壇之主體餘者是彼支分前觀夢相若得聽許或未遮止乃得發起灌頂儀軌及於弟子預備之前豈非亦善觀察何須此處以投花相觀察可否灌頂如是投齒木時亦曾觀察修何悉地此處何須復問空中所現總觀能灌頂人與請法者可否灌頂要在觀察師長與弟子之德相然前觀察夢相是為觀察有無留難灌頂師資德相圓滿與生留難全無相違故須觀察雖於灌頂無難德相亦具然非現在決定時至故投花者是觀現在可否灌頂非總觀察以由投花知不可者説令悔罪後時入故雖以投齒木相已觀修何悉地然以現色觀察亦不相違非許一一便足要以二事決定無相違故此諸儀軌嗢柁南曰裝入正加持問答發覺心教祕密入內旋繞恭敬禮立誓降智尊問現色旋繞諦語而投花取鬘及開眼開示天生喜説入見誓言最勝大樂解脫城如法自入受灌頂壇輪依怙為師長獲得所許歌供養後令善根弟子入主要儀軌及支分分別曉示諸方便令彼教授極明顯
