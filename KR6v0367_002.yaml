body:
  text: 宗喀巴大師造法尊法師譯總明入聖教次第不同諸門品第一之二子二餘師論中所説寂靜論師四百五十論釋中云若有唯修天之體性不能成佛道不滿故又若唯修諸天真實而非諸天是則須經多無數劫乃得成佛非速疾成由是俱修最為愜意加持勝故速得無上正等菩提此説若唯修天瑜伽決定不能成佛若不修天而修空性及餘方便須經多無數劫方得成佛若能俱修天及空性為速疾道故此論師亦許空性正見是二大乘所共若無天瑜伽則如波羅蜜多乘道其道稽遲修天瑜伽及空性見是速疾道即隨前師之所許也無畏論師教授穗論第十八穗亦如寂靜論師所許而説并引金剛幕第十四品云為摧庸常慢正宣説修行又云又為淨治不淨身故當修佛身無勝月論師於第二觀察初品釋中亦引金剛幕經初品及十四品證由不同之因不能感生不同之果持祥論師札拏釋俱生光明論亦云又不應説由布施等諸方便門及願力等而正出生若於圓滿受用及變化身未能修習心懷猶豫如何能令彼心定解若謂彼由願力出生則應不修無我而得現證法身彼復何須勤勞修習若謂彼由修習出生則於圓滿受用變化二身之因何過而不須修是故安住波羅密多乘者須許具足三身之佛彼由修得極為顯了此説若法身行相之無我而須修習則色身行相之天身亦須修習此若不修應許前亦不修而證法身是理相齊無差別故彼論引文證云如云修習成佛因謂修佛瑜伽何不遍觀察果由似因生又一切祕密經亦云總之佛陀果從定慧出生除佛瑜伽外行者不得佛三昧耶金剛論師於扎拏釋中所説同上勝授論師於集密釋亦如是説調伏授論師云此義是師親宣説雙修色身及法身咄哉決定證菩提法身由佛靜慮得色身何故不修習由福資糧得色身須經長時餘下劣果別應從因別生現見三身為同時如大幻曼陀羅儀軌廣説雖亦尚有餘論可據此等明顯故略敘之壬二以下續部教中所説修我方便論中説廣大天瑜伽方便為波羅密多乘與密咒乘之別引攝真實證菩提中生天之教而善成立并明顯説彼瑜伽中具金剛界諸尊之規故非但與無上瑜伽亦是與瑜伽續二者方便之差別也諸餘論師所説於無上時已宣説訖凡許自修為天相之續部一切皆然以須如是而修理皆同故瑜伽續中亦多宣説如攝真實經初品云身語心金剛自身諸微塵若修為佛身即當成正覺釋論憍薩羅莊嚴云修諸微塵為金剛等調伏作意之瑜伽師應於每日四次修為佛身由修佛身得何成就當成正覺義即當得相好莊嚴之佛身也真實光明釋云諸修密咒行者當修念佛當知須修隨念如來色身及法性故又云安住一切如來中央於彼攝持以法身理及色身體與彼俱無異故乃至自能現見應當修習言法身者謂由通達空慧修成是義極顯故不繁録事行教中宣説此者如佛密論師大日經疏云此中有相無相二種次第由清淨非清淨二身差別門中顯示二種天身自性其清淨者謂法身無相三摩地自性是無相智體性非清淨者謂遍計色自性諸正等覺圓滿受用變化身相由於衆生顯現增上立為顯色形色體性此顯隨順二身行相修習二種瑜伽事行兩部相同此中二種大乘見無勝劣惟由廣大天瑜伽門而分三乘建立中亦明了宣説如云故勝義諦除薄伽梵及龍猛等所安立者更無第二殊勝真勝義諦問云唯由世俗如何廣大答云此由所緣淨友伴及隨行故諸有慧者説為最上乘此説了解清淨天性受持諸三昧耶而得諸佛加持如佛菩薩饒益衆生清淨國土而修由彼所緣友伴隨行三種廣大勝出波羅密多中觀以説具足彼三差別之乘為事行等續部之別故許總為密部顯乘之別總之由達諸法都無自性之空性見與生自身為天之天瑜伽二種係屬成二身果是金剛乘法一切正機共行之道各續部中除彼二外所説多種餘道當知有是通達空性勝進方便有是修天瑜伽支分此應持為扼要之義辛三斷諍論有作是言若由波羅密多乘中無似色身之因密咒有之而安立勝劣者不應正理以由似果之因而成諸果不決定故若成相好莊嚴之身須修相好行相之道則成輪王相好之身其因亦須修習相好行相之道如是善趣惡趣之身造彼因時一切皆應修彼二趣行相之因是為大失若謂彼果之因不須與自行相隨順佛果則須如是修習應説其理然不可得故説色身行相之道成辦色身視為咒乘特法亦唯信仰而已今當解釋如諸波羅密多乘説色身體性之因謂諸最勝福德資糧相好等之別因謂迎送師長等由無量生修集之力至大地時獲得隨順相好莊嚴之身彼復漸漸轉令殊妙至最後有獲得有學究竟相好即於彼身證法身時即彼相好身之等流成受用身非許道時都無相好得果無間頓然新生如是諸金剛乘説於一身修成佛者若有學時都無隨順無學身之相好亦不許彼究竟相好頓然新生如是若有學位都無相好則定不能成辦色身是二大乘之所共許趣入密咒一身成佛之初業者咒中未説彼身初生便須相好莊嚴實亦非有故無凡身相好而可立為色身相好之因須於彼生新修能感相好等流之因此除修天瑜伽更無餘事由是因緣感發善趣惡趣之身於彼因位不須修彼行相之因而於成佛色身之前則須修集彼身行相隨順之因二如何等我等非許受生色身諸異熟因須修似彼行相之道是許成佛相好之前須彼隨順等流之因故無諍論安足之處若爾下三續部所修之天瑜伽及無上部未能即生成佛須經生者所修天身如何能成色身等流之因彼等亦由於現法中如是修習後於餘生成色身時即為爾時等流之因非是受生色身之異熟因如是善斷所説諸疑次須定解修天瑜伽必不可少如金剛空行初品云我是一切佛及一切勇識由自天加行善修成自我由此於現生當成一切佛及一切勇識一切金剛持此是和合諸空行金剛空行最勝樂金剛薩埵如是來吉祥世尊所宣説又云由此印和合當盡噉三地餘加行不具猶如燈息滅釋論中云言由此者謂由上文所説空性之印若誰能與手面等世俗印平等和合即作是説彼瑜伽師何所作為謂當盡噉三地義為遣除身等庸常之色次顯唯修空性靜慮終不能證大菩提故説餘等文餘謂唯修空性加行不具謂不顯現息滅謂無自利而般涅槃如何而滅曰如燈如燈由油相續故能照耀空際若時油盡燈便盡滅自尚不顯况能照他唯空三摩地亦當如是觀此説密咒道中若不修天瑜伽不論如何修習空性果位不免墮寂滅邊此即續部最勝意趣若未於此善獲定解棄天瑜伽僅修密咒一分之道當知定非獲得道體庚二明道有別果無勝劣分二辛一解釋正義辛二釋道差別今初有作是言若二大乘道有勝劣所得佛果應有勝劣以因有別果無差別成相違故若不爾者因之差別全無義故當知第十一普光明地劣於金剛持位結合初章第四品云總之佛陀果無數俱胝劫乃獲得佛果由最勝安樂現法能證得或得金剛持此説由無數俱胝劫所得佛果與金剛持二各別故又前經云即於現身證得佛果或得金剛薩埵若未證得不思議處彼名善逝即名為佛其所相事正謂菩薩此不應理彼教非説由無上道一生之中或證波羅密多所説普光明地或證咒中所説金剛持故由無數劫所得之佛與第十一普光明地波羅密多乘人亦復不許無差別故經無數劫所得果中分為二類佛者現觀莊嚴論云由超第九地智名住佛地當知彼即是菩薩第十地於第十地説名為佛金剛持者即是第十一地咒中雖尚説有十二十三十四地等然依印度論師解釋彼等與波羅密多乘所説諸地僅是開合之異至下果時再述由是當知第十一普光明地與金剛持地義同經中即説此地是經於三無數劫所得續部説為即生成辦不應以名金剛持故便執非波羅密多乘之果當如靜命論師所説金剛持地即為二道共所得果成就真實論云吉祥大樂金剛薩埵若由餘道須經多無數劫乃能證得諸具金剛乘方便者即於現法無難而證又結合續釋教授穗論云佛者謂十地自在種相覺者謂勝進道金剛持者謂十一地自在三理炬論云義同然無愚汝自亦許此義謂咒與波羅密多乘所得義同又得波羅密多乘普光明地亦説盡斷二障一切習氣證得力無所畏不共法等一切諸佛功德若更有佛勝彼所説則汝應許雖已盡斷二障習氣過尚未盡雖已得十力等一百四十四種無漏功德德猶未圓若論如是果位不待密咒之道唯以波羅密多乘道能否趣證印度智者多有抉擇理應觀察若許唯用波羅密多乘道即能趣證普光明地而又説於彼上更有所趣則非應理二道趣證有不待無數大劫能否成佛之勝劣而非果有粗妙之因然亦不能成立因之差別都為無義以果雖無粗妙而望得果遠近有差別故辛二釋道差別分二壬一自宗所説之差別壬二餘師所説之差別今初下三續部與波羅密多乘遲速差別是由依止諸天瑜伽念誦之力獲得諸共悉地及蒙諸佛菩薩攝受加持等多善權方便速疾圓滿大菩提行無上部之速疾差別生起次第有多深處非下三部所有圓滿次第更有衆多最勝深處後當廣説不待經歷無數大劫速能成佛唯是無上部之特法下三部機如能證得亦須趣入無上部之二種次第非唯目道便能滿足故密咒之速疾差別不應唯執濁世一生成佛及不待無數大劫而成佛壬二餘師所説之差別分二癸一律生釋中所説癸二三理炬中所説今初寶鎧論師於圓滿次第時説修離諸戲論二乘相同父子相見會説得一切法遍樂三摩地之菩薩隨於一切所緣唯生樂受不生苦捨乃至割截如迦喀跋那量及被象踏亦唯樂想並説修彼樂之方便非彼安樂不順咒乘又波羅密多乘説世出世間一切圓滿正因謂菩提心咒中亦如是説又引現境成金剛等為據成立大樂亦是共法現觀莊嚴論云巧便受諸欲迦葉品中以農夫喻説煩惱糞是生佛法之所必須以故受用欲塵亦是共法其果地等亦皆相等故説生起次第為咒特法律生第十三品釋云故若不修生起次第則咒法中更無殊特意謂凡是修天瑜伽一切攝為生起次第脈息空點等是生安樂之瑜伽安樂更無差別癸二三理炬中所説義同然無愚多方便無難依利根增上説咒論超勝此説一切種智之果咒與波羅密多二無差別然由四種差別故説四部密咒勝於波羅密多無愚差別謂諸波羅密多行者修施等時三輪無得雖非愚蒙然捨頭腦行外施等則根非利須經長時乃得菩提諸咒行者則無彼愚波羅密多是能頓滿一切有情所求利益捨頭腦等不能利益無邊有情見彼乃是三摩地果是故呵棄尋常方便求勝方便此由周遍無偏相續無間修習方便智慧無二妙三摩地乃能滿足無邊有情利益圓滿布施波羅密多爾時諸餘波羅密多亦皆圓滿布施身等無如是義故不立為波羅密多方便差別謂波羅密多乘説諸難行戒律儀等為生天趣及解脫因由依最寂靜行不能攝受一切有情咒為饒益一切有情説四部續此當先知自於何惑最為勝強即修貪等成彌陀等持誦咒為心曼陀羅修諸韻字成諸尊等語曼陀羅修宮殿等成身曼陀羅説如是等諸門不同無難差別難與非難皆待自心非定屬事有於此難於他易故由是若能順自所欲而引導者即由安樂而得安樂故密咒中不説難行對上上根貪等過失不行分別微薄具足大悲勤修無二真實法者則説法無我智與大悲一味又名方便智慧大印法門上中根者雖能厭行諸庸常境然未斷除貪等分別不能趣入勝義智海故為彼説修行智印此即修習五部如來及佛眼等諸明天女由修彼等而得入真實者謂於天身心堅穩住天唯心現非有外境故不應著修等三輪如是知者即能安住遠離外境及能所取分別之身又依師長教授由觀彼身離一異故通達無事次觀一切同彼而達諸法皆無自性依此密意説無邊種修天之法此是智稱論師所説上下根者雖亦愛樂無二妙智然未斷貪由近貪境心便散亂不能入定於彼聽許三昧耶印此品須具如餘處説明妃德相若上品貪而無廣大證真實慧除此非餘所能住心為説業印於彼亦須以隨順業而受用之三理炬論於此未説以何等根用何業印智稱論師於上下根説三昧耶或羯摩印意似雙指作不作業或明妃相具不具足如是趣入咒乘上根之機於明妃欲有貪不貪之二於其後者説修大印前者又分於外明妃有無貪欲之二於其後者説修智印前者聽許三昧耶印及羯摩印二種故有持此論師意趣許為自宗而説無上部之正機須於外明妃欲具大貪者成相違失利根差別謂四諦瑜伽師不知實義故是鈍根波羅密多諸瑜伽師方便錯亂故是中根諸咒行者全無愚蒙故是上根設以餘人行之必墮惡趣然由巧方便行反得清淨此是止毗達加摩羅論師所説又智稱論師云若於智印等不愛樂修習慧力羸弱故不堪修大印佛為饒益彼假以大印名金剛薩埵等色相名大印此説由慧力弱不能修習大印於餘三印不樂修習便於天身立大印名而為宣説此是瑜伽部之修法事行兩部亦當例知方便大悲與通達法無我真實之慧為道命根波羅密多亦皆共許又波羅密多乘説若捨頭等身財滿有情願乃名布施波羅密多是則布施波羅密多終無圓滿如是破已説於一切財物淨自慳吝及淨自利妄執之垢增長捨心至最究竟是名布施波羅密多入行論云若衆生無貧乃名為施度現有貧衆生昔佛云何度一切財及果悉捨諸衆生説名布施度如是彼唯心故難解説無愚差別利根差別理亦難通若謂是不愚方便者與前重復若謂以欲貪為道者咒乘上機不見此事以上首機無彼事故又入密咒之機上者於初次第圓滿導入第二次第圓滿次第堅穩之時多於爾世便得成佛故説於中根者聽許智印於下根聽許三昧耶印等亦難安立故諸智者於此等義應當觀察西藏諸師解多方便謂多消災等事解釋無難謂以欲塵為道於此論師及以智稱論師論中皆無明據丙二別説入金剛乘差別分三丁一明趣入密咒之異門丁二明安立異門之差別丁三明具彼差別之諸道今初金剛幕第十三品云於下説事續彼上無事行瑜伽上有情再上無上行此下謂金剛乘下機彼上中機上即上機再上即最上機對彼四機説四續部故四續部即四能入門入無上續義論亦云密咒果金剛乘總有四能入門謂事行瑜伽無上瑜伽續如世共説丁二明安立異門之差別分二戊一問戊二答今初若由機有勝劣而説續部次第不同則此能入之門非就所為勝劣而立以凡趣入金剛乘者一切皆為一切有情而求證得無上菩提發大乘心無差別故非就能得二身正因道體不同而立以達無自性慧引發法身相同修天瑜伽引發色身總相同故是故一切名金剛乘唯是一乘若以天瑜伽等衆多道之差別立為異乘或續部次第不同異門者則於無上瑜伽一一續中亦應安立衆多不同諸乘即如集密一部亦應有多不同能入之門以集智金剛續説有蓮花旃檀等勝劣五種補特伽羅故以是當説就機勝劣門中分別續部不同四門究由何理而為安立戊二答分二己一明餘倒説己二出自正答今初西藏諸師有云為攝四類外道故説四續謂具貪者隨自在行有嗔恚者隨遍入行有愚癡者隨梵天行若不定者遇彼三隨一即受持彼宗由有彼四如其次第説無上瑜伽續行續事續及瑜伽續并説此是隨順攝真實會慶喜藏及善現護等所許今當問彼若謂彼等補特伽羅由彼彼續能調伏者是則不能據彼以明由四續部趣入之別以彼一一皆能調彼四補特伽羅故若謂彼諸續部正所化機為彼等者極不應理咒乘正所化機是以已入佛教之機為勝此機不須先起邪見故又先未入邪宗而直入正宗者應犯非彼諸續正所化機之過亦非慶喜藏論師之所許彼師所造集密初品釋云由薄伽梵安住於彼故名薄伽此明處所彼者謂佛眼摩摩格白衣度母四尊天女即此中妃彼如此經十七品説何故安住彼等密耶為令諸樂遍入等續不捨境者於此以貪斷貪生愛樂故謂彼意許依止母邑及大香小香等而能成辦遍入等果尋求彼中所説成就彼等便趣明妃祕密如云薄伽善遍入住母邑密處令諸人愛樂故名那羅延此廣宣説於樂遍入續者説無上部諸貪行故攝真實會全無建立無上瑜伽為何所化宣説之理彼説四段是為有貪瞋等四種煩惱者説必是例彼推比實無確據西藏諸師又有説為隨順佛教四宗由四不同起天之門立四續部并説此是隨順集智金剛龍猛父子智足師資所許彼諸師是集密行者集密釋續集智金剛説事部時無自想為天及智慧薩埵之樂必係例此推説然説為順四宗則全無據雖説獨覺配瑜伽部起天規式然獨覺道非是四宗之一又説事部無自起法亦非集智金剛教義後當廣説故不應理又阿朗迦迦拉峽説於婆羅門及剎帝利宣説事部及瑜伽部吠舍有二於貪瞋薄愚癡增上勝解遍入天者宣説行部於愚癡薄貪瞋增上説集密等勝瑜伽部於彼上上貪瞋下下愚癡屬旃陀羅種者説勝樂略續等母部若以四部之機似四種族而説彼不能辨四部趣入之別若謂四部之機須四種人終難決定亦不見有主不主別故非應理雖説金剛界中諸尊猶如國王俱諸眷屬然然以此理不能成立彼所化機為剎帝利總諸大乘正所化機須悲增上尤以無上瑜伽正所化機要由大悲激發其意急於利他速欲成佛若説彼等須具上品瞋恚誠為非理之談己二出自正答續部安立四種能入異門非乘有異非由天瑜伽等道之差別然由入金剛乘主要四機極不相同故立四門其所化機有差別者略由二門一謂欲貪為道之理不同有四二謂能如是者是由相續生真空見及天瑜伽功能勝劣有四不同初如結合第六章之第三品云笑視及執手兩相抱為四如蟲住四續第二觀察義同此説教授穗論説此為道續未説為教續然第七章初品穗中亦説此為教續勇金剛論師於結合釋中亦説為四續部金剛藏莊嚴續第十一品先説方便續中貪續多種差別次云此明互相抱續部諸差別如是由執手笑視亦應知此説能詮教續故是顯示四續部之差別爾時續部之名亦曰笑續視續執手或抱持續二相合續共為四部如前所説天瑜伽為色身不共之因是説主要方便若僅由諸方便增進通達空性之慧則是二大乘之所共此如入行論云此一切支分佛為慧故説以是由天瑜伽增進慧道是以殊勝方便智慧現為欲天父母等住行相之天瑜伽無上部中道之差別雖有多種然名二合續即由彼立名在諸續中亦多有説二合之相即由此門以貪為道依止二菩提心開合之要增進通達空性之慧由下三部無有如是以貪為道殊勝方便故亦未説彼七支中和合之支然有由笑顧視執手或抱所生喜樂為道故亦總有以欲塵貪為道之義此如第二十五穗云事行瑜伽及上瑜伽四續部者以笑視抱持二合執手而表示之如是事續等中有以諸尊顧視顯示智慧方便隨貪有以歡笑有以執手有以抱持有以二合又後分別第三品由諸笑及視抱與兩兩合續亦有四種寂靜論師釋云言由四者謂由事行瑜伽上瑜伽續表示笑視抱持二合如是事續等中有明方便智慧諸尊隨貪現笑有現顧視有現抱持有現二合彼雖但言諸尊顧視其歡笑等亦謂諸尊由顧視等何所作為謂顯智慧方便隨貪即表諸尊互相愛也毗盧遮那與佛眼等諸尊絶無貪愛故此是謂持彼諸尊我慢之行者以諸續部所化將視等貪持以為道是正義故事行部等宣説諸尊有顧視等若不配當所化則由顧視等門不能明所化之差別又非唯無上部説笑視等即下三部亦説彼事如不空羂索儀軌云佛薄伽梵面向忿怒又云右有度母天女含笑屈身目視施勝手印左有蓮部妙女含笑隨順密咒理趣目視不空羂索大日經曰其右有天女名曰大佛眼天女面微笑光輪滿一尋無等清淨身釋迦牟尼妃又云畫勇觀自在安住白蓮座如螺拘陀月頂戴無量光面容含微笑其右有天女度母大名稱善妙除怖畏又金剛頂經云天女金剛笑抱持自天女首向彼側轉含笑遍顧現執持世尊手勝吉祥經初品中云其側大金剛持箭勤揮弄手作偏抱勢持摩羯魚幢此僅略録總謂行者生何尊時即將彼此互視等門所生喜樂持以為道下續部中無緣外印作是修法上續部中亦未宣説如是修習故是緣於所修佛眼等天女也諸劣所化未堪上貪為道故密意説下品貪欲漸令為道此如後説要天瑜伽已至堅穩獲得空性妙三摩地緣於自部天女大佛眼等而修如勇金剛結合釋云言笑視及執手等謂由笑聲或由觀色持手二合妙觸引生大樂無分別心言如蟲者是無漏大樂空句謂如蟲從樹生即食其樹如是從樂所生妙三摩地應修空性第二十三穗云笑續如化樂天此是以彼諸天為喻非説彼等是諸續部上首之機信解金剛乘及修彼少分道者雖不決定然初趣入金剛乘之上首機宜須欲界身必須信解由明妃欲塵貪為道門中求菩提者無上部中俱緣真實及自所修明妃以笑等貪而為正道下三續部唯緣所修智妃欲塵喜樂為道瑜伽續中既不可修二根交合故除彼外緣餘執手或抱持觸喜樂為道配瑜伽續除觸塵外依笑視緣所生喜樂為道配事行續此等是釋無上部中立四續部之名義由此即明彼等機宜及道差別次當更釋四續部名依諸續部共許名義以明機宜差別能以欲塵為道之方便者為空性見及天瑜伽欲證此二若須觀待衆多外事乃是事部之機若待外事內定等分非待極多外事即是行部之機若於外事內定二者以定為主待少外事是瑜伽部之機若不觀待外事能生無上瑜伽是無上瑜伽部之機此依解釋名義而説謂由外事增上故名事續事定等行故名行續重內瑜伽名瑜伽續較此瑜伽更無過上故名無上瑜伽續也此就所攝正機入道增上而説非謂定爾真實光明論説攝真實續後會是為怖畏深修者説故總諸所化信解外事及內瑜伽雖有遍重然亦有信解不稱自根之道者就彼信解不能明辨彼等主要之機當知有説觀不觀待上品外事極為應理如三理炬論云若由餘生修習習氣獨於林藪無諸衆生及無沐浴繪壇供養護摩苦行念誦等事則心不能得定故説事續若有心念愛樂真實復由信力以佛所説諸事而得妙智故亦待事佛為彼等説根本續無多事支此根本續與共許之行續義同雖有內定然多外事立為事續如大日經注云諸事續中雖重外行非無內行歡喜金剛略義疏云若修真實堪能微劣外行增上説為事續若內正定與諸外事等分開示立為行續如大日經注云此續雖是方便智慧為主之瑜伽續然為攝受信解外事諸衆生故開示隨順外事諸行故共稱為事續或二俱續又金剛藏莊嚴續云事二俱瑜伽亦説行續為二俱續三理炬云餘者專信修習無二真實於衆多事起散亂想為利彼故宣説行續瑜伽為主兼説少分事支此之行續即瑜伽續丁三明具彼差別之諸道分二戊一二種大乘共道次第戊二金剛乘不共道次第今初金剛手灌頂續云此大菩薩陀羅尼咒大曼陀羅最極廣大最勝甚深最難測量諸祕密中最為祕密於惡有情不容開顯金剛手汝説此法最為希有昔未聞者此法當於何等有情乃可宣説金剛手曰曼殊室利謂諸修習菩提心者若彼成就大菩提心行菩薩行修密咒門爾乃令入大智灌頂陀羅尼咒大曼陀羅若菩提心未能圓滿即不令入亦不令彼見曼陀羅亦不為彼開示契印及諸密咒此説於灌頂前須圓滿修大菩提心故當先修願行二心次乃入密此中次第謂應先於一具德相大乘知識意樂加行如理依止彼當開示暇身難得令其修心若於暇身發起廣大取堅實欲最勝堅實謂入大乘入大乘之門即發菩提心若於自身有真正菩提心則成真實大乘學者彼心若唯虛言是則大乘亦但假名如是諸具慧者應當漸除此心障品發生圓滿德相之心復次若未先遣現法之心俱障大乘小乘之道故當念死於現法中不能久住及思沒後漂流惡趣之理次當善思生死一切過患遮遣愛著後世圓滿之心務令心意趣向解脫後為遣除獨樂寂靜之心當於慈悲及以慈悲為本之菩提心長時修習引發真實大菩提心次當了知諸菩薩行發求學欲若能荷負菩薩行擔則當進受菩薩律儀學彼學處若更能荷金剛乘三昧耶律儀重擔則當聞尊長五十論清淨修習依師長法而入密咒尊長五十論云淨意樂弟子當皈依三寶此隨行師法授與令誦習次授與諸咒令成正法器清淨意樂是説於發菩提心及有不共皈依者乃為説尊長五十論由與尊長五十論故而成法器明顯雙運論云此中次第者擇宿曜吉日弟子敬合掌懺悔一切罪先受三皈依善發菩提心亦受近事戒及菩薩律儀次更受長淨此隨順次第謂如法親近金剛阿闍黎因教文太繁故今不廣録如是善作已請師賜灌頂此説於灌頂前先受別解脫戒發菩提心及受律儀次乃請師求賜灌頂此言近事及近住長淨是依在家而説入密咒之出家者則當清淨沙彌戒等攝行論第一品先成應次第學非可頓學次云其中次第謂當先學佛乘意樂若已善學佛乘意樂乃於新乘學習一念妙三摩地謂先學佛乘已再學新乘即密咒也佛乘意樂即願行心如是發起願行心已必須具足六度行者非摘波羅密多中事用資補充即密咒中亦數宣説須學彼道故是金剛乘中共法此於共乘道次第中已廣宣説不復繁贅若未能以無垢理辨自他宗善惡説復不善辨大小乘顯密共不共差別縱説如來諸聖教大乘尤以金剛乘為具善者最勝門如是亦唯徒自信是故具智善欲者當以淨理治慧目心於聖教求勝解不為敵者所引轉
