body:
  text: 宗喀巴大師造法尊法師譯明生起次第品第十二之一子四二次第之修學分二丑一學生起次第丑二學圓滿次第初中有二寅一總立生起次第寅二別釋現觀次第初中有三卯一生起次第之對治卯二生起次第之差別卯三爾時云何修空性初中有二辰一明所斷事顯破彼理辰二明修顯了及安住規今初生起次第不共所斷謂於能依所依現凡常相及於彼執凡常之慢如幕經十四云為破凡常相故説當正修攝行論云諸蘊處界從無始來住凡常慢為顯彼是一切如來微塵所成體性此述經説由無始來於五蘊等住凡常慢其能對治謂修蘊等為佛此雖是説身遠離位然與生起次第不共所斷相同為遮如是境執故於能依所依修殊勝相唯是咒乘勝法波羅蜜多乘之所無對治凡常境執説修生起次第所依為宮殿能依為諸尊是故應修所依宮殿能依諸天之相遣凡常相應修自是不動或毗盧佛之見遣凡常慢除凡常慢成天慢者如於降智尊時忘自我執起是天想次應改不動毗盧等假想轉成天慢此時有生真實天慢而能所依不明了者有能所依明了而無真實慢者有俱有者有俱無者共有四類如總論云初發業者入曼陀羅得三昧耶律儀灌頂為離凡常慢故修四座天瑜伽餘論多説除凡常慢故對治凡常慢以修能依所依曼陀羅慢為主遣凡常境修能所依殊勝之相是彼支分所斷之凡常相非五根識所見情器是於意識之所現者言以生起次第斷除彼相與凡常慢非如出世間道永斷種子亦非如世間道損害種子伏其現行若爾云何謂若無餘違緣住能依所依曼陀羅慢時便能轉成如所説慢明想彼二曼陀羅時如所明想能極明顯於意識前遣除凡常境相即是伏除凡常境執然非片時略伏要極堅固如金剛阿闍黎以如是理先善承事於修地規敕魔等時宣説我勝金剛持等以自修金剛持等慢乃生彼彼真實天慢若非爾者唯成語言慢耳故先承事極為重要非唯語言之殊勝慢要由先修唯言假造之慢而生是故先應於彼勤修多修習住天瑜伽時眼等諸識不現餘境是由意識專趣彼義令眼識等退失等無間緣之力而暫不生故暫不現青等餘相非由生起次第破彼等相此如正理王云由識著餘境無力取他義故若於意識前能以勝相滅除凡常等相即能辦所為果雖於事實未成本尊若能發生真實天慢所為之果亦能成辦辰二明修顯了及安住規分三巳一修幾現觀巳二修顯了法巳三修安住法今初修學生起次第為如修學圓滿次第修一一緣前堅固已轉修後者為於一座前後一切俱時修耶於一修道補特伽羅就生道位別為四位彼四各修幾許及如何修皆應了知然燈智云早起皆如前善誦為初業已略降少智具咒戒禁行加持眼身等中間善策誦一切種圓滿能為收放者得少智自在晝夜修瑜伽正得智自在剎塵三勝輪天身如影像作利衆生事此中初發業者乃至得少智自在之一分是生起次第位正得智自在者已達圓滿次第高上之時第一位時須圓滿修修法所説生起次第一切儀軌如寂靜論師云善誦為初業者謂初業者應依一切儀軌而正持誦持祥論師亦分四位説第一位俱修四種瑜伽穗論第十二云初發業瑜伽師乃至本尊粗支如現見事於三座中修四瑜伽如四百五十論釋云粗分身曼陀羅須臾現前略降少智而住從最初修乃至粗分身曼陀羅未能須臾一切畢現一切皆是初發業者五次第論與攝行論乃至究竟生起次第一切皆名初發業者是待圓滿次第而立此中是就第一次第分位立名初發業者故不相違次略降少智者如四百五十論釋云粗分身曼陀羅若能須臾現前而微細地藏與身金剛等猶未現前具足咒戒及諸禁行由得彼力名於智慧略得自在此與本頌略降少智義同此中粗分謂彼曼陀羅中所立諸尊細者謂彼諸尊眼等處內所立諸尊所言粗分須臾現前非如初發業時要由次第明想彼等乃能明顯不爾不現隨所想時彼尊一切支節皆能頓現此非暫現及有時現即為滿足要得堅固如穗論十二云若得如所説相於初瑜伽令心堅固即於少智略得自在應修須臾變曼陀羅修現觀時粗細二尊雖非修有多寡然粗者易現而細者難現例如主尊曼殊金剛之眼與彼眼中地藏全身明顯有其難易此處雖未明説宮殿然亦要能須臾現前若乃至地藏等未能現前皆立為略降少智者則與札拏經釋所説乃至能見細身有相違失彼説若時已見粗支乃至現見微細身金剛等名略降少智故答云無違説微細身漸次明想雖能顯現未得堅固頓時明顯即立為略降少智故若爾此與初發業者修現觀法有無差別答曰有別如四百五十論釋云彼於一切座間令曼陀羅須臾現前加持眼等身等隨令歡喜供養稱讚嘗受甘露為先應慎念誦此時亦須分座而修故云一切座間於每座中如何修者論云須臾謂能依所依曼陀羅現前及加持諸處等修法自體雖與初發業者相同然如不動三面諸手及足目等一切支節不須漸誦漸想皆能頓時憶念是故語中所誦與彼隨言所修其量多寡有大差別然修微細天身仍須次第明想徐徐而修言隨令歡喜者謂修父母等至勝曼陀羅論雖未説召入智尊實亦應修若如此者云何札拏釋云從護四座至最加行須臾明想於大瑜伽恭敬修習答云此由曼殊金剛修法於生果位金剛持後加持眼等札拏修法於生最勝曼陀羅後加持諸尊眼等故有差別然於細天殷重修習則無所異得少智自在者如四百五十論釋云若一切種由能圓滿收放加行令曼陀羅須臾現前故名得智自在此亦由得降智乃有未得則無故名為少此通二次第位始從細身須臾現前乃至未得正智自在皆此位攝此亦等者謂初業者必須先修前前乃生後後即破天竺有説利根修行不須此等次第之執律生第三雖云修生次第壇鈍中根應思利根剎那相唯心曼陀羅剎那相瑜伽修圓滿次第然釋論意約彼先須漸明想時名為鈍根次能一時圓滿現時名為中根次能俱修圓滿次第曼陀羅時名為利根猶如一人幼壯老位依一行者修習淺深次第作是安立如云此鈍根等差別可明一人修行次第如約一生分少壯等得亦多人明此差別如待他人有幼壯等於此等文若不善解彼義則執初業利根不須生起次第而即棄捨是故就修勝共悉地所立諸根次第及於一一補特伽羅就生智德分位所立諸根次第應善分別勿使雜亂雖諸細天支節等事能須臾現若未堅固仍是第二位攝至堅固時為第三位如穗論十二云若於所修諸曼陀羅心得堅固即是得智自在能由收放廣利衆生以菩提心為先隨證法性應除微細諸垢此説得智自在須心堅固札拏釋云若自在見身金剛等如掌中果彼即於智獲得自在不定時限應修下説圓滿次第此説得智自在須自在見前説證菩提心除微細垢與此説修圓滿次第二義相同説至此位不須定分界限故不更須日夜別別新修現觀然於此位仍須修習生起次第如四百五十論釋云此瑜伽師為欲增進究竟果故應當日夜修彼瑜伽謂應修習粗細天身須臾現前瑜伽非至此位生起次第便到究竟此後尚應究竟生起次第次乃修習圓滿次第正得智自在者四百五十論釋中説自利究竟唯以靜慮能利衆生穗論十二説證此大印悉地能作無邊利益他事此如札拏釋云次住空性從定起已能如所欲加持現境是名於智正得自在又名解脫自在成所作事士夫如上所説生起圓滿須漸次生理極明顯餘諸定量經論宣説此義文證非一故二次第定應如是而修巳二修顯了法生起次第於身生起之理藏師有説先於一尊修成堅固明顯奢摩他已次乃圓滿修習現觀有説先圓滿修四座現觀念誦再緣一尊一份漸次修令明顯然諸修法唯説圓滿修習現觀無彼二説就此第一次第有修明顯與修安住二法應別了知若令境相明顯但於彼境數數作意即能成辦正理王云欲畏憂惱逼及賊夢等害見諸虛偽事宛如現前住謂多貪者數數作意可愛境相現見彼境如在目前是故引生明相不須先修安住亦不以未分分俱修而即不生又生明相不必定修真實隨所修習倒非倒義皆生明相法性爾故正理王云是故正非正隨其善修習修習圓滿時明無分別果續中亦説隨思何事即成彼相如玻璃喻初發業者始從加行積集資糧乃至收攝而修於一一事皆修明顯然非唯現彼相當起有力執持行相明顯任持天慢俱須修故最初如其所應於短時中始終心不沉掉令所修心無間運轉勵力學習次漸延長後每一座從始至終無沉掉礙漸次學習爾時因修未久智力未宏多不明顯故以增上勝解為主而修如四百五十論釋云此三瑜伽增上勝解為主非以明見為主以時短暫或力弱故此明顯與天慢要以觀慧觀擇修習漸次生起若由幻境忽爾而生不可憑信生起次第獲得堪能當隨自心所想而現非未想者如想而現不越彼量若雜幻境則於彼量不忍觀察故若先作是念當如是修次觀想時即於彼量能不增減是為修行已得堪能此於初修縱依彼量亦難成辦後久修已當如是觀修天慢法準彼應知必須如是修者如修無常與悲心等若於各各所緣行相由專修習漸生領受則能隨心所欲明顯所緣行相皆能生起若雜幻象忽覺彼心似甚有力然自欲時則不能生總之若修生起次第但是緣自為天令成明顯殊勝天慢則下三部皆有生起次第宗要但修一尊亦能成辦則修曼陀羅輪悉成無用故將所修凡常情器修成能依所依曼陀羅輪應如智者所解經義圓滿而修由此能成衆多能治所治殊勝因緣成熟善根引生圓滿次第殊勝智德成熟相續之力須修四次曼陀羅輪故於修法應數修學令其明顯生明顯法當如諸大論師教規於一切分平等修習一切明顯同時引生此力最大如是學習圓滿修法縱於各別支分未得明顯然由儀軌圓滿成熟相續亦甚有力得明顯時必於一切粗分皆發明顯梵典多説生天法後次於所修修習疲乏應修念誦此為觀修為於天身心專住修堪依教典皆未明説彼時尚修令天明顯故以觀修數數明想為主此復初修天法與念誦前修法完畢及於彼能所依行相明想之後當起是慢此實是彼由説此時是將果位剎土眷屬佛身等事持修為道即是最勝念佛故非於毗盧不動等略憶身色首臂等相略起彼慢應須勝解實是斷一切障具一切德之佛由如是修殊勝明相天慢任運皆生如熟誦經珍珠鬘云悉地謂心堅固自身天相天慢於日日中任運而得以是由修彼二每一大座從始至終以成殊勝相慢之力已能滅除凡常相執爾後當修令心堅住此就身心無新違緣而説爾時不須自是彼尊之念全不間斷但由前生真實天慢之力能滅我慢即足譬如有人非人所附雖或意散未起我是非人之心然彼勢力未退失時亦不還生是彼本人之想要修幾久諸尊乃能如現前事攝真實經疏云三三摩地為先若修六月或修一年乃至金剛界曼陀羅如現量見應日日修此中所説修習時量餘處亦未宣説長於一年故若善知修法住三昧耶及以律儀發大精進無間勵力不勞太久曼陀羅輪諸尊便得具顯譬如鑽木若不長恆猛進中多休息終不生火故當相續而修如吉祥勇攝波羅蜜多論云由無間瑜伽應勤修靜慮若數數休息鑽木不出火瑜伽法亦然未得勝勿捨巳三修安住法分二午一於初二位修微細點午二於第三位修微細點今初有作是念初次第時於粗細能依所依曼陀羅數數作意成明顯相即爾便足不須修奢摩他以第二次第時宣説脈息及猛利等瑜伽多種修定之方便故又若此時修奢摩他應以細點等瑜伽修總論普賢修法堪依誦典中説於勝曼陀羅後念誦之前修行彼等須以數數作意行相雜觀擇而修故然彼等不成奢摩他如前所引修次第論與後靜慮釋等説彼已得奢摩他者若過觀擇退失住分爾時尚應修止何況未得奢摩他時吉祥勇師亦云應於一所緣堅固意思慮展轉多所緣意反生散亂此説若修靜慮不專一緣令心堅固展轉多緣不能成故茲當正釋若唯數數作意修習行相雖生明顯然不能得堅穩安住如修愛怖所起明顯故唯轉成殊勝明顯以及天慢猶非滿足須能堅固安住以無堅住則不能得滅除凡常境執真對治故正為滅彼修生起次第故其於粗細能所依曼陀羅圓滿明顯心得調柔定須獲得奢摩他故以是初次第時次定當修正奢摩他及以細點瑜伽而修於微細標幟或微細點中修能所依圓滿曼陀羅者非初發業略降少智二位所修第三位中始能修此以於眼等所立諸天能須臾現立為第三位故於微細曼陀羅能令收放説為得少智自在故如云一切種圓滿能為收放者得少智自在點瑜伽者智足師弟説於自身智薩埵心中標幟上修三摩地薩埵初發業者亦修彼事修彼所為如祥米金剛論師云如是精勤修瑜伽師若時心掉或復沉沒應如是修點瑜伽等謂於勤修勝曼陀羅等時為遣心隨沉掉轉故修點瑜伽是故初發業者修點瑜伽非為修奢摩他是破修習生起次第心生沈掉於所緣境不能堅固相續而轉之失爾時雖未得三摩地於一所緣相續久住然於修觀滅心沈掉最為殊勝此時又由持心細點能遮風息向外散動令於內住如如來金剛云由於臍處修細音韻瑜伽或於心等修習點等瑜伽靜慮能遮命向外轉故名命力故於上下二鼻或臍或心等處修習細字及細點等強攝心者由修習處與所緣事關係漸為向內住息之緣雖雜衆多觀擇之境然由漸次調息之力能速滅前掉舉等過故不同於餘論所説修學三摩地法若爾初發業與得少智位修微細點其法云何四百五十論云心光所化佛斷自邪分別令衆生成佛回入心種內住心標臍中於月心點形修自意光明由光鬘醒覺善修智薩埵意語身金剛想光入心中降自智甘露次一切內心毛孔放光明普照一切處圓滿利衆生此説修點瑜伽次第謂於自心智慧薩埵心中標幟臍內月輪上有種子從彼光明化生諸佛斷除有情邪執二障皆成正覺次召請彼與種子合彼種子點不異自心具大光明次由彼光漸照標幟內外智慧薩埵及彼住處身語意三金剛及彼住處內外次想如光顯照次第仍復收回集前點中降智甘露後想自身悉皆光明一一毛孔放淨光明照觸衆生若心沈沒想彼光明乃至沉銷應如是修若心掉舉即緣細點令心專注乃至掉息應如是修此是祥米金剛所説彼師又説除沉沒已數十次出入息由彼收放次第能覺智慧薩埵此如教授穗論所説出息時修放光入息時修收光他伽那説咒變為點或即修咒點之瑜伽如總論云生一切壇已安住輪中央次修細瑜伽此説修勝曼陀羅訖復於主尊鼻端修細瑜伽明炬論謂於上鼻端修細標幟及於祕處鼻端修微細點并於後者之內修能依所依曼陀羅此復初二位時但修微細標幟及點第三位後兼修細相之內二曼陀羅攝行論説學一念後當學分別瑜伽明炬論云於此芥子學習分別瑜伽當思動與不動金剛薩埵此説於細標幟及細點內修有動情界諸尊與不動器界宮殿是在已學一念之後龍猛派之已學一念與智足派之第三位其義相同龍猛派於初二位時若於上門修細相者謂於鼻端想主尊標幟藍色五股金剛杵量如芥子緣彼專注若於下門修細相者觀想父母等至溶菩提心成微細點於鼻端處量如芥子此復沉沒增上修上鼻端掉舉增上修下鼻端已説令心堅固方便點瑜伽法別有於心修習之法想三摩地薩埵光明順於阿嚩都底溶化頂上大樂輪中之菩提心仍由彼道入心間吽字等三摩地薩埵之點中緣此攝心餘於臍間修習點瑜伽法謂於臍心項頂四脈輪中脈結孔內依次明想暗吽嗡杭四字次由祕處脈輪之風吹動火輪猛利自性阿字熾然放光溶上三字降入臍間暗字成無分別當觀俱生歡喜自性細點而攝持心釋迦護師亦説修細點形毳衣大師説四輪字形色由下依次雜色向上青色向下紅色向上白色向下又説修彼脈輪諸字最極明顯許為生起次第支分次云如是修勝解成熟已釋迦護云修習圓滿謂於上説所緣能攝心已想從彼點放微細光成一焰聚次由彼光溶滴甘露充滿空點光焰隨息次於空點令心專住乃至見堅固相應如是修若得見堅固相想彼光焰照種種色則觀一切如掌中果亦能速滿妙三摩地心間臍中修點瑜伽是無畏論師説智足派於細點瑜伽亦通母部是第一位第三位者依三補扎金剛空行等經於四脈論不立諸字唯四主尊午二於第三位修微細點如是於初二位修習細點瑜伽心堅固已次修曼陀羅諸尊及彼眼等處所立諸尊善令明顯後於細相之內具修曼陀羅法四百五十論云又修自細相住明妃鼻端自證能仁輪謂於明妃鼻端觀想主尊標幟量如麥許於中具修曼陀羅法祥米金剛説於父母隨一祕處鼻端藥足論師説於金剛摩尼瓶中標幟之內修曼陀羅若心沈沒應於上鼻端修是為教授若於明妃蓮花標幟中修心生沈沒想自五股金剛中股變成鈎形鈎至明妃鼻端而修是故修處無定此中藥足論師説由自心種子放光鈎召諸佛溶化成菩提心降至祕處變成標幟於中而修教授穗論亦説彼義及前所説臍間細點降至祕處於中修曼陀羅彼二細相瑜伽處所説金剛與蓮花鼻端隨一即可明炬論文雖明顯説於細點修及於明妃蓮華中修然彼二者祕處相同祥米金剛説修細點瑜伽圓滿於標幟內修微細天藥足論師亦云又者謂修點瑜伽已為令心堅固故復修細相此説第三位所學習及於細點瑜伽串習得心堅固乃修細相故龍猛派亦從彼後乃學上門細相令心堅固此堅固已乃學細相收放學習此後相生為天學天收放此後乃於密處鼻端俱修微細諸尊又可先於上細標幟令心堅固及於下門具修微細諸尊此堅固已次於上門收放標幟及於下門收放諸尊生起微細曼陀羅法教授穗論説須臾生是為頓生此若未堅固時不修開放若得堅固相已乃修收放一切皆同相者寂靜論師藥足論師祥米金剛他伽那等説見陽焰及輕煙等五相明炬論説堅固謂所修金剛等安住不變攝真實經亦謂先修粗顯諸尊瑜伽圓滿後修細相量者真實光明論説細相堅固應修兩月收放應修一月此約緣微細相修奢摩他而説以是於初發業及降少智二位修細點者正為修現觀時斷除沉掉其於串習細相令生堅固修安住者是第三位所修應善分別以修細點所為界限如何修法是初次第中最勝教授故釋迦友説上門細相堅固即得身心輕安瑜伽等論多説彼在獲得奢摩他時故於爾時成奢摩他次以觀慧數修收放如餘論中緣盡所有性修毗鉢舍那由如是修能得止觀雙運勝三摩地如是瑜伽已得堅固即立彼為究竟生起次第集密二派共作此説無上部中緣微細點善持心時左右二息不向外轉於內安住依此諸界由頂降注引生大樂心離沉掉安住所緣生三摩地能久住等恐繁不録當從師知卯二生起次第之差別分二辰一明四支與四種瑜伽之總頌辰二明六支與三三摩地之總頌今初能攝生起次第總頌集密中説承事修行四支差別如集密後續云一切瑜伽續瑜伽師恆讚承事法第一第二為近修修行是第三大修行第四初承事支又分四法如集密云應修承事定勝菩提加行所説二次第中承事之義如明炬云由是承事樂解脫者所應學故名為承事藥足論師説是近義承事支中別分四法之承事者梵文訓詁含有所近與所緣義明炬論中於總標時説是真如但廣釋中緣菩提心説名承事故是由此而緣非緣此義菩提心緣真空性故是為承事定者由心於彼專一安住名三摩地勝菩提者謂修觀察虛那達咒所顯真如諸大菩提即名承事緣真實之承事悲足論師説護輪後修習空性故非唯於勝解諸尊收入光明始修空性善加行者從生智地乃至勝解諸尊收入自身是承事三摩地與善加行明炬論意承事及三摩地並如前説中間諸法收為彼支故立為承事支如是從生智地乃至勝解諸尊收入自身立為承事支者是後續釋與悲足師所説即明炬論意趣準此例餘從修空性至生宮殿諸座為承事支近修支者集密根本經云近修於勝成觀察金剛處明炬論説始從修日輪等至身圓滿生大印形為近修行拏熱巴師亦作是説所以名近修者悲足師云近謂近前能近清淨大印要待最初依怙清淨故是大印所近之處謂清淨天身之大印智身能近彼者謂最初依怙身此能成就圓滿次第時風心所成之受用身故清淨者謂圓滿次第之智身不清淨者即是咒身唯淨不淨之別若爾不立餘法為近修耶善根稱等雖有餘解然悲足説乃至最善瑜伽一切皆是近修妙符明炬總標之意若爾餘法云何釋為近修答云最初依怙正為近修餘法是彼支分或近修之眷屬攝為近修成者謂成大印之身悲足師謂於彼成就而安立等言金剛者謂從毗盧乃至妙害明王三十二尊處者謂從色蘊乃至足心悲足師謂此明安立字處言觀察者謂知安立身曼陀羅因果而安立之一往似説安立於最初依怙身實須安於轉成化身之身準此釋餘謂從五相生起主尊乃至加持諸處修行支者根本經云由修習咒主説修時策發咒謂嗡等主謂三重薩埵由修習彼及為加持三業策發身語意三金剛自與金剛平等一味之三昧耶名為修行由此能令三業與三金剛互無差別及成三重薩埵故為修行大修行者根本經云作大修行時自咒金剛形於冠想部主當成智金剛智金剛者謂具本尊瑜伽咒師彼先加持金剛蓮華而入等至班枳等自咒所生諸尊名有金剛彼等形者即修大印想以各部部主印定當得悉地明炬論説勝曼陀羅與勝事業由能修成廣大利他名大修行據此當知勝業亦是大修行攝亦顯彼前三支為初加行與修自利如是龍猛派説唯除積集資糧與修護輪二種加行其餘一切能依所依瑜伽須以承事修行四支總攝但於能依若於一尊則不別配四支智足派於主尊明妃勝曼陀羅諸尊別配承事修行四支許彼如次名為下中上品四支勝事業時亦配下中上三承事者謂生三昧耶近修者謂加持諸處修行謂加持身語意大修行謂灌頂部主印定此復如藥足説由近三有寂滅無住故名承事由近修行故名近修由修三門成三身故名為修行由灌三界法王頂故較前修行尤超勝故名大修行如此諸師所説則一一尊生起次第皆有承事修行四支然圓滿修承事修行四支則須具足三品須修曼陀羅輪生起次第此等是瑜伽續總攝生起次第差別隨順父續札拏經中亦作四聚總攝生起次第如云初修謂瑜伽第二隨瑜伽第三善瑜伽第四大瑜伽其廣釋亦如彼經云金剛薩埵滿此説名瑜伽彼等流天身稱為隨瑜伽一切輪圓滿許為善瑜伽加持身語意及諸尊眼等召入智慧輪大供養稱讚名為大瑜伽紅大威德第十九品亦如是説總釋瑜伽之義集密後續説為方便智慧和合無別此中則謂由五相證菩提所成法界智性因金剛持之三摩地隨瑜伽者寂靜論師釋為相似與前瑜伽相似即是果位金剛持之瑜伽若天瑜伽較前最為廣大名善瑜伽謂由父母等至放蓮華內所生天輪各住己處壇輪圓滿其次加持身語意等召入智尊灌頂印定供養稱讚嘗甘露味從修念誦至送智輪收攝三昧耶尊為大瑜伽持祥師説如此此中未攝中間瑜伽修習資糧護輪加行及生所依亦非四瑜伽中所攝童月論師從請福田至因位金剛持攝為瑜伽總論依金剛鬘經意於初加行分四瑜伽此等不於一尊作論依修曼陀羅輪而説辰二明六支與三三摩地之總頌母續總攝生起次第差別金剛幕經攝為六支彼第七云圓滿佛住處修普賢實法五相成本尊如是修壇輪供讚甘露等由此次第修謂六支加行義如難勝月論師云修金剛隨貪別修佛宮殿灌頂嘗甘露供讚修六支修六支瑜伽速得妙悉地宮為毗盧佛灌頂不動佛嘗甘露彌陀供養即不空稱讚為寶生貪為金剛心謂由六部分為六支第一支者謂從毗盧修生佛處宮殿如幕經云當修習法生想彼為佛處又云大勝毗盧佛從法界字生由彼生佛處義謂色是身心所依毗盧亦是諸佛色蘊自性故以彼生所依宮殿為第一支第二支者如幕經云應修五種相先想為士夫次放空行輪乾闥婆善入墮化後隨念四隅天女請勸已輪導師眼等立癡等三金剛三處次金剛隨貪善入智慧法第六支中從五相證菩提生起因位持金剛父母已加持二尊祕處起隨貪慢後出壇輪天女安立各處以歌勸請令從定起召入智尊加持眼等非謂不許彼等隨貪支攝故自修五相證菩提生能依天乃至生起圓滿三昧耶輪召入智尊加持諸處一切皆修金剛薩埵及彼隨貪之慢從自出生壇輪故是第二支攝此處金剛薩埵修隨貪者係由父母菩提化為壇輪諸尊當以主尊而修隨貪此許主尊即金剛薩埵故餘四支者幕經一句明一支云八明妃灌頂亦當嘗甘露八天女供養稱讚輪導師由不動尊作灌頂者以此灌頂是水灌頂彼是不動體故由彌陀尊嘗甘露者以彌陀佛是語金剛由嘗甘露飽足語金剛故由不空尊修供養者以不空佛是羯摩部供養諸佛益有情事彼自在故由寶生佛修稱讚者是讚功德以分身語意業德五法時寶生屬功德故此五無別即是金剛薩埵由彼六部能攝一切能依所依瑜伽餘念誦等例彼亦能攝故瑜伽與母二續所共金剛鬘經説以最初加行勝曼陀羅及勝事業三三摩地總攝生起次第如云瑜伽隨瑜伽善與大瑜伽略為初加行如是勝壇王勝業王瑜伽二種勝王為二瑜伽加四瑜伽是六瑜伽初四攝為最初加行故名三三摩地或三瑜伽諸母續中亦多以此三三摩地作修法總頌者此依父續母續共續直列彼名而説實則承事修行四支之義與六支等非不更互相攝若依無上部釋三三摩地初加行者謂化起曼陀羅諸尊之主尊父母三摩地生於餘二之前故名為初方便智慧和合無二故名加行此隨勝説據實從起所依至生父母一切皆此中攝從彼二尊菩提心化出曼陀羅諸尊乃至安立各處由於曼陀羅中安立壇輪圓滿名勝曼陀羅王其後諸尊作諸事業淨佛土等為勝業王若龍猛派於初加行以上有廣生三身法説為自利圓滿攝彼承事修行四支之前三支二種勝王是成佛後所作事業即大修行故依果位佛土身業取修為道由三三摩地與承事修行四支而作總攝其待所修治事與修圓滿次第安立要旨建立次第論釋已廣説訖寂靜師等多依三三摩地次第配自性受用變化身意謂初加行者初成自利能化天衆是故立為自性身或法身彼所生者利他色身之最初故勝曼陀羅王立為受用身彼住本處而各放出諸天往十方界饒益有情故勝業王立為化身若如此義則是修彼三身為道故修三三摩地為令了知第一次第瑜伽不出六部故作六支總攝一切生起次第根本瑜伽攝為四瑜伽者初二瑜伽修主尊父母為下品第三瑜伽於上加修圓滿天輪立為中品瑜伽最後修與智尊平等一味加持眼等立為上品瑜伽是為了知第一次第破除逆品有上中下三品能力智足派安立下中上三品亦於前前增加後後依除逆品粗中細立或與藥足所説相同智足派依七支為道而作生起次第差別最為重要如前已説彼等皆是第一次第希有總攝若本彼義而審觀察生起次第要旨是否圓滿即可了知
